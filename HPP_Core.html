<script>
  /**
   * ZETTBOT APP_STATE: GLOBAL STATE STORE
   * Re-architected for near-instant SPA Performance & Anti-Race Condition
   * ==========================================
   */
  var HPP_MODAL_APP_STATE = {
    data: {
      master: null,
      currentCabang: null,
      hpp: {
        gas: 0,
        listrik: 0,
        air: 0,
        packing: 0,
        bahan: 0,
        nota: 0,
        total: 0
      }
    },
    cache: {
      key: 'ZETT_MASTER_CACHE_V2',
      ttl: 300000 // 5 menit TTL
    },
    loading: false,
    locks: {}
  };

  // State Machine for ultra-fast, unblocking DOM updates
  var HPP_MODAL_STATE_MACHINE = {
    
    // 6. LOCK SYSTEM (ANTI DOUBLE CLICK)
    acquireLock: function(action) {
      if (APP_STATE.locks[action]) {
        console.warn(`[LOCKED] Action ${action} is currently running.`);
        return false;
      }
      APP_STATE.locks[action] = true;
      return true;
    },

    releaseLock: function(action) {
      APP_STATE.locks[action] = false;
    },

    // 1 & 2. MULTI-LAYER CACHING & SINGLE INITIAL FETCH
    fetchMasterPayload: async function(serverFunction) {
      if (!this.acquireLock('fetchMaster')) return APP_STATE.data.master;
      
      try {
        // Layer 1: Memory Cache (Instant)
        if (APP_STATE.data.master) return APP_STATE.data.master;

        // Layer 2: LocalStorage Cache with TTL (< 5ms)
        const cachedStr = localStorage.getItem(APP_STATE.cache.key);
        if (cachedStr) {
          try {
            const parsed = JSON.parse(cachedStr);
            if (Date.now() < parsed.expiry) {
              APP_STATE.data.master = parsed.data;
              return parsed.data;
            }
          } catch(e) { localStorage.removeItem(APP_STATE.cache.key); }
        }

        // Layer 3: Network Fetch (ONLY IF CACHE EXPIRED)
        APP_STATE.loading = true;
        const data = await new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            [serverFunction]();
        });

        // Save to caches
        APP_STATE.data.master = data;
        localStorage.setItem(APP_STATE.cache.key, JSON.stringify({
          data: data,
          expiry: Date.now() + APP_STATE.cache.ttl
        }));
        
        return data;
      } finally {
        APP_STATE.loading = false;
        this.releaseLock('fetchMaster');
      }
    },

    invalidateClientCache: function() {
      APP_STATE.data.master = null;
      localStorage.removeItem(APP_STATE.cache.key);
    },

    // 7. INSTANT UI RESPONSE & STATE MANAGER
    updateMetric: function(key, value) {
      if (!this.acquireLock('calcHPP')) return;
      APP_STATE.data.hpp[key] = value;
      this.calculateTotal();
      this.releaseLock('calcHPP');
    },
    
    calculateTotal: function() {
      const clean = value => {
        if (typeof window.zettCleanNumber === 'function') return window.zettCleanNumber(value);
        const number = Number(String(value ?? '').replace(/[^\d.-]/g, ''));
        return Number.isFinite(number) ? number : 0;
      };
      const gas = clean(APP_STATE.data.hpp.gas);
      let listrik = clean(APP_STATE.data.hpp.listrik);
      if (!listrik && typeof window.zettGetActiveElectricDashboardValueFromRow === 'function') {
        listrik = window.zettGetActiveElectricDashboardValueFromRow();
      }
      const air = clean(APP_STATE.data.hpp.air);
      const packing = clean(APP_STATE.data.hpp.packing);
      const bahan = clean(APP_STATE.data.hpp.bahan);
      const nota = clean(APP_STATE.data.hpp.nota);
      Object.assign(APP_STATE.data.hpp, { gas, listrik, air, packing, bahan, nota });
      APP_STATE.data.hpp.total = gas + listrik + air + packing + bahan + nota;
      
      // Hardware accelerated UI rendering untuk 60fps frame rate
      window.requestAnimationFrame(() => {
        this.renderDashboard();
      });
    },
    
    renderDashboard: function() {
      console.log('[HPP_TRACE_10_BEFORE_RENDER_DASHBOARD]');
      if (!window.__HPP_RENDER_LOOP_ZEROING__) {
        window.__HPP_RENDER_COUNTER__ = window.__HPP_RENDER_COUNTER__ || 0;
        window.__HPP_RENDER_COUNTER__ += 1;
        console.log('[HPP_RENDER_COUNTER]', window.__HPP_RENDER_COUNTER__);
      }
      if (!window.__HPP_RENDER_LOOP_ZEROING__ && window.__HPP_RENDER_COUNTER__ > 20) {
        console.error('[HPP_RENDER_LOOP_DETECTED]', {
          selectedOutlet: document.getElementById('inputNamaHPP')?.value || '',
          counter: window.__HPP_RENDER_COUNTER__
        });
        if (typeof window.renderHPPZeroState === 'function') {
          window.renderHPPZeroState(document.getElementById('inputNamaHPP')?.value || '', { skipRenderLoopCounter: true });
        }
        return;
      }
      const clean = value => {
        if (typeof window.zettCleanNumber === 'function') return window.zettCleanNumber(value);
        const number = Number(String(value ?? '').replace(/[^\d.-]/g, ''));
        return Number.isFinite(number) ? number : 0;
      };
      let gas = Math.max(0, clean(APP_STATE.data.hpp.gas));
      let listrik = Math.max(0, clean(APP_STATE.data.hpp.listrik));
      let air = Math.max(0, clean(APP_STATE.data.hpp.air));
      let packing = Math.max(0, clean(APP_STATE.data.hpp.packing));
      let bahan = Math.max(0, clean(APP_STATE.data.hpp.bahan));
      let nota = Math.max(0, clean(APP_STATE.data.hpp.nota));
      if (typeof window.zettIsHPPOutletNotSelected_ === 'function' && window.zettIsHPPOutletNotSelected_()) {
        gas = 0;
        listrik = 0;
        air = 0;
        packing = 0;
        bahan = 0;
        nota = 0;
        APP_STATE.data.hpp.gas = 0;
        APP_STATE.data.hpp.listrik = 0;
        APP_STATE.data.hpp.air = 0;
        APP_STATE.data.hpp.packing = 0;
        APP_STATE.data.hpp.bahan = 0;
        APP_STATE.data.hpp.nota = 0;
        APP_STATE.data.hpp.total = 0;
      } else if (!listrik && typeof window.zettGetActiveElectricDashboardValueFromRow === 'function') {
        listrik = window.zettGetActiveElectricDashboardValueFromRow();
        if (listrik > 0) APP_STATE.data.hpp.listrik = listrik;
      }
      const displayTotal = gas + listrik + air + packing + bahan + nota;
      Object.assign(APP_STATE.data.hpp, { gas, listrik, air, packing, bahan, nota, total: displayTotal });
      
      const totalEl = document.getElementById('dash-hpp-total');
      if(totalEl && typeof formatRupiah === 'function') {
        totalEl.innerText = formatRupiah(displayTotal);
        
        if(document.getElementById('dash-card-gas')) document.getElementById('dash-card-gas').innerText = formatRupiah(gas);
        if(document.getElementById('dash-card-listrik')) document.getElementById('dash-card-listrik').innerText = formatRupiah(listrik);
        if(document.getElementById('dash-card-air')) document.getElementById('dash-card-air').innerText = formatRupiah(air);
        if(document.getElementById('dash-card-packing')) document.getElementById('dash-card-packing').innerText = formatRupiah(packing);
        if(document.getElementById('dash-card-bahan')) document.getElementById('dash-card-bahan').innerText = formatRupiah(bahan);
        if(document.getElementById('dash-card-nota')) document.getElementById('dash-card-nota').innerText = formatRupiah(nota);
      }
      
      const donut = document.getElementById('hpp-donut-chart');
      const labelsContainer = document.getElementById('hpp-donut-labels');

      if (donut && displayTotal > 0) {
        console.log('[HPP_TRACE_11_BEFORE_UPDATE_DONUT]');
        let pctGas = (gas / displayTotal) * 100;
        let pctListrik = (listrik / displayTotal) * 100;
        let pctAir = (air / displayTotal) * 100;
        let pctPacking = (packing / displayTotal) * 100;
        let pctBahan = (bahan / displayTotal) * 100;
        let pctNota = (nota / displayTotal) * 100;

        let cGas = pctGas;
        let cListrik = cGas + pctListrik;
        let cAir = cListrik + pctAir;
        let cPacking = cAir + pctPacking;
        let cBahan = cPacking + pctBahan;

        if (![pctGas, pctListrik, pctAir, pctPacking, pctBahan, pctNota, cGas, cListrik, cAir, cPacking, cBahan].every(Number.isFinite)) {
          donut.style.setProperty('--p-gas', `0%`);
          donut.style.setProperty('--p-listrik', `0%`);
          donut.style.setProperty('--p-air', `0%`);
          donut.style.setProperty('--p-packing', `0%`);
          donut.style.setProperty('--p-bahan', `0%`);
          if (labelsContainer) labelsContainer.innerHTML = '';
          return;
        }

        donut.style.setProperty('--p-gas', `${cGas}%`);
        donut.style.setProperty('--p-listrik', `${cListrik}%`);
        donut.style.setProperty('--p-air', `${cAir}%`);
        donut.style.setProperty('--p-packing', `${cPacking}%`);
        donut.style.setProperty('--p-bahan', `${cBahan}%`);

        if (labelsContainer) {
            labelsContainer.innerHTML = '';
            let currentAnglePct = 0;
            const slices = [pctGas, pctListrik, pctAir, pctPacking, pctBahan, pctNota];
            
            slices.forEach(slicePct => {
                if (slicePct >= 4) { 
                    let midPct = currentAnglePct + (slicePct / 2);
                    let angleDeg = (midPct * 3.6) - 90;
                    let rad = angleDeg * Math.PI / 180;
                    let r = 98; 
                    let x = 120 + r * Math.cos(rad);
                    let y = 120 + r * Math.sin(rad);
                    
                    let label = document.createElement('div');
                    label.className = 'absolute text-[11px] font-black text-white tracking-wider drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] z-20';
                    label.style.left = x + 'px';
                    label.style.top = y + 'px';
                    label.style.transform = 'translate(-50%, -50%)';
                    label.innerText = Math.round(slicePct) + '%';
                    labelsContainer.appendChild(label);
                }
                currentAnglePct += slicePct;
            });
        }

      } else if (donut) {
        donut.style.setProperty('--p-gas', `0%`);
        donut.style.setProperty('--p-listrik', `0%`);
        donut.style.setProperty('--p-air', `0%`);
        donut.style.setProperty('--p-packing', `0%`);
        donut.style.setProperty('--p-bahan', `0%`);
        if (labelsContainer) labelsContainer.innerHTML = '';
      }
    }
  };
</script>

<script id="zett-hpp-component-card-display-unit-20260609">
  (function zettHPPComponentCardDisplayUnit20260609() {
    const loadUnitCards = ['gas', 'listrik', 'air', 'nota'];

    function byId(id) { return document.getElementById(id); }

    function textOf(value) {
      return String(value || '').trim();
    }

    function isSelfService() {
      const selected = textOf(byId('inputNamaHPP')?.value).toLowerCase();
      const row = typeof window.zettFindActiveHPPRow === 'function' ? (window.zettFindActiveHPPRow() || {}) : {};
      const outlet = typeof window.zettFindActiveOutletRow === 'function' ? (window.zettFindActiveOutletRow() || {}) : {};
      const sources = [
        outlet.kategori,
        outlet.kategoriLaundry,
        outlet['Kategori Laundry'],
        row.kategori,
        row.kategoriLaundry,
        row['Kategori Laundry'],
        byId('inputKategori')?.value
      ];

      if (selected && Array.isArray(window.masterDataHPP)) {
        const match = window.masterDataHPP.find(function(item) {
          return textOf(item?.namaOutlet || item?.['Nama Outlet']).toLowerCase() === selected;
        });
        if (match) sources.push(match.kategoriLaundry, match.kategori, match['Kategori Laundry']);
      }

      return sources.some(function(value) {
        return textOf(value).toLowerCase().includes('self');
      });
    }

    function normalizeMoneyText(raw) {
      return textOf(raw).replace(/\s*\/\s*(kg|load)\s*$/i, '');
    }

    function applyUnit() {
      const page = byId('view-hpp');
      const noOutlet = typeof window.zettIsHPPOutletNotSelected_ === 'function'
        ? window.zettIsHPPOutletNotSelected_()
        : !textOf(byId('inputNamaHPP')?.value);
      const self = !noOutlet && isSelfService();
      if (page) {
        page.classList.toggle('hpp-no-outlet-components', !!noOutlet);
        page.classList.toggle('hpp-self-service-components', !!self);
      }

      if (noOutlet) {
        loadUnitCards.forEach(function(type) {
          const el = byId('dash-card-' + type);
          if (el) el.textContent = normalizeMoneyText(el.textContent);
        });
        return;
      }

      if (!self) return;

      loadUnitCards.forEach(function(type) {
        const el = byId('dash-card-' + type);
        if (!el) return;
        const money = normalizeMoneyText(el.textContent);
        if (money) el.textContent = money;
      });
    }

    function scheduleUnit() {
      requestAnimationFrame(applyUnit);
      setTimeout(applyUnit, 80);
    }

    function wrap(name) {
      const original = window[name];
      if (typeof original !== 'function' || original.__hppComponentUnitWrapped) return;
      const wrapped = function() {
        const result = original.apply(this, arguments);
        scheduleUnit();
        return result;
      };
      wrapped.__hppComponentUnitWrapped = true;
      window[name] = wrapped;
    }

    function boot() {
      ['zettHPPUpdateDashboardFromState', 'calculateGas', 'calculateListrik', 'calculateAir', 'calculateNota'].forEach(wrap);
      scheduleUnit();
      setTimeout(scheduleUnit, 450);
      const outlet = byId('inputNamaHPP');
      if (outlet && !outlet.__hppComponentUnitBound) {
        outlet.__hppComponentUnitBound = true;
        outlet.addEventListener('change', scheduleUnit);
        outlet.addEventListener('input', scheduleUnit);
      }
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot, { once: true });
    else boot();
  })();
</script>

<script id="zett-hpp-form-controller-restore">
  /**
   * ======================================================================
   * ZETTBOT FIX: HPP FORM CONTROLLER RESTORE
   * Mengembalikan fungsi klik card HPP -> form input + tombol CRUD/update.
   * Tidak menyentuh backend, spreadsheet, database, atau struktur HTML.
   * ====================================================================== */
  (function zettHppFormControllerRestore() {
    function byId(id) { return document.getElementById(id); }

    function showEl(el, displayValue) {
      if (!el) return;
      el.classList.remove('hidden');
      el.style.display = displayValue || '';
      el.style.pointerEvents = 'auto';
      el.style.opacity = '1';
      el.style.filter = 'none';
    }

    function hideEl(el) {
      if (!el) return;
      el.classList.add('hidden');
      el.style.display = 'none';
    }

    function runHppCalculators() {
      const tasks = [
        function() { if (typeof toggleAirInputs === 'function') toggleAirInputs(); },
        function() { if (typeof toggleBahanActive === 'function') toggleBahanActive(); },
        function() { if (typeof toggleBahanInputs === 'function') toggleBahanInputs(); },
        function() { if (typeof toggleNotaInputs === 'function') toggleNotaInputs(); },
        function() { if (typeof calculateGas === 'function') calculateGas(); },
        function() { if (typeof calculateListrik === 'function') calculateListrik(); },
        function() { if (typeof calculateAir === 'function') calculateAir(); },
        function() { if (typeof calculatePacking === 'function') calculatePacking(); },
        function() { if (typeof calculateBahanBaku === 'function') calculateBahanBaku(); },
        function() { if (typeof calculateNota === 'function') calculateNota(); },
        function() { if (typeof StateMachine !== 'undefined' && StateMachine.calculateTotal) StateMachine.calculateTotal(); }
      ];
      if (typeof window.zettRunHPPTaskQueue_ === 'function') window.zettRunHPPTaskQueue_(window.__zettBranchSwitchToken, tasks);
      else tasks.forEach(function(task) { try { task(); } catch(e) { console.error(e); } });
    }

    function restoreOldHppData() {
      const selectHPP = byId('inputNamaHPP');
      const namaCabang = selectHPP ? selectHPP.value : '';

      if (namaCabang && typeof populateFormHPP === 'function') {
        try {
          if (typeof window.zettWithHPPPopulationGuard_ === 'function') {
            window.zettWithHPPPopulationGuard_(function() { populateFormHPP(namaCabang); });
          } else {
            populateFormHPP(namaCabang);
          }
        } catch(e) { console.error('populateFormHPP error:', e); }
      } else if (!namaCabang && typeof loadHPPFromLocal === 'function') {
        try { loadHPPFromLocal(); } catch(e) { console.error('loadHPPFromLocal error:', e); }
      }

      try { if (typeof toggleActionButtons === 'function') toggleActionButtons(); } catch(e) { console.error(e); }
      try { if (typeof checkHPPLock === 'function') checkHPPLock(); } catch(e) { console.error(e); }
      runHppCalculators();
    }

    function revealHppTab(type) {
      document.querySelectorAll('#view-hpp .tab-content').forEach(tab => {
        hideEl(tab);
        tab.classList.remove('hpp-form-enter-final', 'hpp-view-enter-premium');
      });

      const targetTab = byId('tab-' + type);
      if (targetTab) {
        showEl(targetTab, 'grid');
        void targetTab.offsetWidth;
        targetTab.classList.add('hpp-form-enter-final');
      }
    }

    window.openHPPForm = function(type, title) {
      const dashboard = byId('hpp-dashboard-view');
      const formView = byId('hpp-form-view');
      const titleEl = byId('hpp-form-title-text');

      if (titleEl) titleEl.textContent = title || 'Analisa Biaya';

      hideEl(dashboard);
      showEl(formView, 'block');
      formView.classList.remove('hpp-form-enter-final', 'hpp-view-enter-premium');
      void formView.offsetWidth;
      formView.classList.add('hpp-form-enter-final');

      revealHppTab(type);
      restoreOldHppData();

      const btnSimpan = byId('btnSimpanHPP');
      const btnUpdate = byId('btnUpdateHPP');
      if (btnSimpan) btnSimpan.style.display = btnSimpan.classList.contains('hidden') ? 'none' : '';
      if (btnUpdate) btnUpdate.style.display = btnUpdate.classList.contains('hidden') ? 'none' : '';

      const scroller = byId('mainViewScroller') || document.querySelector('.custom-scroll');
      if (scroller && typeof scroller.scrollTo === 'function') {
        requestAnimationFrame(() => scroller.scrollTo({ top: 0, behavior: 'smooth' }));
      }
    };

    window.closeHPPForm = function() {
      const dashboard = byId('hpp-dashboard-view');
      const formView = byId('hpp-form-view');

      hideEl(formView);
      document.querySelectorAll('#view-hpp .tab-content').forEach(tab => hideEl(tab));

      showEl(dashboard, 'grid');
      dashboard.classList.remove('hpp-dashboard-return-final', 'hpp-view-enter-premium');
      void dashboard.offsetWidth;
      dashboard.classList.add('hpp-dashboard-return-final');

      try { if (typeof checkHPPLock === 'function') checkHPPLock(); } catch(e) { console.error(e); }
    };
  })();
</script>

<script id="zett-hpp-spatial-performance-bridge">
  /**
   * ======================================================================
   * ZETTBOT HPP SPATIAL PERFORMANCE BRIDGE
   * Native Vanilla JS, non-blocking, tidak mengubah backend/database.
   * ====================================================================== */
  (function zettHppSpatialPerformanceBridge() {
    const ready = (fn) => {
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', fn, { once: true });
      else fn();
    };

    function markInteractiveCards() {
      document.querySelectorAll('#view-hpp .hpp-card-dash').forEach((card) => {
        if (!card.hasAttribute('tabindex')) card.setAttribute('tabindex', '0');
        if (!card.hasAttribute('role')) card.setAttribute('role', 'button');
        card.addEventListener('keydown', function(event) {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            card.click();
          }
        }, { passive: false });
      });
    }

    function applyInitialSkeleton() {
      const targets = ['dash-hpp-total', 'dash-card-gas', 'dash-card-listrik', 'dash-card-air', 'dash-card-packing', 'dash-card-bahan', 'dash-card-nota'];
      targets.forEach((id) => {
        const el = document.getElementById(id);
        if (el && /^Rp\s?0$/i.test(el.textContent.trim())) el.classList.add('hpp-skeleton-pulse');
      });
      window.setTimeout(() => {
        targets.forEach((id) => {
          const el = document.getElementById(id);
          if (el) el.classList.remove('hpp-skeleton-pulse');
        });
      }, 650);
    }

    function singleViewEnter(target) {
      if (!target) return;
      target.classList.remove('hpp-view-enter-premium');
      void target.offsetWidth;
      target.classList.add('hpp-view-enter-premium');
    }

    function bridgeHppFormTransition() {
      const originalOpen = window.openHPPForm;
      if (typeof originalOpen === 'function' && !originalOpen.__zettSpatialWrapped) {
        const wrapped = function(type, title) {
          const result = originalOpen.apply(this, arguments);
          window.requestAnimationFrame(() => {
            singleViewEnter(document.getElementById('hpp-form-view'));
            const activeTab = document.getElementById('tab-' + type);
            singleViewEnter(activeTab);
            const scroller = document.getElementById('mainViewScroller') || document.querySelector('.custom-scroll');
            if (scroller && typeof scroller.scrollTo === 'function') scroller.scrollTo({ top: 0, behavior: 'smooth' });
          });
          return result;
        };
        wrapped.__zettSpatialWrapped = true;
        window.openHPPForm = wrapped;
      }

      const originalClose = window.closeHPPForm;
      if (typeof originalClose === 'function' && !originalClose.__zettSpatialWrapped) {
        const wrappedClose = function() {
          const result = originalClose.apply(this, arguments);
          window.requestAnimationFrame(() => singleViewEnter(document.getElementById('hpp-dashboard-view')));
          return result;
        };
        wrappedClose.__zettSpatialWrapped = true;
        window.closeHPPForm = wrappedClose;
      }
    }

    function bridgeRenderDashboard() {
      if (!window.StateMachine || typeof window.StateMachine.renderDashboard !== 'function' || window.StateMachine.renderDashboard.__zettSpatialWrapped) return;
      const originalRender = window.StateMachine.renderDashboard.bind(window.StateMachine);
      const wrappedRender = function() {
        window.requestAnimationFrame(() => {
          originalRender();
          document.querySelectorAll('#view-hpp .hpp-skeleton-pulse').forEach(el => el.classList.remove('hpp-skeleton-pulse'));
        });
      };
      wrappedRender.__zettSpatialWrapped = true;
      window.StateMachine.renderDashboard = wrappedRender;
    }

    ready(() => {
      markInteractiveCards();
      applyInitialSkeleton();
      bridgeHppFormTransition();
      bridgeRenderDashboard();
      singleViewEnter(document.getElementById('hpp-dashboard-view'));
    });
  })();
</script>

<script id="zett-hpp-umkm-compact-percent-bridge">
  /**
   * Menambah informasi kontribusi per komponen tanpa mengubah logic kalkulasi.
   * Data tetap berasal dari APP_STATE.data.hpp yang sudah dipakai dashboard HPP.
   */
  (function zettHppUmkmCompactPercentBridge() {
    const map = {
      gas: 'dash-card-gas',
      listrik: 'dash-card-listrik',
      air: 'dash-card-air',
      packing: 'dash-card-packing',
      bahan: 'dash-card-bahan',
      nota: 'dash-card-nota'
    };

    function ensurePercentNodes() {
      Object.keys(map).forEach((key) => {
        const valueEl = document.getElementById(map[key]);
        if (!valueEl) return;
        const id = map[key] + '-pct';
        if (document.getElementById(id)) return;
        const pct = document.createElement('p');
        pct.id = id;
        pct.className = 'hpp-card-percent';
        pct.textContent = '0% dari HPP';
        valueEl.insertAdjacentElement('afterend', pct);
      });
    }

    function updatePercentNodes() {
      ensurePercentNodes();
      try {
        if (typeof APP_STATE === 'undefined' || !APP_STATE.data || !APP_STATE.data.hpp) return;
        const hpp = APP_STATE.data.hpp;
        const total = Number(hpp.total || 0);
        Object.keys(map).forEach((key) => {
          const pctEl = document.getElementById(map[key] + '-pct');
          if (!pctEl) return;
          const value = Number(hpp[key] || 0);
          const pct = total > 0 ? Math.round((value / total) * 100) : 0;
          pctEl.textContent = pct + '% dari HPP';
        });
      } catch (error) {
        console.error('Gagal update persentase card HPP:', error);
      }
    }

    function wrapRenderDashboard() {
      try {

  (function zettHPPActiveOutletZeroGuard20260521() {
    function normalizeText(value) {
      return String(value == null ? '' : value).trim().replace(/\s+/g, ' ');
    }

    function isEmptyOutletLabel(value) {
      const text = normalizeText(value).toLowerCase();
      if (!text) return true;
      return (
        text === '-' ||
        text === 'undefined' ||
        text === 'null' ||
        text === 'semua cabang' ||
        text.includes('pilih cabang') ||
        text.includes('pilih outlet') ||
        text.includes('select branch') ||
        text.includes('select outlet')
      );
    }

    function readElementValue(selector, attr) {
      const el = document.querySelector(selector);
      if (!el) return null;
      return attr ? el.getAttribute(attr) : (el.value != null ? el.value : el.textContent);
    }

    function getActiveHPPOutletName() {
      const controlSources = [
        readElementValue('#inputNamaHPP'),
        readElementValue('#namaOutletHPP'),
        readElementValue('#selectCabangHPP'),
        readElementValue('#dropdownCabangHPP'),
        readElementValue('[data-hpp-selected-outlet]', 'data-hpp-selected-outlet'),

        readElementValue('.hpp-selected-outlet'),
        readElementValue('.selected-outlet-name')
      ];

      for (const source of controlSources) {
        if (source == null) continue;
        const value = normalizeText(source);
        return isEmptyOutletLabel(value) ? '' : value;
      }

      const state = window.APP_STATE || {};
      const possibleSources = [
        window.selectedCabangHPP,

  (function zettHPPHybridCompat20260512() {
    const HPP_TYPES = ['gas', 'listrik', 'air', 'packing', 'bahan', 'nota'];

    const TITLE_MAP = {
      gas: 'Analisa Biaya Gas',
      listrik: 'Analisa Biaya Listrik',
      air: 'Analisa Biaya Air',
      packing: 'Analisa Biaya Packing',
      bahan: 'Analisa Biaya Chemical',
      nota: 'Analisa Biaya Nota & Kasir'
    };

    const KEY_MAP = {
      gas: ['gas', 'lpg'],
      listrik: ['listrik'],
      air: ['air', 'pdam'],
      packing: ['packing', 'plastik'],
      bahan: ['chemical', 'bahan'],
      nota: ['nota', 'admin', 'kasir']
    };

    function byId(id) {
      return document.getElementById(id);
    }

    window.ZETT_DEBUG_HPP_SAFE = window.ZETT_DEBUG_HPP_SAFE ?? true;
    function hppSafeDebug(label, payload) {
      if (!window.ZETT_DEBUG_HPP_SAFE) return;
      try {
        if (arguments.length > 1) console.log(label, payload, { t: Math.round(performance.now()) });
        else console.log(label, { t: Math.round(performance.now()) });
      } catch (error) {}
    }
    function hppSafeError(label, payload) {
      if (!window.ZETT_DEBUG_HPP_SAFE) return;
      try { console.error(label, payload, { t: Math.round(performance.now()) }); } catch (error) {}
    }
    window.zettHPPSafeDebug = window.zettHPPSafeDebug || hppSafeDebug;
    window.zettHPPSafeError = window.zettHPPSafeError || hppSafeError;

    function safeNumberHPP(value) {
      if (typeof value === 'number') return Number.isFinite(value) ? value : 0;
      let raw = String(value ?? '').trim();
      if (!raw) return 0;
      raw = raw.replace(/[^\d.,-]/g, '');
      const hasComma = raw.includes(',');
      const hasDot = raw.includes('.');
      if (hasComma && hasDot) {
        raw = raw.lastIndexOf(',') > raw.lastIndexOf('.')
          ? raw.replace(/\./g, '').replace(',', '.')
          : raw.replace(/,/g, '');
      } else if (hasDot) {
        const parts = raw.split('.');
        raw = parts.length > 1 && parts.slice(1).every(part => part.length === 3) ? parts.join('') : raw;
      } else if (hasComma) {
        const parts = raw.split(',');
        raw = parts.length > 1 && parts.slice(1).every(part => part.length === 3) ? parts.join('') : raw.replace(',', '.');
      }
      const number = Number(raw);
      return Number.isFinite(number) ? number : 0;
    }

    function parseNumber(value) {
      return safeNumberHPP(value);
    }

    function formatRupiahCompat(value) {
      if (typeof formatRupiah === 'function') {
        try { return formatRupiah(Math.max(0, safeNumberHPP(value))); } catch (error) {}
      }
      return 'Rp ' + Math.max(0, safeNumberHPP(value)).toLocaleString('id-ID');
    }

    function pickHPPNumber(row, keys) {
      if (!row) return 0;
      for (const key of keys) {
        const value = safeNumberHPP(row[key]);
        if (value > 0) return value;
      }
      return 0;
    }

    function getActiveElectricDashboardValueFromRow() {
      const row = typeof window.zettFindActiveHPPRow === 'function' ? window.zettFindActiveHPPRow() : null;

function zettNormalizeName(value) {
  return String(value || '')
    .replace(/\u00A0/g, ' ')
    .trim()
    .toLowerCase()
    .replace(/\s+/g, ' ');
}

function zettCleanNumber(value) {
  if (typeof value === 'number') return Number.isFinite(value) ? value : 0;

  let raw = String(value || '').trim();
  if (!raw) return 0;

  raw = raw.replace(/[^\d.,-]/g, '');

  const hasComma = raw.includes(',');
  const hasDot = raw.includes('.');

  if (hasComma && hasDot) {
    const lastComma = raw.lastIndexOf(',');
    const lastDot = raw.lastIndexOf('.');
    raw = lastComma > lastDot
      ? raw.replace(/\./g, '').replace(',', '.')
      : raw.replace(/,/g, '');
  } else if (hasDot) {
    const parts = raw.split('.');
    const isThousands = parts.length > 1 && parts.slice(1).every(part => part.length === 3);
    raw = isThousands ? parts.join('') : raw;
  } else if (hasComma) {
    const parts = raw.split(',');
    const isThousands = parts.length > 1 && parts.slice(1).every(part => part.length === 3);
    raw = isThousands ? parts.join('') : raw.replace(',', '.');
  }

  return Number(raw) || 0;
}

function zettToNumberSafe(value) {
  if (typeof zettCleanNumber === 'function') return zettCleanNumber(value);
  if (typeof value === 'number') return Number.isFinite(value) ? value : 0;
  let raw = String(value == null ? '' : value).trim();
  if (!raw) return 0;
  raw = raw.replace(/[^\d.,-]/g, '');
  const hasComma = raw.includes(',');
  const hasDot = raw.includes('.');
  if (hasComma && hasDot) {
    raw = raw.lastIndexOf(',') > raw.lastIndexOf('.')
      ? raw.replace(/\./g, '').replace(',', '.')
      : raw.replace(/,/g, '');
  } else if (hasDot) {
    const parts = raw.split('.');
    raw = parts.length > 1 && parts.slice(1).every(part => part.length === 3) ? parts.join('') : raw;
  } else if (hasComma) {
    const parts = raw.split(',');
    raw = parts.length > 1 && parts.slice(1).every(part => part.length === 3) ? parts.join('') : raw.replace(',', '.');
  }
  const n = Number(raw);
  return Number.isFinite(n) ? n : 0;
}
window.zettToNumberSafe = zettToNumberSafe;

function ensureHPPCardDetailContainer(type) {
  const valueEl = document.getElementById('dash-card-' + type);
  if (!valueEl) return null;
  const id = 'dash-card-' + type + '-details';
  const shouldAttachAfterValue = ['packing', 'bahan', 'nota'].includes(type);
  let detail = document.getElementById(id);
  if (!detail) {
    const card = valueEl.closest('.hpp-card-dash');
    detail = card ? card.querySelector('.zett-' + type + '-card-details, .hpp-premium-lite-details') : null;
    if (!detail) {
      zettRemoveOldHPPDetailContainers_(type, card, null);
      if (type === 'packing') {
        let oldPacking = document.getElementById('dash-card-packing-details');
        if (oldPacking) oldPacking.remove();
      }
      if (type === 'bahan') {
        let oldChemical = document.getElementById('dash-card-bahan-details');
        if (oldChemical) oldChemical.remove();
      }
      detail = document.createElement('div');
      const pctEl = document.getElementById('dash-card-' + type + '-pct');
      if (!shouldAttachAfterValue && pctEl && pctEl.parentElement) pctEl.insertAdjacentElement('afterend', detail);
      else valueEl.insertAdjacentElement('afterend', detail);
    }
    detail.id = id;
  }
  zettRemoveOldHPPDetailContainers_(type, valueEl.closest('.hpp-card-dash'), detail);
  detail.classList.add('hpp-card-breakdown', 'zett-hpp-card-details', 'zett-' + type + '-card-details');
  if (shouldAttachAfterValue && detail.previousElementSibling !== valueEl) {
    valueEl.insertAdjacentElement('afterend', detail);
  }
  return detail;
}

function zettDedupeMetricsByLabel(metrics) {
  const seen = new Set();
  return (metrics || []).filter(function(item) {
    const key = String(item && item.label || '').trim().toLowerCase();
    if (!key || seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function zettSyncHPPDetailGapFromElectric() {
  const electricValue = document.getElementById('dash-card-listrik');
  const electricDetail = document.getElementById('dash-card-listrik-details');
  const firstElectricRow = electricDetail ? electricDetail.querySelector('div') : null;
  if (!electricValue || !firstElectricRow) return;

  const targetGap = Math.max(
    2,
    Math.round(firstElectricRow.getBoundingClientRect().top - electricValue.getBoundingClientRect().bottom) - 4
  );

  ['packing', 'bahan', 'nota'].forEach(function(type) {
    const detail = document.getElementById('dash-card-' + type + '-details');
    if (!detail) return;

    detail.style.transform = 'none';

    // Packing & Chemical dikunci compact agar detail tidak turun terlalu jauh.
    if (type === 'packing' || type === 'bahan') {
      detail.style.marginTop = '10px';
      return;
    }

    // Nota tetap mengikuti behavior lama.
    detail.style.marginTop = targetGap + 'px';
  });

function zettGetHPPMasterDataSources() {
  const candidates = [];

  if (Array.isArray(window.__ZETT_FRESH_HPP_ROWS)) {
    candidates.push(window.__ZETT_FRESH_HPP_ROWS);
  }

  if (typeof masterDataHPP !== 'undefined' && Array.isArray(masterDataHPP)) {
    candidates.push(masterDataHPP);
  }

  if (Array.isArray(window.masterDataHPP)) {
    candidates.push(window.masterDataHPP);
  }

  if (typeof APP_STATE !== 'undefined' && APP_STATE && APP_STATE.data) {
    if (Array.isArray(APP_STATE.data.hppMaster)) candidates.push(APP_STATE.data.hppMaster);
    if (Array.isArray(APP_STATE.data.hppRows)) candidates.push(APP_STATE.data.hppRows);
    if (APP_STATE.data.master && Array.isArray(APP_STATE.data.master.hpp)) candidates.push(APP_STATE.data.master.hpp);
    if (Array.isArray(APP_STATE.data.hpp)) candidates.push(APP_STATE.data.hpp);
  }

  if (window.APP_STATE && window.APP_STATE.data) {
    if (window.APP_STATE.data.master && Array.isArray(window.APP_STATE.data.master.hpp)) candidates.push(window.APP_STATE.data.master.hpp);
    if (Array.isArray(window.APP_STATE.data.hppMaster)) candidates.push(window.APP_STATE.data.hppMaster);
  }

  try {
    const cacheKey = (typeof APP_STATE !== 'undefined' && APP_STATE?.cache?.key) || (window.APP_STATE?.cache?.key);
    if (cacheKey) {
      const cached = localStorage.getItem(cacheKey);
      if (cached) {
        const parsed = JSON.parse(cached);
        if (parsed && parsed.data && Array.isArray(parsed.data.hpp)) candidates.push(parsed.data.hpp);
      }
    }
  } catch (error) {}

  const merged = [];
  const seen = {};
  candidates.forEach(arr => {
    if (!Array.isArray(arr)) return;
    arr.forEach(row => {
      if (!row || typeof row !== 'object') return;
      const rowName = row.namaOutlet || row.outlet || row.cabang || row.namaCabang || row['Nama Outlet'] || row['Nama_Outlet'] || '';
      const key = zettNormalizeName(rowName) || ('__row_' + merged.length);
      if (seen[key]) return;
      seen[key] = true;
      merged.push(row);
    });
  });
  return merged;
}

function zettFindActiveHPPRow() {
  const outletName = document.getElementById('inputNamaHPP')?.value || '';

  if (!outletName) {
    console.warn('Outlet aktif belum dipilih.');
    return null;
  }

  const dataHPP = zettGetHPPMasterDataSources();

  if (!Array.isArray(dataHPP) || dataHPP.length === 0) {
    console.warn('masterDataHPP belum tersedia.');
    return null;
  }

  const activeName = zettNormalizeName(outletName);
  const cache = window.__ZETT_HPP_ACTIVE_ROW_CACHE || {};
  if (
    cache.name === activeName &&
    cache.source === dataHPP &&
    cache.length === dataHPP.length &&
    cache.row
  ) {
    return cache.row;
  }

  console.log('[HPP_OUTLET_MATCH_DEBUG]', {
    selectedOutlet: outletName,
    normalizedSelected: activeName,
    availableOutlets: dataHPP.map(item => item?.namaOutlet || item?.outlet || item?.cabang || item?.namaCabang || item?.['Nama Outlet'] || item?.['Nama_Outlet'] || '')
  });

  const row = dataHPP.find(item => {
    const itemName = item?.namaOutlet || item?.outlet || item?.cabang || item?.namaCabang || item?.['Nama Outlet'] || item?.['Nama_Outlet'] || '';
    return zettNormalizeName(itemName) === activeName;
  });

  if (!row) {
    window.__ZETT_HPP_ACTIVE_ROW_CACHE = {
      name: activeName,
      source: dataHPP,
      length: dataHPP.length,
      row: null
    };
    console.log('Data HPP outlet tidak ditemukan');
    return null;
  }

  window.__ZETT_HPP_ACTIVE_ROW_CACHE = {
    name: activeName,
    source: dataHPP,
    length: dataHPP.length,
    row: row
  };
  return row;
}

function zettStoreFreshHPPRow(row) {
  if (!row) return;
  const rowName = row.namaOutlet || row['Nama Outlet'] || row['Nama_Outlet'] || '';
  if (!rowName) return;

  if (!Array.isArray(window.__ZETT_FRESH_HPP_ROWS)) {
    window.__ZETT_FRESH_HPP_ROWS = [];
  }

  const normalized = zettNormalizeName(rowName);
  const index = window.__ZETT_FRESH_HPP_ROWS.findIndex(item => {
    const itemName = item?.namaOutlet || item?.['Nama Outlet'] || item?.['Nama_Outlet'] || '';
    return zettNormalizeName(itemName) === normalized;
  });

  if (index >= 0) {
    window.__ZETT_FRESH_HPP_ROWS[index] = row;
  } else {
    window.__ZETT_FRESH_HPP_ROWS.unshift(row);
  }
  window.__ZETT_HPP_ACTIVE_ROW_CACHE = null;

  if (Array.isArray(window.masterDataHPP)) {
    const masterIndex = window.masterDataHPP.findIndex(item => {
      const itemName = item?.namaOutlet || item?.['Nama Outlet'] || item?.['Nama_Outlet'] || '';
      return zettNormalizeName(itemName) === normalized;
    });

    if (masterIndex >= 0) {
      window.masterDataHPP[masterIndex] = row;
    }
  }
}

function zettRefreshActiveHPPRowFromServer(outletName, options) {
  const outlet = String(outletName || document.getElementById('inputNamaHPP')?.value || '').trim();
  const config = options || {};
  window.hppLoadState = window.hppLoadState || {
    isLoading: false,
    loaded: false,
    lastOutletId: null,
    lastLoadedAt: 0,
    data: null
  };
  window.__ZETT_HPP_ROW_LOADS = window.__ZETT_HPP_ROW_LOADS || {};
  const normalizedOutlet = zettNormalizeName(outlet);
  const inflight = window.__ZETT_HPP_ROW_LOADS[normalizedOutlet];
  if (inflight && Date.now() - inflight < 12000 && !config.force) {
    return;
  }

  const cachedRow = (Array.isArray(window.__ZETT_FRESH_HPP_ROWS) ? window.__ZETT_FRESH_HPP_ROWS : [])
    .find(item => zettNormalizeName(item?.namaOutlet || item?.['Nama Outlet'] || item?.['Nama_Outlet'] || '') === normalizedOutlet);

  if (!outlet || typeof google === 'undefined' || !google.script || !google.script.run) {
    return;
  }

  if (cachedRow && !config.force) {
    if (typeof window.zettWithHPPPopulationGuard_ === 'function') {
      window.zettWithHPPPopulationGuard_(function() { zettApplyHPPRowToForm(cachedRow); });
    } else {
      zettApplyHPPRowToForm(cachedRow);
    }
    zettRunHPPCalculationAfterSync();
  }

  window.__ZETT_HPP_ROW_LOADS[normalizedOutlet] = Date.now();
  const syncToken = Date.now() + ':' + normalizedOutlet;
  window.__ZETT_HPP_ACTIVE_SYNC_TOKEN = syncToken;

  google.script.run
    .withSuccessHandler(function(response) {
      delete window.__ZETT_HPP_ROW_LOADS[normalizedOutlet];
      if (window.__ZETT_HPP_ACTIVE_SYNC_TOKEN !== syncToken) return;
      if (!response || response.status !== 'success' || !response.data) return;
      const activeOutlet = document.getElementById('inputNamaHPP')?.value || '';
      if (zettNormalizeName(activeOutlet) !== zettNormalizeName(outlet)) return;

      zettStoreFreshHPPRow(response.data);
      if (typeof window.zettWithHPPPopulationGuard_ === 'function') {
        window.zettWithHPPPopulationGuard_(function() { zettApplyHPPRowToForm(response.data); });
      } else {
        zettApplyHPPRowToForm(response.data);
      }
      zettRunHPPCalculationAfterSync();

      if (config.openType && typeof window.openHPPForm === 'function') {
        const activeType = window.zettGetActiveHPPType ? window.zettGetActiveHPPType() : '';
        if (activeType === config.openType) {
          requestAnimationFrame(function() {
            if (window.__ZETT_HPP_ACTIVE_SYNC_TOKEN !== syncToken) return;
            if (typeof window.zettWithHPPPopulationGuard_ === 'function') {
              window.zettWithHPPPopulationGuard_(function() { zettApplyHPPRowToForm(response.data); });
            } else {
              zettApplyHPPRowToForm(response.data);
            }
            if (typeof calculateGas === 'function') calculateGas();
          });
        }
      }
    })
    .withFailureHandler(function() {
      delete window.__ZETT_HPP_ROW_LOADS[normalizedOutlet];
      if (window.__ZETT_HPP_ACTIVE_SYNC_TOKEN === syncToken) window.__ZETT_HPP_ACTIVE_SYNC_TOKEN = null;
    })
    .getHPPRowByOutlet(outlet);
}

function zettRunHPPCalculationAfterSync() {
  const tasks = [
    function() { if (typeof updateGasDefault === 'function') updateGasDefault(); },
    function() { if (typeof calculateGas === 'function') calculateGas(); },
    function() { if (typeof toggleSetrikaInputs === 'function') toggleSetrikaInputs(); },
    function() { if (typeof calculateListrik === 'function') calculateListrik(); },
    function() { if (typeof toggleAirInputs === 'function') toggleAirInputs(); },
    function() { if (typeof calculateAir === 'function') calculateAir(); },
    function() { if (typeof calculatePacking === 'function') calculatePacking(); },
    function() { if (typeof toggleBahanActive === 'function') toggleBahanActive(); },
    function() { if (typeof toggleBahanInputs === 'function') toggleBahanInputs(); },
    function() { if (typeof calculateBahanBaku === 'function') calculateBahanBaku(); },
    function() { if (typeof toggleNotaInputs === 'function') toggleNotaInputs(); },
    function() { if (typeof calculateNota === 'function') calculateNota(); },
    function() {
      if (typeof window.zettRenderAllHPPCardDetails === 'function') {
        window.requestAnimationFrame(function() { window.zettRenderAllHPPCardDetails(); });
      }
    },
    function() {
      if (
        typeof window.HPPStateMachine !== 'undefined' &&
        typeof window.HPPStateMachine.calculateTotal === 'function'
      ) {
        window.HPPStateMachine.calculateTotal();
      }
    },
    function() {
      if (
        typeof window.StateMachine !== 'undefined' &&
        typeof window.StateMachine.calculateTotal === 'function'
      ) {
        window.StateMachine.calculateTotal();
      }
    }
  ];

  if (typeof window.zettRunHPPTaskQueue_ === 'function') {
    window.zettRunHPPTaskQueue_(window.__zettBranchSwitchToken, tasks);
  } else {
    tasks.forEach(function(task) { task(); });
  }
}

function zettApplyHPPDashboardFallback(row) {
  if (!row) return;

  const num = key => zettCleanNumber(row[key]);
  const current = id => zettCleanNumber(document.getElementById(id)?.textContent || 0);

  const gas = num('Estimasi Biaya Gas') || num('Gas Per Kg') || num('Gas Per Load');
  const listrik = num('Cuci Per Kg') + num('Kering Per Kg') + num('Listrik Setrika Kg');
  const air = num('Air Per Kg') + num('Air Setrika Kg');
  const packing = current('dash-card-packing');
  const bahan = current('dash-card-bahan');
  const nota = current('dash-card-nota');

  const fallback = { gas, listrik, air, packing, bahan, nota };
  const hasSheetFallback = gas > 0 || listrik > 0 || air > 0;

  if (!hasSheetFallback) return;

  Object.entries(fallback).forEach(([type, value]) => {
    if (value > 0 && typeof window.zettHPPSetStateValue === 'function') {
      window.zettHPPSetStateValue(type, value);
    }
  });

  if (typeof window.zettHPPUpdateDashboardFromState === 'function') {
    window.zettHPPUpdateDashboardFromState('gsheet');
  }
}

function zettSyncHPPFromGSheet() {
  if (typeof window.zettIsHPPPopulating_ === 'function' && window.zettIsHPPPopulating_()) {
    return false;
  }
  const row = zettFindActiveHPPRow();
  if (!row) return false;

  if (typeof window.zettWithHPPPopulationGuard_ === 'function') {
    window.zettWithHPPPopulationGuard_(function() { zettApplyHPPRowToForm(row); });
  } else {
    zettApplyHPPRowToForm(row);
  }

  setTimeout(() => {
    if (typeof window.zettIsHPPPopulating_ === 'function' && window.zettIsHPPPopulating_()) return;
    zettRunHPPCalculationAfterSync();
    zettApplyHPPDashboardFallback(row);
    window.__HPP_GSHEET_SYNC_LOCKED = true;
    console.log('HPP GSHEET SYNC LOCKED');

    if (typeof window.zettHPPRefreshDashboard === 'function') {
      window.zettHPPRefreshDashboard();
    }

    console.log('HPP sync berhasil');
  }, 180);

  return true;
}

function zettRetrySyncHPPFromGSheet(maxRetry = 12, intervalMs = 500) {
  let attempt = 0;

  const run = () => {
    attempt += 1;
    const outletValue = document.getElementById('inputNamaHPP')?.value || '';
    const source = zettGetHPPMasterDataSources();
    const ready = !!outletValue && Array.isArray(source) && source.length > 0;

    if (ready) {
      const ok = zettSyncHPPFromGSheet();
      if (!ok) console.log('Data HPP outlet tidak ditemukan');
      return;
    }

    if (attempt >= maxRetry) {
      console.log('HPP sync retry berhenti');
      return;
    }

    setTimeout(run, intervalMs);
  };

  run();
}
</script>

        raw = raw.lastIndexOf(',') > raw.lastIndexOf('.')
          ? raw.replace(/\./g, '').replace(',', '.')
          : raw.replace(/,/g, '');
      } else if (hasDot) {
        const parts = raw.split('.');
        raw = parts.length > 1 && parts.slice(1).every(part => part.length === 3) ? parts.join('') : raw;
      } else if (hasComma) {
        const parts = raw.split(',');
        raw = parts.length > 1 && parts.slice(1).every(part => part.length === 3) ? parts.join('') : raw.replace(',', '.');

        if (window.__HPP_SAFE_REFRESH_LOCK__) return;
        window.__HPP_SAFE_REFRESH_LOCK__ = true;
        try { refreshPremiumUi(); }
        finally { window.__HPP_SAFE_REFRESH_LOCK__ = false; }
      }, 60);
    }

    function wrapDashboardUpdate() {
      if (window.__hppDesktopPremiumDashboardPatchWrapped) return;
      window.__hppDesktopPremiumDashboardPatchWrapped = true;

      const originalZettUpdate = window.zettHPPUpdateDashboardFromState;
      if (typeof originalZettUpdate === 'function') {
        window.zettHPPUpdateDashboardFromState = function() {
          try {
            return originalZettUpdate.apply(this, arguments);
          } catch (error) {
            if (typeof window.zettHPPSafeError === 'function') window.zettHPPSafeError('[HPP_SAFE_CALCULATE_ERROR]', error);
          } finally {
            scheduleRefresh();
          }
        };
      }

      try {
        if (typeof StateMachine !== 'undefined' && StateMachine.renderDashboard && !StateMachine.renderDashboard.__hppDesktopPremiumWrapped) {
          const originalRender = StateMachine.renderDashboard.bind(StateMachine);
          const wrappedRender = function() {
            try {
              return originalRender.apply(this, arguments);
            } catch (error) {
              if (typeof window.zettHPPSafeError === 'function') window.zettHPPSafeError('[HPP_SAFE_RENDER_DASHBOARD_ERROR]', error);
            } finally {
              scheduleRefresh();
            }
          };
          wrappedRender.__hppDesktopPremiumWrapped = true;
          StateMachine.renderDashboard = wrappedRender;
        }
      } catch (error) {}
    }

    function boot() {
      if (window.__HPP_SAFE_DESKTOP_REFRESH_BOOTED__) return;
      window.__HPP_SAFE_DESKTOP_REFRESH_BOOTED__ = true;
      refreshPremiumUi();
      wrapDashboardUpdate();
      scheduleRefresh();
      window.setTimeout(refreshPremiumUi, 350);
      window.setTimeout(refreshPremiumUi, 1200);

      const dashboard = byId('hpp-dashboard-view');
      if (dashboard && window.MutationObserver) {
        const observer = new MutationObserver(scheduleRefresh);
        observer.observe(dashboard, { childList: true, subtree: true, characterData: true });
      }
    }

    if (desktopQuery.addEventListener) desktopQuery.addEventListener('change', refreshPremiumUi);
    else if (desktopQuery.addListener) desktopQuery.addListener(refreshPremiumUi);

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot, { once: true });
    else boot();
  })();
</script>

      if (typeof window.zettIsHPPOutletNotSelected_ === 'function') return window.zettIsHPPOutletNotSelected_();
      const text = String(outlet || '').trim().toLowerCase().replace(/\s+/g, ' ');
      return !text || text === '-' || text === 'pilih cabang' || text === 'pilih outlet' || text === 'pilih cabang laundry' || text === 'semua cabang';
    }

    function zettGetZeroAdminNotaMetrics_() {
      return {
        apps: 0,
        nota: 0,
        total: 0,
        appPerLoad: 0,
        notaPerLoad: 0,
        totalAdminNota: 0,
        percent: 0,
        displayAppPerLoad: 'Rp 0',
        displayNotaPerLoad: 'Rp 0',
        displayTotal: 'Rp 0',
        source: 'zero'
      };
    }
    window.zettGetZeroAdminNotaMetrics_ = window.zettGetZeroAdminNotaMetrics_ || zettGetZeroAdminNotaMetrics_;

    function setAdminNotaCardTransition(card, active) {
      if (!card) return;
      card.classList.toggle('is-admin-nota-transitioning', !!active);
      if (active) {
        window.clearTimeout(card.__zettAdminNotaTransitionTimer);
        card.__zettAdminNotaTransitionTimer = window.setTimeout(function() {
          card.classList.remove('is-admin-nota-transitioning');
        }, 180);
      }
    }

    function findDetailValue(containerId, labels) {
      const container = byId(containerId);
      if (!container) return 0;
      const needles = labels.map(label => String(label).toLowerCase());
      const rows = Array.from(container.querySelectorAll('div'));
      for (const row of rows) {
        const label = String(row.querySelector('span')?.textContent || '').toLowerCase();
        if (needles.some(needle => label.includes(needle))) {
          return clean(row.querySelector('strong')?.textContent || row.textContent);
        }
      }
      return 0;
    }

    function getSelectedHPPRow() {
      const selected = String(byId('inputNamaHPP')?.value || '').trim().toLowerCase();
      if (typeof window.zettFindActiveHPPRow === 'function') {
        const active = window.zettFindActiveHPPRow();
        const activeName = String(active?.namaOutlet || active?.['Nama Outlet'] || '').trim().toLowerCase();
        if (active && (!selected || activeName === selected)) return active;
      }
      if (!selected) return null;
      const sources = [];
      if (typeof masterDataHPP !== 'undefined' && Array.isArray(masterDataHPP)) sources.push(masterDataHPP);
      if (Array.isArray(window.masterDataHPP)) sources.push(window.masterDataHPP);
      if (window.APP_STATE?.data?.master?.hpp) sources.push(window.APP_STATE.data.master.hpp);
      for (const rows of sources) {
        const found = rows.find(row => String(row?.namaOutlet || row?.['Nama Outlet'] || '').trim().toLowerCase() === selected);
        if (found) return found;
      }
      return null;
    }

    function readRowNumber(keys) {
      const rows = [getSelectedHPPRow(), getSelectedOutletRow()].filter(Boolean);
      for (const row of rows) {
        for (const key of keys) {
          const value = clean(row[key]);
          if (value > 0) return value;
        }
      }
      return 0;
    }

    function sourceValue(ids, detailContainerId, detailLabels, rowKeys) {
      const values = [];
      (ids || []).forEach(id => values.push(readMoneyById(id)));
      if (detailContainerId && detailLabels) values.push(findDetailValue(detailContainerId, detailLabels));
      if (rowKeys) values.push(readRowNumber(rowKeys));
      const found = values.find(value => Number.isFinite(Number(value)) && Number(value) > 0);
      return found || 0;
    }

    function electricDryerLoadValue() {
      return sourceValue(
        ['dispListrikPengeringLoad'],
        'dash-card-listrik-details',
        ['Listrik Kering /Load'],
        ['Listrik Kering Per Load', 'Listrik Kering /Load', 'Kering Per Load', 'listrikKeringPerLoad', 'listrikKeringLoad', 'keringElectricPerLoad']
      );
    }

    function adminNotaBreakdown() {
      if (isAdminNotaOutletNotSelected()) {
        const zero = zettGetZeroAdminNotaMetrics_();
        debugAdminNotaZero({
          outletAktif: getActiveHPPOutletName(),
          isOutletNotSelected: true,
          sourceData: zero.source,
          appPerLoad: zero.appPerLoad,
          notaPerLoad: zero.notaPerLoad
        });
        return zero;
      }
      const apps = sourceValue(
        ['dispNotaAppLoad'],
        '',
        ['Transaksi Apps /Load', 'Kasir Per Order'],
        ['HPP Aplikasi Per Load', 'Transaksi Apps Per Load', 'Transaksi Apps /Load', 'transaksiAppsPerLoad', 'Kasir Per Order', 'Nota_App_HargaTrx']
      );
      const nota = sourceValue(
        ['dispNotaCostTrx'],
        '',
        ['Nota Transaksi /Load', 'Nota Per Order'],
        ['HPP Nota Transaksi Per Load', 'Nota Transaksi Per Load', 'Nota Transaksi /Load', 'notaTransaksiPerLoad', 'Nota Per Order', 'Nota_Thermal_Harga']
      );
      const total = sourceValue(
        [],
        '',
        [],
        ['Admin Nota Kasir Per Load', 'Admin Nota Kasir Per Order', 'Admin/Nota Per Load', 'adminNotaPerLoad']
      );
      return {
        apps,
        nota,
        total: total > 0 ? total : apps + nota,
        appPerLoad: apps,
        notaPerLoad: nota,
        totalAdminNota: total > 0 ? total : apps + nota,
        percent: 0,
        displayAppPerLoad: money(apps),
        displayNotaPerLoad: money(nota),
        displayTotal: money(total > 0 ? total : apps + nota),
        source: (apps > 0 || nota > 0 || total > 0) ? 'live/sheet' : 'empty'
      };
    }

    function renderAdminNotaCard() {
      const valueEl = byId('dash-card-nota');
      if (!valueEl) return;
      const card = valueEl.closest('.hpp-card-dash');
      let detail = byId('dash-card-nota-details');
      if (!detail && card) {
        if (typeof zettRemoveOldHPPDetailContainers_ === 'function') zettRemoveOldHPPDetailContainers_('nota', card, null);
        detail = document.createElement('div');
        detail.id = 'dash-card-nota-details';
        detail.className = 'hpp-premium-lite-details';
        valueEl.insertAdjacentElement('afterend', detail);
      }
      if (detail) detail.innerHTML = '';
      const data = adminNotaBreakdown();
      const nextValue = money(data.total);
      const previousSignature = card ? card.__zettAdminNotaSignature : '';
      const nextSignature = [data.source, data.apps, data.nota, data.total].join('|');
      if (card && previousSignature !== nextSignature) setAdminNotaCardTransition(card, true);
      if (card) card.__zettAdminNotaSignature = nextSignature;
      if (valueEl.textContent !== nextValue) valueEl.textContent = nextValue;
      if (card) card.classList.toggle('is-admin-nota-zero-state', data.source === 'zero');
      const metrics = [
        { label: 'Transaksi Apps /Load', value: data.apps },
        { label: 'Nota Transaksi /Load', value: data.nota },
        { label: 'Total Admin/Nota /Load', value: data.total }
      ];
      if (typeof window.renderHPPCardDetails === 'function') {
        window.renderHPPCardDetails('nota', metrics);
      } else if (detail) {
        const nextDetail = metrics
          .map(item => '<div class="hpp-card-row"><span class="hpp-card-label">' + item.label + '</span><strong class="hpp-card-amount">' + money(item.value) + '</strong></div>')
          .join('');
        if (detail.innerHTML !== nextDetail) detail.innerHTML = nextDetail;
      }
      const pctEl = byId('dash-card-nota-pct');
      if (pctEl && data.source === 'zero') pctEl.textContent = '0%';
      if (typeof window.zettHPPSetStateValue === 'function') window.zettHPPSetStateValue('nota', data.total);
      debugAdminNotaZero({
        outletAktif: getActiveHPPOutletName(),
        isOutletNotSelected: data.source === 'zero',
        sourceData: data.source,
        appPerLoad: data.apps,
        notaPerLoad: data.nota
      });
    }

    function resetAdminNotaCardIfNoOutlet() {
      if (!isAdminNotaOutletNotSelected()) return false;
      renderAdminNotaCard();
      return true;
    }
    window.zettResetAdminNotaCardIfNoOutlet = resetAdminNotaCardIfNoOutlet;

    // [HPP DASHBOARD REQUEST PATCH - 2026-05-19]
    function getSelectedOutletRow() {
      const selected = String(byId('inputNamaHPP')?.value || '').trim().toLowerCase();
      if (!selected) return null;
      const sources = [];
      if (typeof masterDataCabang !== 'undefined' && Array.isArray(masterDataCabang)) sources.push(masterDataCabang);
      if (Array.isArray(window.masterDataCabang)) sources.push(window.masterDataCabang);
      if (window.APP_STATE?.data?.master?.cabang) sources.push(window.APP_STATE.data.master.cabang);
      if (typeof masterDataHPP !== 'undefined' && Array.isArray(masterDataHPP)) sources.push(masterDataHPP);
      if (Array.isArray(window.masterDataHPP)) sources.push(window.masterDataHPP);
      if (window.APP_STATE?.data?.master?.hpp) sources.push(window.APP_STATE.data.master.hpp);
      for (const rows of sources) {
        const found = rows.find(row => String(row?.namaOutlet || row?.['Nama Outlet'] || '').trim().toLowerCase() === selected);
        if (found) return found;
      }
      return null;
    }

    function isSelfServiceOutlet() {
      const outlet = getSelectedOutletRow();
      const category = String(outlet?.kategori || outlet?.kategoriLaundry || outlet?.['Kategori Laundry'] || '').toLowerCase();
      return category.includes('self');
    }

    function getDashboardContext() {
      const outlet = getSelectedOutletRow() || {};
      const row = getSelectedHPPRow() || {};
      const category = String(outlet.kategori || outlet.kategoriLaundry || outlet['Kategori Laundry'] || row['Kategori Laundry'] || byId('inputKategori')?.value || '').toLowerCase();
      const setrika = String(outlet.tipeSetrikaUtama || outlet.tipeSetrika || row['Tipe Setrika'] || '').toLowerCase();
      const isSelfService = category.includes('self');
      const isHybrid = category.includes('hybrid');
      const isDropOff = category.includes('drop') || category.includes('kiloan');
      const usesElectricIron = !isSelfService && setrika.includes('listrik');
      const usesSteamIron = !isSelfService && !usesElectricIron;
      return {
        isSelfService,
        isHybrid,
        isDropOff,
        showKgEstimate: isDropOff || isHybrid,
        usesElectricIron,
        usesSteamIron,
        capacities: {
          cuci: Math.max(readRowNumber(['Kap Cuci', 'cuciKg']) || 1, 1),
          kering: Math.max(readRowNumber(['Kap Kering', 'pengeringKg']) || 1, 1),
          setrika: Math.max(readRowNumber(['Kap Setrika', 'setrikaKg', 'Kg Setrika']) || 1, 1)
        }
      };
    }

    // [HPP DASHBOARD OUTLET DATA RESTORE + CATEGORY BADGE FIX - 2026-05-19]
    function processIconMarkup(item) {
      if (item.key !== 'setrika') return '<i class="ph ' + item.icon + '"></i>';
      return [
        '<svg class="hpp-process-iron-svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">',
          '<path d="M5 14.5h11.8c1.9 0 3.4 1.5 3.4 3.4v1.1H4.2v-2.7c0-1 .8-1.8 1.8-1.8Z" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"/>',
          '<path d="M7.2 14.5V8.8c0-1.7 1.4-3 3-3h3.1c2.4 0 4.6 1.4 5.5 3.6l2.2 5.1" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/>',
          '<path d="M10.1 8.8h3.6" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>',
          '<path d="M6.4 18.9h14" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/>',
        '</svg>'
      ].join('');
    }

    function ensureProcessCards() {
      const dashboard = byId('hpp-dashboard-view');
      const hero = dashboard ? dashboard.firstElementChild : null;
      const heroText = hero ? hero.querySelector('.flex-1') : null;
      if (!dashboard || !hero || !heroText) return;

      hero.classList.add('hpp-hero-dashboard');
      const title = heroText.querySelector('h2');
      const subtitle = heroText.querySelector('p');
      const total = byId('dash-hpp-total');
      const totalRow = total ? total.closest('.flex') : null;

      if (title) title.textContent = 'RINGKASAN BIAYA VARIABEL';
      if (subtitle) subtitle.textContent = 'Ringkasan biaya variabel untuk menjaga margin tetap sehat';
      if (totalRow) totalRow.classList.add('hpp-total-value-row');

      let grid = heroText.querySelector('.hpp-process-grid');
      if (!grid) {
        grid = document.createElement('div');
        grid.className = 'hpp-process-grid';
        PROCESS.forEach(item => {
          const card = document.createElement('article');
          card.className = 'hpp-process-card';
          card.dataset.hppProcess = item.key;
          card.style.setProperty('--process-accent', item.color);
          card.innerHTML = [
            '<div class="hpp-process-head">',
              '<span class="hpp-process-icon">' + processIconMarkup(item) + '</span>',
              '<span class="hpp-process-title">' + item.title + '</span>',
            '</div>',
            '<div class="hpp-process-main">',
              '<span class="hpp-process-value" data-process-value="' + item.key + '">Rp 0</span>',
              '<span class="hpp-process-unit">' + item.unit + '</span>',
            '</div>',
            '<div class="hpp-process-estimate" data-process-estimate="' + item.key + '"></div>',
            '<div class="hpp-process-detail" data-process-detail="' + item.key + '"></div>',
            '<div class="hpp-process-foot">',
              '<div class="hpp-process-bar"><span data-process-bar="' + item.key + '"></span></div>',
              '<span class="hpp-process-pct" data-process-pct="' + item.key + '">0%</span>',
            '</div>'
          ].join('');
          grid.appendChild(card);
        });
        heroText.appendChild(grid);
      }

    }

    function updateProcessCards() {
      renderAdminNotaCard();
      const forceZero = !!window.__HPP_FORCE_ZERO_DASHBOARD;
      const hasSelectedOutlet = !forceZero && !!String(byId('inputNamaHPP')?.value || '').trim();
      const context = getDashboardContext();
      const selfService = context.isSelfService;
      const processValues = {};
      const domWrites = [];
      PROCESS.forEach(item => {
        const detailRows = item.details
          .filter(detail => !detail.when || detail.when(context))
          .map(detail => ({
            label: detail.label,
            value: Math.max(0, Number(detail.source()) || 0)
          }));
        const total = !hasSelectedOutlet || (selfService && item.key === 'setrika')
          ? 0
          : detailRows.reduce((sum, row) => sum + row.value, 0);
        processValues[item.key] = total;

        const valueEl = document.querySelector('#view-hpp [data-process-value="' + item.key + '"]');
        const estimateEl = document.querySelector('#view-hpp [data-process-estimate="' + item.key + '"]');
        const detailEl = document.querySelector('#view-hpp [data-process-detail="' + item.key + '"]');
        const nextValue = money(total);
        if (valueEl && valueEl.textContent !== nextValue) {
          domWrites.push(function() { valueEl.textContent = nextValue; });
        }
        if (estimateEl) {
          const cap = context.capacities[item.key] || 1;
          const showEstimate = hasSelectedOutlet && context.showKgEstimate && !(selfService && item.key === 'setrika');
          const nextEstimate = showEstimate ? 'Estimasi ' + money(total / Math.max(cap, 1)) + ' /Kg' : '';
          if (estimateEl.textContent !== nextEstimate) {
            domWrites.push(function() { estimateEl.textContent = nextEstimate; });
          }
        }
        if (detailEl) {
          const nextDetailHtml = selfService && item.key === 'setrika'
            ? ''
            : detailRows
              .map(row => '<div class="hpp-process-detail-row"><span>' + row.label + '</span><strong>' + money(hasSelectedOutlet ? row.value : 0) + '</strong></div>')
              .join('');
          if (detailEl.innerHTML !== nextDetailHtml) {
            domWrites.push(function() { detailEl.innerHTML = nextDetailHtml; });
          }
        }
      });

      const grand = PROCESS.reduce((sum, item) => {
        const rawValue = Number(processValues[item.key]);
        return sum + (Number.isFinite(rawValue) ? Math.max(0, rawValue) : 0);
      }, 0);
      PROCESS.forEach(item => {
        const rawValue = Number(processValues[item.key]);
        const value = Number.isFinite(rawValue) ? Math.max(0, rawValue) : 0;
        const rawPct = grand > 0 ? Math.round((value / grand) * 100) : 0;
        const pct = Number.isFinite(rawPct) ? Math.max(0, rawPct) : 0;
        const pctEl = document.querySelector('#view-hpp [data-process-pct="' + item.key + '"]');
        const barEl = document.querySelector('#view-hpp [data-process-bar="' + item.key + '"]');
        const nextPct = pct + '%';
        if (pctEl && pctEl.textContent !== nextPct) {
          domWrites.push(function() { pctEl.textContent = nextPct; });
        }
        if (barEl) {
          domWrites.push(function() { barEl.style.setProperty('--process-width', pct + '%'); });
        }
      });
      if (domWrites.length) {
        window.requestAnimationFrame(function() {
          domWrites.forEach(function(write) { write(); });
        });
      }
    }

    function refresh() {
      if (!isHppProcessRefreshAllowed()) return;
      try {
        ensureProcessCards();
        resetAdminNotaCardIfNoOutlet();
        updateProcessCards();
      } catch (error) {
        if (typeof window.zettHPPSafeError === 'function') window.zettHPPSafeError('[HPP_SAFE_PROCESS_REFRESH_ERROR]', error);
      }
    }

    window.zettRefreshHPPProcessCards = refresh;
    window.zettResetHPPProcessCardsToZero = function() {
      ensureProcessCards();
      PROCESS.forEach(item => {
        const valueEl = document.querySelector('#view-hpp [data-process-value="' + item.key + '"]');
        const estimateEl = document.querySelector('#view-hpp [data-process-estimate="' + item.key + '"]');
        const detailEl = document.querySelector('#view-hpp [data-process-detail="' + item.key + '"]');
        const pctEl = document.querySelector('#view-hpp [data-process-pct="' + item.key + '"]');
        const barEl = document.querySelector('#view-hpp [data-process-bar="' + item.key + '"]');
        if (valueEl) valueEl.textContent = money(0);
        if (estimateEl) estimateEl.textContent = '';
        if (detailEl) detailEl.innerHTML = '';
        if (pctEl) pctEl.textContent = '0%';
        if (barEl) barEl.style.setProperty('--process-width', '0%');
      });
    };

    function isHppProcessRefreshAllowed() {
      const view = byId('view-hpp');
      if (typeof window.zettIsActiveViewHPP_ === 'function') return window.zettIsActiveViewHPP_();
      return !!(view && !view.classList.contains('hidden') && view.offsetParent !== null);
    }

    function scheduleRefresh() {
      if (!isHppProcessRefreshAllowed()) {
        if (typeof window.zettHPPSafeDebug === 'function') window.zettHPPSafeDebug('[HPP_SAFE_SKIP_PROCESS_REFRESH_OUTSIDE_HPP]');
        return;
      }
      if (typeof window.zettIsHPPPopulating_ === 'function' && window.zettIsHPPPopulating_()) return;
      const token = (window.__HPP_SAFE_PROCESS_REFRESH_TOKEN__ || 0) + 1;
      window.__HPP_SAFE_PROCESS_REFRESH_TOKEN__ = token;
      window.clearTimeout(timer);
      timer = window.setTimeout(function() {
        if (token !== window.__HPP_SAFE_PROCESS_REFRESH_TOKEN__) return;
        if (window.__HPP_SAFE_PROCESS_REFRESH_LOCK__) return;
        window.__HPP_SAFE_PROCESS_REFRESH_LOCK__ = true;
        try { refresh(); }
        finally { window.__HPP_SAFE_PROCESS_REFRESH_LOCK__ = false; }
      }, 90);
    }

    function wrap(name) {
      const fn = window[name];
      if (typeof fn !== 'function' || fn.__hppPremiumUiWrapped) return;
      const wrapped = function() {
        try {
          return fn.apply(this, arguments);
        } catch (error) {
          if (typeof window.zettHPPSafeError === 'function') window.zettHPPSafeError('[HPP_SAFE_CALCULATE_ERROR:' + name + ']', error);
        } finally {
          scheduleRefresh();
        }
      };
      wrapped.__hppPremiumUiWrapped = true;
      window[name] = wrapped;
    }

    function boot() {
      if (window.__HPP_SAFE_PROCESS_REFRESH_BOOTED__) return;
      window.__HPP_SAFE_PROCESS_REFRESH_BOOTED__ = true;
      ['calculateGas', 'calculateListrik', 'calculateAir', 'calculatePacking', 'calculateBahanBaku', 'calculateNota', 'zettHPPUpdateDashboardFromState'].forEach(wrap);
      refresh();
      window.setTimeout(refresh, 350);
      window.setTimeout(refresh, 1200);

      const dashboard = byId('hpp-dashboard-view');
      if (dashboard && window.MutationObserver) {
        const observer = new MutationObserver(scheduleRefresh);
        observer.observe(dashboard, { childList: true, subtree: true, characterData: true });
      }

      document.addEventListener('change', event => {
        if (window.__HPP_PROGRAMMATIC_UPDATE__) {
          console.warn('[STAGE_5_LOOP_PREVENTED] Programmatic update diabaikan.');
          return;
        }
        // Guard HPP: batasi scheduleRefresh ke halaman HPP agar tidak memicu freeze/render loop dari luar.
        if (event.target && (event.target.id === 'inputNamaHPP' || event.target.closest('#view-hpp'))) scheduleRefresh();
      });
      document.addEventListener('input', event => {
        if (event.target && event.target.closest('#view-hpp')) scheduleRefresh();
      });
      window.addEventListener('resize', scheduleRefresh, { passive: true });
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot, { once: true });
    else boot();
  })();
</script>
