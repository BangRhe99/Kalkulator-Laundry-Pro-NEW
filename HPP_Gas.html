<script id="hpp-gas-module">
function zettGasDefaultHours(cap) {
  const map = { '3': 8, '5.5': 14.4, '12': 32, '50': 132 };
  return map[String(cap)] || 0;
}

window.updateGasDefault = function() {
  const cap = document.getElementById('inputGasKapasitas')?.value || '';
  const jamEl = document.getElementById('inputGasJam');
  if (!jamEl) return;
  const hour = zettGasDefaultHours(cap);
  if (hour > 0) jamEl.value = String(hour);
  window.calculateGas();
};

window.ZETT_DEBUG_GAS = (window.ZETT_DEBUG_GAS === undefined) ? true : window.ZETT_DEBUG_GAS;
function zettGasDebugLog(label, data) {
  if (window.ZETT_DEBUG_GAS && window.console && typeof window.console.log === 'function') {
    window.console.log('[HPP GAS] ' + label, data || {});
  }
}
window.calculateGas = function() {
  const harga = zettCleanNumber(document.getElementById('inputGasHarga')?.value);
  const jam = parseFloat(document.getElementById('inputGasJam')?.value || 0) || 0;
  const menit = Math.max(0, Math.round(jam * 60));
  const menitEl = document.getElementById('inputGasMenit');
  if (menitEl) menitEl.value = String(menit);

  const row = zettFindActiveHPPRow() || {};
  const context = typeof window.zettGetGasUsageContext === 'function' ? window.zettGetGasUsageContext() : {};
  const mesinKering = zettCleanNumber(context.mesinKering || row['Mesin Kering'] || row['Mesin Pengering']);
  const durasiKering = zettCleanNumber(context.durasiKering || row['Durasi Kering']);
  const kapKering = zettCleanNumber(context.kapKering || row['Kap Kering']) || 1;
  const kapSetrika = zettCleanNumber(context.kapSetrika || row['Kap Setrika']);
  const shouldCalculateLoad = !!context.requiresGasDryerLoad;
  const shouldCalculateIron = !!context.requiresGasSteamIron;
  const gasPerJam = (harga > 0 && jam > 0) ? harga / jam : 0;
  const gasPerMenit = (harga > 0 && menit > 0) ? harga / menit : 0;
  const estimasiLoadGas = (shouldCalculateLoad && menit > 0 && durasiKering > 0 && mesinKering > 0)
    ? (menit / durasiKering / mesinKering)
    : 0;
  const estimasiBiayaGas = (shouldCalculateLoad && gasPerMenit > 0 && durasiKering > 0)
    ? gasPerMenit * durasiKering
    : 0;
  const gasPerKg = (estimasiBiayaGas > 0 && kapKering > 0) ? estimasiBiayaGas / kapKering : 0;
  const setrikaPerJam = shouldCalculateIron ? gasPerJam : '';
  const setrikaPerKg = shouldCalculateIron && gasPerJam > 0 && kapSetrika > 0 ? gasPerJam / kapSetrika : '';

  zettGasDebugLog('form values', {
    kapasitas: document.getElementById('inputGasKapasitas')?.value || '',
    harga,
    jam,
    menit,
    mesinKering,
    durasiKering,
    kapKering,
    kapSetrika
  });
  zettGasDebugLog('calculated values', {
    gasPerJam,
    gasPerMenit,
    estimasiLoadGas,
    estimasiBiayaGas,
    gasPerLoad: estimasiBiayaGas,
    gasPerKg,
    setrikaPerJam,
    setrikaPerKg
  });

  const loadEl = document.getElementById('inputGasPerLoadManual');
  if (loadEl) loadEl.value = estimasiLoadGas > 0 ? Number(estimasiLoadGas.toFixed(2)) : '';

  const perJamEl = document.getElementById('displayGasPerJam');
  if (perJamEl) perJamEl.textContent = 'Rp ' + Math.round(gasPerJam).toLocaleString('id-ID');
  const perMenitEl = document.getElementById('displayBiayaGasMenit');
  if (perMenitEl) perMenitEl.textContent = 'Rp ' + Math.round(gasPerMenit).toLocaleString('id-ID');
  const perLoadEl = document.getElementById('displayEstimasiBiayaGas');
  if (perLoadEl) perLoadEl.textContent = 'Rp ' + Math.round(estimasiBiayaGas).toLocaleString('id-ID');

  if (typeof window.zettRenderGasLpgCard === 'function') window.zettRenderGasLpgCard();

  return {
    gasPerJam,
    gasPerMenit,
    estimasiLoadGas,
    estimasiBiayaGas,
    gasPerLoad: estimasiBiayaGas,
    gasPerKg,
    menitGas: menit,
    setrikaPerJam,
    setrikaPerKg,
    needsProfileGasData: shouldCalculateLoad && (!durasiKering || !mesinKering)
  };
};

window.saveGasHPPData = function(event) {
  if (event) event.preventDefault();
  zettStepDebugLog('current form before save', {
    form: window.zettGetActiveHPPType ? window.zettGetActiveHPPType() : 'gas',
    outlet: document.getElementById('inputNamaHPP')?.value?.trim() || ''
  });
  const btnSimpan = document.getElementById('btnSimpanHPP');
  const originalButtonHtml = btnSimpan ? btnSimpan.innerHTML : '';

  const setSavingState = function(isSaving) {
    if (!btnSimpan) return;
    btnSimpan.disabled = isSaving;
    btnSimpan.classList.toggle('zett-gas-saving', isSaving);
    btnSimpan.innerHTML = isSaving
      ? '<i class="ph ph-spinner-gap text-xl animate-spin"></i> Menyimpan...'
      : originalButtonHtml || '<i class="ph ph-floppy-disk text-xl"></i> Simpan Data Baru';
  };

  const showGasResult = function(type, title, text, options) {
    const config = options || {};
    if (window.Swal && typeof window.Swal.fire === 'function') {
      return window.Swal.fire({
        icon: type,
        title: title,
        text: text,
        toast: config.toast === true,
        position: config.toast ? 'top-end' : 'center',
        timer: config.toast ? 1800 : undefined,
        timerProgressBar: config.toast === true,
        showConfirmButton: config.toast !== true,
        confirmButtonText: 'OK',
        buttonsStyling: false,
        showClass: { popup: 'swal2-show' },
        hideClass: { popup: 'swal2-hide' },
        customClass: {
          popup: 'rounded-[1.75rem] border border-slate-200/70 shadow-[0_28px_90px_rgba(15,23,42,0.22)]',
          title: 'text-slate-900 font-black tracking-tight',
          htmlContainer: 'text-slate-500 font-semibold',
          confirmButton: 'bg-slate-950 hover:bg-slate-800 text-white px-7 py-3 rounded-full font-extrabold shadow-[0_14px_30px_rgba(15,23,42,0.22)] transition-all active:scale-[0.98]'
        }
      });
    }

    if (typeof showOmniToast === 'function') {
      showOmniToast(text, type === 'success' ? 'success' : 'error');
    }
  };

  const namaOutlet = document.getElementById('inputNamaHPP')?.value?.trim() || '';
  const kapGas = document.getElementById('inputGasKapasitas')?.value || '';
  const hargaGas = zettCleanNumber(document.getElementById('inputGasHarga')?.value);
  const jamGas = parseFloat(document.getElementById('inputGasJam')?.value || 0) || 0;
  const calc = window.calculateGas();

  if (typeof window.zettValidateGasAnalysisForm === 'function') {
    const validation = window.zettValidateGasAnalysisForm();
    if (!validation.valid) {
      showGasResult('warning', 'Data belum lengkap', validation.message || ('Harap lengkapi: ' + validation.missing.join(', ')));
      return;
    }
  } else if (!namaOutlet || !kapGas || hargaGas <= 0 || jamGas <= 0 || !calc.menitGas) {
    showGasResult('warning', 'Data belum lengkap', 'Lengkapi input Gas terlebih dahulu.');
    return;
  }

  setSavingState(true);

  const payload = {
    namaOutlet,
    gasKapasitas: kapGas,
    gasHarga: hargaGas,
    gasJam: jamGas,
    gasMenit: calc.menitGas,
    kapGas,
    hargaGas,
    jamGas,
    menitGas: calc.menitGas,
    estimasiLoadGas: calc.estimasiLoadGas,
    gasPerJam: calc.gasPerJam,
    gasPerMenit: calc.gasPerMenit,
    estimasiBiayaGas: calc.estimasiBiayaGas,
    gasPerLoad: calc.gasPerLoad,
    gasPerKg: calc.gasPerKg,
    setrikaPerJam: calc.setrikaPerJam,
    setrikaPerKg: calc.setrikaPerKg
  };
  Object.assign(payload, {
    'Kapasitas Gas LPG': kapGas,
    'Harga Per Tabung Gas': hargaGas,
    'Estimasi Pemakaian Gas Jam': jamGas,
    'Konversi Waktu Gas': calc.menitGas,
    'Estimasi Load Pemakaian Gas': calc.estimasiLoadGas,
    'HPP Gas Per Jam': calc.gasPerJam,
    'HPP Gas Per Menit': calc.gasPerMenit,
    'HPP Gas Per Load': calc.gasPerLoad
  });
  zettGasDebugLog('payload before save', payload);
  zettPatchActiveHPPRow({
    'Kap Gas': kapGas,
    'Harga Gas': zettFormatNumberID(hargaGas),
    'Jam Gas': jamGas,
    'Menit Gas': calc.menitGas,
    'Estimasi Load Gas': calc.estimasiLoadGas,
    'Gas Per Jam': calc.gasPerJam,
    'Gas Per Menit': calc.gasPerMenit,
    'Estimasi Biaya Gas': calc.estimasiBiayaGas,
    'Gas Per Load': calc.gasPerLoad,
    'Gas Per Kg': calc.gasPerKg,
    'Setrika Per Jam': calc.setrikaPerJam,
    'Setrika Per Kg': calc.setrikaPerKg
  });

  if (typeof window.zettHPPSetStateValue === 'function') {
    window.zettHPPSetStateValue('gas', typeof window.zettGetGasDashboardValue === 'function' ? window.zettGetGasDashboardValue() : calc.gasPerKg);
  }
  if (typeof window.zettHPPUpdateDashboardFromState === 'function') {
    window.zettHPPUpdateDashboardFromState('gas-save');
  }

  google.script.run
    .withSuccessHandler(function(res) {
      zettGasDebugLog('backend save response', res);
      zettStepDebugLog('save response', res);
      showGasResult('success', 'Berhasil Disimpan', 'Data gas berhasil disimpan.', { toast: true });
      if (res && res.data) {
        zettPatchActiveHPPRow(res.data);
      }
      if (typeof window.zettRefreshActiveHPPRowFromServer === 'function') {
        setTimeout(function() { window.zettRefreshActiveHPPRowFromServer(namaOutlet); }, 250);
      }
      setSavingState(false);
      zettStepDebugLog('next form after save', { from: 'gas', next: 'air' });
      if (typeof window.openHPPForm === 'function') {
        setTimeout(function() { window.openHPPForm('air', 'Analisa Biaya Air'); }, 220);
      }
    })
    .withFailureHandler(function(err) {
      setSavingState(false);
      showGasResult('error', 'Gagal Menyimpan', 'Gagal simpan data gas: ' + (err && err.message ? err.message : err));
    })
    .saveGasHPPData(payload);
};

/* Gas LPG operational UI: scoped to Struktur Biaya > Analisa Biaya Gas. */
(function zettGasLpgOperationalUi20260515() {
  const FIELD_CONFIG = {
    kapGas: { id: 'inputGasKapasitas', label: 'Kapasitas Gas LPG' },
    hargaGas: { id: 'inputGasHarga', label: 'Harga Per Tabung' },
    gasJam: { id: 'inputGasJam', label: 'Estimasi Pemakaian (Jam)' },
    gasLoad: { id: 'inputGasPerLoadManual', label: 'Estimasi Load Pemakaian' }
  };

  function byId(id) { return document.getElementById(id); }
  function norm(value) { return String(value || '').trim().toLowerCase(); }
  function clean(value) { return typeof zettCleanNumber === 'function' ? zettCleanNumber(value) : zettToNumberSafe(value); }
  function rupiah(value) {
    if (typeof formatRupiah === 'function') return formatRupiah(Math.round(Number(value) || 0));
    return 'Rp ' + Math.round(Number(value) || 0).toLocaleString('id-ID');
  }
  function outletName() { return String(byId('inputNamaHPP')?.value || '').trim(); }
  function getOutlet() {
    const name = norm(outletName());
    const sources = [];
    if (typeof masterDataCabang !== 'undefined' && Array.isArray(masterDataCabang)) sources.push(masterDataCabang);
    if (window.APP_STATE?.data?.master?.cabang) sources.push(window.APP_STATE.data.master.cabang);
    for (const rows of sources) {
      const found = rows.find(item => norm(item?.namaOutlet || item?.['Nama Outlet']) === name);
      if (found) return found;
    }
    return null;
  }
  function getRow() {
    if (typeof zettFindActiveHPPRow === 'function') return zettFindActiveHPPRow() || {};
    return {};
  }

  function zettGetGasUsageContext() {
    const outlet = getOutlet() || {};
    const row = getRow();
    const kategoriRaw = outlet.kategori || row['Kategori Laundry'] || byId('inputKategori')?.value || 'Laundry Drop Off';
    const kategori = norm(kategoriRaw);
    const dryerType = norm(outlet.tipeMesinPengering || row['Tipe Mesin Pengering'] || '');
    const setrikaType = norm(outlet.tipeSetrikaUtama || outlet.tipeSetrika || row['Tipe Setrika'] || '');
    const dryerUnit = clean(outlet.pengeringUnit || row['Mesin Kering'] || row['Mesin Pengering']);
    const dryerDuration = clean(outlet.pengeringDurasi || row['Durasi Kering']);
    const dryerKg = clean(outlet.pengeringKg || row['Kap Kering']);
    const setrikaKg = clean(outlet.setrikaKg || row['Kap Setrika']);
    const explicitDryerOff = outlet.pakaiPengering === false || String(outlet.pakaiPengering).toLowerCase() === 'false' || norm(outlet.metodePengeringan).includes('jemur');
    const isSelfService = kategori.includes('self');
    const isDropOff = kategori.includes('drop') || kategori.includes('kiloan');
    const isHybrid = kategori.includes('hybrid');
    const pakaiMesinPengering = !explicitDryerOff && (dryerUnit > 0 || dryerKg > 0 || isSelfService || isHybrid);
    const dryerUsesGas = pakaiMesinPengering;
    const requiresGasDryerLoad = isSelfService || isHybrid || (isDropOff && dryerUsesGas);
    const usesSteamIron = !isSelfService && (setrikaType.includes('uap') || setrikaType.includes('steam') || setrikaType.includes('gas'));
    const requiresGasSteamIron = (isDropOff || isHybrid) && usesSteamIron;
    const gasActive = isSelfService || isHybrid || (isDropOff && pakaiMesinPengering) || requiresGasSteamIron;

    return {
      kategoriBisnis: kategoriRaw,
      isSelfService,
      isDropOff,
      isHybrid,
      pakaiMesinPengering,
      usesSteamIron,
      dryerUsesGas,
      requiresGasDryerLoad,
      requiresGasSteamIron,
      gasActive,
      mesinKering: dryerUnit,
      durasiKering: dryerDuration,
      kapKering: dryerKg,
      kapSetrika: setrikaKg
    };
  }

  function getVisibleGasInputFields(context) {
    const c = context || zettGetGasUsageContext();
    const fields = ['kapGas', 'hargaGas', 'gasJam'];
    if (c.requiresGasDryerLoad) fields.push('gasLoad');
    return fields;
  }

  function getGasValues() {
    const row = getRow();
    const calc = typeof window.calculateGas === 'function' && !window.__zettGasRendering ? window.calculateGas() : {};
    const kapKering = clean(row['Kap Kering']) || clean(getOutlet()?.pengeringKg) || 1;
    const gasLoad = clean(calc.estimasiBiayaGas) || clean(row['Estimasi Biaya Gas']) || clean(row['Gas Per Load']);
    const gasKg = clean(calc.gasPerKg) || (gasLoad > 0 && kapKering > 0 ? gasLoad / kapKering : 0) || clean(row['Gas Per Kg']);
    return {
      gasLoad,
      gasKg,
      gasPerJam: clean(calc.gasPerJam) || clean(row['Gas Per Jam']),
      gasPerMenit: clean(calc.gasPerMenit) || clean(row['Gas Per Menit']),
      estimasiLoadGas: clean(calc.estimasiLoadGas) || clean(row['Estimasi Load Gas']),
      setrikaJam: clean(calc.setrikaPerJam) || clean(row['Setrika Per Jam']),
      setrikaKg: clean(calc.setrikaPerKg) || clean(row['Setrika Per Kg'])
    };
  }

  function getVisibleGasMetrics(context) {
    const c = context || zettGetGasUsageContext();
    const v = getGasValues();
    if (c.isSelfService) return [{ label: 'Gas Kering /Load', value: v.gasLoad }];
    const metrics = [];
    if (c.isHybrid) {
      metrics.push({ label: 'Gas Kering /Load', value: v.gasLoad });
      metrics.push({ label: 'Gas Kering /Kg', value: v.gasKg });
    } else if (c.isDropOff && c.pakaiMesinPengering) {
      metrics.push({ label: 'Gas Kering /Kg', value: v.gasKg });
    }
    if (c.requiresGasSteamIron) {
      metrics.push({ label: 'Gas Setrika /Jam', value: v.setrikaJam });
      metrics.push({ label: 'Gas Setrika /Kg', value: v.setrikaKg });
    }
    return metrics;
  }

  function zettGetGasDashboardValue() {
    const c = zettGetGasUsageContext();
    if (!c.gasActive) return 0;
    const v = getGasValues();
    if (c.isSelfService) return v.gasLoad || 0;
    return (c.requiresGasDryerLoad ? (v.gasKg || 0) : 0) + (c.requiresGasSteamIron ? (v.setrikaKg || 0) : 0);
  }

  function zettRenderGasAnalysisForm() {
    const c = zettGetGasUsageContext();
    const visible = new Set(getVisibleGasInputFields(c));
    document.querySelectorAll('#tab-gas .zett-gas-field').forEach(wrap => {
      const active = visible.has(wrap.dataset.gasField);
      wrap.classList.toggle('hidden', !active);
      wrap.style.display = active ? '' : 'none';
    });
    document.querySelectorAll('#tab-gas .zett-gas-base-field').forEach(wrap => {
      const active = visible.has('kapGas') || visible.has('hargaGas') || visible.has('gasJam');
      wrap.classList.toggle('hidden', !active);
      wrap.style.display = active ? '' : 'none';
    });
  }

  function zettRenderGasLpgCard() {
    if (window.__zettGasRendering) return;
    window.__zettGasRendering = true;
    try {
      const c = zettGetGasUsageContext();
      const card = byId('hpp-card-gas-wrap') || byId('dash-card-gas')?.closest('.hpp-card-dash');
      const toggle = byId('toggleGasManualHPP');
      const valueEl = byId('dash-card-gas');
      const dashboardValue = zettGetGasDashboardValue();
      zettGasDebugLog('card render source', {
        outlet: outletName(),
        row: getRow(),
        values: getGasValues(),
        dashboardValue,
        context: c
      });

      if (toggle) {
        toggle.textContent = c.gasActive ? 'ON' : 'OFF';
        toggle.classList.toggle('is-off', !c.gasActive);
      }
      if (card) {
        card.classList.toggle('zett-gas-off', !c.gasActive);
        card.style.pointerEvents = 'auto';
        card.style.opacity = '';
        card.style.filter = '';
      }
      if (typeof window.renderHPPCardDetails === 'function') {
        const metrics = c.gasActive
          ? getVisibleGasMetrics(c)
          : [{ label: 'Gas tidak dihitung', value: 0 }];
        window.renderHPPCardDetails('gas', metrics);
      }
      if (valueEl) valueEl.textContent = rupiah(dashboardValue);
      if (typeof window.zettHPPSetStateValue === 'function') {
        window.zettHPPSetStateValue('gas', dashboardValue);
      }
      zettRenderGasAnalysisForm();
    } finally {
      window.__zettGasRendering = false;
    }
  }

  function zettValidateGasAnalysisForm() {
    const c = zettGetGasUsageContext();
    const missing = [];
    if (!outletName()) missing.unshift('Outlet');
    if (!c.gasActive) return { valid: missing.length === 0, missing };
    ['kapGas', 'hargaGas', 'gasJam'].forEach(key => {
      const config = FIELD_CONFIG[key];
      const el = config ? byId(config.id) : null;
      const value = key === 'hargaGas' ? clean(el?.value) : Number(el?.value || 0);
      if (!el || String(el.value || '').trim() === '' || (key !== 'kapGas' && value <= 0)) missing.push(config.label);
    });
    if (c.requiresGasDryerLoad && (!c.durasiKering || !c.mesinKering)) {
      return {
        valid: false,
        missing,
        message: 'Durasi kering atau jumlah mesin pengering belum tersedia. Lengkapi Profil Operasional terlebih dahulu.'
      };
    }
    return { valid: missing.length === 0, missing };
  }

  function clearGasInputsForNewData() {
    ['inputGasPerLoadManual', 'inputGasKapasitas', 'inputGasHarga', 'inputGasJam'].forEach(id => {
      const el = byId(id);
      if (el) el.value = '';
    });
    const menit = byId('inputGasMenit');
    if (menit) menit.value = '';
  }

  function syncNewOrExistingGasForm() {
    const row = getRow();
    if (row && (row['Estimasi Load Gas'] || row['Harga Gas'] || row['Jam Gas'])) {
      if (byId('inputGasPerLoadManual')) byId('inputGasPerLoadManual').value = row['Estimasi Load Gas'] || '';
    } else if (window.zettGetActiveHPPType && window.zettGetActiveHPPType() === 'gas') {
      clearGasInputsForNewData();
    }
    zettRenderGasLpgCard();
  }

  window.zettGetGasUsageContext = zettGetGasUsageContext;
  window.zettGetVisibleGasInputFields = getVisibleGasInputFields;
  window.zettGetVisibleGasMetrics = getVisibleGasMetrics;
  window.zettGetGasDashboardValue = zettGetGasDashboardValue;
  window.zettRenderGasAnalysisForm = zettRenderGasAnalysisForm;
  window.zettRenderGasLpgCard = zettRenderGasLpgCard;
  window.zettValidateGasAnalysisForm = zettValidateGasAnalysisForm;
  window.zettToggleGasManualMode = function() {
    zettRenderGasLpgCard();
  };

  document.addEventListener('DOMContentLoaded', function() {
    syncNewOrExistingGasForm();
    document.addEventListener('change', function(event) {
      if (window.__HPP_PROGRAMMATIC_UPDATE__) {
        console.warn('[STAGE_5_LOOP_PREVENTED] Programmatic update diabaikan.');
        return;
      }
      if (typeof window.zettIsHPPPopulating_ === 'function' && window.zettIsHPPPopulating_()) return;
      if (event.target && (event.target.id === 'inputNamaHPP' || event.target.id === 'inputKategori')) setTimeout(syncNewOrExistingGasForm, 60);
    });
    document.addEventListener('input', function(event) {
      if (typeof window.zettIsHPPPopulating_ === 'function' && window.zettIsHPPPopulating_()) return;
      if (event.target && ['inputGasKapasitas', 'inputGasHarga', 'inputGasJam'].includes(event.target.id)) {
        requestAnimationFrame(zettRenderGasLpgCard);
      }
    });
  });
})();
</script>
