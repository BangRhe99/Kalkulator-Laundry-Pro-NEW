function normalizeKapasitasRow(item) {
    const row = item ? {...item} : {};
    const pick = (...keys) => {
        for (const key of keys) {
            if (row[key] !== undefined && row[key] !== null && row[key] !== '') return row[key];
        }
        return '';
    };

    row.namaOutlet = pick('namaOutlet', 'namaLaundry', 'Nama Outlet', 'Nama Cabang/Outlet') || 'Unknown';
    row.kategori = pick('kategori', 'kategoriLaundry', 'Kategori Laundry') || 'Drop Off/Kiloan';
    const mingguTutupRaw = pick('mingguTutup', 'tutupMinggu', 'Tutup Hari Minggu');
    const mingguTutupText = String(mingguTutupRaw || '').trim().toLowerCase();
    row.mingguTutup = (mingguTutupRaw === true || mingguTutupText === 'true' || mingguTutupText === 'ya' || mingguTutupText.includes('tutup')) ? 'Ya (Tutup)' : 'Tidak';
    row.targetOkupansiCuci = pick('targetOkupansiCuci', 'okupansiCuci', 'Target Okupansi Cuci') || '100';
    row.targetOkupansiKering = pick('targetOkupansiKering', 'okupansiKering', 'Target Okupansi Kering') || '100';
    row.targetOkupansiSetrika = pick('targetOkupansiSetrika', 'okupansiSetrika', 'Target Okupansi Setrika') || '100';
    row.cuciUnit = pick('cuciUnit', 'mesinCuci', 'Mesin Cuci') || 0;
    row.pengeringUnit = pick('pengeringUnit', 'mesinPengering', 'Mesin Pengering') || 0;
    row.setrikaUnit = pick('setrikaUnit', 'alatSetrika', 'Alat Setrika') || 0;
    row.cuciKg = pick('cuciKg', 'kapCuci', 'Kap Cuci') || 0;
    row.pengeringKg = pick('pengeringKg', 'kapKering', 'Kap Kering') || 0;
    row.setrikaKg = pick('setrikaKg', 'kapSetrika', 'Kap Setrika') || 0;
    row.cuciDurasi = pick('cuciDurasi', 'durasiCuci', 'Durasi Cuci') || 0;
    row.pengeringDurasi = pick('pengeringDurasi', 'durasiKering', 'Durasi Kering') || 0;
    row.setrikaDurasi = pick('setrikaDurasi', 'durasiSetrika', 'Durasi Setrika') || 0;
    row.tipeSetrikaUtama = pick('tipeSetrikaUtama', 'tipeSetrika', 'Tipe Setrika') || 'uap';

    row.jamTutup = pick('jamTutup', 'Jam Tutup');

    return row;
}

function zettPatchOperationalProfileToLocalHPP(outlet) {
    if (!outlet) return;

    if (!name) return;

        'Pakai Pengering': row.pakaiPengering ? 'Ya' : 'Tidak',
        'Metode Pengeringan': row.pakaiPengering ? 'mesin' : 'jemur'
    };

    const idx = masterDataHPP.findIndex(h => String(h.namaOutlet || h['Nama Outlet'] || '').trim().toLowerCase() === normalized);

    if (typeof window.zettPatchActiveHPPRow === 'function' && document.getElementById('inputNamaHPP')?.value === name) {
        window.zettPatchActiveHPPRow(patch);
    }
}

window.zettPatchOperationalProfileToLocalHPP = zettPatchOperationalProfileToLocalHPP;

function formatJamOperasional(value) {
    const raw = String(value || '').trim();
    if (!raw) return '--:--';

    const cleaned = raw.replace(/\./g, ':');
    const parts = cleaned.split(':');
    let hour = 0;
    let minute = 0;

    if (parts.length === 1) {
        hour = parseInt(parts[0], 10);
        minute = 0;
    } else {
        hour = parseInt(parts[0], 10);
        minute = parseInt(parts[1] || '0', 10);
    }

    if (isNaN(hour) || isNaN(minute)) return raw || '--:--';
    hour = Math.max(0, Math.min(23, hour));
    minute = Math.max(0, Math.min(59, minute));
    return String(hour).padStart(2, '0') + ':' + String(minute).padStart(2, '0');
}

function hitungDurasiMenit(jamBuka, jamTutup) {
    const buka = formatJamOperasional(jamBuka);
    const tutup = formatJamOperasional(jamTutup);
    if (!/^\d{2}:\d{2}$/.test(buka) || !/^\d{2}:\d{2}$/.test(tutup)) return 0;

    const bParts = buka.split(':');
    const tParts = tutup.split(':');
    const b = (parseInt(bParts[0], 10) * 60) + parseInt(bParts[1], 10);
    let t = (parseInt(tParts[0], 10) * 60) + parseInt(tParts[1], 10);
    if (t < b) t += 24 * 60;
    return Math.max(0, t - b);
}

function formatDurasiOperasional(jamBuka, jamTutup, fallbackDurasi) {
    const totalMenit = hitungDurasiMenit(jamBuka, jamTutup);
    if (!totalMenit) return fallbackDurasi || '-';

    const jam = Math.floor(totalMenit / 60);
    const menit = totalMenit % 60;
    let label = '';
    if (jam > 0) label += jam + ' Jam';
    if (menit > 0) label += (label ? ' ' : '') + menit + ' Menit';
    if (!label) label = '0 Menit';
    return label + ' (' + totalMenit.toLocaleString('id-ID') + ' menit)';
}

function formatAngkaID(value) {
    const num = Number(value || 0);
    return (Number.isFinite(num) ? Math.round(num) : 0).toLocaleString('id-ID');
}

function formatHybridCapacity(loadValue, kgValue) {
    return `${formatAngkaID(loadValue)} Load (${formatAngkaID(kgValue)} Kg)/Bln`;
}

function formatKgID(value) {
    const num = Number(value || 0);
    return `${(Number.isFinite(num) ? num : 0).toLocaleString('id-ID', { minimumFractionDigits: 1, maximumFractionDigits: 1 })} Kg`;
}

function ensureHybridCapacityRow(anchorId, rowId, labelText) {
    const anchorValue = document.getElementById(anchorId);
    if (!anchorValue) return null;

    const anchorRow = anchorValue.parentElement;
    if (!anchorRow || !anchorRow.parentNode) return null;

    let row = document.getElementById(rowId);
    if (row && row.dataset.zettHybridCapacityRow !== 'true') {
        row.remove();
        row = null;
    }

    if (!row) {
        row = document.createElement('div');
        row.id = rowId;
        row.dataset.zettHybridCapacityRow = 'true';
        row.style.cssText = 'display: flex; justify-content: space-between; border-bottom: 1px dashed var(--omni-border); padding-bottom: 0.2rem;';
        row.innerHTML = `
            <span id="${rowId}Label" style="font-size: 0.7rem; font-weight: 700; color: var(--omni-navy-light);">${labelText}</span>
            <span id="${rowId}Value" style="font-weight: 800; color: var(--omni-navy);">0</span>
        `;

        anchorRow.parentNode.insertBefore(row, anchorRow);
    }

    row.style.display = 'flex';
    return row.querySelector('#' + rowId + 'Value') || row.querySelector('[id$="Value"]') || row.lastElementChild;
}

function updateHybridCapacityExtraRows(isHybrid, data) {
    const rows = [
        ['dispCuciKgMinggu', 'hybridCuciLoadMingguRow', 'Load/Minggu:', data.cuci.loadMinggu],
        ['dispCuciKgBulan', 'hybridCuciLoadBulanRow', 'Load/Bulan:', data.cuci.loadBulan],
        ['dispKeringKgMinggu', 'hybridKeringLoadMingguRow', 'Load/Minggu:', data.kering.loadMinggu],
        ['dispKeringKgBulan', 'hybridKeringLoadBulanRow', 'Load/Bulan:', data.kering.loadBulan]
    ];

    rows.forEach(([anchorId, rowId, label, value]) => {
        const existing = document.getElementById(rowId);
        if (!isHybrid) {
            if (existing) existing.style.display = 'none';
            return;
        }

        const valueEl = ensureHybridCapacityRow(anchorId, rowId, label);
        if (valueEl) valueEl.innerText = formatAngkaID(value);
    });
}

function updateHybridLoadHariRows(isHybrid) {
    [
        ['dispCuciLoadHari', 'Load/Hari:', 'Siklus/Hari:'],
        ['dispKeringLoadHari', 'Load/Hari:', 'Siklus/Hari:']
    ].forEach(([valueId, hybridLabel, defaultLabel]) => {
        const valueEl = document.getElementById(valueId);
        const row = valueEl ? valueEl.parentElement : null;
        const label = row ? (row.querySelector('[id^="lbl"]') || row.firstElementChild) : null;
        if (label) label.innerText = isHybrid ? hybridLabel : defaultLabel;
    });
}

function getOutletCapacityBreakdown(outlet) {
    const c = normalizeKapasitasRow(outlet);
    const kategori = String(c.kategori || '').toLowerCase();
    const isSelfService = kategori.includes('self service');
    const isHybrid = kategori.includes('hybrid');
    const hariPerBulan = c.mingguTutup === 'Ya (Tutup)' ? 26 : 30;
    const operasionalMenit = hitungDurasiMenit(c.jamBuka, c.jamTutup);
    const parseNum = (value, fallback = 0) => {
        const n = parseFloat(String(value || '').replace(/[^0-9.-]/g, ''));
        return isNaN(n) ? fallback : n;
    };
    const calc = (unit, durasi, kg, okupansi, preferLoad) => {
        const u = parseNum(unit);
        const d = parseNum(durasi);
        const k = parseNum(kg);
        const ok = parseNum(okupansi, 100) / 100;
        if (u <= 0 || d <= 0 || operasionalMenit <= 0) return 0;
        const siklusPerMesin = Math.floor(operasionalMenit / d);
        const loadHari = Math.floor(siklusPerMesin * u * ok);
        if (preferLoad) return loadHari * hariPerBulan;
        return (siklusPerMesin * u * k * ok) * hariPerBulan;
    };
    const calcPair = (unit, durasi, kg, okupansi) => {
        const u = parseNum(unit);
        const d = parseNum(durasi);
        const k = parseNum(kg);
        const ok = parseNum(okupansi, 100) / 100;
        if (u <= 0 || d <= 0 || operasionalMenit <= 0) return { load: 0, kg: 0 };
        const siklusPerMesin = Math.floor(operasionalMenit / d);
        const loadHari = Math.floor(siklusPerMesin * u * ok);
        return {
            load: loadHari * hariPerBulan,
            kg: (siklusPerMesin * u * k * ok) * hariPerBulan
        };
    };

    const preferLoad = isSelfService;
    const hybridUnit = isHybrid ? 'Kg/Bln / Load/Bln' : (preferLoad ? 'Load/Bln' : 'Kg/Bln');
    const setrikaType = String(c.tipeSetrikaUtama || '').toLowerCase().includes('listrik') ? 'Kap S.Listrik' : 'Kap S.Uap';

    const cuciVal = calc(c.cuciUnit, c.cuciDurasi, c.cuciKg, c.targetOkupansiCuci, preferLoad);
    const keringVal = c.pakaiPengering === false ? 0 : calc(c.pengeringUnit, c.pengeringDurasi, c.pengeringKg, c.targetOkupansiKering, preferLoad);
    const cuciHybrid = isHybrid ? calcPair(c.cuciUnit, c.cuciDurasi, c.cuciKg, c.targetOkupansiCuci) : null;
    const keringHybrid = isHybrid && c.pakaiPengering !== false ? calcPair(c.pengeringUnit, c.pengeringDurasi, c.pengeringKg, c.targetOkupansiKering) : null;
    const setrikaVal = calc(c.setrikaUnit, c.setrikaDurasi, c.setrikaKg, c.targetOkupansiSetrika, false);

    const result = [
        { label: 'Kap Cuci', value: cuciVal, unit: hybridUnit, display: cuciHybrid ? formatHybridCapacity(cuciHybrid.load, cuciHybrid.kg) : null },
        { label: 'Kap Kering', value: keringVal, unit: hybridUnit, display: keringHybrid ? formatHybridCapacity(keringHybrid.load, keringHybrid.kg) : null, disabled: c.pakaiPengering === false, note: c.pakaiPengering === false ? 'Jemur' : '' }
    ];

    if (!isSelfService) {
        result.push({ label: isHybrid ? (setrikaType === 'Kap S.Listrik' ? 'Kap S.Listrik' : 'Kap S.Uap') : setrikaType, value: setrikaVal, unit: 'Kg/Bln' });
    }

    return result;
}

function hydrateCabangFromCache() {
    try {
        const cachedStr = localStorage.getItem(APP_STATE.cache.key);
        if(!cachedStr) return false;

        const parsed = JSON.parse(cachedStr);
        const res = parsed && parsed.data;
        if(!res || res.status !== 'success') return false;

        masterDataCabang = Array.isArray(res.kapasitas) ? res.kapasitas.map(normalizeKapasitasRow) : [];
        masterDataHPP = Array.isArray(res.hpp) ? res.hpp : [];
        window.masterDataHPP = masterDataHPP;
        dashboardRawData = Array.isArray(res.transactions) ? res.transactions : [];
        hasLoadedInitialData = true;
        APP_STATE.data.master = res;
        window.zettOutletState.loaded = masterDataCabang.length > 0;
        window.zettOutletState.lastSync = parsed.expiry ? parsed.expiry - APP_STATE.cache.ttl : Date.now();
        return true;
    } catch(e) {
        console.error("Cache hydrate Error:", e);
        return false;
    }
}

function persistCabangToClientCache() {
    try {
        const cachedStr = localStorage.getItem(APP_STATE.cache.key);
        const cached = cachedStr ? JSON.parse(cachedStr) : {};
        const cachedData = cached && cached.data && cached.data.status === 'success' ? cached.data : {};
        const data = {
            ...cachedData,
            ...(APP_STATE.data.master && APP_STATE.data.master.status === 'success' ? APP_STATE.data.master : {}),
            status: 'success',
            kapasitas: masterDataCabang,
            hpp: Array.isArray(masterDataHPP) ? masterDataHPP : [],
            transactions: Array.isArray(dashboardRawData) ? dashboardRawData : []
        };

        APP_STATE.data.master = data;
        localStorage.setItem(APP_STATE.cache.key, JSON.stringify({ data: data, expiry: Date.now() + APP_STATE.cache.ttl }));
        hasLoadedInitialData = true;
        window.zettOutletState.loaded = true;
        window.zettOutletState.lastSync = Date.now();
    } catch (e) {
        console.warn('Gagal memperbarui cache outlet lokal:', e);
    }
}

// =========================================================================
// [BangRhe REVISI: 0ms SYNCHRONOUS BOOTSTRAPPER (SWR PATTERN)]

(function zettBotFastBoot() {
    hydrateCabangFromCache();
})();

async function loadDaftarCabang(forceFresh = false) {
    // 1. Render UI INSTAN (0ms) dari Memori FastBoot
    if(!hasLoadedInitialData) {
        hydrateCabangFromCache();
    }

    if(hasLoadedInitialData) {
        applyCabangUIData();
    } else {
        const tableArea = document.getElementById('tableDaftarOutlet');
        if(tableArea) tableArea.innerHTML = `
          <div class="p-10 text-center text-slate-500 font-bold bg-slate-50/80 rounded-[1.5rem] border border-slate-100">
            <i class="ph ph-spinner-gap animate-spin text-4xl mb-4 text-emerald-500 mx-auto"></i>
            <br>Memuat data outlet...
          </div>`;
    }

    // 2. STALE-WHILE-REVALIDATE (Bg Sync Tanpa Memblokir Layar)
    const revalidateLock = 'profilOutletRevalidate';
    if (!StateMachine.acquireLock(revalidateLock)) {
        if(hasLoadedInitialData) applyCabangUIData();
        return;
    }

    try {
        window.zettOutletState.loading = true;
        const cachedStr = localStorage.getItem(APP_STATE.cache.key);
        let needsFetch = true;
        if (cachedStr) {
            const parsed = JSON.parse(cachedStr);
            if (!forceFresh && Date.now() < parsed.expiry) {
                needsFetch = false;
                if(!hasLoadedInitialData && hydrateCabangFromCache()) {
                    applyCabangUIData();
                }
            }
        }

        if (needsFetch) {
            const data = await new Promise((resolve, reject) => {
                const runner = google.script.run
                    .withSuccessHandler(resolve)
                    .withFailureHandler(reject);

                if (typeof google.script.run.getProfilOperasionalPayload === 'function') {
                    runner.getProfilOperasionalPayload(forceFresh === true);
                } else {
                    runner.getZettBotInitialPayload(forceFresh === true);
                }
            });
            
            if(data && data.status === 'success') {
                masterDataCabang = Array.isArray(data.kapasitas) ? data.kapasitas.map(normalizeKapasitasRow) : [];
                if (Array.isArray(data.hpp)) masterDataHPP = data.hpp;
                window.masterDataHPP = masterDataHPP;
                if (Array.isArray(data.transactions)) dashboardRawData = data.transactions;
                persistCabangToClientCache();
                if (typeof window.zettCommitPayload === 'function' && APP_STATE.data.master) window.zettCommitPayload(APP_STATE.data.master);
                applyCabangUIData(); 
            } else {
                const tableArea = document.getElementById('tableDaftarOutlet');
                if(tableArea && !hasLoadedInitialData) {
                    tableArea.innerHTML = `
                      <div class="p-10 text-center text-slate-500 bg-slate-50 rounded-[1.5rem] border border-slate-200 border-dashed">
                        <i class="ph ph-warning-circle text-5xl mb-3 text-amber-500"></i>
                        <p class="font-extrabold text-slate-700 mb-1">Data outlet belum bisa dimuat</p>
                        <p class="text-sm font-semibold">Coba buka ulang halaman Profil Operasional.</p>
                      </div>`;
                }
            }
        }
    } catch(e) {
        console.error("SWR Sync Error:", e);
        const tableArea = document.getElementById('tableDaftarOutlet');
        if(tableArea && !hasLoadedInitialData) {
            tableArea.innerHTML = `
              <div class="p-10 text-center text-slate-500 bg-slate-50 rounded-[1.5rem] border border-slate-200 border-dashed">
                <i class="ph ph-cloud-warning text-5xl mb-3 text-rose-500"></i>
                <p class="font-extrabold text-slate-700 mb-1">Gagal memuat data outlet</p>
                <p class="text-sm font-semibold">Periksa koneksi lalu coba lagi.</p>
              </div>`;
        }
    } finally {
        window.zettOutletState.loading = false;
        StateMachine.releaseLock(revalidateLock);
    }
}

const StateMachine = {
  // LOCK SYSTEM
  acquireLock: function(action) {
    if (APP_STATE.locks[action]) {
      console.warn(`[LOCKED] Action ${action} is currently running. Request blocked.`);
      return false;
    }
    APP_STATE.locks[action] = true;
    return true;
  },

  releaseLock: function(action) {
    APP_STATE.locks[action] = false;
  },

  invalidateClientCache: function() {
    localStorage.removeItem(APP_STATE.cache.key);
    hasLoadedInitialData = false;
    APP_STATE.data.master = null;
  },

  updateMetric: function(key, value) {
    if (!this.acquireLock('calcHPP')) return;
    APP_STATE.data.hpp[key] = value;
    this.calculateTotal();
    this.releaseLock('calcHPP');
  },
  
  calculateTotal: function() {
    const { gas, listrik, air, packing, bahan, nota } = APP_STATE.data.hpp;
    APP_STATE.data.hpp.total = gas + listrik + air + packing + bahan + nota;
    window.requestAnimationFrame(() => { this.renderDashboard(); });
  },
  
  renderDashboard: function() {
    const t = APP_STATE.data.hpp.total;
    const { gas, listrik, air, packing, bahan, nota } = APP_STATE.data.hpp;
    
    const totalEl = document.getElementById('dash-hpp-total');
    if(totalEl && typeof formatRupiah === 'function') {
      totalEl.innerText = formatRupiah(t);
      if(document.getElementById('dash-card-gas')) document.getElementById('dash-card-gas').innerText = formatRupiah(gas);
      if(document.getElementById('dash-card-listrik')) document.getElementById('dash-card-listrik').innerText = formatRupiah(listrik);
      if(document.getElementById('dash-card-air')) document.getElementById('dash-card-air').innerText = formatRupiah(air);
      if(document.getElementById('dash-card-packing')) document.getElementById('dash-card-packing').innerText = formatRupiah(packing);
      if(document.getElementById('dash-card-bahan')) document.getElementById('dash-card-bahan').innerText = formatRupiah(bahan);
      if(document.getElementById('dash-card-nota')) document.getElementById('dash-card-nota').innerText = formatRupiah(nota);
      
      // Update percentages for balok
      const updatePct = (id, value) => {
        const el = document.getElementById(id);
        if(el) el.innerText = t > 0 ? Math.round((value / t) * 100) + '%' : '0%';
      };
      updatePct('dash-card-gas-pct', gas);
      updatePct('dash-card-listrik-pct', listrik);
      updatePct('dash-card-air-pct', air);
      updatePct('dash-card-packing-pct', packing);
      updatePct('dash-card-bahan-pct', bahan);
      updatePct('dash-card-nota-pct', nota);
    }
    
    const donut = document.getElementById('hpp-donut-chart');
    const labelsContainer = document.getElementById('hpp-donut-labels');

    if (donut && t > 0) {
      let pctGas = (gas / t) * 100; let pctListrik = (listrik / t) * 100; let pctAir = (air / t) * 100;
      let pctPacking = (packing / t) * 100; let pctBahan = (bahan / t) * 100; let pctNota = (nota / t) * 100;
      let cGas = pctGas; let cListrik = cGas + pctListrik; let cAir = cListrik + pctAir;
      let cPacking = cAir + pctPacking; let cBahan = cPacking + pctBahan;

      donut.style.setProperty('--p-gas', `${cGas}%`); donut.style.setProperty('--p-listrik', `${cListrik}%`);
      donut.style.setProperty('--p-air', `${cAir}%`); donut.style.setProperty('--p-packing', `${cPacking}%`);
      donut.style.setProperty('--p-bahan', `${cBahan}%`);

      if (labelsContainer) {
          labelsContainer.innerHTML = '';
          let currentAnglePct = 0;
          const slices = [pctGas, pctListrik, pctAir, pctPacking, pctBahan, pctNota];
          slices.forEach(slicePct => {
              if (slicePct >= 4) { 
                  let midPct = currentAnglePct + (slicePct / 2); let angleDeg = (midPct * 3.6) - 90;
                  let rad = angleDeg * Math.PI / 180; let r = 98; 
                  let x = 120 + r * Math.cos(rad); let y = 120 + r * Math.sin(rad);
                  let label = document.createElement('div');
                  label.className = 'absolute text-[11px] font-black text-white tracking-wider drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] z-20';
                  label.style.left = x + 'px'; label.style.top = y + 'px'; label.style.transform = 'translate(-50%, -50%)';
                  label.innerText = Math.round(slicePct) + '%';
                  labelsContainer.appendChild(label);
              }
              currentAnglePct += slicePct;
          });
      }
    } else if (donut) {
      donut.style.setProperty('--p-gas', `0%`); donut.style.setProperty('--p-listrik', `0%`);
      donut.style.setProperty('--p-air', `0%`); donut.style.setProperty('--p-packing', `0%`); donut.style.setProperty('--p-bahan', `0%`);
      if (labelsContainer) labelsContainer.innerHTML = '';
    }
  },

  // Toggle expandable balok details
  toggleHPPBalok: function(type) {
    const detailEl = document.getElementById('hpp-balok-' + type);
    if (!detailEl) return;
    
    const isHidden = detailEl.classList.contains('hidden');
    if (isHidden) {
      detailEl.classList.remove('hidden');
      detailEl.style.maxHeight = '0px';
      detailEl.style.opacity = '0';
      // Trigger reflow
      detailEl.offsetHeight;
      detailEl.style.maxHeight = detailEl.scrollHeight + 'px';
      detailEl.style.opacity = '1';
    } else {
      detailEl.style.maxHeight = '0px';
      detailEl.style.opacity = '0';
      setTimeout(() => {
        detailEl.classList.add('hidden');
      }, 300);
    }
  }
};

function formatRupiahInput(input) {
    let value = input.value.replace(/[^,\d]/g, ''); let split = value.split(',');
    let sisa = split[0].length % 3; let rupiah = split[0].substr(0, sisa); let ribuan = split[0].substr(sisa).match(/\d{3}/gi);
    if (ribuan) { let separator = sisa ? '.' : ''; rupiah += separator + ribuan.join('.'); }
    rupiah = split[1] !== undefined ? rupiah + ',' + split[1] : rupiah; input.value = rupiah;
}

function formatRupiah(angka) {
    if (angka === 0 || !angka || isNaN(angka)) return 'Rp 0';
    let isNegative = angka < 0; let strAngka = Math.round(Math.abs(angka)).toString();
    let reverse = strAngka.split('').reverse().join(''); let ribuan = reverse.match(/\d{1,3}/g);
    let formatted = ribuan.join('.').split('').reverse().join('');
    return (isNegative ? '- Rp ' : 'Rp ') + formatted;
}

function safeSetSelect(elementId, targetValue) {
    const el = document.getElementById(elementId);
    if(!el || !targetValue) return;
    let cleanVal = String(targetValue).trim(); el.value = cleanVal;
    if(el.value !== cleanVal) {
        for(let opt of el.options) {

        }
    }
}

function filterCabang() {
    const val = document.getElementById('inputNama').value.trim().toLowerCase();
    const dropdown = document.getElementById('dropdownCabangResult');
    const escapeHtml = (str) => String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
    if(!dropdown) return;
    if(!val) { dropdown.classList.add('hidden'); return; }

    const filtered = masterDataCabang.filter(c => String(c.namaOutlet).toLowerCase().includes(val));
    if(filtered.length > 0) {
        let html = '';
        filtered.forEach(c => { html += `<div class="p-3 border-b border-slate-100 hover:bg-slate-50 cursor-pointer font-bold text-slate-700 text-sm flex items-center transition-colors" onclick="pilihCabang('${escapeHtml(c.namaOutlet)}')"><i class="ph ph-storefront text-blue-500 mr-2 text-lg"></i> ${escapeHtml(c.namaOutlet)}</div>`; });
        dropdown.innerHTML = html; dropdown.classList.remove('hidden');
    } else { dropdown.classList.add('hidden'); }
    toggleActionButtons();
}

function pilihCabang(namaCabang, cardEl) {
    const switchToken = Date.now() + ':' + String(namaCabang || '');
    window.__zettBranchSwitchToken = switchToken;
    if (cardEl) {
        cardEl.style.transform = 'scale(0.985)';
        cardEl.style.boxShadow = '0 18px 34px -24px rgba(37, 99, 235, 0.55)';
        setTimeout(() => {
            cardEl.style.transform = '';
            cardEl.style.boxShadow = '';
        }, 140);
    }

    const cabang = masterDataCabang.find(c => String(c.namaOutlet) === namaCabang);
    if(!cabang) return;
    zettPatchOperationalProfileToLocalHPP(cabang);

    document.getElementById('inputNama').value = cabang.namaOutlet;
    const globalHeaderDropdown = document.getElementById('inputNamaHPP');
    if(globalHeaderDropdown) globalHeaderDropdown.value = cabang.namaOutlet;
    if(document.getElementById('inputKategori')) document.getElementById('inputKategori').value = cabang.kategori || 'Drop Off/Kiloan';
    
    let jBuka = formatJamOperasional(cabang.jamBuka);
    let jTutup = formatJamOperasional(cabang.jamTutup);

    if(document.getElementById('inputJamBuka')) document.getElementById('inputJamBuka').value = jBuka;
    if(document.getElementById('inputJamTutup')) document.getElementById('inputJamTutup').value = jTutup;
    if(document.getElementById('inputMingguTutup')) document.getElementById('inputMingguTutup').checked = (cabang.mingguTutup === 'Ya (Tutup)');
    if(document.getElementById('inputOkupansiCuci')) document.getElementById('inputOkupansiCuci').value = String(cabang.targetOkupansiCuci || '100').replace(/[^0-9.]/g, '');
    if(document.getElementById('inputOkupansiKering')) document.getElementById('inputOkupansiKering').value = String(cabang.targetOkupansiKering || '100').replace(/[^0-9.]/g, '');
    if(document.getElementById('inputOkupansiSetrika')) document.getElementById('inputOkupansiSetrika').value = String(cabang.targetOkupansiSetrika || '100').replace(/[^0-9.]/g, '');
    if(document.getElementById('displayDurasi')) document.getElementById('displayDurasi').innerText = cabang.durasiOperasional || "- Jam - Menit";

    safeSetSelect('jenisMesinCuci', cabang.tipeMesinCuci || 'commercial'); safeSetSelect('jenisMesinPengering', cabang.tipeMesinPengering || 'commercial'); safeSetSelect('jenisSetrikaUtama', cabang.tipeSetrikaUtama || 'uap');
    setPakaiPengering(cabang.pakaiPengering !== false);
    syncDryerToggleVisibility();

    document.getElementById('containerMesinCuci').innerHTML = ''; document.getElementById('containerMesinPengering').innerHTML = ''; document.getElementById('containerMesinSetrika').innerHTML = '';

    let cuciU = !isNaN(parseFloat(cabang.cuciUnit)) ? parseFloat(cabang.cuciUnit) : 0; let cuciD = !isNaN(parseFloat(cabang.cuciDurasi)) ? parseFloat(cabang.cuciDurasi) : 0; let cuciK = !isNaN(parseFloat(cabang.cuciKg)) ? parseFloat(cabang.cuciKg) : 0;
    if (cuciU === 0 && cuciK === 0) cuciD = 0; addMesin('cuci', cuciU, cuciD, cuciK);

    let kerU = !isNaN(parseFloat(cabang.pengeringUnit)) ? parseFloat(cabang.pengeringUnit) : 0; let kerD = !isNaN(parseFloat(cabang.pengeringDurasi)) ? parseFloat(cabang.pengeringDurasi) : 0; let kerK = !isNaN(parseFloat(cabang.pengeringKg)) ? parseFloat(cabang.pengeringKg) : 0;
    if (kerU === 0 && kerK === 0) kerD = 0; addMesin('pengering', kerU, kerD, kerK);

    let setU = !isNaN(parseFloat(cabang.setrikaUnit)) ? parseFloat(cabang.setrikaUnit) : 0; let setD = !isNaN(parseFloat(cabang.setrikaDurasi)) ? parseFloat(cabang.setrikaDurasi) : 0; let setK = !isNaN(parseFloat(cabang.setrikaKg)) ? parseFloat(cabang.setrikaKg) : 0;
    if (setU === 0 && setK === 0) setD = 0; addMesin('setrika', setU, setD, setK);

    document.getElementById('dropdownCabangResult').classList.add('hidden');
    updateNavName();
    
    if (typeof populateFormHPP === 'function') {
        requestAnimationFrame(() => {
            if (window.__zettBranchSwitchToken !== switchToken) return;
            populateFormHPP(namaCabang);
            if (typeof window.zettRefreshActiveHPPRowFromServer === 'function') {
                window.zettRefreshActiveHPPRowFromServer(namaCabang);
            }
        });
    }
    toggleActionButtons(); toggleKategoriLaundry(); syncDryerToggleVisibility(); calculateCapacity(); 
    showFormKapasitas(false);
    if (typeof checkHPPLock === 'function') checkHPPLock();
}

function normalizeNumericInputValue(input) {
    let raw = String(input && input.value !== undefined ? input.value : '').replace(/[^0-9]/g, '');
    if (!raw) return '';
    return String(parseInt(raw, 10) || 0);
}

function bindCapacityNumericInputGuard() {
    if (window.__zettNumericInputGuardBound) return;
    window.__zettNumericInputGuardBound = true;

    const isCapacityNumeric = (target) => target && target.matches && target.matches('.m-unit, .m-durasi, .m-kg');

    document.addEventListener('focusin', function(e) {
        if (!isCapacityNumeric(e.target)) return;
        e.target.value = normalizeNumericInputValue(e.target);
        requestAnimationFrame(() => {
            try { e.target.select(); } catch (err) {}
        });
    });

    document.addEventListener('input', function(e) {
        if (!isCapacityNumeric(e.target)) return;
        const normalized = normalizeNumericInputValue(e.target);
        if (e.target.value !== normalized) e.target.value = normalized;
        if (typeof calculateCapacity === 'function') calculateCapacity();
    });

    document.addEventListener('blur', function(e) {
        if (!isCapacityNumeric(e.target)) return;
        const normalized = normalizeNumericInputValue(e.target);
        e.target.value = normalized === '' ? '0' : normalized;
        if (typeof calculateCapacity === 'function') calculateCapacity();
    }, true);
}

function ensureDryerToggleUI() {
    const container = document.getElementById('containerMesinPengering');
    if (!container || document.getElementById('togglePakaiPengering')) return;

    const card = container.closest('.bento-card') || container.parentElement;
    if (!card) return;

    const toggleWrap = document.createElement('div');
    toggleWrap.id = 'pengeringModeControl';
    toggleWrap.className = 'mb-3 rounded-2xl border border-orange-100 bg-orange-50/60 px-4 py-3 transition-all duration-300';
    toggleWrap.innerHTML = `
      <label class="flex items-center justify-between gap-3 cursor-pointer select-none">
        <span class="flex flex-col">
          <span class="text-[11px] font-black uppercase tracking-[0.16em] text-orange-600">Mode Pengering</span>
          <span id="labelPakaiPengering" class="text-xs font-bold text-slate-500">Mesin pengering aktif</span>
        </span>
        <span class="relative inline-flex h-7 w-12 shrink-0 items-center rounded-full bg-orange-500 transition-colors duration-300 shadow-inner">
          <input type="checkbox" id="togglePakaiPengering" class="sr-only" checked>
          <span id="thumbPakaiPengering" class="absolute left-1 h-5 w-5 rounded-full bg-white shadow transition-transform duration-300 translate-x-5"></span>
        </span>
      </label>`;

    card.insertBefore(toggleWrap, container);
    const toggle = document.getElementById('togglePakaiPengering');
    if (toggle) {
        toggle.addEventListener('change', function() {
            setPakaiPengering(toggle.checked);
            calculateCapacity();
        });
    }
}

function shouldShowDryerToggle(kategori) {
    const k = String(kategori || '').toLowerCase();
    return k.includes('drop') || k.includes('kiloan');
}

function syncDryerToggleVisibility() {
    ensureDryerToggleUI();
    const kategori = document.getElementById('inputKategori') ? document.getElementById('inputKategori').value : '';
    const show = shouldShowDryerToggle(kategori);
    const control = document.getElementById('pengeringModeControl');
    const container = document.getElementById('containerMesinPengering');
    const select = document.getElementById('jenisMesinPengering');

    if (control) control.style.display = show ? 'block' : 'none';
    if (!show) {
        if (container) {
            container.style.opacity = '1';
            container.style.filter = 'none';
            container.querySelectorAll('input, button').forEach(el => {
                el.disabled = false;
                el.style.pointerEvents = 'auto';
            });
        }
        if (select) {
            select.disabled = false;
            select.style.opacity = '1';
        }
    } else {
        setPakaiPengering(isPakaiPengering());
    }
}

function setPakaiPengering(isActive) {
    ensureDryerToggleUI();
    const active = isActive !== false;
    const toggle = document.getElementById('togglePakaiPengering');
    const thumb = document.getElementById('thumbPakaiPengering');
    const label = document.getElementById('labelPakaiPengering');
    const control = document.getElementById('pengeringModeControl');
    const container = document.getElementById('containerMesinPengering');
    const select = document.getElementById('jenisMesinPengering');

    if (toggle) toggle.checked = active;
    if (thumb) thumb.style.transform = active ? 'translateX(1.25rem)' : 'translateX(0)';
    if (label) label.innerText = active ? 'Mesin pengering aktif' : 'OFF - sistem jemur, pengering tidak dihitung';
    if (control) {
        control.classList.toggle('bg-orange-50/60', active);
        control.classList.toggle('border-orange-100', active);
        control.classList.toggle('bg-slate-50', !active);
        control.classList.toggle('border-slate-200', !active);
    }
    if (container) {
        container.style.opacity = active ? '1' : '0.38';
        container.style.filter = active ? 'none' : 'grayscale(1)';
        container.querySelectorAll('input, button').forEach(el => {
            el.disabled = !active;
            el.style.pointerEvents = active ? 'auto' : 'none';
        });
    }
    if (select) {
        select.disabled = !active;
        select.style.opacity = active ? '1' : '0.45';
    }
}

function isPakaiPengering() {
    const kategori = document.getElementById('inputKategori') ? document.getElementById('inputKategori').value : '';
    if (!shouldShowDryerToggle(kategori)) return true;
    const toggle = document.getElementById('togglePakaiPengering');
    return toggle ? toggle.checked : true;
}

function getOutletOperationalConfig(outletName) {
    const name = String(outletName || '').trim();
    const outlet = masterDataCabang.find(c => String(c.namaOutlet || '').trim().toLowerCase() === name.toLowerCase());
    if (!outlet) return null;

    const jenisSetrika = String(outlet.tipeSetrikaUtama || outlet.tipeSetrika || '').toLowerCase();
    const tipePengering = String(outlet.tipeMesinPengering || '').toLowerCase();
    const pakaiPengering = outlet.pakaiPengering !== false;
    const usesIronElectric = jenisSetrika.includes('listrik');
    const usesDryer = pakaiPengering;
    const dryerUsesGas = usesDryer && (tipePengering.includes('konversi') || tipePengering.includes('gas'));

    return {
        namaOutlet: outlet.namaOutlet,
        kategori: outlet.kategori || 'Drop Off/Kiloan',
        pakaiPengering,
        metodePengeringan: pakaiPengering ? 'mesin' : 'jemur',
        jenisSetrika: outlet.tipeSetrikaUtama || outlet.tipeSetrika || 'uap',
        usesGas: dryerUsesGas,
        usesElectricity: true,
        usesDryer,
        usesIronElectric,
        dryerUsesGas
    };
}

function setHPPCardOperationalState(type, active, note) {
    const valueEl = document.getElementById('dash-card-' + type);
    const card = valueEl ? valueEl.closest('.hpp-card-dash') : null;
    if (!card) return;

    if (type === 'gas') {
        card.style.pointerEvents = 'auto';
        card.title = note || '';
        return;
    }

    card.style.opacity = active ? '1' : '0.38';
    card.style.filter = active ? 'none' : 'grayscale(1)';
    card.style.pointerEvents = active ? 'auto' : 'none';
    card.title = note || '';
}

function applyOperationalConfigToHPP(outletName) {
    const config = getOutletOperationalConfig(outletName);
    const dashboard = document.getElementById('hpp-dashboard-view');
    if (!dashboard || !config) return;

    const insight = document.getElementById('hpp-operational-insight');
    if (insight) insight.remove();

    setHPPCardOperationalState('gas', config.usesGas, 'Gas tidak relevan untuk konfigurasi outlet ini.');
    setHPPCardOperationalState('listrik', true, 'Listrik tetap relevan untuk operasi outlet.');

    const gasInputs = ['inputGasKapasitas', 'inputGasHarga', 'inputGasJam'];
    gasInputs.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.disabled = false;
        el.style.opacity = '1';
    });
    if (typeof window.zettRenderGasLpgCard === 'function') window.zettRenderGasLpgCard();

    const dryerWatt = document.getElementById('inputListrikPengeringWatt');
    if (dryerWatt) {
        dryerWatt.disabled = !config.usesDryer;
        dryerWatt.style.opacity = config.usesDryer ? '1' : '0.45';
    }

    const ironToggle = document.getElementById('toggleSetrikaListrik');
    if (ironToggle && config.usesIronElectric && !ironToggle.checked) {
        ironToggle.checked = true;
        if (typeof toggleSetrikaInputs === 'function') toggleSetrikaInputs();
        if (typeof calculateListrik === 'function') calculateListrik();
    }

    const gasContext = typeof window.zettGetGasUsageContext === 'function' ? window.zettGetGasUsageContext() : null;
    if (!config.usesGas && (!gasContext || !gasContext.gasActive) && typeof window.zettHPPSetStateValue === 'function') {
        window.zettHPPSetStateValue('gas', 0);
        if (typeof window.zettHPPUpdateDashboardFromState === 'function') window.zettHPPUpdateDashboardFromState('operational-config');
    }
}

function addMesin(tipe, unit = 0, durasi = 0, kg = 0) {
    let idContainer = '';
    if (tipe === 'cuci') idContainer = 'containerMesinCuci';
    else if (tipe === 'pengering') idContainer = 'containerMesinPengering';
    else idContainer = 'containerMesinSetrika';
    
    const container = document.getElementById(idContainer);
    if(!container) return;
    
    if(container.children.length === 0) {
        const header = document.createElement('div');
        header.className = 'omni-asset-header animate-fade-in';
        header.innerHTML = `
            <div class="omni-asset-th">Unit</div>
            <div class="omni-asset-th">Durasi(m)</div>
            <div class="omni-asset-th">Max Kg</div>
            <div class="omni-asset-th">Aksi</div>
        `;
        container.appendChild(header);
    }
    
    const id = 'omni_m_' + Date.now() + Math.floor(Math.random() * 1000);
    const div = document.createElement('div');
    div.className = `omni-asset-grid animate-fade-in input-mesin-${tipe}`;
    div.id = id;
    
    const safeUnit = (unit === '' || isNaN(parseFloat(unit))) ? 0 : parseFloat(unit);
    const safeDurasi = (durasi === '' || isNaN(parseFloat(durasi))) ? 0 : parseFloat(durasi);
    const safeKg = (kg === '' || isNaN(parseFloat(kg))) ? 0 : parseFloat(kg);

    div.innerHTML = `
        <input type="number" min="0" value="${safeUnit}" class="m-unit omni-asset-input" placeholder="0">
        <input type="number" min="0" value="${safeDurasi}" class="m-durasi omni-asset-input" placeholder="0">
        <input type="number" min="0" step="0.1" value="${safeKg}" class="m-kg omni-asset-input" placeholder="0">
        <button type="button" onclick="document.getElementById('${id}').remove(); calculateCapacity()" class="omni-btn-trash" aria-label="Hapus Aset">
            <i class="ph ph-trash-bold text-lg"></i>
        </button>
    `;
    container.appendChild(div);
    
    div.querySelectorAll('.omni-asset-input').forEach(input => {
        input.addEventListener('input', calculateCapacity);
        input.addEventListener('change', calculateCapacity);
    });

    if (tipe === 'pengering') setPakaiPengering(isPakaiPengering());
    calculateCapacity();
}

function _extractMesin(tipe) {
  if (tipe === 'pengering' && !isPakaiPengering()) return [];
  let idContainer = '';
  if (tipe === 'cuci') idContainer = 'containerMesinCuci';
  else if (tipe === 'pengering') idContainer = 'containerMesinPengering';
  else idContainer = 'containerMesinSetrika';

  const container = document.getElementById(idContainer);
  if (!container) return [];

  const rows = container.querySelectorAll('.omni-asset-grid'); 
  const data = [];

  rows.forEach(row => {
    const inputs = row.querySelectorAll('.omni-asset-input');
    if (inputs.length >= 3) {
      let u = parseFloat(inputs[0].value);
      let d = parseFloat(inputs[1].value);
      let k = parseFloat(inputs[2].value);
      data.push({
        unit: isNaN(u) ? 0 : u,
        durasi: isNaN(d) ? 0 : d, 
        max_kg: isNaN(k) ? 0 : k
      });
    }
  });
  
  return data;
}

// [PROFIL OPERASIONAL - INPUT OUTLET BARU] Validator khusus outlet baru.
function validateOutletBaruForm() {
    const errors = [];
    const byId = (id) => document.getElementById(id);
    const valueOf = (id) => {
        const el = byId(id);
        return el ? String(el.value || '').trim() : '';
    };
    const selectValue = (id) => {
        const el = byId(id);
        if (!el || el.disabled) return '';
        return String(el.value || '').trim();
    };
    const positiveNumber = (value) => {
        if (value === null || value === undefined) return false;
        const raw = String(value).trim();
        if (!raw) return false;
        const num = Number(raw.replace(',', '.'));
        return Number.isFinite(num) && num > 0;
    };
    const firstMachine = (tipe) => {
        const list = _extractMesin(tipe);
        return list[0] || { unit: '', durasi: '', max_kg: '' };
    };
    const category = valueOf('inputKategori');
    const categoryLower = category.toLowerCase();
    const isHybrid = categoryLower.includes('hybrid');
    const isSelfService = categoryLower.includes('self service');
    const isDropOff = categoryLower.includes('drop off') || categoryLower.includes('drop') || categoryLower.includes('kiloan');
    const isJemur = categoryLower.includes('jemur');
    const dryerOn = isPakaiPengering();

    if (!valueOf('inputNama')) errors.push('Nama outlet wajib diisi.');
    if (!category) errors.push('Kategori laundry wajib dipilih.');

    const jamBuka = valueOf('inputJamBuka');
    const jamTutup = valueOf('inputJamTutup');
    if (byId('inputJamBuka') && byId('inputJamTutup')) {
        if (!jamBuka || !jamTutup) errors.push('Jam operasional wajib diisi lengkap: jam buka dan jam tutup.');
    } else if (!jamBuka && !jamTutup && byId('inputJamOperasional')) {
        if (!valueOf('inputJamOperasional')) errors.push('Jam operasional wajib diisi.');
    }

    const cuci = firstMachine('cuci');
    if (!positiveNumber(cuci.unit)) errors.push('Jumlah unit mesin cuci wajib diisi dan harus lebih dari 0.');
    if (!positiveNumber(cuci.durasi)) errors.push('Durasi cuci wajib diisi dan harus lebih dari 0.');
    if (!positiveNumber(cuci.max_kg)) errors.push('Max kg mesin cuci wajib diisi dan harus lebih dari 0.');
    if (!selectValue('jenisMesinCuci')) errors.push('Tipe mesin cuci wajib dipilih.');

    const dryerRequired = isHybrid || isSelfService || ((isDropOff || isJemur) && dryerOn);
    if (dryerRequired) {
        const kering = firstMachine('pengering');
        const context = (isHybrid || isSelfService) ? ' untuk kategori Hybrid/Self Service' : ' karena pengering diaktifkan';
        const dryerStartErrorCount = errors.length;
        if (!positiveNumber(kering.unit)) errors.push('Jumlah unit mesin pengering wajib diisi' + context + '.');
        if (!positiveNumber(kering.durasi)) errors.push('Durasi pengering wajib diisi' + context + '.');
        if (!positiveNumber(kering.max_kg)) errors.push('Max kg mesin pengering wajib diisi' + context + '.');
        if (!selectValue('jenisMesinPengering')) errors.push('Tipe mesin pengering wajib dipilih.');
        if (isJemur && errors.length > dryerStartErrorCount) {
            errors.push('Untuk Drop Off System Jemur, data pengering boleh kosong hanya jika tombol pengering dalam kondisi OFF.');
        }
    }

    const ironRequired = isHybrid || (isDropOff && !isSelfService) || isJemur;
    if (ironRequired) {
        const setrika = firstMachine('setrika');
        if (!positiveNumber(setrika.unit)) errors.push('Jumlah unit setrika wajib diisi untuk kategori Hybrid/Drop Off.');
        if (!positiveNumber(setrika.durasi)) errors.push('Durasi setrika wajib diisi untuk kategori Hybrid/Drop Off.');
        if (!positiveNumber(setrika.max_kg)) errors.push('Max kg setrika wajib diisi untuk kategori Hybrid/Drop Off.');
        if (!selectValue('jenisSetrikaUtama')) errors.push('Pilihan jenis setrika wajib dipilih: Setrika Uap atau Setrika Listrik.');
    }

    return errors;
}

// [PROFIL OPERASIONAL - INPUT OUTLET BARU] Commit cepat ke state/cache frontend tanpa reload server berat.
function commitOutletBaruToLocalState(outletData) {
    const normalized = normalizeKapasitasRow(outletData);
    const outletName = String(normalized.namaOutlet || '').trim().toLowerCase();
    if (!outletName) return;

    const existingIndex = masterDataCabang.findIndex(c => String(c.namaOutlet || '').trim().toLowerCase() === outletName);
    if (existingIndex >= 0) {
        masterDataCabang = masterDataCabang.map((item, index) => index === existingIndex ? normalized : item);
    } else {
        masterDataCabang = [normalized].concat(masterDataCabang);
    }

    hasLoadedInitialData = true;
    if (APP_STATE.data.master && APP_STATE.data.master.status === 'success') {
        APP_STATE.data.master = {...APP_STATE.data.master, kapasitas: masterDataCabang};
    } else {
        APP_STATE.data.master = { status: 'success', kapasitas: masterDataCabang, hpp: masterDataHPP, transactions: dashboardRawData };
    }

    persistCabangToClientCache();

    applyCabangUIData();
}

let capTimeout;
function calculateCapacity() {
    clearTimeout(capTimeout);
    capTimeout = setTimeout(() => {
        let operasionalMenit = 0;
        const jamBuka = document.getElementById('inputJamBuka') ? document.getElementById('inputJamBuka').value : '';
        const jamTutup = document.getElementById('inputJamTutup') ? document.getElementById('inputJamTutup').value : '';

        if (jamBuka && jamTutup) {
            const bH = parseInt(jamBuka.split(':')[0], 10);
            const bM = parseInt(jamBuka.split(':')[1] || 0, 10);
            const tH = parseInt(jamTutup.split(':')[0], 10);
            const tM = parseInt(jamTutup.split(':')[1] || 0, 10);
            
            if (!isNaN(bH) && !isNaN(bM) && !isNaN(tH) && !isNaN(tM)) {
                let mBuka = bH * 60 + bM;
                let mTutup = tH * 60 + tM;
                
                if (mTutup < mBuka) mTutup += 24 * 60; 
                operasionalMenit = mTutup - mBuka;

                const durasiJam = Math.floor(operasionalMenit / 60);
                const durasiMenit = operasionalMenit % 60;
                if (document.getElementById('displayDurasi')) {
                    document.getElementById('displayDurasi').innerText = `${durasiJam} Jam ${durasiMenit} Menit`;
                }
            } else {
                if (document.getElementById('displayDurasi')) {
                    document.getElementById('displayDurasi').innerText = `- Jam - Menit`;
                }
            }
        }

        const mingguTutup = document.getElementById('inputMingguTutup') ? document.getElementById('inputMingguTutup').checked : false;
        const hariPerBulan = mingguTutup ? 26 : 30;
        const hariPerMinggu = mingguTutup ? 6 : 7;
        
        if (document.getElementById('displayHariOperasional')) {
            document.getElementById('displayHariOperasional').innerText = hariPerBulan;
        }

        const valCuci = document.getElementById('inputOkupansiCuci') ? document.getElementById('inputOkupansiCuci').value.replace(/[^0-9.]/g, '') : '100';
        const valKering = document.getElementById('inputOkupansiKering') ? document.getElementById('inputOkupansiKering').value.replace(/[^0-9.]/g, '') : '100';
        const valSetrika = document.getElementById('inputOkupansiSetrika') ? document.getElementById('inputOkupansiSetrika').value.replace(/[^0-9.]/g, '') : '100';

        const okCuci = (parseFloat(valCuci) || 100) / 100;
        const okKering = (parseFloat(valKering) || 100) / 100;
        const okSetrika = (parseFloat(valSetrika) || 100) / 100;

        const hitungSiklusMesin = (tipe, targetOkupansi) => {
            let totalLoadAwal = 0;
            let totalKgAwal = 0;

            document.querySelectorAll(`.input-mesin-${tipe}`).forEach(row => {
                const unit = parseFloat(row.querySelector('.m-unit').value) || 0;
                let durasi = parseFloat(row.querySelector('.m-durasi').value);
                if (isNaN(durasi)) durasi = 0; 
                
                const maxKg = parseFloat(row.querySelector('.m-kg').value) || 0;

                if (durasi > 0 && operasionalMenit > 0) {
                    const maxSiklusPerMesin = Math.floor(operasionalMenit / durasi);
                    const maxLoadSemuaUnit = maxSiklusPerMesin * unit;
                    totalLoadAwal += maxLoadSemuaUnit;
                    totalKgAwal += (maxLoadSemuaUnit * maxKg);
                }
            });

            const loadAktual = Math.floor(totalLoadAwal * targetOkupansi);
            const kgAktual = totalKgAwal * targetOkupansi;

            return {
                loadHari: loadAktual,
                kgHari: kgAktual,
                kgMinggu: kgAktual * hariPerMinggu,
                kgBulan: kgAktual * hariPerBulan
            };
        };

        const hasilCuci = hitungSiklusMesin('cuci', okCuci);
        const hasilKering = isPakaiPengering() ? hitungSiklusMesin('pengering', okKering) : { loadHari: 0, kgHari: 0, kgMinggu: 0, kgBulan: 0 };
        const hasilSetrika = hitungSiklusMesin('setrika', okSetrika);

        const kategoriValue = document.getElementById('inputKategori') ? document.getElementById('inputKategori').value : '';
        const isSelfService = kategoriValue === 'Self Service';
        const isHybrid = String(kategoriValue || '').toLowerCase().includes('hybrid');
        const unitStr = isSelfService ? 'Load' : 'Kg';
        const cuciLoadMinggu = hasilCuci.loadHari * hariPerMinggu;
        const cuciLoadBulan = hasilCuci.loadHari * hariPerBulan;
        const keringLoadMinggu = hasilKering.loadHari * hariPerMinggu;
        const keringLoadBulan = hasilKering.loadHari * hariPerBulan;

        updateHybridLoadHariRows(isHybrid);
        updateHybridCapacityExtraRows(isHybrid, {
            cuci: { loadHari: hasilCuci.loadHari, loadMinggu: cuciLoadMinggu, loadBulan: cuciLoadBulan },
            kering: { loadHari: hasilKering.loadHari, loadMinggu: keringLoadMinggu, loadBulan: keringLoadBulan }
        });

        if(document.getElementById('dispCuciLoadHari')) document.getElementById('dispCuciLoadHari').innerText = formatAngkaID(hasilCuci.loadHari);
        if(document.getElementById('dispCuciKgHari')) document.getElementById('dispCuciKgHari').innerText = isSelfService ? `${formatAngkaID(hasilCuci.loadHari)} Load` : formatKgID(hasilCuci.kgHari);
        if(document.getElementById('dispCuciKgMinggu')) document.getElementById('dispCuciKgMinggu').innerText = isSelfService ? `${formatAngkaID(cuciLoadMinggu)} Load` : formatKgID(hasilCuci.kgMinggu);
        if(document.getElementById('dispCuciKgBulan')) {
            const el = document.getElementById('dispCuciKgBulan');
            el.dataset.kgValue = hasilCuci.kgBulan.toFixed(1);
            el.innerText = isSelfService ? `${formatAngkaID(cuciLoadBulan)} Load` : formatKgID(hasilCuci.kgBulan);
        }

        if(document.getElementById('dispKeringLoadHari')) document.getElementById('dispKeringLoadHari').innerText = formatAngkaID(hasilKering.loadHari);
        if(document.getElementById('dispKeringKgHari')) document.getElementById('dispKeringKgHari').innerText = isSelfService ? `${formatAngkaID(hasilKering.loadHari)} Load` : formatKgID(hasilKering.kgHari);
        if(document.getElementById('dispKeringKgMinggu')) document.getElementById('dispKeringKgMinggu').innerText = isSelfService ? `${formatAngkaID(keringLoadMinggu)} Load` : formatKgID(hasilKering.kgMinggu);
        if(document.getElementById('dispKeringKgBulan')) {
            const el = document.getElementById('dispKeringKgBulan');
            el.dataset.kgValue = hasilKering.kgBulan.toFixed(1);
            el.innerText = isSelfService ? `${formatAngkaID(keringLoadBulan)} Load` : formatKgID(hasilKering.kgBulan);
        }

        if(document.getElementById('dispSetrikaKgHari')) document.getElementById('dispSetrikaKgHari').innerText = `${hasilSetrika.kgHari.toFixed(1)} ${unitStr}`;
        if(document.getElementById('dispSetrikaKgMinggu')) document.getElementById('dispSetrikaKgMinggu').innerText = `${hasilSetrika.kgMinggu.toFixed(1)} ${unitStr}`;
        if(document.getElementById('dispSetrikaKgBulan')) document.getElementById('dispSetrikaKgBulan').innerText = `${hasilSetrika.kgBulan.toFixed(1)} ${unitStr}`;

        if(typeof calculateAll === 'function' && window.isCalculateCapacityRunning !== true) {
            window.isCalculateCapacityRunning = true;
            calculateAll();
            window.isCalculateCapacityRunning = false;
            if (isHybrid) {
                updateHybridLoadHariRows(true);
                updateHybridCapacityExtraRows(true, {
                    cuci: { loadHari: hasilCuci.loadHari, loadMinggu: cuciLoadMinggu, loadBulan: cuciLoadBulan },
                    kering: { loadHari: hasilKering.loadHari, loadMinggu: keringLoadMinggu, loadBulan: keringLoadBulan }
                });
                if(document.getElementById('dispCuciLoadHari')) document.getElementById('dispCuciLoadHari').innerText = formatAngkaID(hasilCuci.loadHari);
                if(document.getElementById('dispCuciKgHari')) document.getElementById('dispCuciKgHari').innerText = formatKgID(hasilCuci.kgHari);
                if(document.getElementById('dispCuciKgMinggu')) document.getElementById('dispCuciKgMinggu').innerText = formatKgID(hasilCuci.kgMinggu);
                if(document.getElementById('dispCuciKgBulan')) document.getElementById('dispCuciKgBulan').innerText = formatKgID(hasilCuci.kgBulan);
                if(document.getElementById('dispKeringLoadHari')) document.getElementById('dispKeringLoadHari').innerText = formatAngkaID(hasilKering.loadHari);
                if(document.getElementById('dispKeringKgHari')) document.getElementById('dispKeringKgHari').innerText = formatKgID(hasilKering.kgHari);
                if(document.getElementById('dispKeringKgMinggu')) document.getElementById('dispKeringKgMinggu').innerText = formatKgID(hasilKering.kgMinggu);
                if(document.getElementById('dispKeringKgBulan')) document.getElementById('dispKeringKgBulan').innerText = formatKgID(hasilKering.kgBulan);
            }
        }
    }, 50);
}

async function prosesSimpanKapasitas() {

    const nama = document.getElementById('inputNama').value.trim();
    const isUpdate = !document.getElementById('btnUpdateKapasitas').classList.contains('hidden');

    // [PROFIL OPERASIONAL - INPUT OUTLET BARU] Validasi premium hanya untuk outlet baru.
    if (!isUpdate) {
        const validationErrors = validateOutletBaruForm();
        if (validationErrors.length > 0) {
            StateMachine.releaseLock('saveKapasitas');
            showOutletValidationAlert(validationErrors);
            return;
        }
    }

    if(!nama) {
        StateMachine.releaseLock('saveKapasitas');
        return showOmniToast('Nama Outlet wajib diisi!', 'error');
    }

    const btnId = isUpdate ? 'btnUpdateKapasitas' : 'btnSimpanKapasitas';
    let previousCabang = null;

    setBtnState(btnId, 'loading');

    try {
        let exCuci = _extractMesin('cuci')[0] || {unit:0, durasi:0, max_kg:0};
        let exKering = _extractMesin('pengering')[0] || {unit:0, durasi:0, max_kg:0};
        let exSetrika = _extractMesin('setrika')[0] || {unit:0, durasi:0, max_kg:0};

        const payload = {
            namaOutlet: nama, 
            kategori: document.getElementById('inputKategori').value,
            jamBuka: document.getElementById('inputJamBuka').value,
            jamTutup: document.getElementById('inputJamTutup').value,
            mingguTutup: document.getElementById('inputMingguTutup').checked,
            targetOkupansiCuci: document.getElementById('inputOkupansiCuci').value,
            targetOkupansiKering: document.getElementById('inputOkupansiKering').value,
            targetOkupansiSetrika: document.getElementById('inputOkupansiSetrika').value,
            estimasiCuciKgBulan: document.getElementById('dispCuciKgBulan') ? (document.getElementById('dispCuciKgBulan').dataset.kgValue || document.getElementById('dispCuciKgBulan').innerText.replace(/[^\d.-]/g, '')) : 0,
            estimasiKeringKgBulan: document.getElementById('dispKeringKgBulan') ? (document.getElementById('dispKeringKgBulan').dataset.kgValue || document.getElementById('dispKeringKgBulan').innerText.replace(/[^\d.-]/g, '')) : 0,
            estimasiSetrikaKgBulan: document.getElementById('dispSetrikaKgBulan') ? document.getElementById('dispSetrikaKgBulan').innerText.replace(/[^\d.-]/g, '') : 0,
            durasiOperasional: document.getElementById('displayDurasi') ? document.getElementById('displayDurasi').innerText : '',
            pakaiPengering: isPakaiPengering(),
            metodePengeringan: isPakaiPengering() ? 'mesin' : 'jemur',
            
            tipeMesinCuci: document.getElementById('jenisMesinCuci') ? document.getElementById('jenisMesinCuci').value : 'commercial',
            tipeMesinPengering: document.getElementById('jenisMesinPengering') ? document.getElementById('jenisMesinPengering').value : 'commercial',
            tipeSetrikaUtama: document.getElementById('jenisSetrikaUtama') ? document.getElementById('jenisSetrikaUtama').value : 'uap',
            
            cuciUnit: exCuci.unit,
            cuciDurasi: exCuci.durasi,
            cuciKg: exCuci.max_kg,
            
            pengeringUnit: exKering.unit,
            pengeringDurasi: exKering.durasi,
            pengeringKg: exKering.max_kg,
            
            setrikaUnit: exSetrika.unit,
            setrikaDurasi: exSetrika.durasi,
            setrikaKg: exSetrika.max_kg
        };

        // [PROFIL OPERASIONAL - INPUT OUTLET BARU] Tunggu response sukses, lalu render dari state lokal tanpa reload berat.
        if (!isUpdate) {
            const response = await runServer('saveKapasitasPremium', payload);
            const responseOutlet = response && (response.outlet || response.data || response.kapasitas || response.row);
            const outletBaru = responseOutlet && !Array.isArray(responseOutlet) ? responseOutlet : payload;

            commitOutletBaruToLocalState(outletBaru);
            setBtnState(btnId, 'success');
            hideFormKapasitas();
            setBtnState(btnId, 'idle');
            showOmniToast('Outlet baru berhasil disimpan.', 'success');
            return;
        }

        previousCabang = masterDataCabang.slice();
        const optimisticRow = normalizeKapasitasRow(payload);
        const existingIndex = masterDataCabang.findIndex(c => String(c.namaOutlet).trim().toLowerCase() === nama.toLowerCase());
        if (existingIndex >= 0) {
            masterDataCabang = masterDataCabang.map((c, idx) => idx === existingIndex ? optimisticRow : c);
        } else {
            masterDataCabang = [optimisticRow].concat(masterDataCabang);
        }
        zettPatchOperationalProfileToLocalHPP(optimisticRow);

        persistCabangToClientCache();
        applyCabangUIData();
        setBtnState(btnId, 'success');
        hideFormKapasitas();
        showOmniToast('Perubahan outlet diterapkan. Sinkronisasi cloud berjalan...', 'success');

        const response = await runServer('saveKapasitasPremium', payload);
        zettPatchOperationalProfileToLocalHPP(optimisticRow);
        persistCabangToClientCache();
        setBtnState(btnId, 'idle');
        showOmniToast(response.message, 'success');

    } catch(error) {
        if (previousCabang) {
            masterDataCabang = previousCabang;
            persistCabangToClientCache();
            applyCabangUIData();
        }
        setBtnState(btnId, 'idle');
        if (!isUpdate) {
            showOutletSaveErrorAlert(error.message);
        } else {
            showOmniToast(error.message, 'error');
        }
    } finally {
        StateMachine.releaseLock('saveKapasitas');
    }
}

function backgroundSyncHPP(payload) {
    if(!StateMachine.acquireLock('bgSync')) return;
    
    localStorage.setItem('zett_hpp_pending_sync', JSON.stringify(payload));
    
    runServer('saveStrukturBiaya', payload)
        .then(response => {
            localStorage.removeItem('zett_hpp_pending_sync');
            StateMachine.invalidateClientCache();
            console.log("Background Sync HPP Sukses: " + response.message);
        })
        .catch(err => {
            showOmniToast('Koneksi terputus! Data tersimpan aman dan akan dikirim ulang otomatis.', 'error');
            console.error("Background Sync HPP Gagal: ", err.message);
        })
        .finally(() => {
            StateMachine.releaseLock('bgSync');
        });
}

function autoRetryPendingSync() {
    const pending = localStorage.getItem('zett_hpp_pending_sync');
    if (pending && !APP_STATE.locks['bgSync']) {
        try {
            const payload = JSON.parse(pending);
            showOmniToast('Mendeteksi antrean. Mengirim ulang data ke Cloud...', 'success');
            backgroundSyncHPP(payload);
        } catch(e) {
            localStorage.removeItem('zett_hpp_pending_sync');
        }
    }
}

function hapusOutlet() {
    const nama = document.getElementById('inputNama').value.trim();
    if (!nama) return showOmniToast('Pilih outlet yang ingin dihapus terlebih dahulu.', 'warning');
    
    showOmniConfirm('Hapus Outlet Permanen', `Anda yakin ingin menghapus data untuk <b>${nama}</b> beserta seluruh riwayat perhitungannya?`)
    .then(async (isConfirmed) => {
        if (!isConfirmed) return;
        
        if(!StateMachine.acquireLock('hapusOutlet')) return;
        
        const btnHapus = document.getElementById('btnHapusKapasitas');
        const originalHtml = btnHapus ? btnHapus.innerHTML : '';
        const previousCabang = masterDataCabang.slice();
        const previousHPP = masterDataHPP.slice();
        const selectedHPP = document.getElementById('inputNamaHPP');
        const selectedHPPValue = selectedHPP ? selectedHPP.value : '';

        if (btnHapus) {
            btnHapus.innerHTML = '<i class="ph ph-spinner-gap animate-spin"></i> Menghapus...';
            btnHapus.classList.add('opacity-80', 'pointer-events-none');
        }

        masterDataCabang = masterDataCabang.filter(c => String(c.namaOutlet).trim().toLowerCase() !== nama.toLowerCase());
        masterDataHPP = masterDataHPP.filter(h => String(h.namaOutlet).trim().toLowerCase() !== nama.toLowerCase());
        if (selectedHPP && selectedHPP.value === nama) selectedHPP.value = '';
        persistCabangToClientCache();
        hideFormKapasitas();
        applyCabangUIData();
        showOmniToast('Outlet dihapus dari tampilan. Sinkronisasi cloud berjalan...', 'success');
        
        try {
            const response = await runServer('deleteKapasitas', nama);
            persistCabangToClientCache();
            showOmniToast(response.message, 'success');
        } catch(error) {
            masterDataCabang = previousCabang;
            masterDataHPP = previousHPP;
            if (selectedHPP) selectedHPP.value = selectedHPPValue;
            persistCabangToClientCache();
            applyCabangUIData();
            showOmniToast(error.message, 'error');
        } finally {
            if (btnHapus) {
                btnHapus.innerHTML = originalHtml;
                btnHapus.classList.remove('opacity-80', 'pointer-events-none');
            }
            StateMachine.releaseLock('hapusOutlet');
        }
    });
}

async function prosesSimpanBEP() {
    if(!StateMachine.acquireLock('simpanBEP')) return;
    
    const btn = document.getElementById('btnSubmit');
    const selectHPP = document.getElementById('inputNamaHPP');
    
    if (!selectHPP || !selectHPP.value) {
        showOmniToast('Pilih cabang terlebih dahulu di pojok kanan atas.', 'error');
        StateMachine.releaseLock('simpanBEP');
        return;
    }
    
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="ph ph-spinner-gap animate-spin text-2xl"></i> Menyimpan...';
    btn.classList.add('opacity-80', 'pointer-events-none', 'scale-95');

    try {
        const payload = {
            namaOutlet: selectHPP.value,
            jamOperasional: document.getElementById('inputJamBuka').value + " - " + document.getElementById('inputJamTutup').value,
            biayaTetap: parseFloat(document.getElementById('hiddenTotalBiayaTetap').value) || 0,
            biayaVariabel: parseFloat(document.getElementById('inputBiayaVariabel').value.replace(/\./g, '')) || 0,
            kapasitas: parseFloat(document.getElementById('hiddenTotalKapasitasBulan').value) || 0,
            hpp: typeof state !== 'undefined' ? state.hpp : 0,
            hargaJualAcuan: typeof state !== 'undefined' ? state.hargaJualAcuan : 0,
            bepKg: typeof state !== 'undefined' ? state.bepKg : 0,
            bepRupiah: typeof state !== 'undefined' ? state.bepRupiah : 0,
            cuciSetrika: parseFloat(document.getElementById('cs_price_1').value.replace(/\./g, '')) || 0,
            cuciLipat: parseFloat(document.getElementById('cl_price_1').value.replace(/\./g, '')) || 0,
            cuciSaja: parseFloat(document.getElementById('c_price_1').value.replace(/\./g, '')) || 0,
            setrikaSaja: parseFloat(document.getElementById('ss_price_1').value.replace(/\./g, '')) || 0
        };

        const res = await runServer('saveTransaction', payload);
        StateMachine.invalidateClientCache();

        btn.innerHTML = '<i class="ph ph-check-circle text-2xl"></i> Tersimpan!';
        btn.classList.replace('from-blue-600', 'from-emerald-500');
        btn.classList.replace('to-indigo-600', 'to-teal-500');
        showOmniToast(res.message, 'success');
        
        setTimeout(() => {
            btn.innerHTML = originalText;
            btn.classList.remove('opacity-80', 'pointer-events-none', 'scale-95');
            btn.classList.replace('from-emerald-500', 'from-blue-600');
            btn.classList.replace('to-teal-500', 'to-indigo-600');
            loadDaftarCabang(); 
            switchMainTab('dashboard'); 
            StateMachine.releaseLock('simpanBEP');
        }, 1500);

    } catch (error) {
        btn.innerHTML = originalText;
        btn.classList.remove('opacity-80', 'pointer-events-none', 'scale-95');
        showOmniToast(error.message, 'error');
        StateMachine.releaseLock('simpanBEP');
    }
}

 * kompatibel dengan header lama Packing_PP_*.

(function(){
  function zettPick(obj, names, fallback) {
    if (!obj) return fallback;
    for (var i = 0; i < names.length; i++) {
      if (Object.prototype.hasOwnProperty.call(obj, names[i]) && obj[names[i]] !== '' && obj[names[i]] !== null && obj[names[i]] !== undefined) {
        return obj[names[i]];
      }
    }
    return fallback;
  }

  function zettSetVal(id, value) {
    var el = document.getElementById(id);
    if (el) el.value = value;
  }

  function zettSetCheck(id, value) {
    var el = document.getElementById(id);
    if (!el) return;
    var s = String(value).toLowerCase();
    el.checked = (value === true || s === 'true' || s === 'ya' || s === 'aktif' || s === '1');
