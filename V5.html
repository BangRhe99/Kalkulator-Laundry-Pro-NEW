<div id="view-cost-structure" class="main-view hidden">
  <div class="v5-header">
    <h2>Dashboard Struktur Biaya</h2>
    <p>Ringkasan komponen HPP per Kg yang tersinkron dari tab HPP.</p>
  </div>

  <div class="v5-total-card">
    <div class="v5-total-label">Total HPP Variabel</div>
    <div id="dash-hpp-total-v5" class="v5-total-value">Rp 0</div>
  </div>

  <div class="v5-cost-grid">
    <div class="v5-cost-card gas">
      <div class="v5-cost-title">Gas LPG</div>
      <div id="dash-card-gas-v5" class="v5-cost-value">Rp 0</div>
      <div id="dash-card-gas-pct-v5" class="v5-cost-pct">0%</div>
    </div>
    <div class="v5-cost-card listrik">
      <div class="v5-cost-title">Listrik</div>
      <div id="dash-card-listrik-v5" class="v5-cost-value">Rp 0</div>
      <div id="dash-card-listrik-pct-v5" class="v5-cost-pct">0%</div>
    </div>
    <div class="v5-cost-card air">
      <div class="v5-cost-title">Air</div>
      <div id="dash-card-air-v5" class="v5-cost-value">Rp 0</div>
      <div id="dash-card-air-pct-v5" class="v5-cost-pct">0%</div>
    </div>
    <div class="v5-cost-card packing">
      <div class="v5-cost-title">Packing</div>
      <div id="dash-card-packing-v5" class="v5-cost-value">Rp 0</div>
      <div id="dash-card-packing-pct-v5" class="v5-cost-pct">0%</div>
    </div>
    <div class="v5-cost-card bahan">
      <div class="v5-cost-title">Chemical</div>
      <div id="dash-card-bahan-v5" class="v5-cost-value">Rp 0</div>
      <div id="dash-card-bahan-pct-v5" class="v5-cost-pct">0%</div>
    </div>
    <div class="v5-cost-card nota">
      <div class="v5-cost-title">Admin/Nota</div>
      <div id="dash-card-nota-v5" class="v5-cost-value">Rp 0</div>
      <div id="dash-card-nota-pct-v5" class="v5-cost-pct">0%</div>
    </div>
  </div>
</div>

<script>

(function initV5Dashboard() {

  if (window.__v5DashboardInitDone === true) return;
  window.__v5DashboardInitDone = true;

  let observerInitialized = false;
  let hppObserver = null;

  function safeGet(id) {

    const el = document.getElementById(id);

    return el ? el.textContent.trim() : '';

  }

  function syncHPPDataToV5() {

    try {

      const syncMap = {

        'dash-hpp-total': 'dash-hpp-total-v5',

        'dash-card-gas': 'dash-card-gas-v5',
        'dash-card-listrik': 'dash-card-listrik-v5',
        'dash-card-air': 'dash-card-air-v5',
        'dash-card-packing': 'dash-card-packing-v5',
        'dash-card-bahan': 'dash-card-bahan-v5',
        'dash-card-nota': 'dash-card-nota-v5',

        'dash-card-gas-pct': 'dash-card-gas-pct-v5',
        'dash-card-listrik-pct': 'dash-card-listrik-pct-v5',
        'dash-card-air-pct': 'dash-card-air-pct-v5',
        'dash-card-packing-pct': 'dash-card-packing-pct-v5',
        'dash-card-bahan-pct': 'dash-card-bahan-pct-v5',
        'dash-card-nota-pct': 'dash-card-nota-pct-v5'

      };

      Object.entries(syncMap).forEach(([sourceId, targetId]) => {

        const sourceEl = document.getElementById(sourceId);
        const targetEl = document.getElementById(targetId);

        if (!sourceEl || !targetEl) return;

        const sourceText = sourceEl.textContent.trim();
        const targetText = targetEl.textContent.trim();

        if (sourceText !== targetText) {

          targetEl.textContent = sourceText;

        }

      });

    } catch (error) {

      console.error('V5 sync error:', error);

    }

  }

  function triggerHPPDataRefresh() {

    try {

      if (
        typeof window.StateMachine !== 'undefined' &&
        typeof window.StateMachine.calculateTotal === 'function'
      ) {

        window.StateMachine.calculateTotal();

      }

      setTimeout(() => {

        syncHPPDataToV5();

      }, 120);

    } catch (error) {

      console.error('Error triggering HPP refresh:', error);

    }

  }

  function watchHPPDataChanges() {

    if (observerInitialized) return;

    const hppView = document.getElementById('view-hpp');

    if (!hppView) {

      setTimeout(watchHPPDataChanges, 500);
      return;

    }

    observerInitialized = true;

    if (hppObserver) {
      hppObserver.disconnect();
    }

    hppObserver = new MutationObserver(() => {

      syncHPPDataToV5();

    });

    hppObserver.observe(hppView, {

      subtree: true,
      childList: true,
      characterData: true

    });

    syncHPPDataToV5();

  }

  function initCardClickHandler() {

    const cards = document.querySelectorAll('.v5-cost-card');

    if (!cards.length) return;

    cards.forEach((card) => {

      card.style.cursor = 'pointer';

      if (card.dataset.clickBound === 'true') return;

      card.dataset.clickBound = 'true';

      card.addEventListener('click', function () {

        const titleEl = this.querySelector('.v5-cost-title');

        if (!titleEl) return;

        const title = titleEl.textContent.trim();

        if (typeof openHPPModal === 'function') {

          openHPPModal(title);
          return;

        }

        console.warn('openHPPModal() tidak ditemukan');

      });

    });

  }

  const originalSwitchMainTab = window.switchMainTab;

  if (
    typeof originalSwitchMainTab === 'function' &&
    window.__v5SwitchMainTabWrapped !== true
  ) {

    window.__v5SwitchMainTabWrapped = true;

    window.switchMainTab = function(tab) {

      originalSwitchMainTab.call(this, tab);

      if (tab === 'cost-structure') {

        setTimeout(() => {

          triggerHPPDataRefresh();

          syncHPPDataToV5();

          initCardClickHandler();

        }, 200);

      }

    };

  }

  function initializeV5Dashboard() {

    watchHPPDataChanges();

    setTimeout(() => {

      syncHPPDataToV5();

      initCardClickHandler();

    }, 300);

  }

  if (document.readyState === 'loading') {

    document.addEventListener('DOMContentLoaded', initializeV5Dashboard);

  } else {

    initializeV5Dashboard();

  }

})();

function exportCostStructureReport() {

  const totalHPP =
    document.getElementById('dash-hpp-total-v5')
    ? document.getElementById('dash-hpp-total-v5').textContent
    : 'N/A';

  const reportText = `
LAPORAN STRUKTUR BIAYA (HPP)
============================
Total Biaya Variabel: ${totalHPP}

Rincian Biaya:
- Gas LPG: ${document.getElementById('dash-card-gas-v5') ? document.getElementById('dash-card-gas-v5').textContent : 'N/A'}
- Listrik: ${document.getElementById('dash-card-listrik-v5') ? document.getElementById('dash-card-listrik-v5').textContent : 'N/A'}
- Air: ${document.getElementById('dash-card-air-v5') ? document.getElementById('dash-card-air-v5').textContent : 'N/A'}
- Packing: ${document.getElementById('dash-card-packing-v5') ? document.getElementById('dash-card-packing-v5').textContent : 'N/A'}
- Chemical: ${document.getElementById('dash-card-bahan-v5') ? document.getElementById('dash-card-bahan-v5').textContent : 'N/A'}
- Admin/Nota: ${document.getElementById('dash-card-nota-v5') ? document.getElementById('dash-card-nota-v5').textContent : 'N/A'}
`;

  alert(reportText);

}

</script>
