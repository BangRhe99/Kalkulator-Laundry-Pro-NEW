    /* =========================================================
       BASE UI
    ========================================================= */

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f8fafc;
    }

    .glass-effect {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);

    }

    /* =========================================================
       TOGGLE
    ========================================================= */

    input:checked ~ .toggle-bg {
      background-color: #3b82f6;
    }

    input:checked ~ .toggle-dot {
      transform: translateX(100%);
    }

    input:checked ~ .toggle-bg-teal {
      background-color: #0f766e;
    }

    input:checked ~ .toggle-bg-rose {
      background-color: #e11d48;
    }

    /* =========================================================
       SCROLLBAR
    ========================================================= */

    .custom-scroll::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    .custom-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scroll::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    .custom-scroll::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .hide-scroll::-webkit-scrollbar {
      display: none;
    }

    .hide-scroll {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* =========================================================
       ANIMATION
    ========================================================= */

    .animate-fade-in {
      animation: fadeIn 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* =========================================================
       FIX HIDDEN
    ========================================================= */

    .hidden {
      display: none !important;
    }

    /* =========================================================
       FORM REVEAL
    ========================================================= */

    .zett-kapasitas-form-reveal {
      animation: zettKapasitasFormReveal 0.36s cubic-bezier(0.16, 1, 0.3, 1) both;
      will-change: opacity, transform, filter;
      transform: translate3d(0,0,0);
      backface-visibility: hidden;
    }

    @keyframes zettKapasitasFormReveal {

      from {
        opacity: 0;
        transform: translate3d(0,16px,0) scale(0.988);
        filter: blur(6px);
      }

      to {
        opacity: 1;
        transform: translate3d(0,0,0) scale(1);
        filter: blur(0);
      }

    }

  </style>

  <script>

    function toggleSidebar() {

      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');

      sidebar.classList.toggle('-translate-x-full');
      overlay.classList.toggle('hidden');

    }

    function switchMainTab(tabName) {

      document.querySelectorAll('.main-view').forEach(view => {
        view.classList.add('hidden');
      });

      const target = document.getElementById('view-' + tabName);

      if (target) {
        target.classList.remove('hidden');
      }

      document.querySelectorAll('.nav-btn').forEach(btn => {

        btn.classList.remove(
          'bg-gradient-to-r',
          'from-blue-600',
          'to-indigo-600',
          'shadow-lg',
          'shadow-indigo-900/30',
          'text-white',
          'font-bold'
        );

        btn.classList.add(
          'text-slate-400',
          'hover:bg-white/5',
          'hover:text-slate-100',
          'font-semibold'
        );

      });

      const activeNav = document.getElementById('nav-' + tabName);

      if (activeNav) {

        activeNav.classList.add(
          'bg-gradient-to-r',
          'from-blue-600',
          'to-indigo-600',
          'shadow-lg',
          'shadow-indigo-900/30',
          'text-white',
          'font-bold'
        );

      }

      const titleMap = {
        dashboard: 'Dashboard Eksekutif',
        kapasitas: 'Profil Operasional',
        hpp: 'Struktur Biaya (HPP)',
        harga: 'Katalog Layanan',
        bep: 'Target Titik Impas',
        roi: 'Proyeksi ROI',
        'cost-structure': 'Dashboard Biaya'
      };

      const headerTitle = document.getElementById('headerTitle');

      if (headerTitle) {
        headerTitle.innerText = titleMap[tabName] || 'Dashboard';
      }

    }

    function handleGlobalOutletChange(value) {

      console.log('Outlet changed:', value);

      if (typeof populateFormHPP === 'function') {
        populateFormHPP(value);
      }

      if (typeof zettRetrySyncHPPFromGSheet === 'function') {
        zettRetrySyncHPPFromGSheet();
      } else if (typeof zettSyncHPPFromGSheet === 'function') {
        zettSyncHPPFromGSheet();
      }

    }

    /* =========================================================
       V5 INIT
    ========================================================= */

    function initV5Dashboard() {

      const v5View = document.getElementById('view-cost-structure');

      if (!v5View) {
        console.error('V5 view not found!');
        return;
      }

      // Keep default tab state controlled by switchMainTab().
      // Do not force V5 view visible on startup.

    }

    /* =========================================================
       HPP SYNC
    ========================================================= */

    function syncHPPData() {

      const ids = [
        'gas',
        'listrik',
        'air',
        'packing',
        'bahan',
        'nota'
      ];

      ids.forEach(id => {

        const source = document.getElementById(`dash-card-${id}`);
        const target = document.getElementById(`dash-card-${id}-v5`);

        if (source && target) {
          target.textContent = source.textContent;
        }

      });

    }

    /* =========================================================
       INIT
    ========================================================= */

    document.addEventListener('DOMContentLoaded', () => {

      switchMainTab('dashboard');

      initV5Dashboard();

      setInterval(() => {

        const v5View = document.getElementById('view-cost-structure');

        if (v5View && !v5View.classList.contains('hidden')) {
          syncHPPData();
        }

      }, 1000);

    });

  </script>
