  <script>

    const SIDEBAR_CLOSE_MS = 220;

    function openSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      if (!sidebar || !overlay) return;

      overlay.classList.remove('hidden');
      sidebar.classList.remove('-translate-x-full');
      document.body.classList.add('sidebar-mobile-open');

      requestAnimationFrame(() => {
        overlay.classList.add('sidebar-overlay-active');
      });
    }

    function closeSidebarMobile() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      if (!sidebar || !overlay) return;

      sidebar.classList.add('-translate-x-full');
      overlay.classList.remove('sidebar-overlay-active');
      document.body.classList.remove('sidebar-mobile-open');

      window.clearTimeout(window.__sidebarOverlayCloseTimer);
      window.__sidebarOverlayCloseTimer = window.setTimeout(() => {
        if (sidebar.classList.contains('-translate-x-full')) {
          overlay.classList.add('hidden');
        }
      }, SIDEBAR_CLOSE_MS);
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      if (!sidebar) return;

      if (sidebar.classList.contains('-translate-x-full')) {
        openSidebar();
      } else {
        closeSidebarMobile();
      }
    }

    function setActiveMenu(tabName) {
      document.querySelectorAll('.nav-btn').forEach(btn => {

        btn.classList.remove(
          'bg-gradient-to-r',
          'from-blue-600',
          'to-indigo-600',
          'shadow-lg',
          'shadow-indigo-900/30',
          'text-white',
          'font-bold'
        );

        btn.classList.add(
          'text-slate-400',
          'hover:bg-white/5',
          'hover:text-slate-100',
          'font-semibold'
        );

      });

      const activeNav = document.getElementById('nav-' + tabName);

      if (activeNav) {

        activeNav.classList.add(
          'bg-gradient-to-r',
          'from-blue-600',
          'to-indigo-600',
          'shadow-lg',
          'shadow-indigo-900/30',
          'text-white',
          'font-bold'
        );

        activeNav.classList.remove('text-slate-400');

      }
    }

    function switchMainTab(tabName) {
      setActiveMenu(tabName);
      document.body.classList.toggle('hpp-mobile-active', tabName === 'hpp');
      if (window.innerWidth < 768) {
        closeSidebarMobile();
      }

      document.querySelectorAll('.main-view').forEach(view => {
        view.classList.add('hidden');
      });

      const target = document.getElementById('view-' + tabName);

      if (target) {
        target.classList.remove('hidden');
      }

      if (tabName === 'kapasitas') {

        const kapasitasDashboard =
          document.getElementById('kapasitas-dashboard');
        const kapasitasForm =
          document.getElementById('kapasitas-form-container');

        if (target) {
          target.classList.remove('hidden');
          target.style.display = 'block';
          target.style.visibility = 'visible';
          target.style.opacity = '1';
        }

        if (kapasitasDashboard) {
          kapasitasDashboard.classList.remove('hidden');
          kapasitasDashboard.style.display = 'block';
          kapasitasDashboard.style.visibility = 'visible';
          kapasitasDashboard.style.opacity = '1';
        }

        if (kapasitasForm) {
          kapasitasForm.classList.add('hidden');
          kapasitasForm.style.display = 'none';
        }

        if (typeof applyCabangUIData === 'function') {
          try { applyCabangUIData(); } catch (error) { console.error('applyCabangUIData error:', error); }
        }

        const hasCabangState =
          (Array.isArray(window.masterDataCabang) && window.masterDataCabang.length > 0) ||
          (window.APP_STATE && window.APP_STATE.data && window.APP_STATE.data.master &&
            Array.isArray(window.APP_STATE.data.master.kapasitas) &&
            window.APP_STATE.data.master.kapasitas.length > 0);

        if (!hasCabangState && typeof window.zettLoadDaftarCabangProfil === 'function') {
          try { window.zettLoadDaftarCabangProfil(); } catch (error) { console.error('zettLoadDaftarCabangProfil error:', error); }
        } else if (!hasCabangState && typeof loadDaftarCabang === 'function') {
          try { loadDaftarCabang(); } catch (error) { console.error('loadDaftarCabang error:', error); }
        }

      }

      if (tabName === 'hpp') {

        const hppDashboard =
          document.getElementById('hpp-dashboard-view');
        const hppForm =
          document.getElementById('hpp-form-view');

        if (target) {
          target.classList.remove('hidden');
          target.style.display = 'block';
          target.style.visibility = 'visible';
          target.style.opacity = '1';
        }

        if (hppDashboard) {
          hppDashboard.classList.remove('hidden');
          hppDashboard.style.display = 'grid';
          hppDashboard.style.visibility = 'visible';
          hppDashboard.style.opacity = '1';
          hppDashboard.style.pointerEvents = 'auto';
          hppDashboard.style.filter = 'none';
        }

        if (hppForm) {
          hppForm.classList.add('hidden');
          hppForm.style.display = 'none';
        }

        if (
          window.StateMachine &&
          typeof window.StateMachine.calculateTotal === 'function'
        ) {
          window.StateMachine.calculateTotal();
        } else if (
          window.HPPStateMachine &&
          typeof window.HPPStateMachine.calculateTotal === 'function'
        ) {
          window.HPPStateMachine.calculateTotal();
        }

        if (typeof window.zettEnsureHPPDashboardLoaded === 'function') {
          window.zettEnsureHPPDashboardLoaded();
        }

      }

      const titleMap = {
        dashboard: 'Dashboard Eksekutif',
        kapasitas: 'Profil Operasional',
        hpp: 'Struktur Biaya (HPP)',
        harga: 'Katalog Layanan',
        bep: 'Target Titik Impas',
        roi: 'Proyeksi ROI'
      };

      const headerTitle = document.getElementById('headerTitle');

      if (headerTitle) {
        headerTitle.innerText = titleMap[tabName] || 'Dashboard';
      }

    }

    function handleGlobalOutletChange(value) {

      console.log('Outlet changed:', value);

      const hppView = document.getElementById('view-hpp');
      const hppDashboard = document.getElementById('hpp-dashboard-view');
      const hppForm = document.getElementById('hpp-form-view');

      if (hppView && !hppView.classList.contains('hidden')) {
        if (hppDashboard) {
          hppDashboard.classList.remove('hidden');
          hppDashboard.style.display = 'grid';
          hppDashboard.style.visibility = 'visible';
          hppDashboard.style.opacity = '1';
          hppDashboard.style.pointerEvents = 'auto';
          hppDashboard.style.filter = 'none';
        }

        if (hppForm) {
          hppForm.classList.add('hidden');
          hppForm.style.display = 'none';
        }

        document.querySelectorAll('#view-hpp .tab-content')
          .forEach(tab => {
            tab.classList.add('hidden');
            tab.style.display = 'none';
          });
      }

      if (typeof populateFormHPP === 'function') {
        populateFormHPP(value);
      }

      if (typeof window.zettRefreshActiveHPPRowFromServer === 'function') {
        window.zettRefreshActiveHPPRowFromServer(value);
      }

      window.__HPP_GSHEET_SYNC_LOCKED = false;
      console.log('HPP sync reset because outlet changed');

      if (typeof zettRetrySyncHPPFromGSheet === 'function') {
        zettRetrySyncHPPFromGSheet();
      } else if (typeof zettSyncHPPFromGSheet === 'function') {
        zettSyncHPPFromGSheet();
      }

    }

    /* =========================================================
       INIT
    ========================================================= */

    document.addEventListener('DOMContentLoaded', () => {

      switchMainTab('dashboard');

    });

  </script>

  <script id="hyper-premium-fintech-ui-bridge-2026">
    // =========================================================
    // [HYPER PREMIUM FINTECH UI PATCH - 2026]
    // Scope: UI interaction only, no data mutation
    // =========================================================
    (function initHyperPremiumFintechUIPatch() {
      function markActiveView() {
        document.querySelectorAll('.main-view').forEach(function(view) {
          var isActive = !view.classList.contains('hidden');
          view.classList.toggle('hp-view-active', isActive);
          if (isActive) view.setAttribute('data-hp-active-view', 'true');
          else view.removeAttribute('data-hp-active-view');
        });
      }

      function wireTapFeedback() {
        document.addEventListener('pointerdown', function(event) {
          var target = event.target.closest('button, .nav-btn, .fin-card, .bento-card, .hpp-card-dash, .kapasitas-outlet-card');
          if (!target || target.disabled) return;
          target.classList.add('hp-is-pressing');
        }, { passive: true });

        document.addEventListener('pointerup', function() {
          document.querySelectorAll('.hp-is-pressing').forEach(function(el) {
            el.classList.remove('hp-is-pressing');
          });
        }, { passive: true });

        document.addEventListener('pointercancel', function() {
          document.querySelectorAll('.hp-is-pressing').forEach(function(el) {
            el.classList.remove('hp-is-pressing');
          });
        }, { passive: true });
      }

      function boot() {
        markActiveView();
        wireTapFeedback();

        var scroller = document.getElementById('mainViewScroller');
        if (scroller && 'ResizeObserver' in window) {
          new ResizeObserver(function() {
            scroller.style.setProperty('--hp-scroll-height', scroller.scrollHeight + 'px');
          }).observe(scroller);
        }

        if ('MutationObserver' in window) {
          var observer = new MutationObserver(markActiveView);
          document.querySelectorAll('.main-view').forEach(function(view) {
            observer.observe(view, { attributes: true, attributeFilter: ['class', 'style'] });
          });
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', boot, { once: true });
      } else {
        boot();
      }
    })();
  </script>
