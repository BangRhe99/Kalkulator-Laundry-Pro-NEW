  <script>
    (function() {
      let loadingDepth = 0;
      const defaultLoadingText = 'Loading...';

      function getLoadingOverlay() {
        return document.getElementById('globalLoadingOverlay');
      }

      function setLoadingText(message) {
        const text = document.getElementById('globalLoadingText');
        if (!text) return;
        text.textContent = typeof message === 'string' && message.trim() ? message : defaultLoadingText;
      }

      window.showLoading = function(message) {
        loadingDepth += 1;
        const overlay = getLoadingOverlay();
        if (!overlay) return;

        setLoadingText(message);
        overlay.classList.add('is-active');
        overlay.setAttribute('aria-hidden', 'false');
        document.body.classList.add('global-loading-active');
      };

      window.hideLoading = function(force) {
        loadingDepth = force === true ? 0 : Math.max(loadingDepth - 1, 0);
        if (loadingDepth > 0) return;

        const overlay = getLoadingOverlay();
        if (!overlay) return;

        overlay.classList.remove('is-active');
        overlay.setAttribute('aria-hidden', 'true');
        document.body.classList.remove('global-loading-active');
        setLoadingText(defaultLoadingText);
      };

      window.zettShowLoading = window.zettShowLoading || window.showLoading;
      window.zettHideLoading = window.zettHideLoading || window.hideLoading;
      window.withLoading = window.withLoading || function(task, message) {
        window.showLoading(message);
        return Promise.resolve(typeof task === 'function' ? task() : task).finally(function() {
          window.hideLoading();
        });
      };
    })();
  </script>

  <script>

    const SIDEBAR_CLOSE_MS = 220;

    function openSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      if (!sidebar || !overlay) return;

      overlay.classList.remove('hidden');
      sidebar.classList.remove('-translate-x-full');
      document.body.classList.add('sidebar-mobile-open');

      requestAnimationFrame(() => {
        overlay.classList.add('sidebar-overlay-active');
      });
    }

    function closeSidebarMobile() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebarOverlay');
      if (!sidebar || !overlay) return;

      sidebar.classList.add('-translate-x-full');
      overlay.classList.remove('sidebar-overlay-active');
      document.body.classList.remove('sidebar-mobile-open');

      window.clearTimeout(window.__sidebarOverlayCloseTimer);
      window.__sidebarOverlayCloseTimer = window.setTimeout(() => {
        if (sidebar.classList.contains('-translate-x-full')) {
          overlay.classList.add('hidden');
        }
      }, SIDEBAR_CLOSE_MS);
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      if (!sidebar) return;

      if (sidebar.classList.contains('-translate-x-full')) {

  <script id="hyper-premium-fintech-ui-bridge-2026">
    // =========================================================
    // [HYPER PREMIUM FINTECH UI PATCH - 2026]
    // Scope: UI interaction only, no data mutation
    // =========================================================
    (function initHyperPremiumFintechUIPatch() {
      function markActiveView() {
        document.querySelectorAll('.main-view').forEach(function(view) {
          var isActive = !view.classList.contains('hidden');
          view.classList.toggle('hp-view-active', isActive);
          if (isActive) view.setAttribute('data-hp-active-view', 'true');
          else view.removeAttribute('data-hp-active-view');
        });
      }

      function wireTapFeedback() {
        document.addEventListener('pointerdown', function(event) {
          var target = event.target.closest('button, .nav-btn, .fin-card, .bento-card, .hpp-card-dash, .kapasitas-outlet-card');
          if (!target || target.disabled) return;
          target.classList.add('hp-is-pressing');
        }, { passive: true });

        document.addEventListener('pointerup', function() {
          document.querySelectorAll('.hp-is-pressing').forEach(function(el) {
            el.classList.remove('hp-is-pressing');
          });
        }, { passive: true });

        document.addEventListener('pointercancel', function() {
          document.querySelectorAll('.hp-is-pressing').forEach(function(el) {
            el.classList.remove('hp-is-pressing');
          });
        }, { passive: true });
      }

      function boot() {
        markActiveView();
        wireTapFeedback();

        var scroller = document.getElementById('mainViewScroller');
        if (scroller && 'ResizeObserver' in window) {
          new ResizeObserver(function() {
            scroller.style.setProperty('--hp-scroll-height', scroller.scrollHeight + 'px');
          }).observe(scroller);
        }

        if ('MutationObserver' in window) {
          var observer = new MutationObserver(markActiveView);
          document.querySelectorAll('.main-view').forEach(function(view) {
            observer.observe(view, { attributes: true, attributeFilter: ['class', 'style'] });
          });
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', boot, { once: true });
      } else {
        boot();
      }
    })();
  </script>
