    /* =========================================================
       BASE UI
    ========================================================= */

    html,

      width: 100%;

      padding: 0 !important;

    body {

    }

    #app,
    .app,
    .main-app,
    .main-layout,
    .main-view,
    .main-wrapper,
    .page-wrapper,
    .page-content,
    .content-wrapper,
    .main-content,
    #mainViewScroller {
      min-height: 100dvh !important;
      background: #EAF4FF !important;
    }

    .glass-effect {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    #sidebar {
      background: #0b1120;
      transition: transform 220ms cubic-bezier(.2,.8,.2,1), opacity 180ms ease;
      will-change: transform;
    }

    #sidebarOverlay {
      background: rgba(15, 23, 42, 0.64);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 200ms ease;
    }

    #sidebarOverlay.sidebar-overlay-active {
      opacity: 1;
      pointer-events: auto;
    }

    .global-loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 2147483000;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 24px;
      background:
        radial-gradient(circle at 50% 42%, rgba(14, 165, 233, 0.18), transparent 18rem),
        rgba(7, 10, 20, 0.66);
      backdrop-filter: blur(8px) saturate(1.08);
      -webkit-backdrop-filter: blur(8px) saturate(1.08);
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 220ms cubic-bezier(0.16, 1, 0.3, 1), visibility 220ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .global-loading-overlay.is-active {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
    }

    .global-loading-shell {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      transform: translate3d(0, 8px, 0) scale(0.98);
      transition: transform 220ms cubic-bezier(0.16, 1, 0.3, 1);
    }

    .global-loading-overlay.is-active .global-loading-shell {
      transform: translate3d(0, 0, 0) scale(1);
    }

    .global-loading-spinner {
      position: relative;
      width: clamp(72px, 10vw, 92px);
      height: clamp(72px, 10vw, 92px);
      contain: layout paint;
    }

    .global-loading-arc {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      border: 3px solid transparent;
      transform: translateZ(0);
      will-change: transform;
    }

    .global-loading-arc-white {
      inset: 0;
      border-top-color: rgba(255, 255, 255, 0.96);
      border-right-color: rgba(255, 255, 255, 0.34);
      animation: globalLoaderSpin 1.18s cubic-bezier(0.62, 0.05, 0.36, 0.95) infinite;
      filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.2));
    }

    .global-loading-arc-cyan {
      inset: 9px;
      border-right-color: rgba(34, 211, 238, 0.95);
      border-bottom-color: rgba(34, 211, 238, 0.28);
      animation: globalLoaderSpinReverse 1.46s cubic-bezier(0.62, 0.05, 0.36, 0.95) infinite;
      filter: drop-shadow(0 0 10px rgba(34, 211, 238, 0.3));
    }

    .global-loading-arc-pink {
      inset: 18px;
      border-left-color: rgba(251, 113, 133, 0.95);
      border-top-color: rgba(251, 113, 133, 0.28);
      animation: globalLoaderSpin 1.72s cubic-bezier(0.62, 0.05, 0.36, 0.95) infinite;
      filter: drop-shadow(0 0 10px rgba(251, 113, 133, 0.28));
    }

    .global-loading-text {
      margin-top: 18px;
      color: #fb7185;
      font-size: clamp(18px, 2.4vw, 23px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.04em;
      text-align: center;
      text-shadow: 0 0 18px rgba(251, 113, 133, 0.28);
    }

    body.global-loading-active {
      cursor: progress;
    }

    @keyframes globalLoaderSpin {
      to { transform: rotate(360deg); }
    }

    @keyframes globalLoaderSpinReverse {
      to { transform: rotate(-360deg); }
    }

    @media (prefers-reduced-motion: reduce) {
      .global-loading-overlay,
      .global-loading-shell {
        transition: none;
      }

      .global-loading-arc {
        animation-duration: 2.4s;
      }
    }

    .nav-btn {

    }

    #sidebar #nav-bep {

    #sidebar > div:first-of-type {

    header {

    body > .flex-1 > header {

    #headerTitle {

    }

    #inputNamaHPP {

    }

    }

    body > .flex-1 > header .relative:has(#inputNamaHPP) {

    @media (max-width: 767px) {

    /* =========================================================
       TOGGLE
    ========================================================= */

    input:checked ~ .toggle-bg {
      background-color: #3b82f6;
    }

    input:checked ~ .toggle-dot {
      transform: translateX(100%);
    }

    input:checked ~ .toggle-bg-teal {
      background-color: #0f766e;
    }

    input:checked ~ .toggle-bg-rose {
      background-color: #e11d48;
    }

    /* =========================================================
       SCROLLBAR
    ========================================================= */

    .custom-scroll::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    .custom-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .custom-scroll::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px;
    }

    .custom-scroll::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    .hide-scroll::-webkit-scrollbar {
      display: none;
    }

    .hide-scroll {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* =========================================================
       ANIMATION
    ========================================================= */

    .animate-fade-in {
      animation: fadeIn 0.5s cubic-bezier(0.4,0,0.2,1);
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* =========================================================
       FIX HIDDEN
    ========================================================= */

    .hidden {
      display: none !important;
    }

    /* =========================================================
       FORM REVEAL
    ========================================================= */

    .zett-kapasitas-form-reveal {
      animation: zettKapasitasFormReveal 0.36s cubic-bezier(0.16, 1, 0.3, 1) both;
      will-change: opacity, transform, filter;
      transform: translate3d(0,0,0);
      backface-visibility: hidden;
    }

    @keyframes zettKapasitasFormReveal {

      from {
        opacity: 0;
        transform: translate3d(0,16px,0) scale(0.988);
        filter: blur(6px);
      }

      to {
        opacity: 1;
        transform: translate3d(0,0,0) scale(1);
        filter: blur(0);
      }

    }
