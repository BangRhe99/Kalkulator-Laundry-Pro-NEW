    /* UI Enhancements & Typography */

  <script>
    /**
     * ==========================================
     * ZETTBOT FIX: OUTLET CONTEXT PER FEATURE
     * Scope: Index.html only
     * Tujuan:
     * 1. Dropdown outlet header tidak pernah membuka Profil Operasional.
     * 2. Setiap fitur menyimpan pilihan outlet sendiri agar tidak saling menimpa.
     * 3. Profil Operasional tetap memakai card outlet untuk membuka form update.
     * 4. Data Profil Operasional dan HPP dipanggil ulang dengan aman.
     * ==========================================
     */
    (function zettOutletContextPerFeature() {
      const titleMap = {
        dashboard: 'Dashboard Eksekutif',
        kapasitas: 'Profil Operasional',
        hpp: 'Struktur Biaya (HPP)',
        harga: 'Katalog Layanan',
        bep: 'Target Titik Impas',
        roi: 'Proyeksi ROI'
      };

      let activeMainTab = 'dashboard';
      const outletContext = {
        dashboard: '',
        kapasitas: '',
        hpp: '',
        harga: '',
        bep: '',
        roi: ''
      };

      function getHeaderDropdown() {
        return document.getElementById('inputNamaHPP');
      }

      function setHeaderTitle(tabName) {
        const headerTitle = document.getElementById('headerTitle');
        if (headerTitle) headerTitle.innerText = titleMap[tabName] || 'Dashboard Eksekutif';
      }

      function closeMobileSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        if (sidebar && window.innerWidth < 768) sidebar.classList.add('-translate-x-full');
        if (overlay && window.innerWidth < 768) overlay.classList.add('hidden');
      }

      function showOnlyView(tabName) {
        document.querySelectorAll('.main-view').forEach(view => {
          view.classList.add('hidden');
          view.classList.remove('block');
          view.style.display = 'none';
        });

        const target = document.getElementById('view-' + tabName);
        if (target) {
          target.classList.remove('hidden');
          target.style.display = '';
          if (tabName === 'dashboard') target.classList.add('block');
        }

        document.querySelectorAll('.nav-btn').forEach(btn => {
          btn.classList.remove('bg-gradient-to-r', 'from-blue-600', 'to-indigo-600', 'shadow-lg', 'shadow-indigo-900/30', 'text-white', 'font-bold');
          btn.classList.add('text-slate-400', 'hover:bg-white/5', 'hover:text-slate-100', 'font-semibold');
        });

        const activeNav = document.getElementById('nav-' + tabName);
        if (activeNav) {
          activeNav.classList.add('bg-gradient-to-r', 'from-blue-600', 'to-indigo-600', 'shadow-lg', 'shadow-indigo-900/30', 'text-white', 'font-bold');
          activeNav.classList.remove('text-slate-400', 'hover:bg-white/5', 'hover:text-slate-100', 'font-semibold');
        }

        setHeaderTitle(tabName);
        closeMobileSidebar();
      }

      function setHeaderValueForActiveTab() {
        const select = getHeaderDropdown();
        if (!select) return;
        select.value = outletContext[activeMainTab] || '';
      }

      function syncDashboardOutlet(namaOutlet) {
        const selectV1 = document.getElementById('v1-global-outlet');
        if (selectV1) selectV1.value = namaOutlet || '';

        if (typeof window.renderSingleOutletDashboard === 'function') {
          try { window.renderSingleOutletDashboard(); } catch (error) { console.error('renderSingleOutletDashboard error:', error); }
        }
      }

      function syncHPPOutlet(namaOutlet) {
        const select = getHeaderDropdown();
        if (select) select.value = namaOutlet || '';

        if (namaOutlet && typeof window.populateFormHPP === 'function') {
          try { window.populateFormHPP(namaOutlet); } catch (error) { console.error('populateFormHPP error:', error); }
        }

        if (!namaOutlet && typeof window.resetFormHPP === 'function') {
          try { window.resetFormHPP(); } catch (error) { console.error('resetFormHPP error:', error); }
        }

        if (typeof window.checkHPPLock === 'function') {
          try { window.checkHPPLock(); } catch (error) { console.error('checkHPPLock error:', error); }
        }

        if (typeof window.toggleActionButtons === 'function') {
          try { window.toggleActionButtons(); } catch (error) { console.error('toggleActionButtons error:', error); }
        }

        if (typeof StateMachine !== 'undefined' && StateMachine.calculateTotal) {
          try { StateMachine.calculateTotal(); } catch (error) { console.error('StateMachine.calculateTotal error:', error); }
        }

        if (typeof window.calculateAll === 'function') {
          try { window.calculateAll(); } catch (error) { console.error('calculateAll error:', error); }
        }
      }

      function ensureKapasitasDashboardMode() {
        const dash = document.getElementById('kapasitas-dashboard');
        const form = document.getElementById('kapasitas-form-container');

        if (dash) {
          dash.classList.remove('hidden');
          dash.style.display = '';
          dash.style.pointerEvents = 'auto';
          dash.style.opacity = '1';
        }

        if (form) {
          form.classList.add('hidden');
          form.classList.remove('zett-kapasitas-form-reveal');
          form.style.display = 'none';
        }
      }

      window.handleGlobalOutletChange = function(namaOutlet) {
        outletContext[activeMainTab] = namaOutlet || '';

        if (activeMainTab === 'dashboard') {
          syncDashboardOutlet(namaOutlet);
          return;
        }

        if (activeMainTab === 'hpp' || activeMainTab === 'harga' || activeMainTab === 'bep' || activeMainTab === 'roi') {
          syncHPPOutlet(namaOutlet);
          return;
        }

        if (activeMainTab === 'kapasitas') {
          /* Profil Operasional sengaja tidak memakai dropdown header untuk membuka form.
             Form update hanya dibuka melalui klik card outlet agar state tidak bercampur. */
          ensureKapasitasDashboardMode();
          if (typeof window.loadDaftarCabang === 'function') setTimeout(() => window.loadDaftarCabang(), 0);
        }
      };

      const originalSwitchMainTab = window.switchMainTab;
      window.switchMainTab = function(tabName) {
        activeMainTab = tabName || activeMainTab;

        if (typeof originalSwitchMainTab === 'function') {
          try { originalSwitchMainTab(tabName); } catch (error) { console.error('switchMainTab original error:', error); }
        }

        showOnlyView(activeMainTab);
        setHeaderValueForActiveTab();

        const selectedOutlet = outletContext[activeMainTab] || '';

        if (activeMainTab === 'dashboard') syncDashboardOutlet(selectedOutlet);

        if (activeMainTab === 'hpp' || activeMainTab === 'harga' || activeMainTab === 'bep' || activeMainTab === 'roi') syncHPPOutlet(selectedOutlet);

        if (activeMainTab === 'kapasitas') {
          ensureKapasitasDashboardMode();
          if (typeof window.loadDaftarCabang === 'function') setTimeout(() => window.loadDaftarCabang(), 0);
        }
      };

      document.addEventListener('DOMContentLoaded', function() {
        const headerDropdown = getHeaderDropdown();
        if (headerDropdown) {
          headerDropdown.onchange = function() { window.handleGlobalOutletChange(this.value); };
        }

        showOnlyView('dashboard');
        if (typeof window.loadDaftarCabang === 'function') setTimeout(() => window.loadDaftarCabang(), 80);
      });
    })();
  </script>
