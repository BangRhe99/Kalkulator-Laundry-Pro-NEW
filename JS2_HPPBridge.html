function zettSetHPPSelectionLoading(isLoading) {
    const dashboard = document.getElementById('hpp-dashboard-view');
    const formView = document.getElementById('hpp-form-view');
    [dashboard, formView].forEach(function(el) {
        if (!el) return;
        el.classList.toggle('hpp-loading-lite', !!isLoading);
        if (isLoading) el.setAttribute('aria-busy', 'true');
        else el.removeAttribute('aria-busy');
    });
}

function zettIsHPPPopulating() {
    return (window.__zettHPPPopulateDepth || 0) > 0;
}

function zettWithHPPPopulationGuard(fn) {
    window.__zettHPPPopulateDepth = (window.__zettHPPPopulateDepth || 0) + 1;
    try {
        return typeof fn === 'function' ? fn() : undefined;
    } finally {
        setTimeout(function() {
            window.__zettHPPPopulateDepth = Math.max(0, (window.__zettHPPPopulateDepth || 1) - 1);
        }, 80);
    }
}

function zettRunHPPTaskQueue(token, tasks, onDone) {
    const queue = Array.isArray(tasks) ? tasks.filter(function(task) { return typeof task === 'function'; }) : [];
    let index = 0;
    const startedAt = Date.now();

    function finish() {
        if (typeof onDone === 'function') {
            try { onDone(); } catch (error) { console.error('HPP queue done error:', error); }
        }
    }

    function runNext() {
        if (token && window.__zettBranchSwitchToken && window.__zettBranchSwitchToken !== token) {
            finish();
            return;
        }
        if (Date.now() - startedAt > 15000) {
            console.warn('HPP task queue stopped after timeout.');
            finish();
            return;
        }
        if (index >= queue.length) {
            finish();
            return;
        }

        const task = queue[index++];
        requestAnimationFrame(function() {
            setTimeout(function() {
                try { task(); }
                catch (error) {
                    console.error('HPP async task error:', error);
                    if (typeof showOmniToast === 'function') showOmniToast('Sebagian data Struktur Biaya gagal diproses. Coba pilih outlet lagi.', 'error');
                }
                runNext();
            }, 0);
        });
    }

    runNext();
}

window.zettSetHPPSelectionLoading = zettSetHPPSelectionLoading;
window.zettIsHPPPopulating_ = zettIsHPPPopulating;
window.zettWithHPPPopulationGuard_ = zettWithHPPPopulationGuard;
window.zettRunHPPTaskQueue_ = zettRunHPPTaskQueue;

if (!window.__zettHPPSelectListenerBound) {
    window.__zettHPPSelectListenerBound = true;
    document.addEventListener('change', function(e) {
        if (!e.target || e.target.id !== 'inputNamaHPP') return;
        if (window.__HPP_PROGRAMMATIC_UPDATE__) {
            console.warn('[STAGE_5_LOOP_PREVENTED] Programmatic update diabaikan.');
            return;
        }
        const outletName = String(e.target.value || '').trim();
        const handledSwitch = window.__HPP_SAFE_SWITCH_LAST || {};
        if (
            window.__HPP_SAFE_SWITCH_ACTIVE === true ||
            (
                String(handledSwitch.outlet || '').trim() === outletName &&
                Date.now() - Number(handledSwitch.at || 0) < 1000
            )
        ) {
            return;
        }
        const switchToken = Date.now() + ':' + outletName;
        window.__zettBranchSwitchToken = switchToken;
        const cabang = masterDataCabang.find(c => String(c.namaOutlet || '').trim() === outletName);
        zettSetHPPSelectionLoading(!!outletName);

        if (!outletName) {
            if (typeof resetHPPDashboardToZero === 'function') resetHPPDashboardToZero();
            zettSetHPPSelectionLoading(false);
        } else {
            if (cabang) {
                zettPatchOperationalProfileToLocalHPP(cabang);
                const inputNama = document.getElementById('inputNama');
                const inputKategori = document.getElementById('inputKategori');
                if (inputNama) inputNama.value = cabang.namaOutlet;
                if (inputKategori) inputKategori.value = cabang.kategori || 'Drop Off/Kiloan';
                if (typeof updateNavName === 'function') updateNavName();
            }
            requestAnimationFrame(() => {
                if (window.__zettBranchSwitchToken !== switchToken) return;
                zettRunHPPTaskQueue(switchToken, [
                    function() {
                        if (typeof populateFormHPP === 'function') {
                            zettWithHPPPopulationGuard(function() { populateFormHPP(outletName); });
                        }
                    },
                    function() { if (typeof applyOperationalConfigToHPP === 'function') applyOperationalConfigToHPP(outletName); },
                    function() { if (typeof window.zettRefreshActiveHPPRowFromServer === 'function') window.zettRefreshActiveHPPRowFromServer(outletName); }
                ], function() {
                    if (window.__zettBranchSwitchToken === switchToken) zettSetHPPSelectionLoading(false);
                });
            });
        }

        if (typeof toggleActionButtons === 'function') toggleActionButtons();
        if (typeof checkHPPLock === 'function') checkHPPLock();
    });
}

function checkHPPLock() {
    const selectHPP = document.getElementById('inputNamaHPP');
    const namaCabang = selectHPP ? selectHPP.value : '';
    
    const hppContents = document.querySelectorAll('#view-hpp .bento-card, #hpp-dashboard-view, #hpp-form-view');
    hppContents.forEach(content => {
        if (!namaCabang) {
            content.style.pointerEvents = 'none';
            content.style.opacity = '0.35';
            content.style.filter = 'grayscale(1)';
            content.style.transition = 'all 0.4s ease';
        } else {
            content.style.pointerEvents = 'auto';
            content.style.opacity = '1';
            content.style.filter = 'none';
        }
    });

    const btnSimpan = document.getElementById('btnSimpanHPP');
    const btnUpdate = document.getElementById('btnUpdateHPP');
    
    if (btnSimpan) {
        if (!namaCabang) {
            btnSimpan.style.opacity = '0.4';
            btnSimpan.style.pointerEvents = 'none';
        } else {
            btnSimpan.style.opacity = '1';
            btnSimpan.style.pointerEvents = 'auto';
        }
    }
    
    if (btnUpdate) {
        if (!namaCabang) {
            btnUpdate.style.opacity = '0.4';
            btnUpdate.style.pointerEvents = 'none';
        } else {
            btnUpdate.style.opacity = '1';
            btnUpdate.style.pointerEvents = 'auto';
        }
    }
}

function getOutletOperationalConfig(outletName) {
    const name = String(outletName || '').trim();
    const outlet = masterDataCabang.find(c => String(c.namaOutlet || '').trim().toLowerCase() === name.toLowerCase());
    if (!outlet) return null;

    const jenisSetrika = String(outlet.tipeSetrikaUtama || outlet.tipeSetrika || '').toLowerCase();
    const tipePengering = String(outlet.tipeMesinPengering || '').toLowerCase();
    const pakaiPengering = outlet.pakaiPengering !== false;
    const usesIronElectric = jenisSetrika.includes('listrik');
    const usesDryer = pakaiPengering;
    const dryerUsesGas = usesDryer && (tipePengering.includes('konversi') || tipePengering.includes('gas'));

    return {
        namaOutlet: outlet.namaOutlet,
        kategori: outlet.kategori || 'Drop Off/Kiloan',
        pakaiPengering,
        metodePengeringan: pakaiPengering ? 'mesin' : 'jemur',
        jenisSetrika: outlet.tipeSetrikaUtama || outlet.tipeSetrika || 'uap',
        usesGas: dryerUsesGas,
        usesElectricity: true,
        usesDryer,
        usesIronElectric,
        dryerUsesGas
    };
}

function setHPPCardOperationalState(type, active, note) {
    const valueEl = document.getElementById('dash-card-' + type);
    const card = valueEl ? valueEl.closest('.hpp-card-dash') : null;
    if (!card) return;

    if (type === 'gas') {
        card.style.pointerEvents = 'auto';
        card.title = note || '';
        return;
    }

    card.style.opacity = active ? '1' : '0.38';
    card.style.filter = active ? 'none' : 'grayscale(1)';
    card.style.pointerEvents = active ? 'auto' : 'none';
    card.title = note || '';
}

function applyOperationalConfigToHPP(outletName) {
    const config = getOutletOperationalConfig(outletName);
    const dashboard = document.getElementById('hpp-dashboard-view');
    if (!dashboard || !config) return;

    const insight = document.getElementById('hpp-operational-insight');
    if (insight) insight.remove();

    setHPPCardOperationalState('gas', config.usesGas, 'Gas tidak relevan untuk konfigurasi outlet ini.');
    setHPPCardOperationalState('listrik', true, 'Listrik tetap relevan untuk operasi outlet.');

    const gasInputs = ['inputGasKapasitas', 'inputGasHarga', 'inputGasJam'];
    gasInputs.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.disabled = false;
        el.style.opacity = '1';
    });
    if (typeof window.zettRenderGasLpgCard === 'function') window.zettRenderGasLpgCard();

    const dryerWatt = document.getElementById('inputListrikPengeringWatt');
    if (dryerWatt) {
        dryerWatt.disabled = !config.usesDryer;
        dryerWatt.style.opacity = config.usesDryer ? '1' : '0.45';
    }

    const ironToggle = document.getElementById('toggleSetrikaListrik');
    if (ironToggle && config.usesIronElectric && !ironToggle.checked) {
        ironToggle.checked = true;
        if (typeof toggleSetrikaInputs === 'function') toggleSetrikaInputs();
        if (typeof calculateListrik === 'function') calculateListrik();
    }

    const gasContext = typeof window.zettGetGasUsageContext === 'function' ? window.zettGetGasUsageContext() : null;
    if (!config.usesGas && (!gasContext || !gasContext.gasActive) && typeof window.zettHPPSetStateValue === 'function') {
        window.zettHPPSetStateValue('gas', 0);
        if (typeof window.zettHPPUpdateDashboardFromState === 'function') window.zettHPPUpdateDashboardFromState('operational-config');
    }
}

window.getOutletOperationalConfig = getOutletOperationalConfig;
window.applyOperationalConfigToHPP = applyOperationalConfigToHPP;
</script>
