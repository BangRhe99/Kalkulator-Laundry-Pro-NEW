<script id="hpp-nota-module">
  if (typeof window.toggleNotaInputs !== 'function') {
    window.toggleNotaInputs = function() {};
  }

  if (typeof window.calculateNota !== 'function') {
    window.calculateNota = function() {};
  }

  (function zettNotaKasirPatch20260521() {
    const NOTA_APP_DIRECT = 'Biaya Langsung Per Transaksi';
    const NOTA_APP_MONTHLY = 'Berlangganan Per Bulan';
    window.ZETT_DEBUG_NOTA_KASIR = window.ZETT_DEBUG_NOTA_KASIR === true;
    function byId(id) { return document.getElementById(id); }
    function debugNotaKasir(label, payload) {
      if (!window.ZETT_DEBUG_NOTA_KASIR || !window.console) return;
      console.log('[NOTA_KASIR_DEBUG] ' + label, payload || {});
    }
    function clean(value) {
      if (typeof zettCleanNumber === 'function') return zettCleanNumber(value);
      let raw = String(value || '').trim().replace(/Rp/gi, '').replace(/\s/g, '').replace(/[^\d.,-]/g, '');
      if (!raw) return 0;
      const hasComma = raw.includes(',');
      const hasDot = raw.includes('.');
      if (hasComma && hasDot) {
        raw = raw.lastIndexOf(',') > raw.lastIndexOf('.')
          ? raw.replace(/\./g, '').replace(',', '.')
          : raw.replace(/,/g, '');
      } else if (hasDot) {
        const parts = raw.split('.');
        raw = parts.length > 1 && parts.slice(1).every(part => part.length === 3) ? parts.join('') : raw;
      } else if (hasComma) {
        const parts = raw.split(',');
        raw = parts.length > 1 && parts.slice(1).every(part => part.length === 3) ? parts.join('') : raw.replace(',', '.');
      }
      const n = Number(raw);
      return Number.isFinite(n) ? n : 0;
    }
    function money(value) {
      const n = Math.round(Number.isFinite(Number(value)) ? Number(value) : 0);
      if (typeof formatRupiah === 'function') return formatRupiah(n);
      return 'Rp ' + n.toLocaleString('id-ID');
    }
    function setValue(id, value) {
      const el = byId(id);
      if (el) el.value = value == null ? '' : value;
    }
    function setText(id, value) {
      const el = byId(id);
      if (el) el.textContent = money(value);
    }
    function normalizeSystem(value) {
      const raw = String(value || '').toLowerCase();
      return raw.includes('manual') ? 'manual' : 'digital';
    }
    function zettNormalizeNotaAppFeeType_(value) {
      const text = String(value || '').trim().toLowerCase();
      if (
        text === 'biaya langsung per transaksi' ||
        text === 'langsung' ||
        text === 'direct' ||
        text === 'per transaksi' ||
        text === 'per_transaksi' ||
        text === 'app_per_transaksi' ||
        text === 'trx'
      ) {
        return NOTA_APP_DIRECT;
      }
      if (
        text === 'berlangganan per bulan' ||
        text === 'bulanan' ||
        text === 'monthly' ||
        text === 'per bulan' ||
        text === 'subscription' ||
        text === 'bulan'
      ) {
        return NOTA_APP_MONTHLY;
      }
      return NOTA_APP_MONTHLY;
    }
    window.zettNormalizeNotaAppFeeType_ = zettNormalizeNotaAppFeeType_;
    function normalizeMethod(value) {
      return zettNormalizeNotaAppFeeType_(value);
    }
    function safeDivide(numerator, denominator) {
      const top = clean(numerator);
      const bottom = clean(denominator);
      return bottom > 0 ? top / bottom : 0;
    }
    function ensureHiddenLegacyInputs() {
      const host = byId('tab-nota');
      if (!host) return;
      [
        ['notaThermalHarga', ''],
        ['notaRataKg', ''],
        ['dispNotaCostKg', 'Rp 0']
      ].forEach(pair => {
        if (byId(pair[0])) return;
        const input = document.createElement('input');
        input.type = 'hidden';
        input.id = pair[0];
        input.value = pair[1];
        host.appendChild(input);
      });
    }
    function applyTransition(active) {
      const workspace = byId('notaKasirWorkspace');
      if (!workspace) return;
      workspace.classList.toggle('zett-nota-transitioning', !!active);
    }
    function setInputsDisabled(disabled) {
      const tab = byId('tab-nota');
      if (!tab) return;
      tab.querySelectorAll('input, select, button').forEach(el => {
        if (el.id === 'btnSimpanHPP' || el.id === 'btnUpdateHPP') return;
        el.disabled = !!disabled;
      });
    }
    function notaKasirValues() {
      const system = normalizeSystem(byId('notaType')?.value);
      const method = normalizeMethod(byId('notaAppFeeType')?.value);
      const appDirect = clean(byId('notaAppHargaTrx')?.value);
      const appMonthly = clean(byId('notaAppHargaBulan')?.value);
      const appTrxMonthly = clean(byId('notaAppTrxBulan')?.value);
      const appExtra = clean(byId('notaAppBiayaTransaksiTambahan')?.value);
      const thermalRoll = clean(byId('notaThermalHargaRoll')?.value || byId('notaThermalHarga')?.value);
      const thermalTrx = clean(byId('notaThermalTransaksiRoll')?.value);
      const manualStart = clean(byId('notaManualHarga')?.value);
      const manualSheets = clean(byId('notaManualLembarTotal')?.value);
      const manualPly = clean(byId('notaManualLembarTrx')?.value);

      const appPerLoad = system === 'digital'
        ? (method === NOTA_APP_DIRECT ? appDirect : (appTrxMonthly > 0 ? safeDivide(appMonthly, appTrxMonthly) + appExtra : 0))
        : 0;
      const thermalPerTrx = system === 'digital' ? safeDivide(thermalRoll, thermalTrx) : 0;
      const manualPerSheet = system === 'manual' ? safeDivide(manualStart, manualSheets) : 0;
      const manualPerTrx = system === 'manual' ? manualPerSheet * manualPly : 0;
      const notaPerLoad = system === 'manual' ? manualPerTrx : thermalPerTrx;

      return {
        system,
        systemLabel: system === 'manual' ? 'Nota Manual Buku NCR' : 'Aplikasi Kasir (Digital + Kertas Thermal)',
        method,
        methodLabel: method,
        appDirect,
        appMonthly,
        appTrxMonthly,
        appExtra,
        appPerLoad: Math.ceil(appPerLoad || 0),
        thermalRoll,
        thermalTrx,
        thermalPerTrx: Math.ceil(thermalPerTrx || 0),
        manualStart,
        manualSheets,
        manualPly,
        manualPerSheet: Math.ceil(manualPerSheet || 0),
        manualPerTrx: Math.ceil(manualPerTrx || 0),
        notaPerLoad: Math.ceil(notaPerLoad || 0)
      };
    }
    function renderNotaKasirForm() {
      ensureHiddenLegacyInputs();
      const values = notaKasirValues();
      const digital = values.system === 'digital';
      const direct = values.method === NOTA_APP_DIRECT;
      const methodSelect = byId('notaAppFeeType');
      if (methodSelect && methodSelect.value !== values.method) methodSelect.value = values.method;
      const panelDigital = byId('panelNotaDigital');
      const panelThermal = byId('panelNotaThermalFields');
      const panelManual = byId('panelNotaManual');
      const panelNota = byId('panelNotaTransaksi');
      const wrapBulan = byId('wrapNotaAppBulan');
      const wrapTrx = byId('wrapNotaAppTrx');
      if (panelDigital) {
        panelDigital.classList.toggle('hidden', !digital);
        panelDigital.style.display = digital ? '' : 'none';
      }
      if (wrapBulan) {
        wrapBulan.classList.toggle('hidden', !digital || direct);
        wrapBulan.style.display = digital && !direct ? '' : 'none';
      }
      if (wrapTrx) {
        wrapTrx.classList.toggle('hidden', !digital || !direct);
        wrapTrx.style.display = digital && direct ? '' : 'none';
      }
      if (panelThermal) {
        panelThermal.classList.toggle('hidden', !digital);
        panelThermal.style.display = digital ? '' : 'none';
      }
      if (panelManual) {
        panelManual.classList.toggle('hidden', digital);
        panelManual.style.display = digital ? 'none' : '';
      }
      if (panelNota) {
        panelNota.classList.toggle('bento-col-12', !digital);
        panelNota.classList.toggle('bento-col-6', digital);
      }
    }
    function calculateNotaKasir() {
      renderNotaKasirForm();
      const values = notaKasirValues();
      debugNotaKasir('calculate', {
        metodeAktif: values.method,
        appBiayaPerTransaksi: values.appDirect,
        hppAplikasiPerLoad: values.appPerLoad
      });
      setText('dispNotaAppLoad', values.appPerLoad);
      setText('dispNotaCostTrx', values.notaPerLoad);
      setText('dispNotaCostKg', 0);
      setValue('notaManualHargaLembar', money(values.manualPerSheet));
      setValue('notaManualBiayaTransaksi', money(values.manualPerTrx));
      setValue('notaThermalHarga', values.thermalPerTrx || '');
      const total = values.appPerLoad + values.notaPerLoad;
      const totalEl = byId('displayBiayaNotaTotalKg');
      if (totalEl) totalEl.textContent = money(total);
      const cardValue = byId('dash-card-nota');
      const noOutlet = typeof window.zettIsHPPOutletNotSelected_ === 'function' && window.zettIsHPPOutletNotSelected_();
      if (cardValue) cardValue.textContent = noOutlet ? money(0) : money(total);
      if (typeof window.zettHPPSetStateValue === 'function') window.zettHPPSetStateValue('nota', noOutlet ? 0 : total);
      if (typeof window.zettHPPUpdateDashboardFromState === 'function') window.zettHPPUpdateDashboardFromState('nota-kasir');
      return values;
    }
    function buildNotaKasirPayloadPatch() {
      const v = calculateNotaKasir();
      const payload = {
        notaType: v.system,
        sistemKasirNota: v.systemLabel,
        notaAppFeeType: v.method,
        metodeBiayaAplikasi: v.method,
        appBiayaPerTransaksi: v.system === 'digital' && v.method === NOTA_APP_DIRECT ? v.appDirect : 0,
        notaAppHargaTrx: v.system === 'digital' && v.method === NOTA_APP_DIRECT ? v.appDirect : 0,
        appBiayaBulanan: v.system === 'digital' && v.method === NOTA_APP_MONTHLY ? v.appMonthly : 0,
        notaAppHargaBulan: v.system === 'digital' && v.method === NOTA_APP_MONTHLY ? v.appMonthly : 0,
        appEstimasiTrxBulanan: v.system === 'digital' && v.method === NOTA_APP_MONTHLY ? v.appTrxMonthly : 0,
        notaAppTrxBulan: v.system === 'digital' && v.method === NOTA_APP_MONTHLY ? v.appTrxMonthly : 0,
        appBiayaTransaksiTambahan: v.system === 'digital' && v.method === NOTA_APP_MONTHLY ? v.appExtra : 0,
        notaAppBiayaTransaksiTambahan: v.system === 'digital' && v.method === NOTA_APP_MONTHLY ? v.appExtra : 0,
        notaThermalHargaRoll: v.system === 'digital' ? v.thermalRoll : 0,
        notaThermalTransaksiRoll: v.system === 'digital' ? v.thermalTrx : 0,
        notaThermalHarga: v.system === 'digital' ? v.thermalPerTrx : 0,
        notaManualHarga: v.system === 'manual' ? v.manualStart : 0,
        notaManualLbrTotal: v.system === 'manual' ? v.manualSheets : 0,
        notaManualLbrTrx: v.system === 'manual' ? v.manualPly : 0,
        notaManualHargaLembar: v.system === 'manual' ? v.manualPerSheet : 0,
        notaManualBiayaTransaksi: v.system === 'manual' ? v.manualPerTrx : 0,
        notaRataKg: '',
        hppAplikasiPerLoad: v.appPerLoad,
        hppNotaTransaksiPerLoad: v.notaPerLoad,
        hppNotaKasirPerLoad: v.appPerLoad + v.notaPerLoad
      };
      debugNotaKasir('save payload', {
        sistemKasirNota: payload.sistemKasirNota,
        metodeBiayaAplikasi: payload.metodeBiayaAplikasi,
        appBiayaPerTransaksi: payload.appBiayaPerTransaksi,
        hppAplikasiPerLoad: payload.hppAplikasiPerLoad
      });
      return payload;
    }
    function pick(row, keys, fallback) {
      row = row || {};
      for (const key of keys) {
        if (row[key] !== undefined && row[key] !== null && row[key] !== '') return row[key];
      }
      return fallback;
    }
    function applyNotaKasirRow(row) {
      ensureHiddenLegacyInputs();
      const system = pick(row, ['Sistem Kasir Nota', 'Nota_Type'], 'digital');
      const method = pick(row, ['Metode Biaya Aplikasi', 'Nota_App_FeeType'], 'bulan');
      const normalizedSystem = normalizeSystem(system);
      const normalizedMethod = normalizeMethod(method);
      debugNotaKasir('load outlet', {
        outlet: pick(row, ['namaOutlet', 'Nama Outlet', 'Nama_Outlet'], ''),
        metodeDariSheet: method,
        normalizedMetode: normalizedMethod,
        appBiayaPerTransaksiDariSheet: pick(row, ['App Biaya Per Transaksi', 'Nota_App_HargaTrx'], ''),
        hppAplikasiPerLoadDariSheet: pick(row, ['HPP Aplikasi Per Load', 'Kasir Per Order'], '')
      });
      setValue('notaType', normalizedSystem);
      setValue('notaAppFeeType', normalizedMethod);
      setValue('notaAppHargaTrx', pick(row, ['App Biaya Per Transaksi', 'Nota_App_HargaTrx'], ''));
      setValue('notaAppHargaBulan', pick(row, ['App Biaya Bulanan', 'Biaya Kasir Bulanan', 'Nota_App_HargaBulan'], ''));
      setValue('notaAppTrxBulan', pick(row, ['App Estimasi Trx Bulanan', 'Nota_App_TrxBulan'], ''));
      setValue('notaAppBiayaTransaksiTambahan', pick(row, ['App Biaya Transaksi Tambahan'], ''));
      setValue('notaThermalHargaRoll', pick(row, ['Thermal Harga Per Roll'], ''));
      setValue('notaThermalTransaksiRoll', pick(row, ['Thermal Transaksi Per Roll'], ''));
      setValue('notaManualHarga', pick(row, ['Manual Harga Satuan Awal Nota', 'Harga Buku Nota', 'Nota_Manual_Harga'], ''));
      setValue('notaManualLembarTotal', pick(row, ['Manual Jumlah Lembar Nota', 'Isi Nota', 'Nota_Manual_LembarTotal'], ''));
      setValue('notaManualLembarTrx', pick(row, ['Manual Ply Per Transaksi', 'Lembar Nota Per Order', 'Nota_Manual_LembarTrx'], ''));
      calculateNotaKasir();
    }
    function resetNotaKasirForm() {
      setValue('notaType', 'digital');
      setValue('notaAppFeeType', NOTA_APP_MONTHLY);
      [
        'notaAppHargaTrx', 'notaAppHargaBulan', 'notaAppTrxBulan',
        'notaAppBiayaTransaksiTambahan', 'notaThermalHargaRoll',
        'notaThermalTransaksiRoll', 'notaManualHarga',
        'notaManualLembarTotal', 'notaManualLembarTrx'
      ].forEach(id => setValue(id, ''));
      calculateNotaKasir();
    }
    function showToast(message, type) {
      if (typeof showOmniToast === 'function') return showOmniToast(message, type || 'success');
      if (window.Swal && typeof window.Swal.fire === 'function') {
        return window.Swal.fire({ toast: true, position: 'top-end', timer: 1600, showConfirmButton: false, icon: type || 'success', title: message });
      }
    }
    function patchBackgroundSync() {
      if (typeof window.backgroundSyncHPP !== 'function' || window.backgroundSyncHPP.__zettNotaKasirPatched) return;
      const original = window.backgroundSyncHPP;
      window.backgroundSyncHPP = function(payload) {
        Object.assign(payload, buildNotaKasirPayloadPatch());
        return original.apply(this, arguments);
      };
      window.backgroundSyncHPP.__zettNotaKasirPatched = true;
    }
    function patchSaveButtonState() {
      const original = window.simpanDataHPP;
      if (typeof original !== 'function' || original.__zettNotaKasirPatched) return;
      window.simpanDataHPP = function(event) {
        const activeType = typeof window.zettGetActiveHPPType === 'function' ? window.zettGetActiveHPPType() : '';
        const saveBtn = byId('btnSimpanHPP');
        const updateBtn = byId('btnUpdateHPP');
        const btn = updateBtn && !updateBtn.classList.contains('hidden') ? updateBtn : saveBtn;
        const oldHtml = btn ? btn.innerHTML : '';
        if (activeType === 'nota') {
          applyTransition(true);
          setInputsDisabled(true);
          if (btn) {
            btn.disabled = true;
            btn.innerHTML = '<i class="ph ph-spinner-gap text-lg animate-spin"></i> Menyimpan...';
          }
        }
        const result = original.apply(this, arguments);
        if (activeType === 'nota') {
          window.setTimeout(function() {
            applyTransition(false);
            setInputsDisabled(false);
            if (btn) {
              btn.disabled = false;
              btn.innerHTML = oldHtml || '<i class="ph ph-floppy-disk text-xl"></i> Simpan Data Baru';
            }
            showToast('Data Nota & Kasir tersimpan.', 'success');
          }, 650);
        }
        return result;
      };
      window.simpanDataHPP.__zettNotaKasirPatched = true;
    }
    function patchRowApply() {
      const original = window.zettApplyHPPRowToForm;
      if (typeof original !== 'function' || original.__zettNotaKasirPatched) return;
      window.zettApplyHPPRowToForm = function(row) {
        applyTransition(true);
        const result = original.apply(this, arguments);
        applyNotaKasirRow(row || {});
        window.setTimeout(function() { applyTransition(false); }, 220);
        return result;
      };
      window.zettApplyHPPRowToForm.__zettNotaKasirPatched = true;
    }
    function patchPopulateForm() {
      const original = window.populateFormHPP;
      if (typeof original !== 'function' || original.__zettNotaKasirPatched) return;
      window.populateFormHPP = function() {
        applyTransition(true);
        const result = original.apply(this, arguments);
        const row = typeof window.zettFindActiveHPPRow === 'function' ? window.zettFindActiveHPPRow() : null;
        if (row) applyNotaKasirRow(row);
        else resetNotaKasirForm();
        window.setTimeout(function() { applyTransition(false); }, 220);
        return result;
      };
      window.populateFormHPP.__zettNotaKasirPatched = true;
    }
    function boot() {
      ensureHiddenLegacyInputs();
      renderNotaKasirForm();
      calculateNotaKasir();
      patchBackgroundSync();
      patchSaveButtonState();
      patchRowApply();
      patchPopulateForm();
      document.addEventListener('change', function(event) {
        if (window.__HPP_PROGRAMMATIC_UPDATE__) {
          console.warn('[STAGE_5_LOOP_PREVENTED] Programmatic update diabaikan.');
          return;
        }
        if (typeof window.zettIsHPPPopulating_ === 'function' && window.zettIsHPPPopulating_()) return;
        if (event.target && (event.target.id === 'inputNamaHPP' || event.target.closest('#tab-nota'))) {
          if (event.target.id === 'notaAppFeeType') {
            debugNotaKasir('dropdown metode berubah', {
              selectedRawValue: event.target.value,
              normalizedValue: normalizeMethod(event.target.value)
            });
          }
          window.setTimeout(calculateNotaKasir, 40);
        }
      });
      document.addEventListener('input', function(event) {
        if (typeof window.zettIsHPPPopulating_ === 'function' && window.zettIsHPPPopulating_()) return;
        if (event.target && event.target.closest('#tab-nota')) calculateNotaKasir();
      });
      window.setTimeout(function() {
        patchBackgroundSync();
        patchSaveButtonState();
        patchRowApply();
        patchPopulateForm();
      }, 500);
    }
    window.toggleNotaInputs = renderNotaKasirForm;
    window.calculateNota = calculateNotaKasir;
    window.calculateNotaKasir = calculateNotaKasir;
    window.renderNotaKasirForm = renderNotaKasirForm;
    window.renderNotaTransaksiCard = calculateNotaKasir;
    window.zettApplyNotaKasirRow = applyNotaKasirRow;
    window.zettResetNotaKasirForm = resetNotaKasirForm;
    window.zettBuildNotaKasirPayloadPatch = buildNotaKasirPayloadPatch;
    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot, { once: true });
    else boot();
  })();
</script>
