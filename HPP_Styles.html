<style>
  /* PURE CSS CONIC DONUT CHART - SAAS REFINED EDITION */
  .hpp-donut-wrap {
    width: 240px;
    height: 240px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
  }
  
  .hpp-donut {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    /* Gradient Warna Vibrant (Dikembalikan agar tajam saat screen recording) */
    background: conic-gradient(
      #f43f5e 0% var(--p-gas, 0%),         /* Rose 500 */
      #f59e0b var(--p-gas, 0%) var(--p-listrik, 0%), /* Amber 500 */
      #06b6d4 var(--p-listrik, 0%) var(--p-air, 0%), /* Cyan 500 */
      #6366f1 var(--p-air, 0%) var(--p-packing, 0%), /* Indigo 500 */
      #10b981 var(--p-packing, 0%) var(--p-bahan, 0%), /* Emerald 500 */
      #94a3b8 var(--p-bahan, 0%) 100%      /* Slate 400 */
    );
    /* Ring dikembalikan sedikit lebih tebal (65%) agar jelas di HP, namun tetap elegan */
    -webkit-mask-image: radial-gradient(circle, transparent 65%, black 66%);
    mask-image: radial-gradient(circle, transparent 65%, black 66%);
    transition: background 1.2s cubic-bezier(0.16, 1, 0.3, 1);
  }

  .hpp-donut-center {
    position: absolute;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Micro-interactions: Smooth Hover & Click */
  .hpp-card-dash {
    transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    cursor: pointer;
    will-change: transform, box-shadow;
  }
  .hpp-card-dash:hover {
    transform: translateY(-6px);
  }
  .hpp-card-dash:active {
    transform: scale(0.96) translateY(-2px);
  }
</style>
