<!-- ========================================================================= -->
<!-- SIDEBAR: COLUMN FILTER PANEL FOR HPP STRUCTURE -->
<!-- Original Purpose: Filter columns in Struktur_Biaya_1 sheet -->
<!-- ========================================================================= -->

<style>
  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: #ffffff;
    color: #0f172a;
    overflow: hidden;
  }

  .sidebar-panel {
    display: flex;
    flex-direction: column;
    height: 100%;
    gap: 0;
  }

  .sidebar-header {
    padding: 1rem;
    border-bottom: 1px solid #e2e8f0;
    font-weight: 800;
    color: #0f172a;
    font-size: 0.95rem;
  }

  .sidebar-content {
    flex: 1;
    overflow-y: auto;
    padding: 0.75rem 0;
  }

  .filter-group {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid #f1f5f9;
  }

  .filter-group-title {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #64748b;
    margin-bottom: 0.75rem;
  }

  .filter-button {
    width: 100%;
    padding: 0.75rem 1rem;
    background: #f1f5f9;
    border: 1px solid #e2e8f0;
    border-radius: 0.75rem;
    color: #0f172a;
    font-weight: 600;
    font-size: 0.875rem;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-bottom: 0.5rem;
  }

  .filter-button:hover {
    background: #e2e8f0;
    border-color: #cbd5e1;
  }

  .filter-button.active {
    background: linear-gradient(135deg, #3b82f6, #6366f1);
    color: white;
    border-color: #3b82f6;
  }

  .sidebar-footer {
    padding: 1rem;
    border-top: 1px solid #e2e8f0;
    font-size: 0.75rem;
    color: #94a3b8;
  }

  .sidebar-content::-webkit-scrollbar {
    width: 6px;
  }

  .sidebar-content::-webkit-scrollbar-track {
    background: transparent;
  }

  .sidebar-content::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 10px;
  }

  .sidebar-content::-webkit-scrollbar-thumb:hover {
    background: #94a3b8;
  }
</style>

<div class="sidebar-panel">

  <div class="sidebar-header">
    <i class="ph ph-sliders-horizontal text-lg align-middle mr-2"></i>
    Filter Kolom Biaya
  </div>

  <div class="sidebar-content" id="filter-groups-container">

    <div style="padding: 1rem; text-align: center; color: #94a3b8;">

      <p style="font-size: 0.875rem;">
        Memuat data filter...
      </p>

    </div>

  </div>

  <div class="sidebar-footer">

    <p style="margin: 0;">
      Aktifkan filter untuk menampilkan kolom yang dipilih di sheet.
    </p>

  </div>

</div>

<script>
  /**
   * =========================================================================
   * SIDEBAR: COLUMN FILTER LOGIC
   * Communicates with Apps Script to filter columns in Struktur_Biaya_1 sheet
   * =========================================================================
   */

  (function initSidebarFilters() {

    const container =
      document.getElementById('filter-groups-container');

    if (!container) {

      console.error('Sidebar container not found');
      return;

    }

    const showStatus = (message, color = '#94a3b8') => {
      container.innerHTML = `
        <div style="padding:1rem;text-align:center;color:${color};">
          <p>${message}</p>
        </div>
      `;
    };

    if (!window.google || !google.script || !google.script.run) {
      showStatus('google.script.run tidak tersedia. Buka panel ini dari Google Sheets Apps Script.', '#f43f5e');
      return;
    }

    // =========================================================================
    // LOAD DATA
    // =========================================================================

    google.script.run

      .withSuccessHandler(function(response) {

        try {

          if (
            !response ||
            typeof response !== 'object'
          ) {

            showStatus('Response sidebar tidak valid.', '#f43f5e');

            return;

          }

          if (
            response.status === 'success' &&
            Array.isArray(response.data) &&
            response.data.length > 0
          ) {

            renderFilterGroups(response.data);

          } else {

            showStatus('Tidak ada kolom filter yang tersedia.');

          }

        } catch (err) {

          console.error('Sidebar render error:', err);

          showStatus('Gagal memproses data sidebar.', '#f43f5e');

        }

      })

      .withFailureHandler(function(error) {

        console.error('Failed to load filter data:', error);

        showStatus('Gagal memuat data filter.', '#f43f5e');

      })

      .getSidebarGroupData();

    // =========================================================================
    // RENDER GROUPS
    // =========================================================================

    function renderFilterGroups(groups) {

      container.innerHTML = '';

      groups.forEach((group) => {

        if (!group) return;

        const groupDiv =
          document.createElement('div');

        groupDiv.className = 'filter-group';

        const titleDiv =
          document.createElement('div');

        titleDiv.className = 'filter-group-title';

        titleDiv.textContent =
          group.name || 'Untitled Group';

        groupDiv.appendChild(titleDiv);

        const button =
          document.createElement('button');

        button.type = 'button';

        button.className = 'filter-button';

        button.textContent =
          'Tampilkan ' + (group.name || 'Filter');

        if (button.dataset.bound === 'true') return;

        button.dataset.bound = 'true';

        button.addEventListener('click', function() {

          applyFilter(
            group.start,
            group.end,
            button
          );

        });

        groupDiv.appendChild(button);

        container.appendChild(groupDiv);

      });

    }

    // =========================================================================
    // APPLY FILTER
    // =========================================================================

    function applyFilter(startCol, endCol, buttonEl) {

      if (!buttonEl) return;

      document.querySelectorAll('.filter-button')
        .forEach((btn) => {

          btn.classList.remove('active');

        });

      buttonEl.classList.add('active');

      google.script.run

        .withSuccessHandler(function() {

          console.log(
            'Filter applied:',
            startCol,
            '-',
            endCol
          );

        })

        .withFailureHandler(function(error) {

          console.error(
            'Filter failed:',
            error
          );

          showStatus('Gagal menerapkan filter.', '#f43f5e');

        })

        .applySidebarFilter(
          startCol,
          endCol
        );

    }

  })();
</script>
