<!DOCTYPE html>
<html lang="id">
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800;900&display=swap');

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: #f8fafc;
      color: #0f172a;
      overflow-x: hidden;
    }

    .btn-category {
      transition: all 0.2s ease-in-out;
    }

    .btn-category:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
    }

    .btn-category:active {
      transform: scale(0.98);
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    .shimmer {
      animation: shimmer 2s infinite linear;
      background: linear-gradient(to right, #f1f5f9 4%, #e2e8f0 25%, #f1f5f9 36%);
      background-size: 1000px 100%;
    }

    @keyframes shimmer {
      0% { background-position: -1000px 0; }
      100% { background-position: 1000px 0; }
    }
  </style>
</head>

<body class="p-4 flex flex-col h-screen">

  <!-- HEADER -->
  <div class="mb-5 shrink-0">
    <div class="w-10 h-10 flex items-center justify-center rounded-xl bg-blue-600 text-white mb-3">
      <i class="ph ph-funnel text-xl"></i>
    </div>

    <h2 class="text-lg font-black text-slate-800">
      Filter Kolom
    </h2>

    <p class="text-xs text-slate-500 mt-1">
      Pilih kolom yang ingin ditampilkan
    </p>
  </div>

  <!-- LOADING -->
  <div id="loadingState" class="flex-1 space-y-3">
    <div class="h-14 rounded-xl shimmer"></div>
    <div class="h-14 rounded-xl shimmer"></div>
    <div class="h-14 rounded-xl shimmer"></div>
  </div>

  <!-- BUTTON LIST -->
  <div id="buttonContainer" class="flex-1 overflow-y-auto hidden space-y-3 pb-6"></div>

  <!-- FOOTER -->
  <div class="shrink-0 mt-4 pt-4 border-t border-slate-200">
    <button onclick="resetView()" id="btnReset"
      class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl active:scale-95 flex items-center justify-center gap-2 text-sm">
      <i class="ph ph-arrows-out-line-horizontal"></i>
      Reset Kolom
    </button>
  </div>

  <script>
    // INIT
    document.addEventListener('DOMContentLoaded', () => {
      google.script.run
        .withSuccessHandler(renderButtons)
        .withFailureHandler(showError)
        .getSidebarGroupData();
    });

    // CLEAN TEXT (Analisa → Biaya)
    function formatName(name) {
      return name
        .replace(/analisa/gi, '')
        .replace(/analysis/gi, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    // RENDER BUTTON
    function renderButtons(response) {
      document.getElementById('loadingState').classList.add('hidden');
      const container = document.getElementById('buttonContainer');
      container.classList.remove('hidden');

      if (response.status === 'error') {
        container.innerHTML = `<div class="p-4 bg-rose-50 text-rose-600 rounded-xl text-xs text-center">${response.message}</div>`;
        return;
      }

      const groups = response.data;

      if (!groups.length) {
        container.innerHTML = `<div class="p-4 bg-slate-50 text-slate-500 rounded-xl text-xs text-center">Tidak ada kolom</div>`;
        return;
      }

      const colors = [
        'text-rose-500 bg-rose-50',
        'text-amber-500 bg-amber-50',
        'text-blue-500 bg-blue-50',
        'text-emerald-500 bg-emerald-50',
        'text-purple-500 bg-purple-50'
      ];

      container.innerHTML = groups.map((g, i) => `
        <button onclick="filterColumns(${g.start}, ${g.end}, this)"
          class="btn-category w-full bg-white border border-slate-200 p-3 rounded-xl flex items-center gap-3">

          <div class="w-10 h-10 flex items-center justify-center rounded-lg ${colors[i % colors.length]}">
            <i class="ph ph-table text-xl"></i>
          </div>

          <span class="text-sm font-extrabold text-slate-800 truncate">
            ${formatName(g.name)}
          </span>
        </button>
      `).join('');
    }

    // FILTER
    function filterColumns(start, end, btn) {
      if (btn.classList.contains('pointer-events-none')) return;

      const original = btn.innerHTML;

      btn.innerHTML = `<i class="ph ph-spinner-gap animate-spin text-xl"></i>`;
      btn.classList.add('pointer-events-none', 'opacity-70');

      google.script.run
        .withSuccessHandler(() => {
          btn.innerHTML = original;
          btn.classList.remove('pointer-events-none', 'opacity-70');
        })
        .withFailureHandler(err => {
          btn.innerHTML = original;
          btn.classList.remove('pointer-events-none', 'opacity-70');
          showError(err);
        })
        .applySidebarFilter(start, end);
    }

    // RESET
    function resetView() {
      const btn = document.getElementById('btnReset');

      if (btn.classList.contains('pointer-events-none')) return;

      const original = btn.innerHTML;

      btn.innerHTML = `<i class="ph ph-spinner-gap animate-spin"></i> Memuat...`;
      btn.classList.add('pointer-events-none', 'opacity-70');

      google.script.run
        .withSuccessHandler(() => {
          btn.innerHTML = original;
          btn.classList.remove('pointer-events-none', 'opacity-70');
        })
        .withFailureHandler(err => {
          btn.innerHTML = original;
          btn.classList.remove('pointer-events-none', 'opacity-70');
          showError(err);
        })
        .resetSidebarFilter();
    }

    // ERROR
    function showError(err) {
      alert("Error: " + err.message);
    }
  </script>

</body>
</html>
