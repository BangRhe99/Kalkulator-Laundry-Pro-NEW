<script>

/**
 * ==========================================
 * FRONT-END LOGIC: KALKULATOR MASTER BIAYA
 * Fase: HPP Dashboard Aggregation & Performance (Debounce)
 * ==========================================
 */

/* =========================================================
   DEBOUNCE
========================================================= */

function zettDebounce(func, delay) {

  let timeout;

  return function(...args) {

    clearTimeout(timeout);

    timeout = setTimeout(() => {
      func.apply(this, args);
    }, delay);

  };

}

/* =========================================================
   GLOBAL STATE
========================================================= */

window.hppDataState = {
  gas: 0,
  listrik: 0,
  air: 0,
  packing: 0,
  bahan: 0,
  nota: 0
};

/* =========================================================
   FORMAT RUPIAH
========================================================= */

function formatRupiah(angka) {

  angka = Number(angka) || 0;

  return 'Rp ' + angka.toLocaleString('id-ID', {
    minimumFractionDigits: 0,
    maximumFractionDigits: 0
  });

}

/* =========================================================
   SAVE LOCAL
========================================================= */

function saveHPPDraftToLocal() {

  const inputs =
    document.querySelectorAll(
      '#view-hpp input, #view-hpp select'
    );

  const draft = {};

  inputs.forEach(el => {

    if (el.id) {

      if (
        el.type === 'checkbox' ||
        el.type === 'radio'
      ) {
        draft[el.id] = el.checked;
      } else {
        draft[el.id] = el.value;
      }

    }

  });

  localStorage.setItem(
    'zett_hpp_draft_state',
    JSON.stringify(draft)
  );

}

/* =========================================================
   LOAD LOCAL
========================================================= */

function loadHPPFromLocal() {

  const savedState =
    localStorage.getItem(
      'zett_hpp_draft_state'
    );

  if (savedState) {

    try {

      const draft =
        JSON.parse(savedState);

      for (let key in draft) {

        const el =
          document.getElementById(key);

        if (el) {

          if (
            el.type === 'checkbox' ||
            el.type === 'radio'
          ) {
            el.checked = draft[key];
          } else {
            el.value = draft[key];
          }

        }

      }

      if (
        typeof updateGasDefault === 'function'
      ) {
        updateGasDefault();
      }

      if (
        typeof calculateGas === 'function'
      ) {
        calculateGas();
      }

      if (
        typeof toggleSetrikaInputs === 'function'
      ) {
        toggleSetrikaInputs();
      }

      if (
        typeof calculateListrik === 'function'
      ) {
        calculateListrik();
      }

      if (
        typeof toggleAirInputs === 'function'
      ) {
        toggleAirInputs();
      }

      if (
        typeof calculateAir === 'function'
      ) {
        calculateAir();
      }

      if (
        typeof calculatePacking === 'function'
      ) {
        calculatePacking();
      }

      if (
        typeof toggleBahanActive === 'function'
      ) {
        toggleBahanActive();
      }

      if (
        typeof toggleBahanInputs === 'function'
      ) {
        toggleBahanInputs();
      }

      if (
        typeof calculateBahanBaku === 'function'
      ) {
        calculateBahanBaku();
      }

      if (
        typeof toggleNotaInputs === 'function'
      ) {
        toggleNotaInputs();
      }

      if (
        typeof calculateNota === 'function'
      ) {
        calculateNota();
      }

    } catch (e) {

      console.error(
        'Gagal memuat memori lokal HPP',
        e
      );

    }

  }

  if (
    typeof StateMachine !== 'undefined'
  ) {
    StateMachine.calculateTotal();
  }

}

/* =========================================================
   DASHBOARD ENGINE
========================================================= */

function updateHPPDashboard() {

  const data =
    window.hppDataState || {
      gas: 0,
      listrik: 0,
      air: 0,
      packing: 0,
      bahan: 0,
      nota: 0
    };

  const gas =
    Number(data.gas) || 0;

  const listrik =
    Number(data.listrik) || 0;

  const air =
    Number(data.air) || 0;

  const packing =
    Number(data.packing) || 0;

  const bahan =
    Number(data.bahan) || 0;

  const nota =
    Number(data.nota) || 0;

  const total =
    gas +
    listrik +
    air +
    packing +
    bahan +
    nota;

  /* TOTAL */

  const totalEl =
    document.getElementById(
      'dash-hpp-total'
    );

  if (totalEl) {
    totalEl.innerText =
      formatRupiah(total);
  }

  /* VALUE */

  setDashboardValue(
    'dash-card-gas',
    gas
  );

  setDashboardValue(
    'dash-card-listrik',
    listrik
  );

  setDashboardValue(
    'dash-card-air',
    air
  );

  setDashboardValue(
    'dash-card-packing',
    packing
  );

  setDashboardValue(
    'dash-card-bahan',
    bahan
  );

  setDashboardValue(
    'dash-card-nota',
    nota
  );

  /* PERCENT */

  setDashboardPercent(
    'dash-card-gas-pct',
    gas,
    total
  );

  setDashboardPercent(
    'dash-card-listrik-pct',
    listrik,
    total
  );

  setDashboardPercent(
    'dash-card-air-pct',
    air,
    total
  );

  setDashboardPercent(
    'dash-card-packing-pct',
    packing,
    total
  );

  setDashboardPercent(
    'dash-card-bahan-pct',
    bahan,
    total
  );

  setDashboardPercent(
    'dash-card-nota-pct',
    nota,
    total
  );

}

/* =========================================================
   SET VALUE
========================================================= */

function setDashboardValue(id, value) {

  const el =
    document.getElementById(id);

  if (!el) return;

  el.innerText =
    formatRupiah(value);

}

/* =========================================================
   SET PERCENT
========================================================= */

function setDashboardPercent(
  id,
  value,
  total
) {

  const el =
    document.getElementById(id);

  if (!el) return;

  let percent = 0;

  if (total > 0) {
    percent =
      (value / total) * 100;
  }

  el.innerText =
    percent.toFixed(1) + '%';

}

/* =========================================================
   STATE MACHINE
========================================================= */

window.StateMachine = {

  updateMetric(type, value) {

    if (!window.hppDataState) {
      window.hppDataState = {};
    }

    window.hppDataState[type] =
      Number(value) || 0;

    updateHPPDashboard();

  },

  calculateTotal() {

    updateHPPDashboard();

  }

};

/* =========================================================
   DOM READY
========================================================= */

document.addEventListener(
  'DOMContentLoaded',
  () => {

    loadHPPFromLocal();

    const hppView =
      document.getElementById(
        'view-hpp'
      );

    if (hppView) {

      hppView.addEventListener(
        'input',
        zettDebounce(
          saveHPPDraftToLocal,
          500
        )
      );

      hppView.addEventListener(
        'change',
        zettDebounce(
          saveHPPDraftToLocal,
          500
        )
      );

    }

    setTimeout(() => {

      updateHPPDashboard();

      if (
        typeof calculateGas ===
        'function'
      ) {
        calculateGas();
      }

      if (
        typeof calculateListrik ===
        'function'
      ) {
        calculateListrik();
      }

      if (
        typeof calculateAir ===
        'function'
      ) {
        calculateAir();
      }

      if (
        typeof calculatePacking ===
        'function'
      ) {
        calculatePacking();
      }

      if (
        typeof calculateBahanBaku ===
        'function'
      ) {
        calculateBahanBaku();
      }

      if (
        typeof calculateNota ===
        'function'
      ) {
        calculateNota();
      }

    }, 300);

  }
);

</script>
