<script>
  const formatRupiahModal = (num) => {
    return 'Rp ' + Number(num || 0).toLocaleString('id-ID');
  };

  function loadHPPDashboard() {
    google.script.run
      .withSuccessHandler(function(data) {
        if (!data) return;

        const total =
          (data.gas || 0) +
          (data.listrik || 0) +
          (data.air || 0) +
          (data.packing || 0) +
          (data.bahan || 0) +
          (data.nota || 0);

        const setText = (id, value) => {
          const el = document.getElementById(id);
          if (el) el.innerText = value;
        };

        setText('dash-hpp-total', formatRupiahModal(total));
        setText('dash-card-gas', formatRupiahModal(data.gas));
        setText('dash-card-listrik', formatRupiahModal(data.listrik));
        setText('dash-card-air', formatRupiahModal(data.air));
        setText('dash-card-packing', formatRupiahModal(data.packing));
        setText('dash-card-bahan', formatRupiahModal(data.bahan));
        setText('dash-card-nota', formatRupiahModal(data.nota));

        function pct(val) {
          if (!total) return '0%';
          return ((val / total) * 100).toFixed(1) + '%';
        }

        setText('dash-card-gas-pct', pct(data.gas));
        setText('dash-card-listrik-pct', pct(data.listrik));
        setText('dash-card-air-pct', pct(data.air));
        setText('dash-card-packing-pct', pct(data.packing));
        setText('dash-card-bahan-pct', pct(data.bahan));
        setText('dash-card-nota-pct', pct(data.nota));
      })

      .withFailureHandler(function(err) {
        console.error('GAGAL LOAD HPP:', err);
      })

      .getHPPDashboardData();
  }

  /* =========================================================================
     GLOBAL HPP INPUT OPENER
     Fungsi ini sengaja dibuat global agar bisa dipanggil dari:
     1. Card HPP di Modal.html
     2. Card Dashboard Biaya V5
  ========================================================================= */

  window.openHPPModal = function(categoryTitle) {
    const rawTitle = String(categoryTitle || '').toLowerCase();

    if (typeof switchMainTab === 'function') {
      switchMainTab('hpp');
    }

    const categoryMap = [
      {
        keys: ['gas', 'lpg'],
        selectors: [
          '#form-gas',
          '#section-gas',
          '#input-gas',
          '#hpp-gas',
          '[data-hpp-section="gas"]',
          '[data-hpp-form="gas"]',
          '[data-category="gas"]'
        ]
      },
      {
        keys: ['listrik'],
        selectors: [
          '#form-listrik',
          '#section-listrik',
          '#input-listrik',
          '#hpp-listrik',
          '[data-hpp-section="listrik"]',
          '[data-hpp-form="listrik"]',
          '[data-category="listrik"]'
        ]
      },
      {
        keys: ['air'],
        selectors: [
          '#form-air',
          '#section-air',
          '#input-air',
          '#hpp-air',
          '[data-hpp-section="air"]',
          '[data-hpp-form="air"]',
          '[data-category="air"]'
        ]
      },
      {
        keys: ['packing', 'plastik'],
        selectors: [
          '#form-packing',
          '#section-packing',
          '#input-packing',
          '#hpp-packing',
          '[data-hpp-section="packing"]',
          '[data-hpp-form="packing"]',
          '[data-category="packing"]'
        ]
      },
      {
        keys: ['chemical', 'bahan'],
        selectors: [
          '#form-bahan',
          '#form-chemical',
          '#section-bahan',
          '#section-chemical',
          '#input-bahan',
          '#input-chemical',
          '#hpp-bahan',
          '#hpp-chemical',
          '[data-hpp-section="bahan"]',
          '[data-hpp-section="chemical"]',
          '[data-hpp-form="bahan"]',
          '[data-hpp-form="chemical"]',
          '[data-category="bahan"]',
          '[data-category="chemical"]'
        ]
      },
      {
        keys: ['nota', 'admin'],
        selectors: [
          '#form-nota',
          '#form-admin',
          '#section-nota',
          '#section-admin',
          '#input-nota',
          '#input-admin',
          '#hpp-nota',
          '#hpp-admin',
          '[data-hpp-section="nota"]',
          '[data-hpp-section="admin"]',
          '[data-hpp-form="nota"]',
          '[data-hpp-form="admin"]',
          '[data-category="nota"]',
          '[data-category="admin"]'
        ]
      }
    ];

    const matchedCategory = categoryMap.find((item) => {
      return item.keys.some((key) => rawTitle.includes(key));
    });

    if (!matchedCategory) {
      console.warn('Kategori HPP tidak dikenali:', categoryTitle);
      return;
    }

    setTimeout(() => {
      let targetEl = null;

      for (const selector of matchedCategory.selectors) {
        targetEl = document.querySelector(selector);
        if (targetEl) break;
      }

      if (!targetEl) {
        console.warn('Target form HPP belum ditemukan untuk:', categoryTitle);
        return;
      }

      targetEl.scrollIntoView({
        behavior: 'smooth',
        block: 'center'
      });

      const focusEl = targetEl.matches('input, select, textarea, button')
        ? targetEl
        : targetEl.querySelector('input, select, textarea, button');

      if (focusEl && typeof focusEl.focus === 'function') {
        setTimeout(() => {
          focusEl.focus();
        }, 250);
      }
    }, 180);
  };

  /* =========================================================================
     CLICKABLE CARD
  ========================================================================= */

  document.addEventListener('DOMContentLoaded', function() {
    loadHPPDashboard();

    document.querySelectorAll('.hpp-card-dash').forEach(card => {
      if (card.dataset.hppClickBound === 'true') return;

      card.dataset.hppClickBound = 'true';

      card.addEventListener('click', function() {
        const titleEl = card.querySelector('.card-title');
        const title = titleEl ? titleEl.textContent.trim() : '';

        if (typeof window.openHPPModal === 'function') {
          window.openHPPModal(title);
          return;
        }

        console.warn('window.openHPPModal tidak tersedia');
      });
    });
  });
</script>
