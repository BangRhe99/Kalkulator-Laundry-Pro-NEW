<!-- ========================================================================= -->
<!-- VIEW STRUKTUR BIAYA HPP - CLEANUP BASELINE -->
<!-- ========================================================================= -->

<style>

  :root {
    --hpp-radius-2xl: 2rem;
    --hpp-radius-xl: 1.25rem;

    --hpp-border: #e2e8f0;
    --hpp-border-soft: rgba(226,232,240,0.8);

    --hpp-surface: #ffffff;
    --hpp-surface-strong: rgba(255,255,255,0.95);

    --hpp-shadow-card: 0 10px 30px rgba(15,23,42,0.06);
    --hpp-shadow-hover: 0 20px 40px rgba(15,23,42,0.12);
    --hpp-shadow-ambient: 0 25px 60px rgba(15,23,42,0.08);

    --hpp-text: #0f172a;
    --hpp-muted: #64748b;
    --hpp-soft: #475569;

    --hpp-rose: #e11d48;
    --hpp-amber: #f59e0b;
    --hpp-cyan: #06b6d4;
    --hpp-indigo: #6366f1;
    --hpp-emerald: #10b981;
    --hpp-slate: #64748b;

    --hpp-hero-pad: clamp(1.5rem, 3vw, 2.5rem);

    --hpp-ease: cubic-bezier(0.4, 0, 0.2, 1);
  }

  #view-hpp {
    margin-top: 1rem;
    padding-bottom: 0;
  }

  #view-hpp,
  #view-hpp * {
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
  }

  #view-hpp .tabular-nums,
  #view-hpp [id^="dash-card-"],
  #view-hpp #dash-hpp-total,
  #view-hpp input,
  #view-hpp select {
    font-variant-numeric: tabular-nums lining-nums;
    font-feature-settings: "tnum" 1, "lnum" 1, "kern" 1;
  }

  #view-hpp #hpp-dashboard-view {
    display: grid;
    gap: clamp(1.35rem, 2.25vw, 2rem);
    max-width: min(100%, 1120px);
    margin-inline: auto;
    transform: translate3d(0, 0, 0);
    will-change: opacity, transform;
  }

  #view-hpp .hpp-summary,
  #view-hpp .hpp-card-dash {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 1rem;
    padding: 1rem;
  }

  #view-hpp .hpp-summary {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  #view-hpp .summary-title {
    font-size: 0.875rem;
    font-weight: 700;
    color: #475569;
  }

  #view-hpp .summary-value {
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 800;
    color: #0f172a;
  }

  #view-hpp .hpp-grid {
    display: grid;
    gap: 0.75rem;
  }

  #view-hpp .hpp-card-dash {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 0.75rem;
  }

  #view-hpp .card-title {
    font-weight: 700;
    color: #0f172a;
  }

  #view-hpp .card-value {
    font-weight: 700;
    color: #0f172a;
  }

  #view-hpp .card-pct {
    font-size: 0.875rem;
    color: #64748b;
    white-space: nowrap;
  }

  #view-hpp .hpp-card-dash:hover {
    transform: translate3d(0, -5px, 0) scale(1.006) !important;
    box-shadow: var(--hpp-shadow-hover) !important;
    border-color: rgba(148, 163, 184, 0.42) !important;
    filter: saturate(1.08);
  }

  #view-hpp .hpp-card-dash:active {
    transform: translate3d(0, -1px, 0) scale(0.982) !important;
    transition-duration: 120ms !important;
  }

  #view-hpp #dash-hpp-total {
    color: var(--hpp-text) !important;
    font-size: clamp(2.85rem, 8.5vw, 4.7rem) !important;
    line-height: 0.94 !important;
    letter-spacing: -0.065em !important;
    text-shadow: 0 1px 0 rgba(255,255,255,0.28);
  }

  #view-hpp #dash-card-gas {
    color: var(--hpp-rose) !important;
  }

  #view-hpp #dash-card-listrik {
    color: var(--hpp-amber) !important;
  }

  #view-hpp #dash-card-air {
    color: var(--hpp-cyan) !important;
  }

  #view-hpp #dash-card-packing {
    color: var(--hpp-indigo) !important;
  }

  #view-hpp #dash-card-bahan {
    color: var(--hpp-emerald) !important;
  }

  #view-hpp #dash-card-nota {
    color: var(--hpp-slate) !important;
  }

  #view-hpp [id^="dash-card-"] {
    font-size: clamp(1.15rem, 2.65vw, 1.7rem) !important;
    line-height: 1 !important;
  }

  .hpp-view-enter-premium {
    animation: hppViewEnterPremium 460ms var(--hpp-ease) both;
  }

  @keyframes hppViewEnterPremium {
    from {
      opacity: 0;
      transform: translate3d(0, 18px, 0) scale(0.988);
      filter: blur(8px);
    }

    to {
      opacity: 1;
      transform: translate3d(0, 0, 0) scale(1);
      filter: blur(0);
    }
  }

  @media (min-width: 768px) {
    #view-hpp .hpp-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
  }

  @media (max-width: 767px) {
    #view-hpp {
      margin-top: 0 !important;
    }

    #view-hpp #hpp-dashboard-view {
      gap: 1.25rem;
      max-width: 100%;
    }

    #view-hpp .hpp-card-dash {
      min-height: 6.5rem;
      padding: 0.9rem !important;
      border-radius: 1.25rem !important;
    }

    #view-hpp [id^="dash-card-"] {
      font-size: clamp(0.95rem, 4.5vw, 1.2rem) !important;
    }

    #view-hpp #dash-hpp-total {
      font-size: clamp(2rem, 10vw, 3rem) !important;
    }
  }

  @media (prefers-reduced-motion: reduce) {
    #view-hpp,
    #view-hpp *,
    #view-hpp *::before,
    #view-hpp *::after {
      animation-duration: 1ms !important;
      animation-iteration-count: 1 !important;
      scroll-behavior: auto !important;
      transition-duration: 1ms !important;
    }
  }

</style>

<div id="view-hpp" class="main-view hidden hpp-view-enter-premium">

  <!-- ================= DASHBOARD VIEW ================= -->

  <div id="hpp-dashboard-view" class="space-y-4">

    <div class="hpp-summary">
      <div class="summary-title">
        Total HPP Variabel
      </div>

      <div id="dash-hpp-total" class="summary-value tabular-nums">
        Rp 0
      </div>
    </div>

    <div class="hpp-grid">

      <div class="hpp-card-dash">
        <span class="card-title">Gas LPG</span>
        <span id="dash-card-gas" class="card-value tabular-nums">Rp 0</span>
        <span id="dash-card-gas-pct" class="card-pct">0%</span>
      </div>

      <div class="hpp-card-dash">
        <span class="card-title">Listrik</span>
        <span id="dash-card-listrik" class="card-value tabular-nums">Rp 0</span>
        <span id="dash-card-listrik-pct" class="card-pct">0%</span>
      </div>

      <div class="hpp-card-dash">
        <span class="card-title">Air</span>
        <span id="dash-card-air" class="card-value tabular-nums">Rp 0</span>
        <span id="dash-card-air-pct" class="card-pct">0%</span>
      </div>

      <div class="hpp-card-dash">
        <span class="card-title">Packing</span>
        <span id="dash-card-packing" class="card-value tabular-nums">Rp 0</span>
        <span id="dash-card-packing-pct" class="card-pct">0%</span>
      </div>

      <div class="hpp-card-dash">
        <span class="card-title">Chemical</span>
        <span id="dash-card-bahan" class="card-value tabular-nums">Rp 0</span>
        <span id="dash-card-bahan-pct" class="card-pct">0%</span>
      </div>

      <div class="hpp-card-dash">
        <span class="card-title">Admin/Nota</span>
        <span id="dash-card-nota" class="card-value tabular-nums">Rp 0</span>
        <span id="dash-card-nota-pct" class="card-pct">0%</span>
      </div>

    </div>

  </div>

</div>
