<script id="hpp-water-module">
  /* [AIR FORM STEAM IRON VISIBILITY PATCH - 2026-05-19] */
  (function zettAirSteamIronVisibilityStyle20260519() {
    if (document.getElementById('zett-air-steam-visibility-style-20260519')) return;
    const style = document.createElement('style');
    style.id = 'zett-air-steam-visibility-style-20260519';
    style.textContent = `
      /* [AIR FORM STEAM IRON VISIBILITY PATCH - 2026-05-19] */
      #tab-air .zett-air-cost-grid {
        align-items: stretch;
      }

      #tab-air .zett-air-wash-card,
      #tab-air .zett-air-steam-card {
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 16px 38px -32px rgba(15, 23, 42, 0.42);
        min-width: 0;
      }

      #tab-air .zett-air-steam-card {
        background:
          linear-gradient(180deg, rgba(250, 245, 255, 0.68), rgba(255, 255, 255, 0.94));
        border-color: rgba(216, 180, 254, 0.48) !important;
      }

      #tab-air .zett-air-steam-card.zett-air-steam-hidden {
        display: none !important;
      }

      #tab-air .zett-air-cost-grid.zett-air-steam-off .zett-air-wash-card {
        grid-column: span 12 / span 12;
      }

      @media (max-width: 767px) {
        #tab-air .zett-air-cost-grid .zett-air-wash-card,
        #tab-air .zett-air-cost-grid .zett-air-steam-card {
          grid-column: span 12 / span 12;
        }
      }
    `;
    document.head.appendChild(style);
  })();

  if (typeof window.toggleAirInputs !== 'function') {
    window.toggleAirInputs = function() {
      const sumberAir = document.getElementById('inputAirSumber')?.value || 'pdam';
      const boilerSumber = document.getElementById('inputAirBoilerSumber')?.value || 'sama';

      const wrapAirPdam = document.getElementById('wrapAirPdam');
      const wrapAirTangki = document.getElementById('wrapAirTangki');
      const wrapAirSumur = document.getElementById('wrapAirSumur');
      const wrapAirGalon = document.getElementById('wrapAirGalon');

      if (wrapAirPdam) {
        wrapAirPdam.classList.toggle('hidden', sumberAir !== 'pdam');
        wrapAirPdam.style.display = sumberAir === 'pdam' ? '' : 'none';
      }

      if (wrapAirTangki) {
        wrapAirTangki.classList.toggle('hidden', sumberAir !== 'tangki');
        wrapAirTangki.style.display = sumberAir === 'tangki' ? 'flex' : 'none';
      }

      if (wrapAirSumur) {
        wrapAirSumur.classList.toggle('hidden', sumberAir !== 'sumur');
        wrapAirSumur.style.display = sumberAir === 'sumur' ? 'flex' : 'none';
      }

      if (wrapAirGalon) {
        const steamVisible = typeof window.shouldShowWaterSteamIronCard === 'function'
          ? window.shouldShowWaterSteamIronCard()
          : true;
        wrapAirGalon.classList.toggle('hidden', !steamVisible || boilerSumber !== 'galon');
        wrapAirGalon.style.display = steamVisible && boilerSumber === 'galon' ? 'flex' : 'none';
      }

      if (typeof window.zettRenderWaterAnalysisForm === 'function') {
        window.zettRenderWaterAnalysisForm();
      }
    };
  }

  if (typeof window.calculateAir !== 'function') {
    window.calculateAir = function() {};
  }

/* Air operational UI: scoped to Struktur Biaya > Analisa Biaya Air. */
(function zettWaterOperationalUi20260517() {
  function byId(id) { return document.getElementById(id); }
  function norm(value) { return String(value || '').trim().toLowerCase(); }
  function clean(value) { return typeof zettCleanNumber === 'function' ? zettCleanNumber(value) : (Number(String(value || '').replace(/[^0-9.-]/g, '')) || 0); }
  function rupiah(value) {
    if (typeof formatRupiah === 'function') return formatRupiah(Math.round(Number(value) || 0));
    return 'Rp ' + Math.round(Number(value) || 0).toLocaleString('id-ID');
  }
  function outletName() { return String(byId('inputNamaHPP')?.value || '').trim(); }
  function getOutlet() {
    const name = norm(outletName());
    const sources = [];
    if (typeof masterDataCabang !== 'undefined' && Array.isArray(masterDataCabang)) sources.push(masterDataCabang);
    if (window.APP_STATE?.data?.master?.cabang) sources.push(window.APP_STATE.data.master.cabang);
    for (const rows of sources) {
      const found = rows.find(item => norm(item?.namaOutlet || item?.['Nama Outlet']) === name);
      if (found) return found;
    }
    return null;
  }
  function getRow() {
    if (typeof zettFindActiveHPPRow === 'function') return zettFindActiveHPPRow() || {};
    return {};
  }
  function setText(id, value) {
    const el = byId(id);
    if (el) el.textContent = rupiah(value);
  }

  function zettGetWaterUsageContext() {
    const outlet = getOutlet() || {};
    const row = getRow();
    const kategoriRaw = outlet.kategori || row['Kategori Laundry'] || byId('inputKategori')?.value || 'Drop Off/Kiloan';
    const kategori = norm(kategoriRaw);
    const jenisSetrikaRaw = outlet.tipeSetrikaUtama || outlet.tipeSetrika || row['Tipe Setrika'] || byId('jenisSetrika')?.value || '';
    const jenisSetrika = norm(jenisSetrikaRaw);
    const isSelfService = kategori.includes('self');
    const isDropOff = kategori.includes('drop') || kategori.includes('kilo');
    const isHybrid = kategori.includes('hybrid');
    const setrikaListrikToggle = !!byId('toggleSetrikaListrik')?.checked;
    const usesElectricIron = jenisSetrika.includes('listrik') || (setrikaListrikToggle && !jenisSetrika.includes('uap') && !jenisSetrika.includes('boiler') && !jenisSetrika.includes('steam'));
    const usesSteamIron = !usesElectricIron && (
      jenisSetrika.includes('uap') ||
      jenisSetrika.includes('boiler') ||
      jenisSetrika.includes('steam') ||
      jenisSetrika.includes('gas')
    );
    return {
      kategoriBisnis: kategoriRaw,
      jenisSetrika: jenisSetrikaRaw,
      isSelfService,
      isDropOff,
      isHybrid,
      usesSteamIron,
      showSteamIronCard: !isSelfService && (isDropOff || isHybrid) && usesSteamIron
    };
  }

  // [AIR FORM STEAM IRON VISIBILITY PATCH - 2026-05-19]
  function shouldShowWaterSteamIronCard(profile) {
    if (profile) {
      const kategori = norm(profile.kategoriLaundry || profile.kategori || profile.kategoriBisnis || '');
      const jenisSetrika = norm(profile.jenisSetrika || profile.tipeSetrika || profile.tipeSetrikaUtama || profile.setrika || '');
      const isSelfService = kategori.includes('self');
      const isDropOff = kategori.includes('drop') || kategori.includes('kilo');
      const isHybrid = kategori.includes('hybrid');
      const usesElectricIron = jenisSetrika.includes('listrik');
      const usesSteamIron = !usesElectricIron && (
        jenisSetrika.includes('uap') ||
        jenisSetrika.includes('boiler') ||
        jenisSetrika.includes('steam') ||
        jenisSetrika.includes('gas')
      );
      return !isSelfService && (isDropOff || isHybrid) && usesSteamIron;
    }
    return !!zettGetWaterUsageContext().showSteamIronCard;
  }

  function zettRenderWaterAnalysisForm() {
    const showSteam = shouldShowWaterSteamIronCard();
    const grid = document.querySelector('#tab-air .zett-air-cost-grid');
    const steamCard = byId('zettAirSteamIronCard') || document.querySelector('#tab-air [data-air-steam-card="boiler"]');
    const steamInputs = ['inputAirBoilerSumber', 'inputAirHargaGalon', 'inputAirLiterGalon', 'inputAirBoilerLiter', 'inputAirBoilerJam', 'inputAirBoilerKgJam'];

    if (grid) grid.classList.toggle('zett-air-steam-off', !showSteam);
    if (steamCard) {
      steamCard.classList.toggle('hidden', !showSteam);
      steamCard.classList.toggle('zett-air-steam-hidden', !showSteam);
      steamCard.style.display = showSteam ? '' : 'none';
      steamCard.setAttribute('aria-hidden', showSteam ? 'false' : 'true');
    }

    steamInputs.forEach(id => {
      const el = byId(id);
      if (!el) return;
      el.disabled = !showSteam;
      el.setAttribute('aria-disabled', showSteam ? 'false' : 'true');
    });

    const galonWrap = byId('wrapAirGalon');
    if (galonWrap) {
      const showGalon = showSteam && norm(byId('inputAirBoilerSumber')?.value) === 'galon';
      galonWrap.classList.toggle('hidden', !showGalon);
      galonWrap.style.display = showGalon ? 'flex' : 'none';
    }
  }

  function zettWaterValues() {
    if (typeof window.zettIsHPPOutletNotSelected_ === 'function' && window.zettIsHPPOutletNotSelected_()) {
      return typeof window.zettGetZeroWaterPdamMetrics_ === 'function'
        ? window.zettGetZeroWaterPdamMetrics_()
        : { source: '', boilerSource: '', airLoad: 0, airKg: 0, setrikaJam: 0, setrikaKg: 0 };
    }

    const row = getRow();
    const outlet = getOutlet() || {};
    const source = norm(byId('inputAirSumber')?.value || row['Sumber Air'] || 'pdam');
    const boilerSource = norm(byId('inputAirBoilerSumber')?.value || row['Sumber Setrika'] || 'sama');
    const hargaAir = source === 'pdam' ? clean(byId('inputAirHargaM3')?.value || row['Harga Air']) : 0;
    const hargaTangki = source === 'tangki' ? clean(byId('inputAirHargaTangki')?.value || row['Harga Tangki']) : 0;
    const literTangki = source === 'tangki' ? clean(byId('inputAirLiterTangki')?.value || row['Liter Tangki']) : 0;
    const airCuci = clean(byId('inputAirCuciLiter')?.value || row['Air Cuci']);
    const kapCuci = clean(outlet.cuciKg || row['Kap Cuci']) || 1;
    const galonSetrika = boilerSource === 'galon' ? clean(byId('inputAirHargaGalon')?.value || row['Galon Setrika']) : 0;
    const volSetrika = boilerSource === 'galon' ? clean(byId('inputAirLiterGalon')?.value || row['Vol Setrika']) : 0;
    const literSetrika = clean(byId('inputAirBoilerLiter')?.value || row['Liter Setrika']);
    const jamSetrika = clean(byId('inputAirBoilerJam')?.value || row['Jam Setrika']);
    const kgSetrika = clean(byId('inputAirBoilerKgJam')?.value || row['Kg Setrika']);

    const mainRate = source === 'pdam'
      ? hargaAir / 1000
      : (source === 'tangki' && literTangki > 0 ? hargaTangki / literTangki : 0);
    const boilerRate = boilerSource === 'galon'
      ? (volSetrika > 0 ? galonSetrika / volSetrika : 0)
      : mainRate;
    const airLoad = mainRate * airCuci;
    const airKg = kapCuci > 0 ? airLoad / kapCuci : 0;
    const setrikaJam = jamSetrika > 0 ? boilerRate * (literSetrika / jamSetrika) : 0;
    const setrikaKg = kgSetrika > 0 ? setrikaJam / kgSetrika : 0;

    return {
      source,
      boilerSource,
      airLoad: clean(row['Air Per Load']) || airLoad || 0,
      airKg: clean(row['Air Per Kg']) || airKg || 0,
      setrikaJam: clean(row['Air Setrika Jam']) || setrikaJam || 0,
      setrikaKg: clean(row['Air Setrika Kg']) || setrikaKg || 0
    };
  }

  function zettGetVisibleWaterMetrics(context) {
    if (typeof window.zettIsHPPOutletNotSelected_ === 'function' && window.zettIsHPPOutletNotSelected_()) {
      return [
        { label: 'Air Cuci /Load', value: 0 },
        { label: 'Air Cuci /Kg', value: 0 },
        { label: 'Air Setrika /Jam', value: 0 },
        { label: 'Air Setrika /Kg', value: 0 }
      ];
    }

    const c = context || zettGetWaterUsageContext();
    const v = zettWaterValues();
    if (c.isSelfService) return [{ label: 'Air Cuci /Load', value: v.airLoad }];
    if (c.isHybrid) {
      const metrics = [
        { label: 'Air Cuci /Load', value: v.airLoad },
        { label: 'Air Cuci /Kg', value: v.airKg }
      ];
      if (c.showSteamIronCard) {
        metrics.push(
          { label: 'Air Setrika /Jam', value: v.setrikaJam },
          { label: 'Air Setrika /Kg', value: v.setrikaKg }
        );
      }
      return metrics;
    }
    const metrics = [{ label: 'Air Cuci /Kg', value: v.airKg }];
    if (c.showSteamIronCard) {
      metrics.push(
        { label: 'Air Setrika /Jam', value: v.setrikaJam },
        { label: 'Air Setrika /Kg', value: v.setrikaKg }
      );
    }
    return metrics;
  }

  function zettGetWaterDashboardValue() {
    if (typeof window.zettIsHPPOutletNotSelected_ === 'function' && window.zettIsHPPOutletNotSelected_()) {
      return 0;
    }

    const c = zettGetWaterUsageContext();
    const v = zettWaterValues();
    if (c.isSelfService) return v.airLoad || 0;
    const steamKg = c.showSteamIronCard ? (v.setrikaKg || 0) : 0;
    if (c.isHybrid) return (v.airLoad || 0) + (v.airKg || 0) + steamKg;
    return (v.airKg || 0) + steamKg;
  }

  function zettRenderWaterCard() {
    const valueEl = byId('dash-card-air');
    const shouldZero = typeof window.zettIsHPPOutletNotSelected_ === 'function' && window.zettIsHPPOutletNotSelected_();
    const metrics = zettGetVisibleWaterMetrics().filter(item => String(item.label || '').trim());
    const value = shouldZero ? 0 : zettGetWaterDashboardValue();
    if (valueEl) valueEl.textContent = rupiah(value);
    if (typeof window.renderHPPCardDetails === 'function') window.renderHPPCardDetails('air', metrics);
    if (typeof window.zettHPPSetStateValue === 'function') window.zettHPPSetStateValue('air', value);
  }

  window.calculateAir = function() {
    const v = zettWaterValues();
    const airCuci = clean(byId('inputAirCuciLiter')?.value);
    const sumberAir = norm(byId('inputAirSumber')?.value);
    const sumberBoiler = norm(byId('inputAirBoilerSumber')?.value);

    if (sumberAir === 'pdam') {
      ['inputAirHargaTangki', 'inputAirLiterTangki'].forEach(id => { const el = byId(id); if (el) el.value = ''; });
    } else if (sumberAir === 'sumur') {
      ['inputAirHargaM3', 'inputAirHargaTangki', 'inputAirLiterTangki'].forEach(id => { const el = byId(id); if (el) el.value = ''; });
    }
    if (sumberBoiler === 'sama') {
      ['inputAirHargaGalon', 'inputAirLiterGalon'].forEach(id => { const el = byId(id); if (el) el.value = ''; });
    }

    zettRenderWaterAnalysisForm();
    const m3El = byId('dispAirCuciM3');
    if (m3El) m3El.textContent = ((airCuci || 0) / 1000).toFixed(3);
    setText('dispAirCuciLoad', v.airLoad || 0);
    setText('dispAirCuciKg', v.airKg || 0);
    setText('dispAirBoilerJam', v.setrikaJam || 0);
    setText('dispAirBoilerKg', v.setrikaKg || 0);
    setText('displayBiayaAirTotalKg', zettGetWaterDashboardValue());
    zettRenderWaterCard();
    return v;
  };

  window.zettGetWaterUsageContext = zettGetWaterUsageContext;
  window.zettGetVisibleWaterMetrics = zettGetVisibleWaterMetrics;
  window.zettGetWaterDashboardValue = zettGetWaterDashboardValue;
  window.zettRenderWaterCard = zettRenderWaterCard;
  window.shouldShowWaterSteamIronCard = shouldShowWaterSteamIronCard;
  window.zettRenderWaterAnalysisForm = zettRenderWaterAnalysisForm;

  document.addEventListener('DOMContentLoaded', function() {
    if (typeof window.toggleAirInputs === 'function') window.toggleAirInputs();
    zettRenderWaterAnalysisForm();
    window.calculateAir();
    document.addEventListener('change', function(event) {
      if (window.__HPP_PROGRAMMATIC_UPDATE__) {
        console.warn('[STAGE_5_LOOP_PREVENTED] Programmatic update diabaikan.');
        return;
      }
      if (typeof window.zettIsHPPPopulating_ === 'function' && window.zettIsHPPPopulating_()) return;
      if (event.target && (event.target.id === 'inputNamaHPP' || event.target.id === 'inputKategori' || event.target.id === 'toggleSetrikaListrik')) {
        setTimeout(window.calculateAir, 60);
      }
    });
  });
})();
</script>
