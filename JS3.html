<script>
/* ========================================================================
 * [ZETTBOT EMERGENCY PATCH - DASHBOARD DATA & SIDEBAR CLICK]
 * Scope: Client-side only. Tidak mengubah struktur HTML/CSS/database.
 * ======================================================================== */
(function () {
  'use strict';

  var CACHE_KEY = 'ZETT_MASTER_CACHE_V5';
  var patchState = {
    payload: null,
    loading: false,
    booted: false
  };

  function $(id) {
    return document.getElementById(id);
  }

  function cleanNumber(value) {
    if (value === null || value === undefined) return 0;
    if (typeof value === 'number') return isFinite(value) ? value : 0;
    var s = String(value).replace(/[^0-9,.-]/g, '').replace(/\./g, '').replace(',', '.');
    var n = parseFloat(s);
    return isFinite(n) ? n : 0;
  }

  function money(value) {
    if (typeof formatRupiah === 'function') return formatRupiah(cleanNumber(value));
    return 'Rp ' + Math.round(cleanNumber(value)).toLocaleString('id-ID');
  }

  function setText(id, value) {
    var el = $(id);
    if (el) el.innerText = value;
  }

  function openSidebarMobile() {
    var sidebar = $('sidebar');
    var overlay = $('sidebarOverlay');
    if (!sidebar || !overlay) return;

    overlay.classList.remove('hidden');
    sidebar.classList.remove('-translate-x-full');
    document.body.classList.add('sidebar-mobile-open');

    window.requestAnimationFrame(function () {
      overlay.classList.add('sidebar-overlay-active');
    });
  }

  function closeSidebarMobile() {
    var sidebar = $('sidebar');
    var overlay = $('sidebarOverlay');
    if (!sidebar || !overlay) return;

    sidebar.classList.add('-translate-x-full');
    overlay.classList.remove('sidebar-overlay-active');
    document.body.classList.remove('sidebar-mobile-open');

    window.clearTimeout(window.__sidebarOverlayCloseTimer);
    window.__sidebarOverlayCloseTimer = window.setTimeout(function () {
      if (sidebar.classList.contains('-translate-x-full')) overlay.classList.add('hidden');
    }, 220);
  }

  function setActiveMenu(tabName) {
    var buttons = document.querySelectorAll('.nav-btn');
    for (var j = 0; j < buttons.length; j++) {
      buttons[j].classList.remove('bg-gradient-to-r', 'from-blue-600', 'to-indigo-600', 'shadow-lg', 'shadow-indigo-900/30', 'text-white', 'font-bold');
      buttons[j].classList.add('text-slate-400', 'hover:bg-white/5', 'hover:text-slate-100', 'font-semibold');
    }

    var active = $('nav-' + tabName);
    if (active) {
      active.classList.add('bg-gradient-to-r', 'from-blue-600', 'to-indigo-600', 'shadow-lg', 'shadow-indigo-900/30', 'text-white', 'font-bold');
      active.classList.remove('text-slate-400');
    }
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function getPayloadFromMemory() {
    try {
      if (typeof APP_STATE !== 'undefined' && APP_STATE && APP_STATE.data && APP_STATE.data.master && APP_STATE.data.master.status === 'success') {
        patchState.payload = APP_STATE.data.master;
        return patchState.payload;
      }
    } catch (e1) {}

    if (patchState.payload && patchState.payload.status === 'success') return patchState.payload;

    try {
      var cached = localStorage.getItem(CACHE_KEY);
      if (cached) {
        var parsed = JSON.parse(cached);
        if (parsed && parsed.data && parsed.data.status === 'success') {
          patchState.payload = parsed.data;
          return patchState.payload;
        }
      }
    } catch (e2) {
      console.warn('[ZETTBOT PATCH] Cache lokal tidak valid:', e2);
    }

    return null;
  }

  function commitPayload(data) {
    if (!data || data.status !== 'success') return false;

    patchState.payload = data;

    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify({
        data: data,
        expiry: Date.now() + 300000
      }));
    } catch (e) {
      console.warn('[ZETTBOT PATCH] Gagal menulis cache:', e);
    }

    try {
      if (typeof APP_STATE !== 'undefined' && APP_STATE && APP_STATE.data) APP_STATE.data.master = data;
    } catch (e0) {}

    try {
      if (typeof masterDataCabang !== 'undefined') {
        masterDataCabang = (data.kapasitas || []).map(function (item) {
          if (typeof window.normalizeKapasitasRow === 'function') return window.normalizeKapasitasRow(item);
          item.namaOutlet = item.namaOutlet || item.namaLaundry || item['Nama Outlet'] || item['Nama Cabang/Outlet'] || 'Unknown';
          item.kategori = item.kategori || item.kategoriLaundry || item['Kategori Laundry'] || 'Drop Off/Kiloan';
          return item;
        });
      }
    } catch (e1) {}

    try {
      if (typeof masterDataHPP !== 'undefined') masterDataHPP = data.hpp || [];
    } catch (e2) {}

    try {
      if (typeof dashboardRawData !== 'undefined') dashboardRawData = data.transactions || [];
    } catch (e3) {}

    try {
      if (typeof hasLoadedInitialData !== 'undefined') hasLoadedInitialData = true;
    } catch (e4) {}

    return true;
  }

  window.zettCommitPayload = commitPayload;

  function getOutlets() {
    var payload = getPayloadFromMemory();
    var list = [];

    if (payload && Array.isArray(payload.kapasitas)) {
      list = payload.kapasitas.map(function (item) {
        var clone = {};
        for (var key in item) clone[key] = item[key];
        if (typeof window.normalizeKapasitasRow === 'function') return window.normalizeKapasitasRow(clone);
        clone.namaOutlet = clone.namaOutlet || clone.namaLaundry || clone['Nama Outlet'] || clone['Nama Cabang/Outlet'] || 'Unknown';
        clone.kategori = clone.kategori || clone.kategoriLaundry || clone['Kategori Laundry'] || 'Drop Off/Kiloan';
        return clone;
      });
    }

    if (list.length === 0) {
      try {
        if (typeof masterDataCabang !== 'undefined' && Array.isArray(masterDataCabang)) {
          list = masterDataCabang.map(function (item) {
            if (typeof window.normalizeKapasitasRow === 'function') return window.normalizeKapasitasRow(item);
            item.namaOutlet = item.namaOutlet || item.namaLaundry || item['Nama Outlet'] || item['Nama Cabang/Outlet'] || 'Unknown';
            item.kategori = item.kategori || item.kategoriLaundry || item['Kategori Laundry'] || 'Drop Off/Kiloan';
            return item;
          });
        }
      } catch (e) {}
    }

    return list;
  }

  function getTransactions() {
    var payload = getPayloadFromMemory();
    if (payload && Array.isArray(payload.transactions)) return payload.transactions;
    try {
      if (typeof dashboardRawData !== 'undefined' && Array.isArray(dashboardRawData)) return dashboardRawData;
    } catch (e) {}
    return [];
  }

  function getSelectedOutletName() {
    var v1 = $('v1-global-outlet');
    var global = $('inputNamaHPP');
    if (v1 && v1.value) return v1.value;
    if (global && global.value) return global.value;
    var outlets = getOutlets();
    return outlets.length ? outlets[0].namaOutlet : '';
  }

  function syncSelectors(selectedName) {
    var outlets = getOutlets();
    var html = '';

    if (outlets.length === 0) {
      html = '<option value="">Belum ada data outlet</option>';
    } else {
      html = '<option value="">Pilih Cabang...</option>';
      outlets.forEach(function (outlet) {
        var name = outlet.namaOutlet || 'Unknown';
        html += '<option value="' + escapeHtml(name) + '">' + escapeHtml(name) + '</option>';
      });
    }

    var selectIds = ['inputNamaHPP', 'v1-global-outlet'];
    selectIds.forEach(function (id) {
      var el = $(id);
      if (!el) return;
      var current = id === 'inputNamaHPP' ? (el.value || '') : (selectedName || el.value || '');
      el.innerHTML = html;
      if (current) el.value = current;
      if (id !== 'inputNamaHPP' && !el.value && outlets.length > 0) el.value = outlets[0].namaOutlet;
      if (id === 'inputNamaHPP' && !el.value && typeof resetHPPDashboardToZero === 'function') resetHPPDashboardToZero();
    });
  }

  function renderEmptyDashboard(message) {
    setText('v1-val-margin', 'Rp 0');
    setText('v1-sub-margin', message || 'Data belum tersedia');
    setText('v1-val-vol', '0%');
    setText('v1-sub-vol', 'Pencapaian target belum tersedia');
    setText('v1-val-profit', 'Rp 0');
    setText('v1-sub-profit', 'Estimasi belum tersedia');
    setText('v1-gauge-pct', '0%');
    setText('v1-donut-total', 'Rp 0');

    var gauge = $('v1-gauge-path');
    if (gauge) gauge.style.strokeDashoffset = '141.37';

    var donut = $('v1-donut-el');
    if (donut) donut.style.setProperty('--val-var', '0%');

    var tbody = $('v1-table-body');
    if (tbody) {
      tbody.innerHTML = '<tr><td colspan="4" style="padding:1rem; text-align:center; color:#64748b; font-weight:700;">' + (message || 'Data belum tersedia') + '</td></tr>';
    }
  }

  window.renderSingleOutletDashboard = function () {
    try {
      var selected = getSelectedOutletName();
      syncSelectors(selected);

      if (!selected) {
        renderEmptyDashboard('Silakan pilih outlet.');
        return;
      }

      var transactions = getTransactions();
      var row = null;
      for (var i = 0; i < transactions.length; i++) {
        var itemName = transactions[i].nama || transactions[i].namaOutlet || transactions[i].Nama_Outlet || transactions[i]['Nama Outlet'];
        if (String(itemName || '').trim().toLowerCase() === String(selected).trim().toLowerCase()) {
          row = transactions[i];
          break;
        }
      }

      if (!row) {
        renderEmptyDashboard('Data BEP/HPP untuk outlet ini belum tersimpan.');
        return;
      }

      var hpp = cleanNumber(row.hpp || row.HPP_Per_Kg || row.hppPerKg);
      var bepKg = cleanNumber(row.bepKg || row.BEP_Kg);
      var bepRupiah = cleanNumber(row.bepRupiah || row.BEP_Rupiah);
      var biayaTetap = cleanNumber(row.biayaTetap || row.Biaya_Tetap);
      var biayaVariabel = cleanNumber(row.biayaVariabel || row.Biaya_Variabel_Per_Kg || hpp);
      var kapasitas = cleanNumber(row.kapasitas || row.Kapasitas_Per_Bulan);
      var hargaAcuan = cleanNumber(row.hargaAcuan || row.Harga_Acuan_BEP);

      var margin = hargaAcuan - hpp;
      var achievement = bepKg > 0 ? Math.min((kapasitas / bepKg) * 100, 999) : 0;
      var profit = (hargaAcuan * kapasitas) - (biayaVariabel * kapasitas) - biayaTetap;
      var varPct = (biayaTetap + (biayaVariabel * Math.max(kapasitas, 1))) > 0 ? ((biayaVariabel * Math.max(kapasitas, 1)) / (biayaTetap + (biayaVariabel * Math.max(kapasitas, 1)))) * 100 : 0;

      setText('v1-val-margin', money(margin));
      setText('v1-sub-margin', margin >= 0 ? 'Margin positif / kg' : 'Margin negatif / kg');
      setText('v1-val-vol', achievement.toFixed(0) + '%');
      setText('v1-sub-vol', 'Kapasitas vs target BEP');
      setText('v1-val-profit', money(profit));
      setText('v1-sub-profit', profit >= 0 ? 'Estimasi laba bersih' : 'Estimasi defisit');
      setText('v1-gauge-pct', achievement.toFixed(0) + '%');
      setText('v1-donut-total', money(hpp));

      var gauge = $('v1-gauge-path');
      if (gauge) {
        var offset = 141.37 - (141.37 * Math.min(achievement, 100) / 100);
        gauge.style.strokeDashoffset = String(offset);
        gauge.style.stroke = achievement >= 100 ? '#10b981' : '#6366f1';
      }

      var donut = $('v1-donut-el');
      if (donut) donut.style.setProperty('--val-var', Math.max(0, Math.min(varPct, 100)).toFixed(1) + '%');

      var tbody = $('v1-table-body');
      if (tbody) {
        tbody.innerHTML = '' +
          '<tr><td>HPP / Kg</td><td class="td-right">' + money(hpp) + '</td><td class="td-right">-</td><td class="td-right">-</td></tr>' +
          '<tr><td>Target BEP</td><td class="td-right">' + money(bepRupiah) + '</td><td class="td-right">' + bepKg.toLocaleString('id-ID') + ' Kg</td><td class="td-right">100%</td></tr>' +
          '<tr><td>Kapasitas Bulanan</td><td class="td-right">-</td><td class="td-right">' + kapasitas.toLocaleString('id-ID') + ' Kg</td><td class="td-right">' + achievement.toFixed(1) + '%</td></tr>' +
          '<tr><td>Estimasi Laba</td><td class="td-right">' + money(profit) + '</td><td class="td-right">-</td><td class="td-right">-</td></tr>';
      }
    } catch (error) {
      console.error('[ZETTBOT PATCH] renderSingleOutletDashboard error:', error);
      renderEmptyDashboard('Dashboard gagal dirender.');
    }
  };

  window.toggleSidebar = function () {
    var sidebar = $('sidebar');
    if (!sidebar) return;

    if (sidebar.classList.contains('-translate-x-full')) {
      openSidebarMobile();
    } else {
      closeSidebarMobile();
    }
  };

  window.openSidebar = openSidebarMobile;
  window.closeSidebarMobile = closeSidebarMobile;
  window.setActiveMenu = setActiveMenu;

  window.switchMainTab = function (tab) {
    try {
      var requestedTab = tab || 'dashboard';
      var target = $('view-' + requestedTab);

      // [ZETTBOT HOTFIX: SAFE NAVIGATION]
      // Jangan sembunyikan view lama sebelum target benar-benar ditemukan.
      // Kasus "Proyeksi ROI" belum memiliki view-roi di Index, sehingga sebelumnya layar bisa menjadi kosong.
      if (!target) {
        console.warn('[ZETTBOT PATCH] View tidak ditemukan:', 'view-' + requestedTab);
        requestedTab = 'dashboard';
        target = $('view-dashboard');
        if (!target) return;
      }

      setActiveMenu(requestedTab);
      if (window.innerWidth < 768) closeSidebarMobile();

      var views = document.querySelectorAll('.main-view');
      for (var i = 0; i < views.length; i++) {
        views[i].classList.add('hidden');
        views[i].classList.remove('block');
        views[i].style.display = 'none';
      }

      target.classList.remove('hidden');
      target.classList.add('block');
      target.style.display = 'block';
      target.style.visibility = 'visible';
      target.style.opacity = '1';

      // [ZETTBOT HOTFIX: PROFIL OPERASIONAL]
      // View kapasitas punya 2 layer internal: dashboard dan form.
      // Pastikan minimal dashboard outlet tampil saat tab Profil Operasional dibuka.
      if (requestedTab === 'kapasitas') {
        var kapasitasDashboard = $('kapasitas-dashboard');
        var kapasitasForm = $('kapasitas-form-container');

        if (kapasitasDashboard) {
          kapasitasDashboard.classList.remove('hidden');
          kapasitasDashboard.style.display = 'flex';
          kapasitasDashboard.style.visibility = 'visible';
          kapasitasDashboard.style.opacity = '1';
        }

        if (kapasitasForm) {
          kapasitasForm.classList.add('hidden');
          kapasitasForm.style.display = 'none';
        }

        if (typeof applyCabangUIData === 'function') {
          try { applyCabangUIData(); } catch(eApply) { console.error('[ZETTBOT PATCH] applyCabangUIData gagal:', eApply); }
        }

        if (getOutlets().length === 0 && typeof loadDaftarCabang === 'function') {
          try { loadDaftarCabang(false); } catch(eLoad) { console.error('[ZETTBOT PATCH] loadDaftarCabang gagal:', eLoad); }
        }
      }

      var titleMap = {
        dashboard: 'Dashboard Eksekutif',
        kapasitas: 'Profil Operasional',
        hpp: 'Struktur Biaya (HPP)',
        harga: 'Katalog Layanan',
        bep: 'Target Titik Impas (BEP)',
        roi: 'Proyeksi ROI'
      };
      setText('headerTitle', titleMap[requestedTab] || 'Dashboard Eksekutif');

      if (requestedTab === 'dashboard') window.renderSingleOutletDashboard();
      if ((requestedTab === 'bep' || requestedTab === 'roi') && typeof calculateAll === 'function') calculateAll();
      if (requestedTab === 'hpp') {
        var selectHPP = $('inputNamaHPP');
        var selectedHPP = selectHPP ? String(selectHPP.value || '').trim() : '';

        if (!selectedHPP) {
          if (selectHPP) selectHPP.value = '';
          if (typeof resetHPPDashboardToZero === 'function') {
            resetHPPDashboardToZero();
          }
        } else if (typeof populateFormHPP === 'function') {
          populateFormHPP(selectedHPP);
        }
      }
    } catch (error) {
      console.error('[ZETTBOT PATCH] switchMainTab error:', error);
    }
  };

  window.zettForceLoadDashboardData = function () {
    var cached = getPayloadFromMemory();
    if (cached) {
      commitPayload(cached);
      syncSelectors(getSelectedOutletName());
      window.renderSingleOutletDashboard();
    } else {
      syncSelectors('');
      renderEmptyDashboard('Mengambil data outlet dari server...');
    }

    if (patchState.loading) return;
    if (!window.google || !google.script || !google.script.run) {
      renderEmptyDashboard('google.script.run belum tersedia. Pastikan aplikasi dibuka dari deployment Apps Script.');
      return;
    }

    patchState.loading = true;
    google.script.run
      .withSuccessHandler(function (data) {
        patchState.loading = false;
        if (data && data.status === 'success') {
          commitPayload(data);
          syncSelectors(getSelectedOutletName());
          window.renderSingleOutletDashboard();
        } else {
          console.error('[ZETTBOT PATCH] Payload gagal:', data);
          renderEmptyDashboard(data && data.message ? data.message : 'Server belum mengirim data.');
        }
      })
      .withFailureHandler(function (err) {
        patchState.loading = false;
        console.error('[ZETTBOT PATCH] google.script.run gagal:', err);
        renderEmptyDashboard((err && err.message) ? err.message : 'Gagal mengambil data dari server.');
      })
      .getZettBotInitialPayload(true);
  };

  window.loadDaftarCabang = function (forceFresh) {
    if (
      typeof window.zettLoadDaftarCabangProfil === 'function' &&
      document.getElementById('tableDaftarOutlet')
    ) {
      return window.zettLoadDaftarCabangProfil(forceFresh === true);
    }

    window.zettForceLoadDashboardData();
  };

  function bootPatch() {
    if (patchState.booted) return;
    patchState.booted = true;

    syncSelectors(getSelectedOutletName());
    window.renderSingleOutletDashboard();
    window.zettForceLoadDashboardData();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bootPatch);
  } else {
    setTimeout(bootPatch, 0);
  }
})();
/* ======================= END ZETTBOT EMERGENCY PATCH ======================= */


    /**
     * ==========================================
     * FRONT-END LOGIC: CALCULATIONS & TRANSACTIONS
     * Fase: Ultra-Performance (Debounce Engine & SPA Aggregation)
     * ==========================================
     */

    let state = { hpp: 0, bepKg: 0, bepRupiah: 0, hargaJualAcuan: 0 };

    function calculateMarginDashboard() {
      const hpp = state.hpp;
      if(document.getElementById('dashHPP')) {
          document.getElementById('dashHPP').innerText = formatRupiah(hpp);
      }

      const cards = ['cs', 'cl', 'c', 'ss']; 
      
      cards.forEach(prefix => {
        for (let i = 1; i <= 3; i++) {
          const elPrice = document.getElementById(`${prefix}_price_${i}`);
          if (!elPrice) continue;
          
          const rawPrice = elPrice.value.replace(/\./g, '');
          const price = parseFloat(rawPrice) || 0;
          const margin = price - hpp;
          
          const elMargin = document.getElementById(`${prefix}_margin_${i}`);
          if (elMargin) {
              elMargin.innerText = formatRupiah(margin);
              
              if (margin > 0) {
                elMargin.className = "text-sm font-black text-emerald-500 tabular-nums [font-feature-settings:'tnum']";
              } else {
                elMargin.className = "text-sm font-black text-rose-500 tabular-nums [font-feature-settings:'tnum']";
              }
          }
        }
      });
    }

    let myBepChart = null;
    function updateBEPChart(fixedCost, variableCost, price, bepKg, maxKg) {
      try {
        const canvas = document.getElementById('bepChart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        if (price <= variableCost || price === 0 || !isFinite(bepKg) || bepKg < 0) {
            if (myBepChart) {
                myBepChart.destroy();
                myBepChart = null;
            }
            return;
        }

        let maxLimit = Math.max(bepKg * 1.5, maxKg || 100);
        
        const labels = [
          0, 
          Math.round(bepKg * 0.5), 
          Math.round(bepKg), 
          Math.round(bepKg * 1.25), 
          Math.round(maxLimit)
        ];
        
        const dataFixedCost = labels.map(() => fixedCost);
        const dataTotalCost = labels.map(kg => fixedCost + (variableCost * kg));
        const dataRevenue = labels.map(kg => price * kg);

        if (myBepChart) {
            myBepChart.data.labels = labels;
            myBepChart.data.datasets[0].data = dataRevenue;
            myBepChart.data.datasets[1].data = dataTotalCost;
            myBepChart.data.datasets[2].data = dataFixedCost;
            myBepChart.update();
        } else {
            myBepChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Pendapatan (Revenue)',
                            data: dataRevenue,
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.2
                        },
                        {
                            label: 'Total Biaya (Total Cost)',
                            data: dataTotalCost,
                            borderColor: '#f43f5e',
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            tension: 0.2
                        },
                        {
                            label: 'Biaya Tetap (Fixed Cost)',
                            data: dataFixedCost,
                            borderColor: '#64748b',
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            tension: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    animation: {
                        duration: 400 // Fast animation for better UX during rapid typing
                    },
                    plugins: {
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleFont: { size: 13 },
                            bodyFont: { size: 13 },
                            padding: 12,
                            cornerRadius: 8,
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.parsed.y !== null) {
                                        label += new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(context.parsed.y);
                                    }
                                    return label;
                                }
                            }
                        },
                        legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 8, font: { weight: 'bold' } } }
                    },
                    scales: {
                        x: { title: { display: true, text: 'Volume Cucian (Kg)', font: { weight: 'bold' } }, grid: { display: false } },
                        y: {
                            title: { display: true, text: 'Nominal Rupiah (Rp)', font: { weight: 'bold' } },
                            ticks: {
                                callback: function(value) {
                                    return 'Rp ' + new Intl.NumberFormat('id-ID', {notation: "compact", compactDisplay: "short"}).format(value);
                                }
                            }
                        }
                    }
                }
            });
        }
      } catch (e) {
          console.error("Gagal merender grafik BEP:", e);
      }
    }

    function updateTargetPenjualanTable(biayaTetap, biayaVariabel, operasionalHari, mingguTutup) {
      const tbody = document.getElementById('tableTargetBEP');
      if(!tbody) return;

    let calcAllTimeout;
    function calculateAll() {

      calcAllTimeout = setTimeout(() => {
          _coreCalculateAll();
      }, 80);
    }

    function _coreCalculateAll() {
      try {
        isKapasitasSaved = false; 
        if(typeof toggleActionButtons === "function") toggleActionButtons();
        
        let operasionalMenitPerHari = 0;
        const jamBuka = document.getElementById('inputJamBuka') ? document.getElementById('inputJamBuka').value : '';
        const jamTutup = document.getElementById('inputJamTutup') ? document.getElementById('inputJamTutup').value : '';
        
        if(jamBuka && jamBuka.length === 5 && jamTutup && jamTutup.length === 5) {
          const [bukaH, bukaM] = jamBuka.split(':').map(Number);
          const [tutupH, tutupM] = jamTutup.split(':').map(Number);
          
          if(!isNaN(bukaH) && !isNaN(bukaM) && !isNaN(tutupH) && !isNaN(tutupM)) {
              let menitBuka = bukaH * 60 + bukaM;
              let menitTutup = tutupH * 60 + tutupM;
              
              if (menitTutup < menitBuka) menitTutup += 24 * 60; 
              operasionalMenitPerHari = menitTutup - menitBuka;
              
              const durasiJam = Math.floor(operasionalMenitPerHari / 60);
              const durasiMenit = operasionalMenitPerHari % 60;
              if(document.getElementById('displayDurasi')) document.getElementById('displayDurasi').innerText = `${durasiJam} Jam ${durasiMenit} Menit`;
          } else {
              if(document.getElementById('displayDurasi')) document.getElementById('displayDurasi').innerText = `- Jam - Menit`;
          }
        } else {
          if(document.getElementById('displayDurasi')) document.getElementById('displayDurasi').innerText = `- Jam - Menit`;
        }

        const mingguTutup = document.getElementById('inputMingguTutup') ? document.getElementById('inputMingguTutup').checked : false;
        const operasionalHariPerBulan = mingguTutup ? 26 : 30;
        if(document.getElementById('displayHariOperasional')) document.getElementById('displayHariOperasional').innerText = operasionalHariPerBulan;

        const sewaTahunRaw = document.getElementById('inputSewaTahun') ? document.getElementById('inputSewaTahun').value.replace(/\./g, '') : '0';
        const sewaTahun = parseFloat(sewaTahunRaw) || 0;
        const totalSewaBulan = sewaTahun / 12;
        const sewaHari = totalSewaBulan / operasionalHariPerBulan;
        
        if(document.getElementById('displaySewaBulan')) document.getElementById('displaySewaBulan').innerText = formatRupiah(totalSewaBulan);
        if(document.getElementById('displaySewaHari')) document.getElementById('displaySewaHari').innerText = formatRupiah(sewaHari);

        let totalGaji = 0;
        document.querySelectorAll('.input-gaji').forEach(input => {
            totalGaji += parseFloat(input.value) || 0;
        });
        if(document.getElementById('displayTotalGaji')) document.getElementById('displayTotalGaji').innerText = formatRupiah(totalGaji);

        const targetOkupansiCuci = parseFloat(document.getElementById('inputOkupansiCuci') ? document.getElementById('inputOkupansiCuci').value : 100) || 100;
        const targetOkupansiKering = parseFloat(document.getElementById('inputOkupansiKering') ? document.getElementById('inputOkupansiKering').value : 100) || 100;
        const targetOkupansiSetrika = parseFloat(document.getElementById('inputOkupansiSetrika') ? document.getElementById('inputOkupansiSetrika').value : 100) || 100;

        let totalCuciLoadHari = 0;
        let totalCuciKgHari = 0;
        let totalKeringLoadHari = 0;
        let totalKeringKgHari = 0;
        let totalSetrikaKgHari = 0;

        document.querySelectorAll('.input-mesin-cuci').forEach(row => {
            const unit = parseFloat(row.querySelector('.m-unit').value) || 0;
            const durasi = parseFloat(row.querySelector('.m-durasi').value) || 0;
            const kg = parseFloat(row.querySelector('.m-kg').value) || 0;

            if (durasi > 0 && operasionalMenitPerHari > 0) {
                const siklusMaksimalPerMesin = Math.floor(operasionalMenitPerHari / durasi);
                const totalSiklusSemuaUnit = siklusMaksimalPerMesin * unit;
                totalCuciLoadHari += totalSiklusSemuaUnit;
                totalCuciKgHari += (totalSiklusSemuaUnit * kg);
            }
        });
        
        document.querySelectorAll('.input-mesin-pengering').forEach(row => {
            const unit = parseFloat(row.querySelector('.m-unit').value) || 0;
            const durasi = parseFloat(row.querySelector('.m-durasi').value) || 0;
            const kg = parseFloat(row.querySelector('.m-kg').value) || 0;

            if (durasi > 0 && operasionalMenitPerHari > 0) {
                const siklusMaksimalPerMesin = Math.floor(operasionalMenitPerHari / durasi);
                const totalSiklusSemuaUnit = siklusMaksimalPerMesin * unit;
                totalKeringLoadHari += totalSiklusSemuaUnit;
                totalKeringKgHari += (totalSiklusSemuaUnit * kg);
            }
        });

        document.querySelectorAll('.input-mesin-setrika').forEach(row => {
            const unit = parseFloat(row.querySelector('.m-unit').value) || 0;
            const durasi = parseFloat(row.querySelector('.m-durasi').value) || 0;
            const kg = parseFloat(row.querySelector('.m-kg').value) || 0;

            if (durasi > 0 && operasionalMenitPerHari > 0) {
                const siklusMaksimalPerMesin = Math.floor(operasionalMenitPerHari / durasi);
                totalSetrikaKgHari += (siklusMaksimalPerMesin * unit * kg);
            }
        });

        const estimasiCuciLoadHari = Math.floor(totalCuciLoadHari * (targetOkupansiCuci / 100));
        const estimasiCuciKgHari = totalCuciKgHari * (targetOkupansiCuci / 100);
        const estimasiCuciKgBulan = estimasiCuciKgHari * operasionalHariPerBulan;

        const estimasiKeringLoadHari = Math.floor(totalKeringLoadHari * (targetOkupansiKering / 100));
        const estimasiKeringKgHari = totalKeringKgHari * (targetOkupansiKering / 100);
        const estimasiKeringKgBulan = estimasiKeringKgHari * operasionalHariPerBulan;
        
        const estimasiSetrikaKgHari = totalSetrikaKgHari * (targetOkupansiSetrika / 100);
        const estimasiSetrikaKgBulan = estimasiSetrikaKgHari * operasionalHariPerBulan;

        const hariPerMinggu = mingguTutup ? 6 : 7;
        
        const estimasiCuciKgMinggu = estimasiCuciKgHari * hariPerMinggu;
        const estimasiKeringKgMinggu = estimasiKeringKgHari * hariPerMinggu;
        const estimasiSetrikaKgMinggu = estimasiSetrikaKgHari * hariPerMinggu;
        
        const estimasiCuciLoadMinggu = estimasiCuciLoadHari * hariPerMinggu;
        const estimasiCuciLoadBulan = estimasiCuciLoadHari * operasionalHariPerBulan;
        const estimasiKeringLoadMinggu = estimasiKeringLoadHari * hariPerMinggu;
        const estimasiKeringLoadBulan = estimasiKeringLoadHari * operasionalHariPerBulan;

        const isSelfService = document.getElementById('inputKategori') && document.getElementById('inputKategori').value === 'Self Service';
        const unitText = isSelfService ? 'Load' : 'Kg';

        const arrLabels = ['lblCuciHari', 'lblCuciMinggu', 'lblCuciBulan', 'lblKeringHari', 'lblKeringMinggu', 'lblKeringBulan', 'lblSetrikaHari', 'lblSetrikaMinggu', 'lblSetrikaBulan'];
        arrLabels.forEach(id => {
            const el = document.getElementById(id);
            if(el) {
                let period = id.includes('Hari') ? 'Hari' : (id.includes('Minggu') ? 'Minggu' : 'Bulan');
                el.innerText = `${unitText}/${period}:`;
            }
        });

        if(document.getElementById('rowCuciLoadHari')) document.getElementById('rowCuciLoadHari').style.display = isSelfService ? 'none' : 'flex';
        if(document.getElementById('rowKeringLoadHari')) document.getElementById('rowKeringLoadHari').style.display = isSelfService ? 'none' : 'flex';

        if(document.getElementById('dispCuciLoadHari')) document.getElementById('dispCuciLoadHari').innerText = estimasiCuciLoadHari;
        if(document.getElementById('dispCuciKgHari')) document.getElementById('dispCuciKgHari').innerText = isSelfService ? (estimasiCuciLoadHari + ' ' + unitText) : (estimasiCuciKgHari.toFixed(1) + ' ' + unitText);
        if(document.getElementById('dispCuciKgMinggu')) document.getElementById('dispCuciKgMinggu').innerText = isSelfService ? (estimasiCuciLoadMinggu + ' ' + unitText) : (estimasiCuciKgMinggu.toFixed(1) + ' ' + unitText);
        if(document.getElementById('dispCuciKgBulan')) document.getElementById('dispCuciKgBulan').innerText = isSelfService ? (estimasiCuciLoadBulan + ' ' + unitText) : (estimasiCuciKgBulan.toFixed(1) + ' ' + unitText);

        if(document.getElementById('dispKeringLoadHari')) document.getElementById('dispKeringLoadHari').innerText = estimasiKeringLoadHari;
        if(document.getElementById('dispKeringKgHari')) document.getElementById('dispKeringKgHari').innerText = isSelfService ? (estimasiKeringLoadHari + ' ' + unitText) : (estimasiKeringKgHari.toFixed(1) + ' ' + unitText);
        if(document.getElementById('dispKeringKgMinggu')) document.getElementById('dispKeringKgMinggu').innerText = isSelfService ? (estimasiKeringLoadMinggu + ' ' + unitText) : (estimasiKeringKgMinggu.toFixed(1) + ' ' + unitText);
        if(document.getElementById('dispKeringKgBulan')) document.getElementById('dispKeringKgBulan').innerText = isSelfService ? (estimasiKeringLoadBulan + ' ' + unitText) : (estimasiKeringKgBulan.toFixed(1) + ' ' + unitText);

        if(document.getElementById('dispSetrikaKgHari')) document.getElementById('dispSetrikaKgHari').innerText = estimasiSetrikaKgHari.toFixed(1) + ' ' + unitText;
        if(document.getElementById('dispSetrikaKgMinggu')) document.getElementById('dispSetrikaKgMinggu').innerText = estimasiSetrikaKgMinggu.toFixed(1) + ' ' + unitText;
        if(document.getElementById('dispSetrikaKgBulan')) document.getElementById('dispSetrikaKgBulan').innerText = estimasiSetrikaKgBulan.toFixed(1) + ' ' + unitText;

        const GRAND_TOTAL_KAPASITAS_BULAN = estimasiCuciKgBulan;
        
        const biayaTetapLain = parseFloat(document.getElementById('inputBiayaTetapLain') ? document.getElementById('inputBiayaTetapLain').value : 0) || 0;
        const GRAND_TOTAL_BIAYA_TETAP = totalSewaBulan + totalGaji + biayaTetapLain;
        
        if(document.getElementById('hiddenTotalBiayaTetap')) document.getElementById('hiddenTotalBiayaTetap').value = GRAND_TOTAL_BIAYA_TETAP;
        if(document.getElementById('hiddenTotalKapasitasBulan')) document.getElementById('hiddenTotalKapasitasBulan').value = GRAND_TOTAL_KAPASITAS_BULAN;

        const biayaVariabel = parseFloat(document.getElementById('inputBiayaVariabel') ? document.getElementById('inputBiayaVariabel').value : 0) || 0;

        if (GRAND_TOTAL_KAPASITAS_BULAN > 0) {
          state.hpp = (GRAND_TOTAL_BIAYA_TETAP / GRAND_TOTAL_KAPASITAS_BULAN) + biayaVariabel;
        } else {
          state.hpp = 0;
        }

        calculateMarginDashboard();

        const bepRefId = document.getElementById('bepReference') ? document.getElementById('bepReference').value : '';
        let refPrice = 0;
        if (bepRefId && document.getElementById(bepRefId)) {
          const rawRefPrice = document.getElementById(bepRefId).value.replace(/\./g, '');
          refPrice = parseFloat(rawRefPrice) || 0;
        }
        
        state.hargaJualAcuan = refPrice;
        if(document.getElementById('hiddenHargaJualAcuan')) document.getElementById('hiddenHargaJualAcuan').value = state.hargaJualAcuan;

        const statusText = document.getElementById('displayStatusMargin');
        const marginKontribusi = refPrice - biayaVariabel;
        
        if (marginKontribusi > 0) {
          state.bepKg = GRAND_TOTAL_BIAYA_TETAP / marginKontribusi;
          state.bepRupiah = state.bepKg * refPrice;
          
          if(statusText) {
            statusText.innerText = `*BEP dihitung dinamis menggunakan Harga Acuan: ${formatRupiah(refPrice)}`;
            statusText.classList.remove('text-rose-500');
            statusText.classList.add('text-indigo-600/70');
          }
        } else if (refPrice > 0 && marginKontribusi <= 0) {
          state.bepKg = 0;
          state.bepRupiah = 0;
          if(statusText) {
            statusText.innerText = "⚠️ Harga Acuan BEP Anda terlalu murah (Lebih rendah dari Biaya Variabel). Anda akan rugi terus!";
            statusText.classList.remove('text-indigo-600/70');
            statusText.classList.add('text-rose-500', 'font-bold');
          }
        } else {
          state.bepKg = 0;
          state.bepRupiah = 0;
          if(statusText) statusText.innerText = "*Pilih Target Acuan BEP yang valid.";
        }

        if(document.getElementById('displayBEPKg')) document.getElementById('displayBEPKg').innerText = state.bepKg.toFixed(1) + ' Kg';
        if(document.getElementById('displayBEPRupiah')) document.getElementById('displayBEPRupiah').innerText = formatRupiah(state.bepRupiah);
        
        updateBEPChart(GRAND_TOTAL_BIAYA_TETAP, biayaVariabel, refPrice, state.bepKg, GRAND_TOTAL_KAPASITAS_BULAN);
        updateTargetPenjualanTable(GRAND_TOTAL_BIAYA_TETAP, biayaVariabel, operasionalHariPerBulan, mingguTutup);
        
        const omsetBulan = GRAND_TOTAL_KAPASITAS_BULAN * refPrice;
        const totalBiayaBulan = GRAND_TOTAL_BIAYA_TETAP + (GRAND_TOTAL_KAPASITAS_BULAN * biayaVariabel);
        const labaBersihBulan = omsetBulan - totalBiayaBulan;

        let modalAwalRaw = '0';
        if (document.getElementById('inputModalAwal')) {
            modalAwalRaw = document.getElementById('inputModalAwal').value.replace(/\./g, '');
        }
        const modalAwal = parseFloat(modalAwalRaw) || 0;

        if (document.getElementById('dispRoiModal')) {
            document.getElementById('dispRoiModal').innerText = formatRupiah(modalAwal);
            document.getElementById('dispRoiLaba').innerText = formatRupiah(labaBersihBulan);

            if (labaBersihBulan > 0 && modalAwal > 0) {
                const bulanBalikModal = modalAwal / labaBersihBulan;
                const totalBulan = Math.ceil(bulanBalikModal); 
                
                const tahun = Math.floor(totalBulan / 12);
                const sisaBulan = totalBulan % 12;

                document.getElementById('dispRoiWaktu').innerText = `${totalBulan} Bulan`;
                
                let textTahun = "";
                if (tahun > 0) {
                    textTahun = `${tahun} Tahun`;
                    if (sisaBulan > 0) textTahun += ` ${sisaBulan} Bulan`;
                } else {
                    textTahun = `< 1 Tahun`;
                }

                document.getElementById('dispRoiTahun').innerText = textTahun;
            } else if (labaBersihBulan <= 0) {
                document.getElementById('dispRoiWaktu').innerText = "Rugi";
                document.getElementById('dispRoiTahun').innerText = "Tidak Balik Modal";
            } else {
                document.getElementById('dispRoiWaktu').innerText = "- Bulan";
                document.getElementById('dispRoiTahun').innerText = "-";
            }
        }
      } catch (e) {
         console.error('Error saat calculateAll: ', e);
      }
    }

    { name: 'Setrika Uap Boiler', units: 1, purchasePrice: 0, residualValue: 0, usefulLifeYears: 3, annualMaintenance: 0 },
    { name: 'Setrika Listrik', units: 1, purchasePrice: 0, residualValue: 0, usefulLifeYears: 3, annualMaintenance: 0 },
    { name: 'Mesin/Peralatan Lainnya', units: 1, purchasePrice: 0, residualValue: 0, usefulLifeYears: 3, annualMaintenance: 0 }
  ];

  var state = {
    outletName: '',
    rentStatus: 'Sewa',
    annualRent: 0,
    monthlyRent: 0,
    rentNote: '',
    salaries: [],
    machines: [],
    internetProvider: '',
    internetMonthly: 0,
    internetNote: '',
    others: [],
    totals: {}
  };

  function byId(id) { return document.getElementById(id); }
  function norm(value) { return String(value || '').trim().toLowerCase().replace(/\s+/g, ' '); }
  function selectedOutlet() { return String(byId('inputNamaHPP')?.value || '').trim(); }
  function finite(n) { n = Number(n); return Number.isFinite(n) ? n : 0; }
  function parseSafe(value) {
    if (value === null || value === undefined || value === '') return 0;
    if (typeof value === 'number') return Number.isFinite(value) ? value : 0;
    var raw = String(value).trim().replace(/[^\d,.-]/g, '');
    if (!raw) return 0;
    if (raw.indexOf(',') >= 0 && raw.indexOf('.') >= 0) raw = raw.replace(/\./g, '').replace(',', '.');
    else if (raw.indexOf(',') >= 0) raw = raw.replace(',', '.');
    else raw = raw.replace(/\./g, '');
    var n = Number(raw);
    return Number.isFinite(n) ? n : 0;
  }
  function money(value) {
    var n = Math.round(finite(value));
    if (typeof formatRupiah === 'function') {
      try { return formatRupiah(n); } catch (error) {}
    }
    return 'Rp ' + n.toLocaleString('id-ID');
  }
  function setText(id, value) { var el = byId(id); if (el) el.textContent = value; }
  function setValue(id, value) { var el = byId(id); if (el) el.value = value; }
  function escapeHtml(value) {
    return String(value || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  function formatInputValue(value) { return value ? String(Math.round(finite(value))).replace(/\B(?=(\d{3})+(?!\d))/g, '.') : ''; }

  window.zettMoneyInput = function(input) {
    if (!input) return;
    input.value = formatInputValue(parseSafe(input.value));
  };

  function emptyState(outlet) {
    state = {
      outletName: outlet || '',
      rentStatus: 'Sewa',
      annualRent: 0,
      monthlyRent: 0,
      rentNote: '',
      salaries: [{ name: '', count: 1, salaryPerPerson: 0 }],
      machines: DEFAULT_MACHINES.map(function(item) { return Object.assign({}, item); }),
      internetProvider: '',
      internetMonthly: 0,
      internetNote: '',
      others: [{ name: '', monthlyAmount: 0, note: '' }],
      totals: {}
    };
  }

  function cleanSalary(row) {
    row = row || {};
    var count = Math.max(0, finite(parseSafe(row.count)));
    var salary = Math.max(0, finite(parseSafe(row.salaryPerPerson)));
    return {
      name: String(row.name || row.role || '').trim(),
      count: count,
      salaryPerPerson: salary,
      total: count * salary
    };
  }
  function cleanMachine(row) {
    row = row || {};
    var units = Math.max(0, parseSafe(row.units));
    var purchase = Math.max(0, parseSafe(row.purchasePrice));
    var residual = Math.max(0, parseSafe(row.residualValue));
    var years = Math.max(0, parseSafe(row.usefulLifeYears));
    var maintenance = Math.max(0, parseSafe(row.annualMaintenance));
    var depreciation = years > 0 ? Math.max(0, ((purchase - residual) * units) / (years * 12)) : 0;
    var maintenanceMonthly = maintenance / 12;
    return {
      name: String(row.name || '').trim(),
      units: units,
      purchasePrice: purchase,
      residualValue: residual,
      usefulLifeYears: years,
      annualMaintenance: maintenance,
      depreciationMonthly: depreciation,
      maintenanceMonthly: maintenanceMonthly,
      totalMonthly: depreciation + maintenanceMonthly
    };
  }
  function cleanOther(row) {
    row = row || {};
    return {
      name: String(row.name || '').trim(),
      monthlyAmount: Math.max(0, parseSafe(row.monthlyAmount)),
      note: String(row.note || '').trim()
    };
  }

  function collectFromDom() {
    state.outletName = selectedOutlet();
    state.rentStatus = byId('bepRentStatus')?.value || 'Sewa';
    state.annualRent = parseSafe(byId('inputSewaTahun')?.value);
    state.monthlyRent = state.annualRent > 0 ? state.annualRent / 12 : 0;
    state.rentNote = String(byId('bepRentNote')?.value || '').trim();
    state.internetProvider = String(byId('bepInternetProvider')?.value || '').trim();
    state.internetMonthly = parseSafe(byId('bepInternetMonthly')?.value);
    state.internetNote = String(byId('bepInternetNote')?.value || '').trim();

    state.salaries = Array.from(document.querySelectorAll('#bepSalaryRows .bep-row')).map(function(row) {
      return cleanSalary({
        name: row.querySelector('[data-bep-field="salary-name"]')?.value,
        count: row.querySelector('[data-bep-field="salary-count"]')?.value,
        salaryPerPerson: row.querySelector('[data-bep-field="salary-amount"]')?.value
      });
    });
    state.machines = Array.from(document.querySelectorAll('#bepMachineRows .bep-machine-row')).map(function(row) {
      return cleanMachine({
        name: row.querySelector('[data-bep-field="machine-name"]')?.value,
        units: row.querySelector('[data-bep-field="machine-units"]')?.value,
        purchasePrice: row.querySelector('[data-bep-field="machine-purchase"]')?.value,
        residualValue: row.querySelector('[data-bep-field="machine-residual"]')?.value,
        usefulLifeYears: row.querySelector('[data-bep-field="machine-years"]')?.value,
        annualMaintenance: row.querySelector('[data-bep-field="machine-maintenance"]')?.value
      });
    });
    state.others = Array.from(document.querySelectorAll('#bepOtherRows .bep-other-row')).map(function(row) {
      return cleanOther({
        name: row.querySelector('[data-bep-field="other-name"]')?.value,
        monthlyAmount: row.querySelector('[data-bep-field="other-amount"]')?.value,
        note: row.querySelector('[data-bep-field="other-note"]')?.value
      });
    });
  }

  function calculateTotals() {
    state.monthlyRent = state.annualRent > 0 ? state.annualRent / 12 : 0;
    state.salaries = (state.salaries || []).map(cleanSalary);
    state.machines = (state.machines || []).map(cleanMachine);
    state.others = (state.others || []).map(cleanOther);

    var salaryTotal = state.salaries.reduce(function(sum, row) { return sum + finite(row.total); }, 0);
    var depreciationTotal = state.machines.reduce(function(sum, row) { return sum + finite(row.depreciationMonthly); }, 0);
    var maintenanceTotal = state.machines.reduce(function(sum, row) { return sum + finite(row.maintenanceMonthly); }, 0);
    var machineTotal = state.machines.reduce(function(sum, row) { return sum + finite(row.totalMonthly); }, 0);
    var otherTotal = state.others.reduce(function(sum, row) { return sum + finite(row.monthlyAmount); }, 0);
    var internetTotal = finite(state.internetMonthly);
    var fixedTotal = finite(state.monthlyRent) + salaryTotal + machineTotal + internetTotal + otherTotal;

    state.totals = {
      salaryTotal: salaryTotal,
      depreciationTotal: depreciationTotal,
      maintenanceTotal: maintenanceTotal,
      machineTotal: machineTotal,
      internetTotal: internetTotal,
      otherTotal: otherTotal,
      fixedTotal: fixedTotal
    };
    return state.totals;
  }

  function syncLegacyInputs() {
    var totals = calculateTotals();
    setValue('inputSewaTahun', formatInputValue(state.annualRent));
    setValue('inputBiayaTetapLain', Math.round(totals.machineTotal + totals.internetTotal + totals.otherTotal));
    setValue('hiddenTotalBiayaTetap', Math.round(totals.fixedTotal));
  }

  function renderSalaryRows() {
    var wrap = byId('bepSalaryRows');
    if (!wrap) return;
    wrap.innerHTML = (state.salaries || []).map(function(row, idx) {
      row = cleanSalary(row);
      return '<div class="bep-row" data-index="' + idx + '">' +
        '<input class="bep-input" data-bep-field="salary-name" placeholder="Nama/Jabatan" value="' + escapeHtml(row.name) + '" oninput="zettBEPFixedChange()">' +
        '<input class="bep-input" data-bep-field="salary-count" inputmode="numeric" placeholder="Orang" value="' + escapeHtml(row.count || '') + '" oninput="zettBEPFixedChange()">' +
        '<input class="bep-input" data-bep-field="salary-amount" inputmode="numeric" placeholder="Gaji/orang" value="' + escapeHtml(formatInputValue(row.salaryPerPerson)) + '" oninput="zettMoneyInput(this); zettBEPFixedChange()">' +
        '<div class="bep-mini-total">' + money(row.total) + '</div>' +
        '<button type="button" class="bep-icon-btn" onclick="zettRemoveBEPSalaryRow(' + idx + ')"><i class="ph ph-trash"></i></button>' +
        '<input type="hidden" class="input-gaji" value="' + Math.round(row.total) + '">' +
      '</div>';
    }).join('');
  }

  function renderMachineRows() {
    var wrap = byId('bepMachineRows');
    if (!wrap) return;
    wrap.innerHTML = (state.machines || []).map(function(row, idx) {
      row = cleanMachine(row);
      return '<div class="bep-machine-row" data-index="' + idx + '">' +
        '<input class="bep-input" data-bep-field="machine-name" placeholder="Nama mesin" value="' + escapeHtml(row.name) + '" oninput="zettBEPFixedChange()">' +
        '<input class="bep-input" data-bep-field="machine-units" inputmode="numeric" placeholder="Unit" value="' + escapeHtml(row.units || '') + '" oninput="zettBEPFixedChange()">' +
        '<input class="bep-input" data-bep-field="machine-purchase" inputmode="numeric" placeholder="Harga/unit" value="' + escapeHtml(formatInputValue(row.purchasePrice)) + '" oninput="zettMoneyInput(this); zettBEPFixedChange()">' +
        '<input class="bep-input" data-bep-field="machine-residual" inputmode="numeric" placeholder="Residu/unit" value="' + escapeHtml(formatInputValue(row.residualValue)) + '" oninput="zettMoneyInput(this); zettBEPFixedChange()">' +
        '<input class="bep-input" data-bep-field="machine-years" inputmode="decimal" placeholder="Tahun" value="' + escapeHtml(row.usefulLifeYears || '') + '" oninput="zettBEPFixedChange()">' +
        '<div class="bep-mini-total">' + money(row.depreciationMonthly) + '</div>' +
        '<input class="bep-input" data-bep-field="machine-maintenance" inputmode="numeric" placeholder="Rawat/tahun" value="' + escapeHtml(formatInputValue(row.annualMaintenance)) + '" oninput="zettMoneyInput(this); zettBEPFixedChange()">' +
        '<div class="bep-mini-total">' + money(row.totalMonthly) + '</div>' +
        '<button type="button" class="bep-icon-btn" onclick="zettRemoveBEPMachineRow(' + idx + ')"><i class="ph ph-trash"></i></button>' +
      '</div>';
    }).join('');
  }

  function renderOtherRows() {
    var wrap = byId('bepOtherRows');
    if (!wrap) return;
    wrap.innerHTML = (state.others || []).map(function(row, idx) {
      row = cleanOther(row);
      return '<div class="bep-other-row" data-index="' + idx + '">' +
        '<input class="bep-input" data-bep-field="other-name" placeholder="Nama biaya" value="' + escapeHtml(row.name) + '" oninput="zettBEPFixedChange()">' +
        '<input class="bep-input" data-bep-field="other-amount" inputmode="numeric" placeholder="Nominal/bulan" value="' + escapeHtml(formatInputValue(row.monthlyAmount)) + '" oninput="zettMoneyInput(this); zettBEPFixedChange()">' +
        '<input class="bep-input" data-bep-field="other-note" placeholder="Catatan" value="' + escapeHtml(row.note) + '" oninput="zettBEPFixedChange()">' +
        '<button type="button" class="bep-icon-btn" onclick="zettRemoveBEPOtherRow(' + idx + ')"><i class="ph ph-trash"></i></button>' +
      '</div>';
    }).join('');
  }

  function renderAll() {
    calculateTotals();
    if (byId('bepRentStatus')) byId('bepRentStatus').value = state.rentStatus || 'Sewa';
    setValue('bepRentNote', state.rentNote || '');
    setValue('inputSewaTahun', formatInputValue(state.annualRent));
    setValue('bepInternetProvider', state.internetProvider || '');
    setValue('bepInternetMonthly', formatInputValue(state.internetMonthly));
    setValue('bepInternetNote', state.internetNote || '');
    renderSalaryRows();
    renderMachineRows();
    renderOtherRows();
    updateDisplays();
  }

  function updateDisplays() {
    var totals = calculateTotals();
    syncLegacyInputs();
    setText('displaySewaBulan', money(state.monthlyRent));
    var hari = byId('inputMingguTutup') && byId('inputMingguTutup').checked ? 26 : 30;
    setText('displaySewaHari', money(state.monthlyRent / Math.max(hari, 1)));
    setText('displayTotalGaji', money(totals.salaryTotal));
    setText('bepSalaryTotal', money(totals.salaryTotal) + ' / bulan');
    setText('bepMachineTotal', money(totals.machineTotal) + ' / bulan');
    setText('bepInternetTotal', money(totals.internetTotal) + ' / bulan');
    setText('bepOtherTotal', money(totals.otherTotal) + ' / bulan');
    setText('bepFixedGrandTotal', money(totals.fixedTotal));
    setText('bepSummaryRent', money(state.monthlyRent));
    setText('bepSummarySalary', money(totals.salaryTotal));
    setText('bepSummaryMachine', money(totals.machineTotal));
    setText('bepSummaryInternet', money(totals.internetTotal));
    setText('bepSummaryOther', money(totals.otherTotal));
  }

  function scheduleCalc() {
    updateDisplays();
    if (typeof window.calculateAll === 'function') {
      window.clearTimeout(window.__bepFixedCalcTimer);
      window.__bepFixedCalcTimer = window.setTimeout(function() {
        try { window.calculateAll(); } catch (error) {}
      }, 40);
    }
  }

  window.zettBEPFixedChange = function() {
    collectFromDom();
    document.querySelectorAll('#bepSalaryRows .bep-row').forEach(function(row, index) {
      var total = state.salaries[index] ? state.salaries[index].total : 0;
      var totalEl = row.querySelector('.bep-mini-total');
      var hidden = row.querySelector('.input-gaji');
      if (totalEl) totalEl.textContent = money(total);
      if (hidden) hidden.value = Math.round(total);
    });
    document.querySelectorAll('#bepMachineRows .bep-machine-row').forEach(function(row, index) {
      var item = state.machines[index] || {};
      var totals = row.querySelectorAll('.bep-mini-total');
      if (totals[0]) totals[0].textContent = money(item.depreciationMonthly || 0);
      if (totals[1]) totals[1].textContent = money(item.totalMonthly || 0);
    });
    scheduleCalc();
  };
  window.zettAddBEPSalaryRow = window.addKaryawan = function() {
    if (!state.salaries) emptyState(selectedOutlet());
    collectFromDom();
    state.salaries.push({ name: '', count: 1, salaryPerPerson: 0 });
    renderAll();
    scheduleCalc();
  };
  window.zettRemoveBEPSalaryRow = function(index) {
    collectFromDom();
    state.salaries.splice(index, 1);
    if (!state.salaries.length) state.salaries.push({ name: '', count: 1, salaryPerPerson: 0 });
    renderAll();
    scheduleCalc();
  };
  window.zettAddBEPMachineRow = function() {
    collectFromDom();
    state.machines.push({ name: '', units: 1, purchasePrice: 0, residualValue: 0, usefulLifeYears: 3, annualMaintenance: 0 });
    renderAll();
    scheduleCalc();
  };
  window.zettRemoveBEPMachineRow = function(index) {
    collectFromDom();
    state.machines.splice(index, 1);
    if (!state.machines.length) state.machines.push({ name: '', units: 1, purchasePrice: 0, residualValue: 0, usefulLifeYears: 3, annualMaintenance: 0 });
    renderAll();
    scheduleCalc();
  };
  window.zettAddBEPOtherRow = function() {
    collectFromDom();
    state.others.push({ name: '', monthlyAmount: 0, note: '' });
    renderAll();
    scheduleCalc();
  };
  window.zettRemoveBEPOtherRow = function(index) {
    collectFromDom();
    state.others.splice(index, 1);
    if (!state.others.length) state.others.push({ name: '', monthlyAmount: 0, note: '' });
    renderAll();
    scheduleCalc();
  };

  function applyServerData(data, outlet) {
    emptyState(outlet);
    if (data) {
      state.outletName = data.namaOutlet || data['Nama Outlet'] || outlet || '';
      state.rentStatus = data.statusSewa || data['Status Sewa'] || 'Sewa';
      state.annualRent = parseSafe(data.biayaSewaTahunan || data['Biaya Sewa Tahunan']);
      state.monthlyRent = parseSafe(data.biayaSewaBulanan || data['Biaya Sewa Bulanan']) || (state.annualRent / 12);
      state.rentNote = data.catatanSewa || data.catatan || data['Catatan'] || '';
      state.salaries = Array.isArray(data.detailGaji) ? data.detailGaji : state.salaries;
      state.machines = Array.isArray(data.detailMesin) ? data.detailMesin : state.machines;
      state.internetProvider = data.providerInternet || data['Provider Internet'] || '';
      state.internetMonthly = parseSafe(data.biayaInternetBulanan || data['Biaya Internet Bulanan']);
      state.internetNote = data.catatanInternet || '';
      state.others = Array.isArray(data.detailLainLain) ? data.detailLainLain : state.others;
    }
    renderAll();
    scheduleCalc();
  }

  window.zettLoadBEPFixedCost = function(outletName) {
    var outlet = String(outletName || selectedOutlet()).trim();
    if (!outlet) {
      emptyState('');
      renderAll();
      scheduleCalc();
      return;
    }
    emptyState(outlet);
    renderAll();
    if (!window.google || !google.script || !google.script.run) return;
    google.script.run
      .withSuccessHandler(function(res) {
        if (norm(selectedOutlet()) !== norm(outlet)) return;
        applyServerData(res && res.data ? res.data : null, outlet);
      })
      .withFailureHandler(function(error) {
        console.error('Gagal load BEP Fixed:', error);
        if (norm(selectedOutlet()) === norm(outlet)) applyServerData(null, outlet);
      })
      .getBEPFixedCost(outlet);
  };

  function buildPayload() {
    collectFromDom();
    calculateTotals();
    return {
      namaOutlet: state.outletName || selectedOutlet(),
      statusSewa: state.rentStatus,
      biayaSewaTahunan: state.annualRent,
      biayaSewaBulanan: state.monthlyRent,
      catatanSewa: state.rentNote,
      detailGaji: state.salaries,
      totalGajiBulanan: state.totals.salaryTotal,
      detailMesin: state.machines,
      totalDepresiasiMesinBulanan: state.totals.depreciationTotal,
      totalCadanganPerawatanMesinBulanan: state.totals.maintenanceTotal,
      totalBiayaMesinBulanan: state.totals.machineTotal,
      providerInternet: state.internetProvider,
      biayaInternetBulanan: state.internetMonthly,
      catatanInternet: state.internetNote,
      detailLainLain: state.others,
      totalLainLainBulanan: state.totals.otherTotal,
      totalFixedCostBulanan: state.totals.fixedTotal,
      catatan: [state.rentNote, state.internetNote].filter(Boolean).join(' | ')
    };
  }
  window.zettBuildBEPFixedPayload = buildPayload;

  var originalSave = window.prosesSimpanBEP;
  window.prosesSimpanBEP = async function() {
    var outlet = selectedOutlet();
    if (!outlet) {
      if (typeof showOmniToast === 'function') showOmniToast('Pilih cabang terlebih dahulu di pojok kanan atas.', 'error');
      return;
    }
    collectFromDom();
    syncLegacyInputs();
    if (window.google && google.script && google.script.run) {
      try { await runServer('saveBEPFixedCost', buildPayload()); } catch (error) { console.error('saveBEPFixedCost gagal:', error); }
    }
    if (typeof originalSave === 'function') return originalSave.apply(this, arguments);
  };

  var originalHandleOutlet = window.handleGlobalOutletChange;
  window.handleGlobalOutletChange = function(value) {
    if (typeof originalHandleOutlet === 'function') originalHandleOutlet.apply(this, arguments);
    window.zettLoadBEPFixedCost(value);
  };

  var originalSwitch = window.switchMainTab;
  window.switchMainTab = function(tabName) {
    document.body.classList.toggle('bep-active', tabName === 'bep');
    var result = typeof originalSwitch === 'function' ? originalSwitch.apply(this, arguments) : undefined;
    if (tabName === 'bep') window.zettLoadBEPFixedCost(selectedOutlet());
    return result;
  };

  function init() {
    emptyState(selectedOutlet());
    renderAll();
    if (selectedOutlet()) window.zettLoadBEPFixedCost(selectedOutlet());
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init, { once: true });
  else init();
})();
</script>
