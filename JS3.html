<script>
/* ========================================================================
 * [ZETTBOT EMERGENCY PATCH - DASHBOARD DATA & SIDEBAR CLICK]
 * Scope: Client-side only. Tidak mengubah struktur HTML/CSS/database.
 * ======================================================================== */
(function () {
  'use strict';

  var CACHE_KEY = 'ZETT_MASTER_CACHE_V5';
  var patchState = {
    payload: null,
    loading: false,
    booted: false
  };

  function $(id) {
    return document.getElementById(id);
  }

  function cleanNumber(value) {
    if (value === null || value === undefined) return 0;
    if (typeof value === 'number') return isFinite(value) ? value : 0;
    var s = String(value).replace(/[^0-9,.-]/g, '').replace(/\./g, '').replace(',', '.');
    var n = parseFloat(s);
    return isFinite(n) ? n : 0;
  }

  function money(value) {
    if (typeof formatRupiah === 'function') return formatRupiah(cleanNumber(value));
    return 'Rp ' + Math.round(cleanNumber(value)).toLocaleString('id-ID');
  }

  function setText(id, value) {
    var el = $(id);
    if (el) el.innerText = value;
  }

  function openSidebarMobile() {
    var sidebar = $('sidebar');
    var overlay = $('sidebarOverlay');
    if (!sidebar || !overlay) return;

    overlay.classList.remove('hidden');
    sidebar.classList.remove('-translate-x-full');
    document.body.classList.add('sidebar-mobile-open');

    window.requestAnimationFrame(function () {
      overlay.classList.add('sidebar-overlay-active');
    });
  }

  function closeSidebarMobile() {
    var sidebar = $('sidebar');
    var overlay = $('sidebarOverlay');
    if (!sidebar || !overlay) return;

    sidebar.classList.add('-translate-x-full');
    overlay.classList.remove('sidebar-overlay-active');
    document.body.classList.remove('sidebar-mobile-open');

    window.clearTimeout(window.__sidebarOverlayCloseTimer);
    window.__sidebarOverlayCloseTimer = window.setTimeout(function () {
      if (sidebar.classList.contains('-translate-x-full')) overlay.classList.add('hidden');
    }, 220);
  }

  function setActiveMenu(tabName) {
    var buttons = document.querySelectorAll('.nav-btn');
    for (var j = 0; j < buttons.length; j++) {
      buttons[j].classList.remove('bg-gradient-to-r', 'from-blue-600', 'to-indigo-600', 'shadow-lg', 'shadow-indigo-900/30', 'text-white', 'font-bold');
      buttons[j].classList.add('text-slate-400', 'hover:bg-white/5', 'hover:text-slate-100', 'font-semibold');
    }

    var active = $('nav-' + tabName);
    if (active) {
      active.classList.add('bg-gradient-to-r', 'from-blue-600', 'to-indigo-600', 'shadow-lg', 'shadow-indigo-900/30', 'text-white', 'font-bold');
      active.classList.remove('text-slate-400');
    }
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function getPayloadFromMemory() {
    try {
      if (typeof APP_STATE !== 'undefined' && APP_STATE && APP_STATE.data && APP_STATE.data.master && APP_STATE.data.master.status === 'success') {
        patchState.payload = APP_STATE.data.master;
        return patchState.payload;
      }
    } catch (e1) {}

    if (patchState.payload && patchState.payload.status === 'success') return patchState.payload;

    try {
      var cached = localStorage.getItem(CACHE_KEY);
      if (cached) {
        var parsed = JSON.parse(cached);
        if (parsed && parsed.data && parsed.data.status === 'success') {
          patchState.payload = parsed.data;
          return patchState.payload;
        }
      }
    } catch (e2) {
      console.warn('[ZETTBOT PATCH] Cache lokal tidak valid:', e2);
    }

    return null;
  }

  function commitPayload(data) {
    if (!data || data.status !== 'success') return false;

    patchState.payload = data;

    try {
      localStorage.setItem(CACHE_KEY, JSON.stringify({
        data: data,
        expiry: Date.now() + 300000
      }));
    } catch (e) {
      console.warn('[ZETTBOT PATCH] Gagal menulis cache:', e);
    }

    try {
      if (typeof APP_STATE !== 'undefined' && APP_STATE && APP_STATE.data) APP_STATE.data.master = data;
    } catch (e0) {}

    try {
      if (typeof masterDataCabang !== 'undefined') {
        masterDataCabang = (data.kapasitas || []).map(function (item) {
          if (typeof window.normalizeKapasitasRow === 'function') return window.normalizeKapasitasRow(item);
          item.namaOutlet = item.namaOutlet || item.namaLaundry || item['Nama Outlet'] || item['Nama Cabang/Outlet'] || 'Unknown';
          item.kategori = item.kategori || item.kategoriLaundry || item['Kategori Laundry'] || 'Drop Off/Kiloan';
          return item;
        });
      }
    } catch (e1) {}

    try {
      if (typeof masterDataHPP !== 'undefined') masterDataHPP = data.hpp || [];
    } catch (e2) {}

    try {
      if (typeof dashboardRawData !== 'undefined') dashboardRawData = data.transactions || [];
    } catch (e3) {}

    try {
      if (typeof hasLoadedInitialData !== 'undefined') hasLoadedInitialData = true;
    } catch (e4) {}

    return true;
  }

  window.zettCommitPayload = commitPayload;

  function getOutlets() {
    var payload = getPayloadFromMemory();
    var list = [];

    if (payload && Array.isArray(payload.kapasitas)) {
      list = payload.kapasitas.map(function (item) {
        var clone = {};
        for (var key in item) clone[key] = item[key];
        if (typeof window.normalizeKapasitasRow === 'function') return window.normalizeKapasitasRow(clone);
        clone.namaOutlet = clone.namaOutlet || clone.namaLaundry || clone['Nama Outlet'] || clone['Nama Cabang/Outlet'] || 'Unknown';
        clone.kategori = clone.kategori || clone.kategoriLaundry || clone['Kategori Laundry'] || 'Drop Off/Kiloan';
        return clone;
      });
    }

    if (list.length === 0) {
      try {
        if (typeof masterDataCabang !== 'undefined' && Array.isArray(masterDataCabang)) {
          list = masterDataCabang.map(function (item) {
            if (typeof window.normalizeKapasitasRow === 'function') return window.normalizeKapasitasRow(item);
            item.namaOutlet = item.namaOutlet || item.namaLaundry || item['Nama Outlet'] || item['Nama Cabang/Outlet'] || 'Unknown';
            item.kategori = item.kategori || item.kategoriLaundry || item['Kategori Laundry'] || 'Drop Off/Kiloan';
            return item;
          });
        }
      } catch (e) {}
    }

    return list;
  }

  function getTransactions() {
    var payload = getPayloadFromMemory();
    if (payload && Array.isArray(payload.transactions)) return payload.transactions;
    try {
      if (typeof dashboardRawData !== 'undefined' && Array.isArray(dashboardRawData)) return dashboardRawData;
    } catch (e) {}
    return [];
  }

  function getSelectedOutletName() {
    var v1 = $('v1-global-outlet');
    var global = $('inputNamaHPP');
    if (v1 && v1.value) return v1.value;
    if (global && global.value) return global.value;
    var outlets = getOutlets();
    return outlets.length ? outlets[0].namaOutlet : '';
  }

  function syncSelectors(selectedName) {
    var outlets = getOutlets();
    var html = '';

    if (outlets.length === 0) {
      html = '<option value="">Belum ada data outlet</option>';
    } else {
      html = '<option value="">Pilih Cabang...</option>';
      outlets.forEach(function (outlet) {
        var name = outlet.namaOutlet || 'Unknown';
        html += '<option value="' + escapeHtml(name) + '">' + escapeHtml(name) + '</option>';
      });
    }

    var selectIds = ['inputNamaHPP', 'v1-global-outlet'];
    selectIds.forEach(function (id) {
      var el = $(id);
      if (!el) return;
      var current = id === 'inputNamaHPP' ? (el.value || '') : (selectedName || el.value || '');
      el.innerHTML = html;
      if (current) el.value = current;
      if (id !== 'inputNamaHPP' && !el.value && outlets.length > 0) el.value = outlets[0].namaOutlet;
      if (id === 'inputNamaHPP' && !el.value && typeof resetHPPDashboardToZero === 'function') resetHPPDashboardToZero();
    });
  }

  function renderEmptyDashboard(message) {
    setText('v1-val-margin', 'Rp 0');
    setText('v1-sub-margin', message || 'Data belum tersedia');
    setText('v1-val-vol', '0%');
    setText('v1-sub-vol', 'Pencapaian target belum tersedia');
    setText('v1-val-profit', 'Rp 0');
    setText('v1-sub-profit', 'Estimasi belum tersedia');
    setText('v1-gauge-pct', '0%');
    setText('v1-donut-total', 'Rp 0');

    var gauge = $('v1-gauge-path');
    if (gauge) gauge.style.strokeDashoffset = '141.37';

    var donut = $('v1-donut-el');
    if (donut) donut.style.setProperty('--val-var', '0%');

    var tbody = $('v1-table-body');
    if (tbody) {
      tbody.innerHTML = '<tr><td colspan="4" style="padding:1rem; text-align:center; color:#64748b; font-weight:700;">' + (message || 'Data belum tersedia') + '</td></tr>';
    }
  }

  window.renderSingleOutletDashboard = function () {
    try {
      var selected = getSelectedOutletName();
      syncSelectors(selected);

      if (!selected) {
        renderEmptyDashboard('Silakan pilih outlet.');
        return;
      }

      var transactions = getTransactions();
      var row = null;
      for (var i = 0; i < transactions.length; i++) {
        var itemName = transactions[i].nama || transactions[i].namaOutlet || transactions[i].Nama_Outlet || transactions[i]['Nama Outlet'];
        if (String(itemName || '').trim().toLowerCase() === String(selected).trim().toLowerCase()) {
          row = transactions[i];
          break;
        }
      }

      if (!row) {
        renderEmptyDashboard('Data BEP/HPP untuk outlet ini belum tersimpan.');
        return;
      }

      var hpp = cleanNumber(row.hpp || row.HPP_Per_Kg || row.hppPerKg);
      var bepKg = cleanNumber(row.bepKg || row.BEP_Kg);
      var bepRupiah = cleanNumber(row.bepRupiah || row.BEP_Rupiah);
      var biayaTetap = cleanNumber(row.biayaTetap || row.Biaya_Tetap);
      var biayaVariabel = cleanNumber(row.biayaVariabel || row.Biaya_Variabel_Per_Kg || hpp);
      var kapasitas = cleanNumber(row.kapasitas || row.Kapasitas_Per_Bulan);
      var hargaAcuan = cleanNumber(row.hargaAcuan || row.Harga_Acuan_BEP);

      var margin = hargaAcuan - hpp;
      var achievement = bepKg > 0 ? Math.min((kapasitas / bepKg) * 100, 999) : 0;
      var profit = (hargaAcuan * kapasitas) - (biayaVariabel * kapasitas) - biayaTetap;
      var varPct = (biayaTetap + (biayaVariabel * Math.max(kapasitas, 1))) > 0 ? ((biayaVariabel * Math.max(kapasitas, 1)) / (biayaTetap + (biayaVariabel * Math.max(kapasitas, 1)))) * 100 : 0;

      setText('v1-val-margin', money(margin));
      setText('v1-sub-margin', margin >= 0 ? 'Margin positif / kg' : 'Margin negatif / kg');
      setText('v1-val-vol', achievement.toFixed(0) + '%');
      setText('v1-sub-vol', 'Kapasitas vs target BEP');
      setText('v1-val-profit', money(profit));
      setText('v1-sub-profit', profit >= 0 ? 'Estimasi laba bersih' : 'Estimasi defisit');
      setText('v1-gauge-pct', achievement.toFixed(0) + '%');
      setText('v1-donut-total', money(hpp));

      var gauge = $('v1-gauge-path');
      if (gauge) {
        var offset = 141.37 - (141.37 * Math.min(achievement, 100) / 100);
        gauge.style.strokeDashoffset = String(offset);
        gauge.style.stroke = achievement >= 100 ? '#10b981' : '#6366f1';
      }

      var donut = $('v1-donut-el');
      if (donut) donut.style.setProperty('--val-var', Math.max(0, Math.min(varPct, 100)).toFixed(1) + '%');

      var tbody = $('v1-table-body');
      if (tbody) {
        tbody.innerHTML = '' +
          '<tr><td>HPP / Kg</td><td class="td-right">' + money(hpp) + '</td><td class="td-right">-</td><td class="td-right">-</td></tr>' +
          '<tr><td>Target BEP</td><td class="td-right">' + money(bepRupiah) + '</td><td class="td-right">' + bepKg.toLocaleString('id-ID') + ' Load</td><td class="td-right">100%</td></tr>' +
          '<tr><td>Kapasitas Bulanan</td><td class="td-right">-</td><td class="td-right">' + kapasitas.toLocaleString('id-ID') + ' Kg</td><td class="td-right">' + achievement.toFixed(1) + '%</td></tr>' +
          '<tr><td>Estimasi Laba</td><td class="td-right">' + money(profit) + '</td><td class="td-right">-</td><td class="td-right">-</td></tr>';
      }
    } catch (error) {
      console.error('[ZETTBOT PATCH] renderSingleOutletDashboard error:', error);
      renderEmptyDashboard('Dashboard gagal dirender.');
    }
  };

  window.toggleSidebar = function () {
    var sidebar = $('sidebar');
    if (!sidebar) return;

    if (sidebar.classList.contains('-translate-x-full')) {
      openSidebarMobile();
    } else {
      closeSidebarMobile();
    }
  };

  window.openSidebar = openSidebarMobile;
  window.closeSidebarMobile = closeSidebarMobile;
  window.setActiveMenu = setActiveMenu;

  window.switchMainTab = function (tab) {
    try {
      var requestedTab = tab || 'dashboard';
      var target = $('view-' + requestedTab);

      // [ZETTBOT HOTFIX: SAFE NAVIGATION]
      // Jangan sembunyikan view lama sebelum target benar-benar ditemukan.
      // Kasus "Proyeksi ROI" belum memiliki view-roi di Index, sehingga sebelumnya layar bisa menjadi kosong.
      if (!target) {
        console.warn('[ZETTBOT PATCH] View tidak ditemukan:', 'view-' + requestedTab);
        requestedTab = 'dashboard';
        target = $('view-dashboard');
        if (!target) return;
      }

      setActiveMenu(requestedTab);
      if (window.innerWidth < 768) closeSidebarMobile();

      var views = document.querySelectorAll('.main-view');
      for (var i = 0; i < views.length; i++) {
        views[i].classList.add('hidden');
        views[i].classList.remove('block');
        views[i].style.display = 'none';
      }

      target.classList.remove('hidden');
      target.classList.add('block');
      target.style.display = 'block';
      target.style.visibility = 'visible';
      target.style.opacity = '1';

      // [ZETTBOT HOTFIX: PROFIL OPERASIONAL]
      // View kapasitas punya 2 layer internal: dashboard dan form.
      // Pastikan minimal dashboard outlet tampil saat tab Profil Operasional dibuka.
      if (requestedTab === 'kapasitas') {
        var kapasitasDashboard = $('kapasitas-dashboard');
        var kapasitasForm = $('kapasitas-form-container');

        if (kapasitasDashboard) {
          kapasitasDashboard.classList.remove('hidden');
          kapasitasDashboard.style.display = 'flex';
          kapasitasDashboard.style.visibility = 'visible';
          kapasitasDashboard.style.opacity = '1';
        }

        if (kapasitasForm) {
          kapasitasForm.classList.add('hidden');
          kapasitasForm.style.display = 'none';
        }

        if (typeof applyCabangUIData === 'function') {
          try { applyCabangUIData(); } catch(eApply) { console.error('[ZETTBOT PATCH] applyCabangUIData gagal:', eApply); }
        }

        if (getOutlets().length === 0 && typeof loadDaftarCabang === 'function') {
          try { loadDaftarCabang(false); } catch(eLoad) { console.error('[ZETTBOT PATCH] loadDaftarCabang gagal:', eLoad); }
        }
      }

      var titleMap = {
        dashboard: 'Dashboard Eksekutif',
        kapasitas: 'Profil Operasional',
        hpp: 'Struktur Biaya (HPP)',
        harga: 'Katalog Layanan',
        bep: 'Target Titik Impas (BEP)',
        roi: 'Proyeksi ROI'
      };
      setText('headerTitle', titleMap[requestedTab] || 'Dashboard Eksekutif');

      if (requestedTab === 'dashboard') window.renderSingleOutletDashboard();
      if ((requestedTab === 'bep' || requestedTab === 'roi') && typeof calculateAll === 'function') calculateAll();
      if (requestedTab === 'hpp') {
        var selectHPP = $('inputNamaHPP');
        var selectedHPP = selectHPP ? String(selectHPP.value || '').trim() : '';

        if (!selectedHPP) {
          if (selectHPP) selectHPP.value = '';
          if (typeof resetHPPDashboardToZero === 'function') {
            resetHPPDashboardToZero();
          }
        } else if (typeof populateFormHPP === 'function') {
          populateFormHPP(selectedHPP);
        }
      }
    } catch (error) {
      console.error('[ZETTBOT PATCH] switchMainTab error:', error);
    }
  };

  window.zettForceLoadDashboardData = function () {
    var cached = getPayloadFromMemory();
    if (cached) {
      commitPayload(cached);
      syncSelectors(getSelectedOutletName());
      window.renderSingleOutletDashboard();
    } else {
      syncSelectors('');
      renderEmptyDashboard('Mengambil data outlet dari server...');
    }

    if (patchState.loading) return;
    if (!window.google || !google.script || !google.script.run) {
      renderEmptyDashboard('google.script.run belum tersedia. Pastikan aplikasi dibuka dari deployment Apps Script.');
      return;
    }

    patchState.loading = true;
    google.script.run
      .withSuccessHandler(function (data) {
        patchState.loading = false;
        if (data && data.status === 'success') {
          commitPayload(data);
          syncSelectors(getSelectedOutletName());
          window.renderSingleOutletDashboard();
        } else {
          console.error('[ZETTBOT PATCH] Payload gagal:', data);
          renderEmptyDashboard(data && data.message ? data.message : 'Server belum mengirim data.');
        }
      })
      .withFailureHandler(function (err) {
        patchState.loading = false;
        console.error('[ZETTBOT PATCH] google.script.run gagal:', err);
        renderEmptyDashboard((err && err.message) ? err.message : 'Gagal mengambil data dari server.');
      })
      .getZettBotInitialPayload(true);
  };

  window.loadDaftarCabang = function (forceFresh) {
    if (
      typeof window.zettLoadDaftarCabangProfil === 'function' &&
      document.getElementById('tableDaftarOutlet')
    ) {
      return window.zettLoadDaftarCabangProfil(forceFresh === true);
    }

    window.zettForceLoadDashboardData();
  };

  function bootPatch() {
    if (patchState.booted) return;
    patchState.booted = true;

    syncSelectors(getSelectedOutletName());
    window.renderSingleOutletDashboard();
    window.zettForceLoadDashboardData();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', bootPatch);
  } else {
    setTimeout(bootPatch, 0);
  }
})();
/* ======================= END ZETTBOT EMERGENCY PATCH ======================= */


    /**
     * ==========================================
     * FRONT-END LOGIC: CALCULATIONS & TRANSACTIONS
     * Fase: Ultra-Performance (Debounce Engine & SPA Aggregation)
     * ==========================================
     */

    let state = { hpp: 0, bepKg: 0, bepRupiah: 0, hargaJualAcuan: 0 };

    function calculateMarginDashboard() {
      const hpp = state.hpp;
      if(document.getElementById('dashHPP')) {
          document.getElementById('dashHPP').innerText = formatRupiah(hpp);
      }

      const cards = ['cs', 'cl', 'c', 'ss']; 
      
      cards.forEach(prefix => {
        for (let i = 1; i <= 3; i++) {
          const elPrice = document.getElementById(`${prefix}_price_${i}`);
          if (!elPrice) continue;
          
          const rawPrice = elPrice.value.replace(/\./g, '');
          const price = parseFloat(rawPrice) || 0;
          const margin = price - hpp;
          
          const elMargin = document.getElementById(`${prefix}_margin_${i}`);
          if (elMargin) {
              elMargin.innerText = formatRupiah(margin);
              
              if (margin > 0) {
                elMargin.className = "text-sm font-black text-emerald-500 tabular-nums [font-feature-settings:'tnum']";
              } else {
                elMargin.className = "text-sm font-black text-rose-500 tabular-nums [font-feature-settings:'tnum']";
              }
          }
        }
      });
    }

    let myBepChart = null;
    function updateBEPChart(fixedCost, variableCost, price, bepKg, maxKg) {
      try {
        const canvas = document.getElementById('bepChart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');

        if (price <= variableCost || price === 0 || !isFinite(bepKg) || bepKg < 0) {
            if (myBepChart) {
                myBepChart.destroy();
                myBepChart = null;
            }
            return;
        }

        let maxLimit = Math.max(bepKg * 1.5, maxKg || 100);
        
        const labels = [
          0, 
          Math.round(bepKg * 0.5), 
          Math.round(bepKg), 
          Math.round(bepKg * 1.25), 
          Math.round(maxLimit)
        ];
        
        const dataFixedCost = labels.map(() => fixedCost);
        const dataTotalCost = labels.map(kg => fixedCost + (variableCost * kg));
        const dataRevenue = labels.map(kg => price * kg);

        if (myBepChart) {
            myBepChart.data.labels = labels;
            myBepChart.data.datasets[0].data = dataRevenue;
            myBepChart.data.datasets[1].data = dataTotalCost;
            myBepChart.data.datasets[2].data = dataFixedCost;
            myBepChart.update();
        } else {
            myBepChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Pendapatan (Revenue)',
                            data: dataRevenue,
                            borderColor: '#10b981',
                            backgroundColor: 'rgba(16, 185, 129, 0.1)',
                            borderWidth: 3,
                            fill: true,
                            tension: 0.2
                        },
                        {
                            label: 'Total Biaya (Total Cost)',
                            data: dataTotalCost,
                            borderColor: '#f43f5e',
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            borderDash: [5, 5],
                            tension: 0.2
                        },
                        {
                            label: 'Biaya Tetap (Fixed Cost)',
                            data: dataFixedCost,
                            borderColor: '#64748b',
                            backgroundColor: 'transparent',
                            borderWidth: 2,
                            tension: 0
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    animation: {
                        duration: 400 // Fast animation for better UX during rapid typing
                    },
                    plugins: {
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            titleFont: { size: 13 },
                            bodyFont: { size: 13 },
                            padding: 12,
                            cornerRadius: 8,
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.parsed.y !== null) {
                                        label += new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(context.parsed.y);
                                    }
                                    return label;
                                }
                            }
                        },
                        legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 8, font: { weight: 'bold' } } }
                    },
                    scales: {
                        x: { title: { display: true, text: 'Volume Cucian (Kg)', font: { weight: 'bold' } }, grid: { display: false } },
                        y: {
                            title: { display: true, text: 'Nominal Rupiah (Rp)', font: { weight: 'bold' } },
                            ticks: {
                                callback: function(value) {
                                    return 'Rp ' + new Intl.NumberFormat('id-ID', {notation: "compact", compactDisplay: "short"}).format(value);
                                }
                            }
                        }
                    }
                }
            });
        }
      } catch (e) {
          console.error("Gagal merender grafik BEP:", e);
      }
    }

    function updateTargetPenjualanTable(biayaTetap, biayaVariabel, operasionalHari, mingguTutup) {
      const tbody = document.getElementById('tableTargetBEP');
      if(!tbody) return;

    function parseBEPNumber(value) {
      if (value === null || value === undefined) return 0;
      if (typeof value === 'number') return Number.isFinite(value) ? value : 0;
      let str = String(value).trim();
      if (!str) return 0;
      str = str
        .replace(/Rp/gi, '')
        .replace(/load/gi, '')
        .replace(/hari/gi, '')
        .replace(/bulan/gi, '')
        .replace(/\//g, '')
        .replace(/\s+/g, '');
      if (str.includes(',')) {
        str = str.replace(/\./g, '').replace(',', '.');
      } else {
        const thousandPattern = /^-?\d{1,3}(\.\d{3})+$/;
        if (thousandPattern.test(str)) str = str.replace(/\./g, '');
      }
      const num = Number(str);
      return Number.isFinite(num) ? num : 0;
    }

    function readBEPFixedCostForKPI() {

    }

      if(document.getElementById('bepKpiMarginNote')) document.getElementById('bepKpiMarginNote').innerText = 'Harga perlu dinaikkan';
      return true;
    }

    function getBEPServiceMixData(sourceMix) {
      let mix = sourceMix || {};
      if (typeof window.zettGetBepSalesMix === 'function') {
        try { mix = sourceMix || window.zettGetBepSalesMix() || {}; } catch (error) { mix = sourceMix || {}; }
      } else if (!sourceMix && window.zettBepSalesMix && typeof window.zettBepSalesMix === 'object') {
        mix = window.zettBepSalesMix;
      }

      return Object.keys(mix || {}).map(key => {
        const item = mix[key] || {};
        const price = parseBEPNumber(item.price);
        const hpp = parseBEPNumber(item.hpp);
        const proporsi = parseBEPNumber(item.proporsi);
        return {
          key,
          active: item.active !== false,
          price: Number.isFinite(price) ? price : 0,
          hpp: Number.isFinite(hpp) ? hpp : 0,
          proporsi: Number.isFinite(proporsi) ? Math.max(0, proporsi) : 0
        };
      }).filter(item => item.active && item.proporsi > 0);
    }

    function calculateBEPWeightedMetrics(fixedCost, sourceMix) {
      fixedCost = Number(fixedCost);
      if (!Number.isFinite(fixedCost) || fixedCost <= 0) fixedCost = 0;
      const services = getBEPServiceMixData(sourceMix);
      const totalProporsi = services.reduce((sum, item) => sum + item.proporsi, 0);
      if (totalProporsi <= 0) return null;

      const totals = services.reduce((sum, item) => {
        const proporsiInternal = item.proporsi / totalProporsi;
        sum.weightedMargin += (item.price - item.hpp) * proporsiInternal;
        sum.weightedPrice += item.price * proporsiInternal;
        return sum;
      }, { weightedMargin: 0, weightedPrice: 0 });

      const volumeExact = totals.weightedMargin > 0 ? fixedCost / totals.weightedMargin : 0;
      const volumeRoundedUp = volumeExact > 0 && Number.isFinite(volumeExact) ? Math.ceil(volumeExact) : 0;
      const revenueBEP = totals.weightedMargin > 0 && totals.weightedPrice > 0 ? volumeRoundedUp * totals.weightedPrice : 0;
      return {
        weightedMargin: totals.weightedMargin,
        weightedPrice: totals.weightedPrice,
        volumeExact,
        volumeRoundedUp,
        revenueBEP
      };
    }

    function calculateBEPKPIFromServiceMix(fixedCost, sourceMix) {
      return calculateBEPWeightedMetrics(fixedCost, sourceMix);
    }

    function getBEPOperatingDays() {
      const shown = parseBEPNumber(document.getElementById('displayHariOperasional')?.innerText);
      if (Number.isFinite(shown) && shown > 0) return shown;
      if (document.getElementById('inputMingguTutup')) return document.getElementById('inputMingguTutup').checked ? 26 : 30;
      return 30;
    }

    function getBEPBaseMetrics(sourceMix) {
      if (!isBEPOutletSelectedForKPI()) {
        bepBaseMetricsCache = null;
        window.__BEP_WEIGHTED_METRICS__ = null;
        return null;
      }
      const fixedCost = readBEPFixedCostForKPI();
      const weighted = calculateBEPWeightedMetrics(fixedCost, sourceMix);
      if (!weighted) {
        bepBaseMetricsCache = null;
        window.__BEP_WEIGHTED_METRICS__ = null;
        return null;
      }
      bepBaseMetricsCache = {
        fixedCost,
        weightedContributionMargin: Number.isFinite(weighted.weightedMargin) ? weighted.weightedMargin : 0,
        weightedAveragePrice: Number.isFinite(weighted.weightedPrice) ? weighted.weightedPrice : 0,
        volumeMinimalBEPExact: Number.isFinite(weighted.volumeExact) ? weighted.volumeExact : 0,
        volumeMinimalBEPDisplay: Number.isFinite(weighted.volumeRoundedUp) ? weighted.volumeRoundedUp : 0,
        omzetMinimalBEP: Number.isFinite(weighted.revenueBEP) ? weighted.revenueBEP : 0,
        operatingDays: getBEPOperatingDays()
      };
      window.__BEP_WEIGHTED_METRICS__ = Object.assign({}, bepBaseMetricsCache);
      return bepBaseMetricsCache;
    }

    function calculateBEPDailyTargets(metrics) {
      metrics = metrics || bepBaseMetricsCache || getBEPBaseMetrics();
      const days = Math.max(1, Number(metrics && metrics.operatingDays) || 30);
      const volume = Math.max(0, Number(metrics && metrics.volumeMinimalBEPDisplay) || 0);
      const revenue = Math.max(0, Number(metrics && metrics.omzetMinimalBEP) || 0);
      return {
        loadMinimalPerHari: volume > 0 ? Math.ceil(volume / days) : 0,
        omzetMinimalPerHari: revenue > 0 ? Math.ceil(revenue / days) : 0
      };
    }

    function cleanBEPTargetProfit(value) {

    function calculateBEPTargetProfit(targetProfit, metrics) {
      metrics = metrics || bepBaseMetricsCache || getBEPBaseMetrics();
      const profit = Math.max(0, Number(targetProfit) || 0);
      const margin = Number(metrics && metrics.weightedContributionMargin) || 0;
      const price = Number(metrics && metrics.weightedAveragePrice) || 0;
      const days = Math.max(1, Number(metrics && metrics.operatingDays) || 30);
      const targetVolumeExact = margin > 0 ? ((Number(metrics.fixedCost) || 0) + profit) / margin : 0;
      const targetVolumeDisplay = targetVolumeExact > 0 && Number.isFinite(targetVolumeExact) ? Math.ceil(targetVolumeExact) : 0;
      return {
        targetProfit: profit,
        targetVolumeExact,
        targetVolumeDisplay,
        targetOmzet: targetVolumeDisplay > 0 && price > 0 ? targetVolumeDisplay * price : 0,
        targetLoadPerHari: targetVolumeDisplay > 0 ? Math.ceil(targetVolumeDisplay / days) : 0
      };
    }

    function _coreCalculateAll() {
      try {
        isKapasitasSaved = false; 
        if(typeof toggleActionButtons === "function") toggleActionButtons();
        
        let operasionalMenitPerHari = 0;
        const jamBuka = document.getElementById('inputJamBuka') ? document.getElementById('inputJamBuka').value : '';
        const jamTutup = document.getElementById('inputJamTutup') ? document.getElementById('inputJamTutup').value : '';
        
        if(jamBuka && jamBuka.length === 5 && jamTutup && jamTutup.length === 5) {
          const [bukaH, bukaM] = jamBuka.split(':').map(Number);
          const [tutupH, tutupM] = jamTutup.split(':').map(Number);
          
          if(!isNaN(bukaH) && !isNaN(bukaM) && !isNaN(tutupH) && !isNaN(tutupM)) {
              let menitBuka = bukaH * 60 + bukaM;
              let menitTutup = tutupH * 60 + tutupM;
              
              if (menitTutup < menitBuka) menitTutup += 24 * 60; 
              operasionalMenitPerHari = menitTutup - menitBuka;
              
              const durasiJam = Math.floor(operasionalMenitPerHari / 60);
              const durasiMenit = operasionalMenitPerHari % 60;
              if(document.getElementById('displayDurasi')) document.getElementById('displayDurasi').innerText = `${durasiJam} Jam ${durasiMenit} Menit`;
          } else {

    var panel = byId('bepFixedDetailPanel');
    return !!(panel && panel.classList.contains('is-open'));
  }

  function setBEPFixedSaveLoading(isLoading) {
    var btn = document.querySelector('#bepFixedDetailPanel .bep-save-btn');
    if (!btn) return function() {};
    if (!btn.getAttribute('data-bep-original-html')) btn.setAttribute('data-bep-original-html', btn.innerHTML);
    if (isLoading) {
      btn.classList.add('is-saving');
      btn.innerHTML = '<i class="ph ph-spinner-gap animate-spin"></i> Menyimpan...';
    } else {
      btn.classList.remove('is-saving');
      btn.innerHTML = btn.getAttribute('data-bep-original-html') || '<i class="ph ph-cloud-arrow-up"></i> Simpan Fixed Cost';
    }
  }

  function showBEPFixedToast(message, type) {
    var stack = document.querySelector('.bep-toast-stack');
    if (!stack) {
      stack = document.createElement('div');
      stack.className = 'bep-toast-stack';
      document.body.appendChild(stack);
    }
    var toast = document.createElement('div');
    var isError = type === 'error';
    toast.className = 'bep-premium-toast' + (isError ? ' is-error' : '');
    toast.innerHTML = '<i class="ph ' + (isError ? 'ph-warning-circle' : 'ph-check') + '"></i><span>' + escapeHtml(message || (isError ? 'Gagal disimpan' : 'Berhasil disimpan')) + '</span>';
    stack.appendChild(toast);
    window.setTimeout(function() {
      toast.classList.add('is-leaving');
      window.setTimeout(function() { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 220);
    }, isError ? 3200 : 2400);
  }

  window.zettOpenBEPFixedDetail = function(type) {
    var panel = byId('bepFixedDetailPanel');
    if (!panel) return;
    var outlet = selectedOutlet();
    if (!outlet) {
      emptyState('');
      renderAll();
      setOutletState('', 'idle');
      showBEPFixedToast('Pilih cabang terlebih dahulu di pojok kanan atas.', 'error');
      return;
    }
    var target = type || 'summary';
    var view = byId('view-bep');
    document.querySelectorAll('#bepFixedDetailPanel .bep-detail-section').forEach(function(section) {
      section.classList.toggle('is-active', section.getAttribute('data-bep-detail') === target);
    });
    if (view) view.classList.add('bep-fixed-form-mode');
    window.requestAnimationFrame(function() {
      panel.classList.add('is-open');
      panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  };

  window.zettCloseBEPFixedDetail = function() {
    var panel = byId('bepFixedDetailPanel');
    var view = byId('view-bep');
    if (!panel) return;
    panel.classList.remove('is-open');
    if (view) view.classList.remove('bep-fixed-form-mode');
    document.querySelectorAll('#bepFixedDetailPanel .bep-detail-section').forEach(function(section) {
      section.classList.remove('is-active');
    });
    window.requestAnimationFrame(function() {
      var shell = document.querySelector('#view-bep .bep-shell');
      if (shell) shell.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
  };

  window.zettToggleBEPFixedSummaryDetails = function() {
    var card = byId('bepFixedSummaryDetails')?.closest('.bep-kpi-card');
    var button = byId('bepFixedSummaryToggle');
    if (!card || !button) return;
    var isOpen = !card.classList.contains('is-fixed-open');
    card.classList.toggle('is-fixed-open', isOpen);
    button.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    var label = button.querySelector('span');
    if (label) label.textContent = isOpen ? 'Sembunyikan Detail' : 'Lihat Detail Biaya Tetap';
  };

  window.zettMoneyInput = function(input) {
    if (!input) return;
    input.value = formatInputValue(parseSafe(input.value));
  };

  function emptyState(outlet) {
    state = {
      outletName: outlet || '',
      category: '',
      rentStatus: 'Sewa',
      annualRent: 0,
      monthlyRent: 0,
      rentNote: '',
      salaries: [{ name: '', count: 1, salaryPerPerson: 0 }],
      machines: [],
      internetProvider: '',
      internetMonthly: 0,
      internetNote: '',
      others: [{ name: '', monthlyAmount: 0, note: '' }],
      totals: {}
    };
  }

  function cleanSalary(row) {
    row = row || {};
    var count = Math.max(0, finite(parseSafe(row.count)));
    var salary = Math.max(0, finite(parseSafe(row.salaryPerPerson)));
    return {
      name: String(row.name || row.role || '').trim(),
      count: count,
      salaryPerPerson: salary,
      total: count * salary
    };
  }
  function cleanMachine(row) {
    row = row || {};
    var jenisMesin = String(row.jenisMesin || row.name || '').trim();
    var tipeMesin = String(row.tipeMesin || '').trim();
    var units = Math.max(0, parseSafe(row.jumlahUnit || row.units));
    var purchase = Math.max(0, parseSafe(row.hargaPerUnit || row.purchasePrice));
    var residual = Math.max(0, parseSafe(row.residuPerUnit || row.residualValue));
    var years = Math.max(0, parseSafe(row.umurEkonomisTahun || row.usefulLifeYears));
    var maintenance = Math.max(0, parseSafe(row.rawatPerTahunPerUnit || row.annualMaintenance));
    var depreciation = years > 0 ? Math.max(0, ((purchase - residual) * units) / (years * 12)) : 0;
    var maintenanceMonthly = (maintenance * units) / 12;
    return {
      machineKey: row.machineKey || machineKey(state.outletName || selectedOutlet(), jenisMesin, tipeMesin),
      jenisMesin: jenisMesin,
      tipeMesin: tipeMesin,
      jumlahUnit: units,
      status: row.status || (units > 0 ? 'Aktif' : 'Nonaktif'),
      source: row.source || 'Profil Operasional',
      active: row.active !== false && units > 0,
      hargaPerUnit: purchase,
      residuPerUnit: residual,
      umurEkonomisTahun: years,
      umurEkonomisBulan: years * 12,
      rawatPerTahunPerUnit: maintenance,
      depresiasiPerBulan: depreciation,
      maintenancePerBulan: maintenanceMonthly,
      totalBiayaMesinPerBulan: depreciation + maintenanceMonthly,
      name: jenisMesin,
      units: units,
      purchasePrice: purchase,
      residualValue: residual,
      usefulLifeYears: years,
      annualMaintenance: maintenance,
      depreciationMonthly: depreciation,
      maintenanceMonthly: maintenanceMonthly,
      totalMonthly: depreciation + maintenanceMonthly
    };
  }
  function cleanOther(row) {
    row = row || {};
    return {
      name: String(row.name || '').trim(),
      monthlyAmount: Math.max(0, parseSafe(row.monthlyAmount)),
      note: String(row.note || '').trim()
    };
  }
  function isArchivedMachineRow(row) {
    row = cleanMachine(row);
    var source = String(row.source || '').toLowerCase();
    return row.active === false ||
      row.units <= 0 ||
      source.indexOf('bep_fixed') >= 0 ||
      source.indexOf('arsip') >= 0;
  }

  function collectFromDom() {
    state.outletName = selectedOutlet();
    state.rentStatus = byId('bepRentStatus')?.value || 'Sewa';
    state.annualRent = parseSafe(byId('inputSewaTahun')?.value);
    state.monthlyRent = state.annualRent > 0 ? state.annualRent / 12 : 0;
    state.rentNote = String(byId('bepRentNote')?.value || '').trim();
    state.internetProvider = String(byId('bepInternetProvider')?.value || '').trim();
    state.internetMonthly = parseSafe(byId('bepInternetMonthly')?.value);
    state.internetNote = String(byId('bepInternetNote')?.value || '').trim();

    state.salaries = Array.from(document.querySelectorAll('#bepSalaryRows .bep-row')).map(function(row) {
      return cleanSalary({
        name: row.querySelector('[data-bep-field="salary-name"]')?.value,
        count: row.querySelector('[data-bep-field="salary-count"]')?.value,
        salaryPerPerson: row.querySelector('[data-bep-field="salary-amount"]')?.value
      });
    });
    state.machines = Array.from(document.querySelectorAll('#bepMachineRows .bep-machine-row')).map(function(row) {
      return cleanMachine({
        machineKey: row.getAttribute('data-machine-key') || '',
        jenisMesin: row.getAttribute('data-machine-name') || row.querySelector('[data-bep-field="machine-name"]')?.value,
        tipeMesin: row.getAttribute('data-machine-type') || '',
        jumlahUnit: row.getAttribute('data-machine-units') || row.querySelector('[data-bep-field="machine-units"]')?.value,
        status: row.getAttribute('data-machine-status') || '',
        source: row.getAttribute('data-machine-source') || 'Profil Operasional',
        active: row.getAttribute('data-machine-active') !== 'false',
        hargaPerUnit: row.querySelector('[data-bep-field="machine-purchase"]')?.value,
        residuPerUnit: row.querySelector('[data-bep-field="machine-residual"]')?.value,
        umurEkonomisTahun: row.querySelector('[data-bep-field="machine-years"]')?.value,
        rawatPerTahunPerUnit: row.querySelector('[data-bep-field="machine-maintenance"]')?.value
      });
    });
    state.others = Array.from(document.querySelectorAll('#bepOtherRows .bep-other-row')).map(function(row) {
      return cleanOther({
        name: row.querySelector('[data-bep-field="other-name"]')?.value,
        monthlyAmount: row.querySelector('[data-bep-field="other-amount"]')?.value,
        note: row.querySelector('[data-bep-field="other-note"]')?.value
      });
    });
  }

  function calculateTotals() {
    state.monthlyRent = state.annualRent > 0 ? state.annualRent / 12 : 0;
    state.salaries = (state.salaries || []).map(cleanSalary);
    state.machines = (state.machines || []).map(cleanMachine);
    state.others = (state.others || []).map(cleanOther);

    var salaryTotal = state.salaries.reduce(function(sum, row) { return sum + finite(row.total); }, 0);
    var depreciationTotal = state.machines.reduce(function(sum, row) { return sum + finite(row.depreciationMonthly); }, 0);
    var maintenanceTotal = state.machines.reduce(function(sum, row) { return sum + finite(row.maintenanceMonthly); }, 0);
    var machineTotal = state.machines.reduce(function(sum, row) { return sum + finite(row.totalMonthly); }, 0);
    var otherTotal = state.others.reduce(function(sum, row) { return sum + finite(row.monthlyAmount); }, 0);
    var internetTotal = finite(state.internetMonthly);
    var fixedTotal = finite(state.monthlyRent) + salaryTotal + machineTotal + internetTotal + otherTotal;

    state.totals = {
      salaryTotal: salaryTotal,
      depreciationTotal: depreciationTotal,
      maintenanceTotal: maintenanceTotal,
      machineTotal: machineTotal,
      internetTotal: internetTotal,
      otherTotal: otherTotal,
      fixedTotal: fixedTotal
    };
    return state.totals;
  }

  function renderBEPFixedCostCharts(totals) {
    var barWrap = byId('bepFixedBarChart');
    var donut = byId('bepFixedDonutChart');
    var legend = byId('bepFixedDonutLegend');
    if (!barWrap || !donut || !legend) return;

    totals = totals || state.totals || {};
    var palette = [
      { color: '#1D4ED8', glow: 'rgba(29,78,216,.22)', soft: 'rgba(29,78,216,.12)' },
      { color: '#0891B2', glow: 'rgba(8,145,178,.22)', soft: 'rgba(8,145,178,.12)' },
      { color: '#4F46E5', glow: 'rgba(79,70,229,.22)', soft: 'rgba(79,70,229,.12)' },
      { color: '#BE185D', glow: 'rgba(190,24,93,.22)', soft: 'rgba(190,24,93,.12)' },
      { color: '#7C3AED', glow: 'rgba(124,58,237,.2)', soft: 'rgba(124,58,237,.12)' }
    ];
    var items = [
      { label: 'Sewa Tempat', value: finite(state.monthlyRent) },
      { label: 'Gaji Tim', value: finite(totals.salaryTotal) },
      { label: 'Biaya Mesin', value: finite(totals.machineTotal) },
      { label: 'Internet', value: finite(totals.internetTotal) },
      { label: 'Lainnya', value: finite(totals.otherTotal) }
    ].sort(function(a, b) { return b.value - a.value; }).map(function(item, index) {
      var tone = palette[index % palette.length];
      return Object.assign({}, item, tone);
    });
    var total = finite(totals.fixedTotal);
    var max = items.reduce(function(best, item) { return Math.max(best, item.value); }, 0);

    setText('bepFixedChartTotal', money(total));

    if (total <= 0 || max <= 0) {
      barWrap.innerHTML = '<div class="bep-fixed-chart-empty">Lengkapi biaya tetap untuk menampilkan grafik bulanan.</div>';
      donut.style.background = 'conic-gradient(#E2E8F0 0 100%)';
      legend.innerHTML = '<div class="bep-fixed-chart-empty">Belum ada komposisi biaya.</div>';
      setText('bepFixedDonutTotal', '100%');
      return;
    }
    setText('bepFixedDonutTotal', '100%');

    barWrap.innerHTML = items.map(function(item) {
      var width = max > 0 ? Math.max(0, Math.min(100, (item.value / max) * 100)) : 0;
      return '<div class="bep-fixed-bar-row" style="--bep-fixed-chart-color:' + item.color + ';--bep-fixed-chart-glow:' + item.glow + '">' +
        '<div class="bep-fixed-bar-label">' + escapeHtml(item.label) + '</div>' +
        '<div class="bep-fixed-bar-track"><span class="bep-fixed-bar-fill" style="--bep-fixed-bar-width:' + width.toFixed(2) + '%"></span></div>' +
        '<div class="bep-fixed-bar-value">' + money(item.value) + '</div>' +
      '</div>';
    }).join('');

    var cursor = 0;
    var segments = items.map(function(item) {
      var percent = item.value > 0 ? (item.value / total) * 100 : 0;
      var start = cursor;
      cursor += percent;
      return item.color + ' ' + start.toFixed(2) + '% ' + cursor.toFixed(2) + '%';
    }).filter(Boolean);
    donut.style.background = 'conic-gradient(' + segments.join(', ') + ')';

    legend.innerHTML = items.map(function(item) {
      var percent = total > 0 ? (item.value / total) * 100 : 0;
      return '<div class="bep-fixed-legend-row" style="--bep-fixed-chart-color:' + item.color + ';--bep-fixed-chart-soft:' + item.soft + '">' +
        '<span class="bep-fixed-legend-dot"></span>' +
        '<span class="bep-fixed-legend-name">' + escapeHtml(item.label) + '</span>' +
        '<span class="bep-fixed-legend-percent">' + percent.toFixed(1).replace('.', ',') + '%</span>' +
      '</div>';
    }).join('');
  }

  function syncLegacyInputs() {
    var totals = calculateTotals();
    setValue('inputSewaTahun', formatInputValue(state.annualRent));
    setValue('inputBiayaTetapLain', Math.round(totals.machineTotal + totals.internetTotal + totals.otherTotal));
    setValue('hiddenTotalBiayaTetap', Math.round(totals.fixedTotal));
  }

  function renderSalaryRows() {
    var wrap = byId('bepSalaryRows');
    if (!wrap) return;
    wrap.innerHTML = (state.salaries || []).map(function(row, idx) {
      row = cleanSalary(row);

        '<input class="bep-input" data-bep-field="salary-name" placeholder="Nama/Jabatan" value="' + escapeHtml(row.name) + '" oninput="zettBEPFixedChange()">' +

        '<input class="bep-input" data-bep-field="salary-amount" inputmode="numeric" placeholder="Gaji/orang" value="' + escapeHtml(formatInputValue(row.salaryPerPerson)) + '" oninput="zettMoneyInput(this); zettBEPFixedChange()">' +
        '<div class="bep-mini-total">' + money(row.total) + '</div>' +
        '<button type="button" class="bep-icon-btn" onclick="zettRemoveBEPSalaryRow(' + idx + ')"><i class="ph ph-trash"></i></button>' +
        '<input type="hidden" class="input-gaji" value="' + Math.round(row.total) + '">' +
      '</div>';
    }).join('');
  }

  function renderMachineRows() {
    var wrap = byId('bepMachineRows');
    if (!wrap) return;
    var notice = byId('bepMachineNotice');
    var machineRows = (state.machines || []).map(cleanMachine);
    var visibleRows = machineRows.filter(function(row) { return !isArchivedMachineRow(row); });
    if (!state.outletName && !selectedOutlet()) {
      if (notice) notice.innerHTML = '<i class="ph ph-info"></i><span>Pilih cabang terlebih dahulu untuk memuat data mesin dari Profil Operasional.</span>';
      wrap.innerHTML = '';
      return;
    }
    if (!visibleRows.length) {
      if (notice) notice.innerHTML = '<i class="ph ph-warning-circle"></i><span>Data mesin di Profil Operasional belum lengkap. Lengkapi Profil Operasional agar perhitungan Biaya Mesin akurat.</span>';
      wrap.innerHTML = '';
      return;
    }
    if (notice) notice.innerHTML = '<i class="ph ph-check-circle"></i><span>Data mesin otomatis diambil dari Profil Operasional' + (state.category ? ' (' + escapeHtml(state.category) + ')' : '') + '.</span>';
    var headerHtml = [
      '<div class="bep-machine-column-header" aria-hidden="true" style="display:grid;gap:0.75rem;align-items:center;margin:0.35rem 0 0.25rem;color:#64748b;font-size:0.68rem;font-weight:900;text-transform:uppercase;letter-spacing:0;">',
        '<span></span>',
        '<span>Harga / Unit</span>',
        '<span>Nilai Residu</span>',
        '<span>Umur (Thn)</span>',
        '<span>Penyusutan</span>',
        '<span>Biaya Rawat / Thn</span>',
        '<span>Rawat / Bln</span>',
        '<span>Total Biaya</span>',
      '</div>'
    ].join('');
    wrap.innerHTML = headerHtml + machineRows.map(function(row, idx) {
      row = cleanMachine(row);
      var archived = isArchivedMachineRow(row);
      return '<div class="bep-machine-row bep-machine-smart-row" ' + (archived ? 'data-machine-archive-hidden="true" style="display:none;" ' : '') + 'data-index="' + idx + '" data-machine-key="' + escapeHtml(row.machineKey) + '" data-machine-name="' + escapeHtml(row.jenisMesin) + '" data-machine-type="' + escapeHtml(row.tipeMesin) + '" data-machine-units="' + escapeHtml(row.jumlahUnit) + '" data-machine-status="' + escapeHtml(row.status) + '" data-machine-source="' + escapeHtml(row.source) + '" data-machine-active="' + (row.active !== false ? 'true' : 'false') + '">' +
        '<div class="bep-machine-identity">' +
          '<div class="bep-machine-name">' + escapeHtml(row.jenisMesin || row.name || 'Mesin') + '</div>' +
          '<div class="bep-machine-badges">' +
            (row.tipeMesin ? '<span class="bep-machine-badge">' + escapeHtml(row.tipeMesin) + '</span>' : '') +
            '<span class="bep-machine-badge">' + escapeHtml(row.jumlahUnit || 0) + ' unit</span>' +
            '<span class="bep-machine-badge ' + (archived ? 'is-archived' : 'is-source') + '">' + escapeHtml(row.source || 'Profil Operasional') + '</span>' +
          '</div>' +
        '</div>' +
        '<input class="bep-input" data-bep-field="machine-purchase" inputmode="numeric" placeholder="Harga/unit" value="' + escapeHtml(formatInputValue(row.hargaPerUnit)) + '" oninput="zettMoneyInput(this); zettBEPFixedChange()">' +
        '<input class="bep-input" data-bep-field="machine-residual" inputmode="numeric" placeholder="Residu/unit" value="' + escapeHtml(formatInputValue(row.residuPerUnit)) + '" oninput="zettMoneyInput(this); zettBEPFixedChange()">' +
        '<input class="bep-input" data-bep-field="machine-years" inputmode="decimal" placeholder="Umur/tahun" value="' + escapeHtml(row.umurEkonomisTahun || '') + '" oninput="zettBEPFixedChange()">' +
        '<div class="bep-mini-total">' + money(row.depreciationMonthly) + '</div>' +
        '<input class="bep-input" data-bep-field="machine-maintenance" inputmode="numeric" placeholder="Rawat/tahun/unit" value="' + escapeHtml(formatInputValue(row.rawatPerTahunPerUnit)) + '" oninput="zettMoneyInput(this); zettBEPFixedChange()">' +
        '<div class="bep-mini-total">' + money(row.maintenanceMonthly) + '</div>' +
        '<div class="bep-mini-total">' + money(row.totalMonthly) + '</div>' +

    window.requestAnimationFrame(function() {
      var header = wrap.querySelector('.bep-machine-column-header');

      if (!header || !firstRow) return;

  function renderOtherRows() {
    var wrap = byId('bepOtherRows');

    wrap.innerHTML = (state.others || []).map(function(row, idx) {
      row = cleanOther(row);
      return '<div class="bep-other-row" data-index="' + idx + '">' +

  function renderAll() {
    calculateTotals();
    if (byId('bepRentStatus')) byId('bepRentStatus').value = state.rentStatus || 'Sewa';
    setValue('bepRentNote', state.rentNote || '');
    setValue('inputSewaTahun', formatInputValue(state.annualRent));
    setValue('bepInternetProvider', state.internetProvider || '');
    setValue('bepInternetMonthly', formatInputValue(state.internetMonthly));
    setValue('bepInternetNote', state.internetNote || '');
    renderSalaryRows();
    renderMachineRows();
    renderOtherRows();
    updateDisplays();
  }

  function updateDisplays() {
    var totals = calculateTotals();
    syncLegacyInputs();
    var selected = selectedOutlet();
    var salaryActive = activeRows(state.salaries, function(row) { return finite(row.total) > 0 || String(row.name || '').trim(); });
    var totalEmployees = salaryActive.reduce(function(sum, row) { return sum + finite(row.count); }, 0);
    var machineActive = activeRows(state.machines, function(row) {
      return row.active !== false && finite(row.units) > 0;
    });
    var otherActive = activeRows(state.others, function(row) { return finite(row.monthlyAmount) > 0 || String(row.name || '').trim(); });
    var biggest = largestComponent(totals);
    var pct = totals.fixedTotal > 0 ? Math.round((biggest.value / totals.fixedTotal) * 100) : 0;

    setText('displaySewaBulan', money(state.monthlyRent));
    var hari = byId('inputMingguTutup') && byId('inputMingguTutup').checked ? 26 : 30;
    setText('displaySewaHari', money(state.monthlyRent / Math.max(hari, 1)));
    setText('displayTotalGaji', money(totals.salaryTotal));
    setText('bepRentCardTotal', money(state.monthlyRent) + ' / bulan');
    setText('bepRentCardStatus', state.annualRent > 0 ? ('Dari sewa tahunan ' + money(state.annualRent)) : 'Boleh dikosongkan atau diisi 0');
    setText('bepSalaryTotal', money(totals.salaryTotal) + ' / bulan');
    setText('bepSalaryCardStatus', totalEmployees > 0 ? (compactCount(totalEmployees, 'karyawan') + ' aktif, ' + compactCount(salaryActive.length, 'kelompok')) : '0 karyawan aktif');
    setText('bepMachineTotal', money(totals.machineTotal) + ' / bulan');
    setText('bepMachineCardStatus', machineActive.length ? (compactCount(machineActive.length, 'jenis mesin') + ' dari Profil Operasional') : 'Menunggu data mesin Profil Operasional');
    setText('bepInternetTotal', money(totals.internetTotal) + ' / bulan');
    setText('bepInternetCardStatus', state.internetProvider ? ('Provider: ' + state.internetProvider) : 'Provider belum diisi');
    setText('bepOtherTotal', money(totals.otherTotal) + ' / bulan');
    setText('bepOtherCardStatus', otherActive.length ? compactCount(otherActive.length, 'item biaya') : '0 item biaya');
    setText('bepFixedGrandTotal', money(totals.fixedTotal));
    setText('bepFixedGrandTotalCard', money(totals.fixedTotal));
    setText('bepKpiFixedTotal', money(totals.fixedTotal));
    setText('bepKpiFixedNote', 'Total Biaya Tetap Per Bulan');
    setText('bepFixedInsight', totals.fixedTotal > 0 ? 'Komponen terbesar: Gaji Tim' : 'Lengkapi komponen biaya tetap untuk menghitung BEP.');
    setText('bepSummaryRent', money(state.monthlyRent));
    setText('bepSummarySalary', money(totals.salaryTotal));
    setText('bepSummaryMachine', money(totals.machineTotal));
    setText('bepSummaryInternet', money(totals.internetTotal));
    setText('bepSummaryOther', money(totals.otherTotal));
    renderBEPFixedCostCharts(totals);
    setText('bepFixedMiniRentAmount', money(state.monthlyRent) + ' / bulan');
    setText('bepFixedMiniRentNote', state.annualRent > 0 ? ('Dari sewa tahunan ' + money(state.annualRent)) : 'Opsional jika outlet milik sendiri');
    setText('bepFixedMiniSalaryAmount', money(totals.salaryTotal) + ' / bulan');
    setText('bepFixedMiniSalaryNote', totalEmployees > 0 ? (compactCount(totalEmployees, 'karyawan') + ' aktif, ' + compactCount(salaryActive.length, 'kelompok')) : '0 karyawan aktif');
    setText('bepFixedMiniMachineAmount', money(totals.machineTotal) + ' / bulan');
    setText('bepFixedMiniMachineNote', machineActive.length ? (compactCount(machineActive.length, 'jenis mesin') + ' dari Profil Operasional') : 'Depresiasi & perawatan');
    setText('bepFixedMiniInternetAmount', money(totals.internetTotal) + ' / bulan');
    setText('bepFixedMiniInternetNote', state.internetProvider ? ('Provider: ' + state.internetProvider) : 'Provider & biaya bulanan');
    setText('bepFixedMiniOtherAmount', money(totals.otherTotal) + ' / bulan');
    setText('bepFixedMiniOtherNote', otherActive.length ? compactCount(otherActive.length, 'item biaya') : 'Pengeluaran tetap tambahan');
    if (typeof window.renderBEPTopKPIOnly === 'function') {
      try { window.renderBEPTopKPIOnly(); } catch (error) {}
    }
    if (!selected) setOutletState('', 'idle');
  }

  function scheduleCalc() {
    updateDisplays();
    if (typeof window.renderBEPTopKPIOnly === 'function') {
      try { window.renderBEPTopKPIOnly(); } catch (error) {}
    }
    if (typeof window.calculateAll === 'function') {
      window.clearTimeout(window.__bepFixedCalcTimer);
      window.__bepFixedCalcTimer = window.setTimeout(function() {
        try { window.calculateAll(); } catch (error) {}
      }, 40);
    }
  }

  window.zettBEPFixedChange = function() {
    collectFromDom();
    document.querySelectorAll('#bepSalaryRows .bep-row').forEach(function(row, index) {
      var total = state.salaries[index] ? state.salaries[index].total : 0;
      var totalEl = row.querySelector('.bep-mini-total');
      var hidden = row.querySelector('.input-gaji');
      if (totalEl) totalEl.textContent = money(total);
      if (hidden) hidden.value = Math.round(total);
    });
    document.querySelectorAll('#bepMachineRows .bep-machine-row').forEach(function(row, index) {
      var item = state.machines[index] || {};
      var totals = row.querySelectorAll('.bep-mini-total');
      if (totals[0]) totals[0].textContent = money(item.depreciationMonthly || 0);
      if (totals[1]) totals[1].textContent = money(item.maintenanceMonthly || 0);
      if (totals[2]) totals[2].textContent = money(item.totalMonthly || 0);
    });
    scheduleCalc();
  };
  window.zettAddBEPSalaryRow = window.addKaryawan = function() {
    if (!state.salaries) emptyState(selectedOutlet());
    collectFromDom();
    state.salaries.push({ name: '', count: 1, salaryPerPerson: 0 });
    renderAll();
    scheduleCalc();
  };
  window.zettRemoveBEPSalaryRow = function(index) {
    collectFromDom();
    state.salaries.splice(index, 1);
    if (!state.salaries.length) state.salaries.push({ name: '', count: 1, salaryPerPerson: 0 });
    renderAll();
    scheduleCalc();
  };
  window.zettAddBEPMachineRow = function() {
    showBEPFixedToast('Data mesin otomatis diambil dari Profil Operasional.', 'error');
  };
  window.zettRemoveBEPMachineRow = function(index) {
    showBEPFixedToast('Nonaktifkan atau ubah jumlah mesin dari Profil Operasional.', 'error');
  };
  window.zettAddBEPOtherRow = function() {
    collectFromDom();
    state.others.push({ name: '', monthlyAmount: 0, note: '' });
    renderAll();
    scheduleCalc();
  };
  window.zettRemoveBEPOtherRow = function(index) {
    collectFromDom();
    state.others.splice(index, 1);
    if (!state.others.length) state.others.push({ name: '', monthlyAmount: 0, note: '' });
    renderAll();
    scheduleCalc();
  };

  function applyServerData(data, outlet) {
    emptyState(outlet);
    if (data) {
      state.outletName = data.namaOutlet || data['Nama Outlet'] || outlet || '';
      state.category = data.category || data.kategoriLaundry || data['Kategori Laundry'] || '';
      state.rentStatus = data.statusSewa || data['Status Sewa'] || 'Sewa';
      state.annualRent = parseSafe(data.biayaSewaTahunan || data['Biaya Sewa Tahunan']);
      state.monthlyRent = parseSafe(data.biayaSewaBulanan || data['Biaya Sewa Bulanan']) || (state.annualRent / 12);
      state.rentNote = data.catatanSewa || data.catatan || data['Catatan'] || '';
      state.salaries = Array.isArray(data.detailGaji) && data.detailGaji.length ? data.detailGaji : state.salaries;
      state.machines = Array.isArray(data.detailMesin) ? data.detailMesin : state.machines;
      state.internetProvider = data.providerInternet || data['Provider Internet'] || '';
      state.internetMonthly = parseSafe(data.biayaInternetBulanan || data['Biaya Internet Bulanan']);
      state.internetNote = data.catatanInternet || '';
      state.others = Array.isArray(data.detailLainLain) && data.detailLainLain.length ? data.detailLainLain : state.others;
    }
    renderAll();
    setOutletState(outlet ? ('Data BEP aktif: ' + outlet) : '', outlet ? 'ready' : 'idle');
    scheduleCalc();
  }

  function renderBEPDashboardFast(data, outlet) {
    applyServerData(data, outlet);
    setBEPLoadingState(false, false);
    pulseBEPDataSwap();
  }

  function loadBEPDashboardByOutlet(outletName, options) {
    var outlet = String(outletName || selectedOutlet()).trim();
    var key = bepCacheKey(outlet);
    var config = options || {};

    if (!outlet) {
      ++bepActiveRequestId;
      bepActiveOutletKey = key;
      if (isBEPFixedFormOpen()) window.zettCloseBEPFixedDetail();
      emptyState('');
      renderAll();
      setOutletState('', 'idle');
      scheduleCalc();
      setBEPLoadingState(false, false);
      return;
    }

    if (bepActiveFetches[key] && !config.force) {
      var activeCached = getCachedBEPOutlet(outlet);
      if (activeCached) renderBEPDashboardFast(activeCached.data, outlet);
      setBEPLoadingState(!activeCached, !!activeCached);
      return;
    }

    var requestId = ++bepActiveRequestId;
    bepActiveOutletKey = key;

    if (isBEPFixedFormOpen() && norm(state.outletName) !== key) window.zettCloseBEPFixedDetail();

    var cached = getCachedBEPOutlet(outlet);
    var cacheFresh = cached && (Date.now() - cached.updatedAt < BEP_CACHE_TTL_MS);
    if (cached && !config.force) {
      renderBEPDashboardFast(cached.data, outlet);
      if (cacheFresh) return;
      setBEPLoadingState(false, true);
      setOutletState('Data BEP aktif: ' + outlet, 'ready');
    } else {
      emptyState(outlet);
      renderAll();
      setBEPLoadingState(true, false);
      setOutletState('Memuat data BEP: ' + outlet, 'loading');
    }

    if (!window.google || !google.script || !google.script.run) {
      setBEPLoadingState(false, false);
      return;
    }
    bepActiveFetches[key] = Date.now();
    google.script.run
      .withSuccessHandler(function(res) {
        delete bepActiveFetches[key];
        if (requestId !== bepActiveRequestId || bepActiveOutletKey !== key || norm(selectedOutlet()) !== key) return;
        var data = res && res.data ? res.data : null;
        var responseKey = data ? bepCacheKey(data.namaOutlet || data['Nama Outlet'] || outlet) : key;
        if (responseKey && responseKey !== key) return;
        if (data) cacheBEPOutletData(outlet, data);
        renderBEPDashboardFast(data, outlet);
      })
      .withFailureHandler(function(error) {
        delete bepActiveFetches[key];
        console.error('Gagal load BEP Fixed:', error);
        if (requestId !== bepActiveRequestId || bepActiveOutletKey !== key || norm(selectedOutlet()) !== key) return;
        setBEPLoadingState(false, false);
        if (!cached) renderBEPDashboardFast(null, outlet);
        showBEPFixedToast('Gagal memuat data cabang', 'error');
      })
      .getBEPFixedCost(outlet);
  }

  window.zettLoadBEPFixedCost = function(outletName, options) {
    var outlet = String(outletName || selectedOutlet()).trim();
    var config = options || {};
    window.clearTimeout(bepLoadTimer);
    if (!outlet) {
      loadBEPDashboardByOutlet('', { force: true });
      return;
    }
    if (!config.force && getCachedBEPOutlet(outlet)) {
      loadBEPDashboardByOutlet(outlet, config);
      return;
    }
    var delay = typeof config.delay === 'number' ? config.delay : 0;
    bepLoadTimer = window.setTimeout(function() {
      loadBEPDashboardByOutlet(outlet, config);
    }, delay);
  };

  function buildPayload() {
    collectFromDom();
    calculateTotals();
    return {
      namaOutlet: state.outletName || selectedOutlet(),
      kategoriLaundry: state.category,
      statusSewa: state.rentStatus,
      biayaSewaTahunan: state.annualRent,
      biayaSewaBulanan: state.monthlyRent,
      catatanSewa: state.rentNote,
      detailGaji: state.salaries,
      totalGajiBulanan: state.totals.salaryTotal,
      detailMesin: state.machines,
      totalDepresiasiMesinBulanan: state.totals.depreciationTotal,
      totalCadanganPerawatanMesinBulanan: state.totals.maintenanceTotal,
      totalBiayaMesinBulanan: state.totals.machineTotal,
      providerInternet: state.internetProvider,
      biayaInternetBulanan: state.internetMonthly,
      catatanInternet: state.internetNote,
      detailLainLain: state.others,
      totalLainLainBulanan: state.totals.otherTotal,
      totalFixedCostBulanan: state.totals.fixedTotal,
      catatan: [state.rentNote, state.internetNote].filter(Boolean).join(' | ')
    };
  }
  window.zettBuildBEPFixedPayload = buildPayload;

  var originalSave = window.prosesSimpanBEP;
  window.prosesSimpanBEP = async function() {
    var outlet = selectedOutlet();
    if (!outlet) {
      showBEPFixedToast('Pilih cabang terlebih dahulu di pojok kanan atas.', 'error');
      return;
    }
    collectFromDom();
    syncLegacyInputs();
    if (isBEPFixedFormOpen()) {
      setBEPFixedSaveLoading(true);
      try {
        if (!window.google || !google.script || !google.script.run || typeof runServer !== 'function') throw new Error('Koneksi Google Apps Script belum siap.');
        var res = await runServer('saveBEPFixedCost', buildPayload());
        if (res && res.status === 'error') throw new Error(res.message || 'Gagal menyimpan data.');
        cacheBEPOutletData(outlet, res && res.data ? res.data : buildPayload());
        renderAll();
        scheduleCalc();
        var activeSection = document.querySelector('#bepFixedDetailPanel .bep-detail-section.is-active');
        showBEPFixedToast(activeSection && activeSection.getAttribute('data-bep-detail') === 'machine' ? 'Biaya Mesin berhasil disimpan dan masuk ke perhitungan BEP.' : 'Berhasil disimpan', 'success');
      } catch (error) {
        console.error('saveBEPFixedCost gagal:', error);
        showBEPFixedToast(error && error.message ? error.message : 'Gagal disimpan', 'error');
      } finally {
        setBEPFixedSaveLoading(false);
      }
      return;
    }
    if (window.google && google.script && google.script.run && typeof runServer === 'function') {
      try {
        var fixedRes = await runServer('saveBEPFixedCost', buildPayload());
        if (fixedRes && fixedRes.status !== 'error') cacheBEPOutletData(outlet, fixedRes.data || buildPayload());
      } catch (error) { console.error('saveBEPFixedCost gagal:', error); }
    }
    if (typeof originalSave === 'function') return originalSave.apply(this, arguments);
  };

  var originalHandleOutlet = window.handleGlobalOutletChange;
  window.handleGlobalOutletChange = function(value) {
    if (typeof originalHandleOutlet === 'function') return originalHandleOutlet.apply(this, arguments);
    if (document.body && document.body.classList.contains('bep-active')) {
      window.zettLoadBEPFixedCost(value);
    }
  };

  var originalSwitch = window.switchMainTab;
  window.switchMainTab = function(tabName) {
    document.body.classList.toggle('bep-active', tabName === 'bep');
    var result = typeof originalSwitch === 'function' ? originalSwitch.apply(this, arguments) : undefined;
    if (tabName === 'bep') window.zettLoadBEPFixedCost(selectedOutlet(), { immediate: true });
    return result;
  };

  function init() {
    emptyState(selectedOutlet());
    renderAll();
    if (selectedOutlet()) window.zettLoadBEPFixedCost(selectedOutlet(), { immediate: true });
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init, { once: true });
  else init();
})();
</script>
