<script id="zett-hpp-form-controller-restore">
  /**
   * ======================================================================
   * ZETTBOT FIX: HPP FORM CONTROLLER RESTORE
   * Mengembalikan fungsi klik card HPP -> form input + tombol CRUD/update.
   * Tidak menyentuh backend, spreadsheet, database, atau struktur HTML.
   * ====================================================================== */
  (function zettHppFormControllerRestore() {
    function byId(id) { return document.getElementById(id); }

    function showEl(el, displayValue) {
      if (!el) return;
      el.classList.remove('hidden');
      el.style.display = displayValue || '';
      el.style.pointerEvents = 'auto';
      el.style.opacity = '1';
      el.style.filter = 'none';
    }

    function hideEl(el) {
      if (!el) return;
      el.classList.add('hidden');
      el.style.display = 'none';
    }

    function runHppCalculators() {
      const tasks = [
        function() { if (typeof toggleAirInputs === 'function') toggleAirInputs(); },
        function() { if (typeof toggleBahanActive === 'function') toggleBahanActive(); },
        function() { if (typeof toggleBahanInputs === 'function') toggleBahanInputs(); },
        function() { if (typeof toggleNotaInputs === 'function') toggleNotaInputs(); },
        function() { if (typeof calculateGas === 'function') calculateGas(); },
        function() { if (typeof calculateListrik === 'function') calculateListrik(); },
        function() { if (typeof calculateAir === 'function') calculateAir(); },
        function() { if (typeof calculatePacking === 'function') calculatePacking(); },
        function() { if (typeof calculateBahanBaku === 'function') calculateBahanBaku(); },
        function() { if (typeof calculateNota === 'function') calculateNota(); },
        function() { if (typeof StateMachine !== 'undefined' && StateMachine.calculateTotal) StateMachine.calculateTotal(); }
      ];
      if (typeof window.zettRunHPPTaskQueue_ === 'function') window.zettRunHPPTaskQueue_(window.__zettBranchSwitchToken, tasks);
      else tasks.forEach(function(task) { try { task(); } catch(e) { console.error(e); } });
    }

    function restoreOldHppData() {
      const selectHPP = byId('inputNamaHPP');
      const namaCabang = selectHPP ? selectHPP.value : '';

      if (namaCabang && typeof populateFormHPP === 'function') {
        try {
          if (typeof window.zettWithHPPPopulationGuard_ === 'function') {
            window.zettWithHPPPopulationGuard_(function() { populateFormHPP(namaCabang); });
          } else {
            populateFormHPP(namaCabang);
          }
        } catch(e) { console.error('populateFormHPP error:', e); }
      } else if (!namaCabang && typeof loadHPPFromLocal === 'function') {
        try { loadHPPFromLocal(); } catch(e) { console.error('loadHPPFromLocal error:', e); }
      }

      try { if (typeof toggleActionButtons === 'function') toggleActionButtons(); } catch(e) { console.error(e); }
      try { if (typeof checkHPPLock === 'function') checkHPPLock(); } catch(e) { console.error(e); }
      runHppCalculators();
    }

    function revealHppTab(type) {
      document.querySelectorAll('#view-hpp .tab-content').forEach(tab => {
        hideEl(tab);
        tab.classList.remove('hpp-form-enter-final', 'hpp-view-enter-premium');
      });

      const targetTab = byId('tab-' + type);
      if (targetTab) {
        showEl(targetTab, 'grid');
        void targetTab.offsetWidth;
        targetTab.classList.add('hpp-form-enter-final');
      }
    }

    window.openHPPForm = function(type, title) {
      const dashboard = byId('hpp-dashboard-view');
      const formView = byId('hpp-form-view');
      const titleEl = byId('hpp-form-title-text');

      if (titleEl) titleEl.textContent = title || 'Analisa Biaya';

      hideEl(dashboard);
      showEl(formView, 'block');
      formView.classList.remove('hpp-form-enter-final', 'hpp-view-enter-premium');
      void formView.offsetWidth;
      formView.classList.add('hpp-form-enter-final');

      revealHppTab(type);
      restoreOldHppData();

      const btnSimpan = byId('btnSimpanHPP');
      const btnUpdate = byId('btnUpdateHPP');
      if (btnSimpan) btnSimpan.style.display = btnSimpan.classList.contains('hidden') ? 'none' : '';
      if (btnUpdate) btnUpdate.style.display = btnUpdate.classList.contains('hidden') ? 'none' : '';

      const scroller = byId('mainViewScroller') || document.querySelector('.custom-scroll');
      if (scroller && typeof scroller.scrollTo === 'function') {
        requestAnimationFrame(() => scroller.scrollTo({ top: 0, behavior: 'smooth' }));
      }
    };

    window.closeHPPForm = function() {
      const dashboard = byId('hpp-dashboard-view');
      const formView = byId('hpp-form-view');

      hideEl(formView);
      document.querySelectorAll('#view-hpp .tab-content').forEach(tab => hideEl(tab));

      showEl(dashboard, 'grid');
      dashboard.classList.remove('hpp-dashboard-return-final', 'hpp-view-enter-premium');
      void dashboard.offsetWidth;
      dashboard.classList.add('hpp-dashboard-return-final');

      try { if (typeof checkHPPLock === 'function') checkHPPLock(); } catch(e) { console.error(e); }
    };
  })();
</script>

<script id="zett-hpp-final-click-and-percent-fix-20260506">
  /**
   * FINAL HPP FIX
   * Scope: Modal.html / Struktur Biaya saja.
   * Tidak mengubah rumus, backend, database, atau penyimpanan spreadsheet.
   */
  (function zettHppFinalClickAndPercentFix() {
    const cardMap = {
      gas: { id: 'dash-card-gas', title: 'Analisa Biaya Gas' },
      listrik: { id: 'dash-card-listrik', title: 'Analisa Biaya Listrik' },
      air: { id: 'dash-card-air', title: 'Analisa Biaya Air' },
      packing: { id: 'dash-card-packing', title: 'Analisa Biaya Packing' },
      bahan: { id: 'dash-card-bahan', title: 'Analisa Biaya Chemical' },
      nota: { id: 'dash-card-nota', title: 'Analisa Biaya Nota & Kasir' }
    };

    function byId(id) { return document.getElementById(id); }

    function showEl(el, displayValue) {
      if (!el) return;
      el.classList.remove('hidden');
      el.style.display = displayValue || '';
      el.style.opacity = '1';
      el.style.pointerEvents = 'auto';
      el.style.filter = 'none';
    }

    function hideEl(el) {
      if (!el) return;
      el.classList.add('hidden');
      el.style.display = 'none';
    }

    function getCurrentHppOutlet() {
      const select = byId('inputNamaHPP');
      return select ? select.value : '';
    }

    function restoreHppDataForSelectedOutlet() {
      const outlet = getCurrentHppOutlet();
      if (outlet && typeof populateFormHPP === 'function') {
        try {
          if (typeof window.zettWithHPPPopulationGuard_ === 'function') {
            window.zettWithHPPPopulationGuard_(function() { populateFormHPP(outlet); });
          } else {
            populateFormHPP(outlet);
          }
        } catch (error) { console.error('populateFormHPP error:', error); }
      } else if (typeof loadHPPFromLocal === 'function') {
        try { loadHPPFromLocal(); } catch (error) { console.error('loadHPPFromLocal error:', error); }
      }

      const tasks = [
        function() { if (typeof toggleActionButtons === 'function') toggleActionButtons(); },
        function() { if (typeof checkHPPLock === 'function') checkHPPLock(); },
        function() { if (typeof updateGasDefault === 'function') updateGasDefault(); },
        function() { if (typeof toggleAirInputs === 'function') toggleAirInputs(); },
        function() { if (typeof toggleBahanActive === 'function') toggleBahanActive(); },
        function() { if (typeof toggleBahanInputs === 'function') toggleBahanInputs(); },
        function() { if (typeof toggleNotaInputs === 'function') toggleNotaInputs(); },
        function() { if (typeof calculateGas === 'function') calculateGas(); },
        function() { if (typeof calculateListrik === 'function') calculateListrik(); },
        function() { if (typeof calculateAir === 'function') calculateAir(); },
        function() { if (typeof calculatePacking === 'function') calculatePacking(); },
        function() { if (typeof calculateBahanBaku === 'function') calculateBahanBaku(); },
        function() { if (typeof calculateNota === 'function') calculateNota(); },
        function() { if (window.StateMachine && typeof window.StateMachine.calculateTotal === 'function') window.StateMachine.calculateTotal(); }
      ];
      if (typeof window.zettRunHPPTaskQueue_ === 'function') window.zettRunHPPTaskQueue_(window.__zettBranchSwitchToken, tasks);
      else tasks.forEach(function(task) { try { task(); } catch (error) { console.error(error); } });
    }

    function openFormSmooth(type, title) {
      const page = byId('view-hpp');
      const dashboard = byId('hpp-dashboard-view');
      const formView = byId('hpp-form-view');
      const titleEl = byId('hpp-form-title-text');
      if (!formView) return;

      if (page) {
        page.classList.add('hpp-form-active');
        page.dataset.hppActiveForm = type || '';
      }
      if (titleEl) titleEl.textContent = title || 'Analisa Biaya';
      const outerHeader = titleEl ? titleEl.closest('.flex.items-center.gap-5') : null;
      if (outerHeader) outerHeader.style.display = (type === 'gas' || type === 'listrik' || type === 'air' || type === 'packing' || type === 'bahan' || type === 'nota') ? 'none' : '';

      hideEl(dashboard);
      showEl(formView, 'block');
      formView.classList.remove('hpp-form-enter-final', 'hpp-view-enter-premium', 'zett-hpp-form-smooth-open');
      void formView.offsetWidth;
      formView.classList.add('zett-hpp-form-smooth-open');

      document.querySelectorAll('#view-hpp .tab-content').forEach(tab => {
        hideEl(tab);
        tab.classList.remove('hpp-form-enter-final', 'hpp-view-enter-premium', 'zett-hpp-tab-smooth-open');
      });

      const targetTab = byId('tab-' + type);
      if (targetTab) {
        showEl(targetTab, 'grid');
        void targetTab.offsetWidth;
        targetTab.classList.add('zett-hpp-tab-smooth-open');
      }

      restoreHppDataForSelectedOutlet();

      if (type === 'gas' && typeof window.zettRefreshActiveHPPRowFromServer === 'function') {
        window.zettRefreshActiveHPPRowFromServer(getCurrentHppOutlet(), { openType: 'gas' });
      }
      if (type === 'gas' && typeof window.zettRenderGasAnalysisForm === 'function') {
        setTimeout(function() {
          window.zettRenderGasAnalysisForm();
          if (typeof window.zettRenderGasLpgCard === 'function') window.zettRenderGasLpgCard();
        }, 30);
      }
      if (type === 'listrik' && typeof window.zettRenderElectricAnalysisForm === 'function') {
        setTimeout(function() {
          if (typeof window.zettRefreshElectricUiAfterRender === 'function') {
            window.zettRefreshElectricUiAfterRender();
          } else {
            window.zettRenderElectricAnalysisForm();
            if (typeof window.calculateListrik === 'function') window.calculateListrik();
          }
        }, 30);
      }
      if (type === 'air') {
        setTimeout(function() {
          if (typeof window.zettRenderWaterAnalysisForm === 'function') window.zettRenderWaterAnalysisForm();
          if (typeof window.calculateAir === 'function') window.calculateAir();
        }, 30);
      }

      const scroller = byId('mainViewScroller') || document.querySelector('.custom-scroll');
      if (scroller && typeof scroller.scrollTo === 'function') {
        requestAnimationFrame(() => scroller.scrollTo({ top: 0, behavior: 'smooth' }));
      }
    }

    function closeFormSmooth() {
      const page = byId('view-hpp');
      const dashboard = byId('hpp-dashboard-view');
      const formView = byId('hpp-form-view');
      const titleEl = byId('hpp-form-title-text');
      const outerHeader = titleEl ? titleEl.closest('.flex.items-center.gap-5') : null;
      if (page) {
        page.classList.remove('hpp-form-active');
        delete page.dataset.hppActiveForm;
      }
      if (outerHeader) outerHeader.style.display = '';
      hideEl(formView);
      document.querySelectorAll('#view-hpp .tab-content').forEach(tab => hideEl(tab));
      showEl(dashboard, 'block');
      if (dashboard) {
        dashboard.classList.remove('hpp-dashboard-return-final', 'hpp-view-enter-premium');
        void dashboard.offsetWidth;
        dashboard.classList.add('hpp-dashboard-return-final');
      }
    }

    function inferTypeFromCard(card) {
      const valueEl = card.querySelector('[id^="dash-card-"]');
      if (!valueEl || !valueEl.id) return '';
      return valueEl.id.replace('dash-card-', '');
    }

    function attachCardClickHandlers() {
      Object.keys(cardMap).forEach(type => {
        const valueEl = byId(cardMap[type].id);
        if (!valueEl) return;
        const card = valueEl.closest('.hpp-card-dash');
        if (!card) return;
        card.dataset.hppType = type;
        card.dataset.hppTitle = cardMap[type].title;
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', '0');
        card.setAttribute('aria-label', 'Buka ' + cardMap[type].title);
        card.onclick = function(event) {
          event.preventDefault();
          event.stopPropagation();
          const activeType = card.dataset.hppType || inferTypeFromCard(card);
          const activeTitle = card.dataset.hppTitle || (cardMap[activeType] ? cardMap[activeType].title : 'Analisa Biaya');
          card.classList.add('zett-hpp-card-pressed');
          window.setTimeout(() => {
            card.classList.remove('zett-hpp-card-pressed');
            openFormSmooth(activeType, activeTitle);
          }, 115);
        };
        card.onkeydown = function(event) {
          if (event.key === 'Enter' || event.key === ' ') {
            event.preventDefault();
            card.click();
          }
        };
      });
    }

    function ensurePercentNodes() {
      Object.keys(cardMap).forEach(type => {
        const valueEl = byId(cardMap[type].id);
        if (!valueEl) return;
        const id = cardMap[type].id + '-pct';
        let pct = byId(id);
        if (!pct) {
          pct = document.createElement('p');
          pct.id = id;
          pct.className = 'hpp-card-percent';
          valueEl.insertAdjacentElement('afterend', pct);
        }
        pct.title = 'Persentase kontribusi biaya ini terhadap ringkasan biaya variabel.';
        pct.setAttribute('aria-label', 'Persentase kontribusi terhadap total HPP');
      });
    }

    function updateCompactPercent() {
      ensurePercentNodes();
      const hpp = window.APP_STATE && window.APP_STATE.data && window.APP_STATE.data.hpp ? window.APP_STATE.data.hpp : null;
      const total = hpp ? Number(hpp.total || 0) : 0;
      Object.keys(cardMap).forEach(type => {
        const pctEl = byId(cardMap[type].id + '-pct');
        if (!pctEl) return;
        const value = hpp ? Number(hpp[type] || 0) : 0;
        const pct = total > 0 ? Math.round((value / total) * 100) : 0;
        pctEl.textContent = pct + '%';
      });
    }

    function wrapRenderDashboard() {
      if (!window.StateMachine || typeof window.StateMachine.renderDashboard !== 'function' || window.StateMachine.renderDashboard.__zettFinalPctWrapped) return;
      const originalRender = window.StateMachine.renderDashboard.bind(window.StateMachine);
      window.StateMachine.renderDashboard = function() {
        const result = originalRender.apply(this, arguments);
        requestAnimationFrame(updateCompactPercent);
        setTimeout(updateCompactPercent, 60);
        return result;
      };
      window.StateMachine.renderDashboard.__zettFinalPctWrapped = true;
    }

    function boot() {
      attachCardClickHandlers();
      updateCompactPercent();
      wrapRenderDashboard();
      window.openHPPForm = openFormSmooth;
      window.closeHPPForm = closeFormSmooth;
      setTimeout(attachCardClickHandlers, 250);
      setTimeout(updateCompactPercent, 250);
      setTimeout(updateCompactPercent, 900);
    }

    if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot, { once: true });
    else boot();
  })();
</script>

<script id="hpp-admin-nota-form-flow-lock-20260521">
  (function hppAdminNotaFormFlowLock20260521() {
    function byId(id) { return document.getElementById(id); }

    function getMainScroller() {
      return byId('mainViewScroller') || document.querySelector('.custom-scroll') || window;
    }

    function scrollToActiveHppForm(type) {
      const form = byId('tab-' + type) || byId('hpp-form-view');
      const scroller = getMainScroller();
      if (!form) return;

      requestAnimationFrame(function() {
        setTimeout(function() {
          if (scroller === window) {
            form.scrollIntoView({ behavior: 'smooth', block: 'start' });
            return;
          }

          if (!scroller || typeof scroller.scrollTo !== 'function' || typeof scroller.getBoundingClientRect !== 'function') return;
          const scrollerRect = scroller.getBoundingClientRect();
          const formRect = form.getBoundingClientRect();
          const offset = formRect.top - scrollerRect.top + scroller.scrollTop - 12;

          scroller.scrollTo({
            top: Math.max(0, offset),
            behavior: 'smooth'
          });
        }, 60);
      });
    }

    function lockFormMode(type) {
      const page = byId('view-hpp');
      const dashboard = byId('hpp-dashboard-view');
      const formView = byId('hpp-form-view');
      const tab = byId('tab-' + type);

      if (page) {
        page.classList.add('hpp-form-active');
        page.dataset.hppActiveForm = type || '';
      }
      if (dashboard) {
        dashboard.classList.add('hidden');
        dashboard.style.display = 'none';
      }
      if (formView) {
        formView.classList.remove('hidden');
        formView.style.display = 'block';
      }
      document.querySelectorAll('#view-hpp .tab-content').forEach(function(item) {
        if (item === tab) return;
        item.classList.add('hidden');
        item.style.display = 'none';
      });
      if (tab) {
        tab.classList.remove('hidden');
        tab.style.display = 'grid';
      }

      scrollToActiveHppForm(type);
    }

    function unlockFormMode() {
      const page = byId('view-hpp');
      if (page) {
        page.classList.remove('hpp-form-active');
        delete page.dataset.hppActiveForm;
      }
    }

    function bindHppCardFormModeFallback() {
      ['gas', 'listrik', 'air', 'packing', 'bahan', 'nota'].forEach(function(type) {
        const valueEl = byId('dash-card-' + type);
        const card = valueEl ? valueEl.closest('.hpp-card-dash') : null;
        if (!card || card.__hppFormModeBound) return;
        card.__hppFormModeBound = true;
        card.addEventListener('click', function() {
          setTimeout(function() { lockFormMode(type); }, 180);
          setTimeout(function() { scrollToActiveHppForm(type); }, 320);
        });
      });
    }

    const originalOpen = window.openHPPForm;
    if (typeof originalOpen === 'function' && !originalOpen.__hppAdminNotaFlowLocked) {
      const wrappedOpen = function(type, title) {
        const result = originalOpen.apply(this, arguments);
        if (type) {
          lockFormMode(type);
          requestAnimationFrame(function() { lockFormMode(type); });
          setTimeout(function() { lockFormMode(type); }, 80);
          setTimeout(function() { lockFormMode(type); }, 220);
        }
        return result;
      };
      wrappedOpen.__hppAdminNotaFlowLocked = true;
      window.openHPPForm = wrappedOpen;
    }

    const originalClose = window.closeHPPForm;
    if (typeof originalClose === 'function' && !originalClose.__hppAdminNotaFlowLocked) {
      const wrappedClose = function() {
        unlockFormMode();
        return originalClose.apply(this, arguments);
      };
      wrappedClose.__hppAdminNotaFlowLocked = true;
      window.closeHPPForm = wrappedClose;
    }

    bindHppCardFormModeFallback();
    setTimeout(bindHppCardFormModeFallback, 300);
  })();
</script>
